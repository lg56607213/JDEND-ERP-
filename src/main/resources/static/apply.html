<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무료체험 신청 | JDEND 렌터카 ERP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f0f4fb;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
      color: #1f2937;
    }

    /* 헤더 */
    .header {
      background: #1b253a;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      color: #60a5fa;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header-sep { color: #334155; }
    .header-title { color: #94aac4; font-size: 14px; }

    /* 본문 */
    .page {
      max-width: 680px;
      margin: 40px auto 60px;
      padding: 0 16px;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .hero h1 {
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 8px;
      color: #1b253a;
    }
    .hero p {
      color: #64748b;
      font-size: 15px;
      margin: 0;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,.07);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-row.full { grid-template-columns: 1fr; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
    }
    .form-group label .req {
      color: #ef4444;
      margin-left: 2px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      color: #111827;
      transition: border-color .15s;
      outline: none;
      background: #fff;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #2563eb;
    }
    .form-group input.error,
    .form-group select.error,
    .form-group textarea.error {
      border-color: #ef4444;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 90px;
    }

    .divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 20px 0;
    }

    .agree-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }
    .agree-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: #2563eb;
    }
    .agree-row label {
      font-size: 14px;
      color: #374151;
      cursor: pointer;
      line-height: 1.5;
    }
    .agree-row a {
      color: #2563eb;
      text-decoration: none;
    }
    .agree-row a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background .15s;
    }
    .btn-submit:hover { background: #1d4ed8; }
    .btn-submit:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    /* 성공/오류 메시지 */
    .msg {
      display: none;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 16px;
      line-height: 1.6;
    }
    .msg.success {
      background: #f0fdf4;
      color: #15803d;
      border: 1.5px solid #bbf7d0;
    }
    .msg.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1.5px solid #fecaca;
    }

    @media (max-width: 560px) {
      .form-row { grid-template-columns: 1fr; }
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <span class="header-logo">JDEND ERP</span>
  <span class="header-sep">|</span>
  <span class="header-title">렌터카 전문 ERP 솔루션</span>
</div>

<!-- 본문 -->
<div class="page">
  <div class="hero">
    <h1>무료체험 신청</h1>
    <p>신청 후 1-2 영업일 내 담당자가 연락드리고 계정을 발급해드립니다.</p>
  </div>

  <div class="card">
    <form id="applyForm" onsubmit="submitForm(event)" novalidate>

      <div class="form-row">
        <div class="form-group">
          <label for="companyName">회사명<span class="req">*</span></label>
          <input type="text" id="companyName" placeholder="예: 동천렌터카" required>
        </div>
        <div class="form-group">
          <label for="representativeName">대표자명<span class="req">*</span></label>
          <input type="text" id="representativeName" placeholder="예: 홍길동" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">연락처<span class="req">*</span></label>
          <input type="tel" id="phone" placeholder="010-1234-5678" required>
        </div>
        <div class="form-group">
          <label for="email">이메일<span class="req">*</span></label>
          <input type="email" id="email" placeholder="example@company.com" required>
        </div>
      </div>

      <div class="form-row full">
        <div class="form-group">
          <label for="vehicleCount">차량 보유 대수</label>
          <select id="vehicleCount">
            <option value="">선택 (선택사항)</option>
            <option value="10대 미만">10대 미만</option>
            <option value="10-30대">10-30대</option>
            <option value="30-50대">30-50대</option>
            <option value="50대 이상">50대 이상</option>
          </select>
        </div>
      </div>

      <div class="form-row full">
        <div class="form-group">
          <label for="inquiry">문의사항</label>
          <textarea id="inquiry" placeholder="궁금한 사항을 자유롭게 입력해주세요. (선택사항)"></textarea>
        </div>
      </div>

      <hr class="divider">

      <div class="agree-row">
        <input type="checkbox" id="agreePrivacy">
        <label for="agreePrivacy">
          <a href="/legal/privacy_policy.html" target="_blank">개인정보 처리방침</a>에 동의합니다.<span class="req">*</span>
        </label>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">무료체험 신청하기</button>

      <div class="msg" id="successMsg">
        신청이 완료되었습니다.<br>
        담당자가 1-2 영업일 내 연락드리겠습니다.
      </div>
      <div class="msg" id="errorMsg"></div>

    </form>
  </div>
</div>

<script>
  function val(id) {
    return document.getElementById(id).value.trim();
  }

  function showError(id, show) {
    const el = document.getElementById(id);
    if (show) el.classList.add('error');
    else el.classList.remove('error');
  }

  async function submitForm(e) {
    e.preventDefault();

    const companyName       = val('companyName');
    const representativeName = val('representativeName');
    const phone             = val('phone');
    const email             = val('email');
    const vehicleCount      = val('vehicleCount');
    const inquiry           = document.getElementById('inquiry').value.trim();
    const agreePrivacy      = document.getElementById('agreePrivacy').checked;

    // 클라이언트 검증
    let hasErr = false;
    [['companyName', !companyName],
     ['representativeName', !representativeName],
     ['phone', !phone],
     ['email', !email || !email.includes('@')]].forEach(([id, err]) => {
      showError(id, err);
      if (err) hasErr = true;
    });

    if (!agreePrivacy) {
      alert('개인정보 처리방침에 동의해주세요.');
      hasErr = true;
    }

    if (hasErr) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '신청 중...';

    document.getElementById('successMsg').style.display = 'none';
    const errEl = document.getElementById('errorMsg');
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/company-applications', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ companyName, representativeName, phone, email, vehicleCount, inquiry })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById('applyForm').style.display = 'none';
        const msg = document.getElementById('successMsg');
        msg.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        errEl.textContent = data.message || '신청 중 오류가 발생했습니다.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '무료체험 신청하기';
      }
    } catch (err) {
      errEl.textContent = '네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '무료체험 신청하기';
    }
  }
</script>
</body>
</html>
