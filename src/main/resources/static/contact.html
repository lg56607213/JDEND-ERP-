<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 | JDEND ERP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
      background: #f5f7fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1b253a;
      letter-spacing: -0.5px;
    }
    .brand p {
      font-size: 0.88rem;
      color: #6b7280;
      margin-top: 4px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 36px 40px;
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1b253a;
      margin-bottom: 6px;
    }
    .card .sub {
      font-size: 0.84rem;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
    }
    .field label .req { color: #ef4444; margin-left: 2px; }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 0.92rem;
      color: #1a2035;
      font-family: inherit;
      transition: border-color .15s;
      background: #fff;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .field textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.6;
    }
    .field select { cursor: pointer; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    .btn-submit:hover:not(:disabled) { background: #1d4ed8; }
    .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
    .result {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 7px;
      font-size: 0.88rem;
      display: none;
      text-align: center;
    }
    .result.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .result.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .back-link {
      margin-top: 24px;
      text-align: center;
      font-size: 0.84rem;
      color: #6b7280;
    }
    .back-link a { color: #2563eb; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 24px 0;
    }
    .contact-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .contact-info .icon { font-size: 1rem; }
  </style>
</head>
<body>

<div class="brand">
  <h1>JDEND ERP</h1>
  <p>렌트카 전문 클라우드 ERP 솔루션</p>
</div>

<div class="card">
  <h2>도입 문의</h2>
  <p class="sub">서비스 도입, 기능, 요금 등 궁금하신 사항을 남겨주시면<br>담당자가 확인 후 빠르게 연락드리겠습니다.</p>

  <form id="contactForm" novalidate>

    <div class="row">
      <div class="field">
        <label>회사명 <span class="req">*</span></label>
        <input type="text" id="companyName" placeholder="예) 주식회사 홍길동렌터카" maxlength="100">
      </div>
      <div class="field">
        <label>담당자명 <span class="req">*</span></label>
        <input type="text" id="contactName" placeholder="성함" maxlength="50">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>연락처 <span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="010-0000-0000" maxlength="20">
      </div>
      <div class="field">
        <label>이메일</label>
        <input type="email" id="email" placeholder="회신 받을 이메일 (선택)" maxlength="100">
      </div>
    </div>

    <div class="field">
      <label>문의 유형 <span class="req">*</span></label>
      <select id="category">
        <option value="도입 문의">도입 문의 (서비스 가입·체험)</option>
        <option value="기능 문의">기능 문의 (특정 기능 설명 요청)</option>
        <option value="가격·요금 문의">가격·요금 문의</option>
        <option value="기술 지원">기술 지원 (오류·장애)</option>
        <option value="기타">기타</option>
      </select>
    </div>

    <div class="field">
      <label>문의 내용 <span class="req">*</span></label>
      <textarea id="content" placeholder="문의하실 내용을 자세히 적어주세요.&#10;&#10;예) 현재 차량 30대를 운영 중이며 계약 관리와 수납 관리 기능에 대해 문의드립니다." maxlength="2000"></textarea>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">문의 접수하기</button>
    <div class="result" id="result"></div>
  </form>

  <hr class="divider">

  <div class="contact-info">
    <span class="icon">📧</span>
    <span>이메일로도 문의 가능합니다: <strong>lg56607213@gmail.com</strong></span>
  </div>
  <div class="contact-info">
    <span class="icon">⏰</span>
    <span>운영 시간: 평일 09:00 ~ 18:00 (주말·공휴일 제외)</span>
  </div>
</div>

<div class="back-link">
  <a href="/login.html">← 로그인 화면으로 돌아가기</a>
</div>

<script>
  document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const result = document.getElementById('result');

    const payload = {
      companyName: document.getElementById('companyName').value.trim(),
      contactName: document.getElementById('contactName').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim(),
      category: document.getElementById('category').value,
      content: document.getElementById('content').value.trim()
    };

    result.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '전송 중...';

    try {
      const res = await fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      result.className = 'result ' + (data.success ? 'success' : 'error');
      result.textContent = data.message;
      result.style.display = 'block';

      if (data.success) {
        document.getElementById('contactForm').reset();
        btn.textContent = '접수 완료 ✓';
        btn.style.background = '#16a34a';
      } else {
        btn.disabled = false;
        btn.textContent = '문의 접수하기';
      }

    } catch (err) {
      result.className = 'result error';
      result.textContent = '전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
      result.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '문의 접수하기';
    }
  });
</script>
</body>
</html>
