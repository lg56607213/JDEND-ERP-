<script src="../../assets/js/sidebar.js"></script>

<!-- ❌ http.js 제거 -->

<script>
  // =========================
  // ✅ API_BASE_URL(fetch) 기반 공통
  // =========================
  function apiBase() {
    return (window.API_BASE_URL || "").replace(/\/$/, "");
  }

  async function request(url, options) {
    const res = await fetch(url, options || {});
    if (res.ok) {
      const ct = res.headers.get("content-type") || "";
      return ct.includes("application/json") ? res.json() : res.text();
    }

    // 에러 바디 최대한 읽어서 보여줌
    let body = "";
    try { body = await res.text(); } catch (_) {}
    throw new Error(`HTTP ${res.status} - ${body || "요청 실패"}`);
  }

  async function getJson(path) {
    const url = apiBase() + path;
    console.log("GET:", url);
    return request(url, {
      method: "GET",
      headers: { "Content-Type": "application/json" }
    });
  }

  async function putJson(path, body) {
    const url = apiBase() + path;
    console.log("PUT:", url, body);
    return request(url, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body ?? {})
    });
  }

  // =========================
  // ✅ 화면 로직(기존 그대로)
  // =========================

  // 계정코드 변경 시 분류계정 자동 선택
  function wireSync() {
    document.querySelectorAll('.account-code').forEach(input => {
      input.addEventListener('change', function () {
        const row = this.closest('.prepaid-item') || this.closest('.account-input-group');
        const select = row.querySelector('.account-select');
        if (select) {
          const code = this.value.trim();
          const option = select.querySelector(`option[value="${code}"]`);
          if (option) select.value = code;
        }
      });
    });

    document.querySelectorAll('.account-select').forEach(select => {
      select.addEventListener('change', function () {
        const row = this.closest('.prepaid-item') || this.closest('.account-input-group');
        const input = row.querySelector('.account-code');
        if (input) input.value = this.value;
      });
    });
  }

  function resetSettings() {
    if (confirm('모든 설정을 기본값으로 초기화하시겠습니까?')) location.reload();
  }

  function selText(id) {
    const el = document.getElementById(id);
    return el ? (el.options[el.selectedIndex]?.textContent?.trim() || "") : "";
  }
  function selVal(id) {
    const el = document.getElementById(id);
    return el ? el.value : "";
  }
  function inputVal(id) {
    const el = document.getElementById(id);
    return el ? el.value.trim() : "";
  }

  function collectSettings() {
    const prepaidAccounts = [];
    document.querySelectorAll('#prepaidAccountBody .prepaid-item').forEach(item => {
      const name = item.querySelector('.prepaid-label').textContent.trim();
      const code = item.querySelector('.account-code').value.trim();
      const account = item.querySelector('.account-select').value;
      const accountName = item.querySelector('.account-select option:checked')?.textContent?.trim() || "";
      prepaidAccounts.push({ name, code, account, accountName });
    });

    const vehicleMapping = {
      debit: { code: inputVal('vehicleDebitCode'), account: selVal('vehicleDebitAccount'), accountName: selText('vehicleDebitAccount') },
      credit: { code: inputVal('vehicleCreditCode'), account: selVal('vehicleCreditAccount'), accountName: selText('vehicleCreditAccount') }
    };

    const loanMapping = {
      debit1: { code: inputVal('loanDebitCode1'), account: selVal('loanDebitAccount1'), accountName: selText('loanDebitAccount1') },
      debit2: { code: inputVal('loanDebitCode2'), account: selVal('loanDebitAccount2'), accountName: selText('loanDebitAccount2') },
      credit: { code: inputVal('loanCreditCode'), account: selVal('loanCreditAccount'), accountName: selText('loanCreditAccount'), bankAccount: selVal('loanBankAccount') }
    };

    const inspectionMapping = {
      debit: { code: inputVal('inspectionDebitCode'), account: selVal('inspectionDebitAccount'), accountName: selText('inspectionDebitAccount') },
      credit: { code: inputVal('inspectionCreditCode'), account: selVal('inspectionCreditAccount'), accountName: selText('inspectionCreditAccount'), bankAccount: selVal('inspectionBankAccount') }
    };

    return { prepaidAccounts, vehicleMapping, loanMapping, inspectionMapping };
  }

  function applySettings(settings) {
    if (!settings) return;

    // 선급 분류
    if (Array.isArray(settings.prepaidAccounts)) {
      const map = new Map(settings.prepaidAccounts.map(x => [x.name, x]));
      document.querySelectorAll('#prepaidAccountBody .prepaid-item').forEach(item => {
        const name = item.querySelector('.prepaid-label').textContent.trim();
        const saved = map.get(name);
        if (saved) {
          item.querySelector('.account-code').value = saved.code ?? "";
          const sel = item.querySelector('.account-select');
          if (sel.querySelector(`option[value="${saved.account}"]`)) sel.value = saved.account;
        }
      });
    }

    // 차량관리 실행
    if (settings.vehicleMapping) {
      document.getElementById('vehicleDebitCode').value = settings.vehicleMapping.debit?.code ?? "";
      document.getElementById('vehicleDebitAccount').value = settings.vehicleMapping.debit?.account ?? document.getElementById('vehicleDebitAccount').value;
      document.getElementById('vehicleCreditCode').value = settings.vehicleMapping.credit?.code ?? "";
      document.getElementById('vehicleCreditAccount').value = settings.vehicleMapping.credit?.account ?? document.getElementById('vehicleCreditAccount').value;
    }

    // 차입금상환
    if (settings.loanMapping) {
      document.getElementById('loanDebitCode1').value = settings.loanMapping.debit1?.code ?? "";
      document.getElementById('loanDebitAccount1').value = settings.loanMapping.debit1?.account ?? document.getElementById('loanDebitAccount1').value;

      document.getElementById('loanDebitCode2').value = settings.loanMapping.debit2?.code ?? "";
      document.getElementById('loanDebitAccount2').value = settings.loanMapping.debit2?.account ?? document.getElementById('loanDebitAccount2').value;

      document.getElementById('loanCreditCode').value = settings.loanMapping.credit?.code ?? "";
      document.getElementById('loanCreditAccount').value = settings.loanMapping.credit?.account ?? document.getElementById('loanCreditAccount').value;
      document.getElementById('loanBankAccount').value = settings.loanMapping.credit?.bankAccount ?? "";
    }

    // 정기검사
    if (settings.inspectionMapping) {
      document.getElementById('inspectionDebitCode').value = settings.inspectionMapping.debit?.code ?? "";
      document.getElementById('inspectionDebitAccount').value = settings.inspectionMapping.debit?.account ?? document.getElementById('inspectionDebitAccount').value;

      document.getElementById('inspectionCreditCode').value = settings.inspectionMapping.credit?.code ?? "";
      document.getElementById('inspectionCreditAccount').value = settings.inspectionMapping.credit?.account ?? document.getElementById('inspectionCreditAccount').value;
      document.getElementById('inspectionBankAccount').value = settings.inspectionMapping.credit?.bankAccount ?? "";
    }
  }

  async function loadSettings() {
    try {
      const data = await getJson("/api/accounting/other-account-settings");
      // 서버 응답이 {settings:{...}} 형태라는 가정
      applySettings(data?.settings);
    } catch (e) {
      console.warn("설정 로드 실패(처음이면 정상):", e.message);
    }
  }

  async function saveSettings() {
    try {
      const settings = collectSettings();
      await putJson("/api/accounting/other-account-settings", { settings });
      alert("계정 설정이 저장되었습니다.");
    } catch (e) {
      alert("저장 실패: " + e.message);
    }
  }

  window.addEventListener("load", () => {
    wireSync();
    loadSettings();
  });
</script>
