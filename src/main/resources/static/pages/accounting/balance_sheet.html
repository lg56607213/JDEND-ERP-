<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재무상태표 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/accounting/balance_sheet.css">
  <style>
    .clickable-row {
      cursor: pointer;
    }
    .clickable-row:hover {
      background: #f8fafc;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-box {
      width: min(1200px, 96vw);
      max-height: 88vh;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.2);
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
    }

    .modal-close {
      border: none;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-body {
      padding: 14px 16px;
      overflow: auto;
    }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
    }

    .detail-table th,
    .detail-table td {
      border-bottom: 1px solid #eee;
      padding: 10px 8px;
      text-align: left;
      font-size: 13px;
    }

    .detail-table th {
      background: #f9fafb;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .text-right {
      text-align: right;
    }

    .muted {
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>재무상태표</h1>
      <p>회계관리 &gt; 재무제표관리 &gt; 재무상태표</p>
    </div>

    <div class="info-notice">
      ℹ️ 재무상태표는 입력이 불가하며, 전표들의 내용으로 합계잔액이 자동으로 표시됩니다.
    </div>

    <div class="erp-card">
      <div class="card-body">
        <div class="date-section">
          <div class="form-group">
            <label for="referenceDate">기준일</label>
            <input type="date" id="referenceDate">
          </div>
          <button type="button" class="btn-search" onclick="loadBalanceSheet()">조회</button>
        </div>

        <div class="balance-sheet-container">
          <div class="statement-section">
            <div class="section-header assets">자산현황</div>
            <div class="section-content">
              <table class="statement-table">
                <tbody id="assetsTableBody">
                  <tr class="clickable-row" data-group-key="cash"><td>현금</td><td id="cash">0</td></tr>
                  <tr><td>렌트자산</td><td id="rentAssets">0</td></tr>
                  <tr class="clickable-row" data-group-key="rentAssetsStatus"><td class="indent-1">렌트자산현황</td><td id="rentAssetsStatus">0</td></tr>
                  <tr class="clickable-row" data-group-key="accumulatedDepreciation"><td class="indent-1">감가상각누계액</td><td id="accumulatedDepreciation">0</td></tr>
                  <tr class="clickable-row" data-group-key="prepaidAssets"><td class="indent-1">선급자산</td><td id="prepaidAssets">0</td></tr>
                  <tr class="clickable-row" data-group-key="vatReceivable"><td>부가세대급금</td><td id="vatReceivable">0</td></tr>
                  <tr class="total-row"><td>자산 총계</td><td id="totalAssets">0</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="statement-section">
            <div class="section-header liabilities">부채현황</div>
            <div class="section-content">
              <table class="statement-table">
                <tbody id="liabilitiesTableBody">
                  <tr class="clickable-row" data-group-key="borrowedLiabilities"><td>차입부채</td><td id="borrowedLiabilities">0</td></tr>
                  <tr class="clickable-row" data-group-key="advanceReceived"><td>선수금</td><td id="advanceReceived">0</td></tr>
                  <tr class="clickable-row" data-group-key="accountsPayable"><td>미지급금</td><td id="accountsPayable">0</td></tr>
                  <tr class="clickable-row" data-group-key="deposit"><td>보증금</td><td id="deposit">0</td></tr>
                  <tr class="total-row"><td>부채 총계</td><td id="totalLiabilities">0</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="statement-section">
          <div class="section-header equity">자본현황</div>
          <div class="section-content">
            <table class="statement-table">
              <tbody id="equityTableBody">
                <tr class="clickable-row" data-group-key="capital"><td>자본금</td><td id="capital">0</td></tr>
                <tr class="clickable-row" data-group-key="capitalSurplus"><td>자본잉여금</td><td id="capitalSurplus">0</td></tr>
                <tr class="total-row"><td>자본 총계</td><td id="totalEquity">0</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="summary-section">
          <div class="summary-title">재무상태 요약</div>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="summary-label">총 자산</div>
              <div class="summary-value assets" id="summaryAssets">0 원</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">총 부채</div>
              <div class="summary-value liabilities" id="summaryLiabilities">0 원</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">총 자본</div>
              <div class="summary-value equity" id="summaryEquity">0 원</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div class="modal-backdrop" id="detailModal">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="detailModalTitle">상세내역</div>
          <div class="muted" id="detailModalSubTitle">기준일 기준 전표 내역</div>
        </div>
        <button type="button" class="modal-close" onclick="closeDetailModal()">×</button>
      </div>
      <div class="modal-body">
        <table class="detail-table">
          <thead>
            <tr>
              <th style="width:110px;">전표일자</th>
              <th style="width:140px;">전표번호</th>
              <th style="width:80px;">구분</th>
              <th style="width:180px;">계정명</th>
              <th style="width:140px;">금액</th>
              <th style="width:180px;">적요</th>
              <th style="width:140px;">계약번호</th>
              <th style="width:120px;">차량번호</th>
              <th style="width:100px;">상태</th>
            </tr>
          </thead>
          <tbody id="detailTableBody">
            <tr><td colspan="9" style="text-align:center;">조회중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    function mustOk(res){ if(!res.ok) throw new Error("HTTP " + res.status); return res; }
    function formatNumber(num) { return Number(num || 0).toLocaleString(); }

    const GROUP_TITLE_MAP = {
      cash: "현금",
      rentAssetsStatus: "렌트자산현황",
      accumulatedDepreciation: "감가상각누계액",
      prepaidAssets: "선급자산",
      vatReceivable: "부가세대급금",
      borrowedLiabilities: "차입부채",
      advanceReceived: "선수금",
      accountsPayable: "미지급금",
      deposit: "보증금",
      capital: "자본금",
      capitalSurplus: "자본잉여금"
    };

    window.addEventListener('load', function() {
      const today = new Date();
      document.getElementById('referenceDate').value = today.toISOString().split('T')[0];
      bindClickableRows();
      loadBalanceSheet();
    });

    function bindClickableRows() {
      document.querySelectorAll('.clickable-row[data-group-key]').forEach(row => {
        row.addEventListener('click', async function() {
          const groupKey = row.dataset.groupKey;
          await openDetailModal(groupKey);
        });
      });
    }

    async function loadBalanceSheet() {
      const referenceDate = document.getElementById('referenceDate').value;
      if (!referenceDate) return alert('기준일을 선택해주세요.');

      const qs = new URLSearchParams({ referenceDate, status: "승인" });

      const res = await fetch(`${API_BASE_URL}/api/statements/balance?` + qs.toString());
      await mustOk(res);
      const data = await res.json();

      displayBalanceSheet(data);
    }

    function displayBalanceSheet(data) {
      document.getElementById('cash').textContent = formatNumber(data.cash);
      document.getElementById('rentAssets').textContent = formatNumber(data.rentAssets);
      document.getElementById('rentAssetsStatus').textContent = formatNumber(data.rentAssetsStatus);
      document.getElementById('accumulatedDepreciation').textContent = formatNumber(data.accumulatedDepreciation);
      document.getElementById('prepaidAssets').textContent = formatNumber(data.prepaidAssets);
      document.getElementById('vatReceivable').textContent = formatNumber(data.vatReceivable);

      const totalAssets = (data.cash||0) + (data.rentAssets||0) + (data.vatReceivable||0);
      document.getElementById('totalAssets').textContent = formatNumber(totalAssets);

      document.getElementById('borrowedLiabilities').textContent = formatNumber(data.borrowedLiabilities);
      document.getElementById('advanceReceived').textContent = formatNumber(data.advanceReceived);
      document.getElementById('accountsPayable').textContent = formatNumber(data.accountsPayable);
      document.getElementById('deposit').textContent = formatNumber(data.deposit);

      const totalLiabilities =
        (data.borrowedLiabilities||0) + (data.advanceReceived||0) + (data.accountsPayable||0) + (data.deposit||0);
      document.getElementById('totalLiabilities').textContent = formatNumber(totalLiabilities);

      document.getElementById('capital').textContent = formatNumber(data.capital);
      document.getElementById('capitalSurplus').textContent = formatNumber(data.capitalSurplus);

      const totalEquity = (data.capital||0) + (data.capitalSurplus||0);
      document.getElementById('totalEquity').textContent = formatNumber(totalEquity);

      document.getElementById('summaryAssets').textContent = formatNumber(totalAssets) + ' 원';
      document.getElementById('summaryLiabilities').textContent = formatNumber(totalLiabilities) + ' 원';
      document.getElementById('summaryEquity').textContent = formatNumber(totalEquity) + ' 원';
    }

    async function openDetailModal(groupKey) {
      const referenceDate = document.getElementById('referenceDate').value;
      if (!referenceDate) {
        alert('기준일을 선택해주세요.');
        return;
      }

      document.getElementById('detailModalTitle').textContent = `${GROUP_TITLE_MAP[groupKey] || groupKey} 상세내역`;
      document.getElementById('detailModalSubTitle').textContent = `${referenceDate} 기준 승인 전표 내역`;
      document.getElementById('detailTableBody').innerHTML = `<tr><td colspan="9" style="text-align:center;">조회중...</td></tr>`;
      document.getElementById('detailModal').style.display = 'flex';

      try {
        const qs = new URLSearchParams({
          groupKey,
          referenceDate,
          status: '승인'
        });

        const res = await fetch(`${API_BASE_URL}/api/statements/balance/details?` + qs.toString());
        await mustOk(res);
        const rows = await res.json();

        renderDetailRows(rows);
      } catch (e) {
        document.getElementById('detailTableBody').innerHTML = `<tr><td colspan="9" style="text-align:center;">조회 실패: ${e.message}</td></tr>`;
      }
    }

    function renderDetailRows(rows) {
      const tbody = document.getElementById('detailTableBody');

      if (!rows || rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;">상세내역이 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.voucherDate || '-'}</td>
          <td>${r.voucherNo || '-'}</td>
          <td>${r.lineType || '-'}</td>
          <td>${r.accountName || '-'}</td>
          <td class="text-right">${formatNumber(r.amount)}</td>
          <td>${r.description || '-'}</td>
          <td>${r.contractNumber || '-'}</td>
          <td>${r.vehicleNo || '-'}</td>
          <td>${r.status || '-'}</td>
        </tr>
      `).join('');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').style.display = 'none';
    }

    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) closeDetailModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeDetailModal();
    });
  </script>
</body>
</html>
