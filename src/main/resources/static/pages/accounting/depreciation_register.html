<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>감가상각등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />
  <link rel="stylesheet" href="../../assets/css/accounting/depreciation_register.css" />
  <style>
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:44px; }
    .icon-btn{
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      width:34px; height:34px; border:1px solid #ddd; background:#fff;
      border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }
    .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); align-items:center; justify-content:center; z-index:9999;}
    .modal-box{ width:min(920px, 92vw); background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 28px rgba(0,0,0,.2);}
    .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee;}
    .modal-body{ padding:14px 16px; }
    .modal-foot{ padding:14px 16px; border-top:1px solid #eee; display:flex; gap:8px; justify-content:flex-end;}
    .modal-close{ border:none; background:transparent; font-size:24px; cursor:pointer;}
    .lookup-table{ width:100%; border-collapse:collapse; }
    .lookup-table th,.lookup-table td{ border-bottom:1px solid #eee; padding:10px; text-align:left; }
    .lookup-table tr:hover{ background:#f8f8f8; cursor:pointer; }
    .text-right{ text-align:right; }
    .round-badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid #ddd;
      background:#fff;
    }
    .round-pending{
      background:#fff7ed;
      border-color:#fed7aa;
      color:#c2410c;
    }
    .round-done{
      background:#ecfdf5;
      border-color:#a7f3d0;
      color:#047857;
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>감가상각등록</h1>
      <p>회계관리 &gt; 감가상각 &gt; 감가상각등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <div class="form-section">
          <div class="search-grid">
            <div class="form-group">
              <label for="baseMonth">상각기준월</label>
              <input type="month" id="baseMonth">
            </div>
            <div class="form-group">
              <label for="depMethod">상각방법</label>
              <select id="depMethod">
                <option value="">전체</option>
                <option value="정액법">정액법</option>
                <option value="정률법">정률법</option>
              </select>
            </div>
            <div class="form-group">
              <label for="assetType">자산구분</label>
              <select id="assetType">
                <option value="">전체</option>
                <option value="렌트자산">렌트자산</option>
                <option value="업무용차량">업무용차량</option>
                <option value="비품">비품</option>
              </select>
            </div>
            <div class="form-group">
              <label for="searchVehicleNo">차량번호</label>
              <div class="input-with-icon">
                <input type="text" id="searchVehicleNo" placeholder="차량번호 입력">
                <button class="icon-btn" type="button" onclick="openVehicleLookup('search')">🔍</button>
              </div>
            </div>
            <div class="form-group">
              <label for="depStartSearch">감가상각시작일</label>
              <input type="date" id="depStartSearch">
            </div>
            <div class="form-group">
              <label for="depEndSearch">감가상각종료일</label>
              <input type="date" id="depEndSearch">
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-header-with-button">
            <h3 class="section-title">감가상각대상자산</h3>
            <div class="button-group">
              <button type="button" class="btn-action btn-add-asset" onclick="openAddModal()">추가</button>
              <button type="button" class="btn-action btn-search-asset" onclick="searchAssets()">조회</button>
            </div>
          </div>

          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th class="col-check"><input type="checkbox" id="checkAll" onclick="toggleCheckAll()"></th>
                  <th>차량관리번호</th>
                  <th>차량번호</th>
                  <th>최초취득가액</th>
                  <th>감가상각시작일</th>
                  <th>감가상각종료일</th>
                  <th>감가상각금액(월별)</th>
                  <th>감가상각누계액</th>
                  <th>미상각잔액</th>
                  <th>총회차</th>
                  <th>기등록회차</th>
                  <th>이번회차</th>
                  <th>이번회차상태</th>
                  <th>최근 감가상각일</th>
                  <th>전표발생일</th>
                </tr>
              </thead>
              <tbody id="assetTableBody"></tbody>
            </table>
          </div>

          <div class="bottom-actions">
            <button type="button" class="btn btn-secondary" onclick="clearSelection()">선택초기화</button>
            <button type="button" class="btn btn-primary" onclick="registerVoucher()">감가상각전표등록</button>
            <button type="button" class="btn btn-warning" onclick="completeDepreciation()">감가상각종료</button>
            <button type="button" class="btn btn-info" onclick="changeSchedule()">감가상각스케줄변경</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal-box">
      <div class="modal-head">
        <h3>감가상각 등록</h3>
        <button type="button" class="modal-close" onclick="closeAddModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-form-grid">
          <div class="form-group">
            <label for="modalVehicleNo">차량번호</label>
            <div class="input-with-icon">
              <input type="text" id="modalVehicleNo" placeholder="차량번호 입력">
              <button class="icon-btn" type="button" onclick="openVehicleLookup('modal')">🔍</button>
            </div>
          </div>
          <div class="form-group">
            <label for="modalMgmtNo">차량관리번호</label>
            <input type="text" id="modalMgmtNo" placeholder="자동입력" readonly>
          </div>

          <div class="form-group">
            <label for="modalDepMethod">상각방법</label>
            <select id="modalDepMethod">
              <option value="정액법">정액법</option>
              <option value="정률법">정률법</option>
            </select>
          </div>
          <div class="form-group">
            <label for="modalAssetType">자산구분</label>
            <select id="modalAssetType">
              <option value="렌트자산">렌트자산</option>
              <option value="업무용차량">업무용차량</option>
              <option value="비품">비품</option>
            </select>
          </div>

          <div class="form-group">
            <label for="modalAcquisitionCost">최초취득가액</label>
            <input type="text" id="modalAcquisitionCost" placeholder="0" oninput="formatNumber(this); calculateMonthlyDep()">
          </div>
          <div class="form-group">
            <label for="modalDepStartDate">감가상각시작일</label>
            <input type="date" id="modalDepStartDate" onchange="calculateMonthlyDep()">
          </div>
          <div class="form-group">
            <label for="modalMonthlyDep">감가상각금액(월)</label>
            <input type="text" id="modalMonthlyDep" placeholder="자동계산" readonly>
          </div>
          <div class="form-group">
            <label for="modalDepEndDate">감가상각종료일</label>
            <input type="date" id="modalDepEndDate" onchange="calculateMonthlyDep()">
          </div>

          <div class="form-group">
            <label for="modalVoucherDate">전표발생일</label>
            <input type="date" id="modalVoucherDate">
          </div>
          <div class="form-group"></div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-primary" onclick="saveDepreciation()">등록하기</button>
        <button type="button" class="btn btn-secondary" onclick="closeAddModal()">취소</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="vehicleLookupModal">
    <div class="modal-box">
      <div class="modal-head">
        <h3>차량 선택</h3>
        <button type="button" class="modal-close" onclick="closeVehicleLookup()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="search-row" style="display:flex; gap:8px; align-items:center;">
          <input id="vehicleKw" type="text" placeholder="차량번호/관리번호/모델 검색" style="flex:1;">
          <button class="btn btn-primary" type="button" onclick="doVehicleLookup()">조회</button>
        </div>
        <div style="margin-top:10px; max-height:420px; overflow:auto;">
          <table class="lookup-table">
            <thead>
              <tr>
                <th>차량관리번호</th>
                <th>차량번호</th>
                <th>모델</th>
                <th class="text-right">총가격</th>
              </tr>
            </thead>
            <tbody id="vehicleLookupBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-secondary" onclick="closeVehicleLookup()">닫기</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    let assetRows = [];

    function mustOk(res){ if(!res.ok) throw new Error("HTTP " + res.status); return res; }
    function ymdToday(){ return new Date().toISOString().split("T")[0]; }
    function ymToday(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      return `${y}-${m}`;
    }

    window.addEventListener('load', () => {
      $("baseMonth").value = ymToday();
      searchAssets();
    });

    function toggleCheckAll() {
      const checkAll = $('checkAll');
      document.querySelectorAll('.row-check').forEach(cb => cb.checked = checkAll.checked);
    }

    function clearSelection() {
      $('checkAll').checked = false;
      document.querySelectorAll('.row-check').forEach(cb => cb.checked = false);
    }

    function getCheckedAssetIds(){
      const ids = [];
      document.querySelectorAll(".row-check:checked").forEach(cb => ids.push(Number(cb.dataset.id)));
      return ids;
    }

    async function searchAssets() {
      const qs = new URLSearchParams({
        baseMonth: $("baseMonth").value || "",
        depMethod: $("depMethod").value || "",
        assetType: $("assetType").value || "",
        vehicleNo: $("searchVehicleNo").value || "",
        depStart: $("depStartSearch").value || "",
        depEnd: $("depEndSearch").value || "",
      });

      const res = await fetch(`${API_BASE_URL}/api/depreciation/assets?` + qs.toString());
      await mustOk(res);
      assetRows = await res.json();
      renderAssets(assetRows);
    }

    function renderRoundStatus(r){
      if(r.currentRoundPosted){
        return `<span class="round-badge round-done">등록완료</span>`;
      }
      return `<span class="round-badge round-pending">미등록</span>`;
    }

    function renderAssets(rows){
      const body = $("assetTableBody");
      body.innerHTML = "";

      if(!rows || rows.length === 0){
        body.innerHTML = `<tr><td colspan="15" style="text-align:center; padding:18px;">데이터가 없습니다.</td></tr>`;
        return;
      }

      for(const r of rows){
        body.insertAdjacentHTML("beforeend", `
          <tr>
            <td><input type="checkbox" class="row-check" data-id="${r.id}"></td>
            <td>${escapeHtml(r.vehicleMgmtNo||"")}</td>
            <td>${escapeHtml(r.vehicleNo||"")}</td>
            <td class="text-right">${num(r.acquisitionCost)}</td>
            <td>${escapeHtml(r.depStartDate||"")}</td>
            <td>${escapeHtml(r.depEndDate||"")}</td>
            <td class="text-right">${num(r.monthlyAmount)}</td>
            <td class="text-right">${num(r.accumulated)}</td>
            <td class="text-right">${num(r.remaining)}</td>
            <td>${r.totalRounds ?? "-"}</td>
            <td>${r.postedRounds ?? 0}</td>
            <td>${r.currentRound ?? "-"}</td>
            <td>${renderRoundStatus(r)}</td>
            <td>${escapeHtml(r.lastDepDate||"")}</td>
            <td>${escapeHtml(r.voucherDate||"")}</td>
          </tr>
        `);
      }
    }

    function num(v){
      if(v === null || v === undefined) return "";
      return Number(v).toLocaleString();
    }

    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function openAddModal() {
      $("addModal").style.display = "flex";
      $("modalVoucherDate").value = ymdToday();
      $("modalDepStartDate").value = ymdToday();

      const end = new Date();
      end.setFullYear(end.getFullYear() + 5);
      $("modalDepEndDate").value = end.toISOString().split("T")[0];
      calculateMonthlyDep();
    }

    function closeAddModal() {
      $("addModal").style.display = "none";
      resetModalForm();
    }

    function resetModalForm() {
      $("modalVehicleNo").value = "";
      $("modalMgmtNo").value = "";
      $("modalAcquisitionCost").value = "";
      $("modalMonthlyDep").value = "";
      $("modalDepStartDate").value = "";
      $("modalDepEndDate").value = "";
      $("modalVoucherDate").value = "";
      $("modalDepMethod").value = "정액법";
      $("modalAssetType").value = "렌트자산";
    }

    function formatNumber(input) {
      let value = input.value.replace(/[^0-9]/g, "");
      input.value = value ? parseInt(value,10).toLocaleString() : "";
    }

    function calculateMonthlyDep() {
      const costStr = $("modalAcquisitionCost").value.replace(/,/g, "");
      const startDate = $("modalDepStartDate").value;
      const endDate = $("modalDepEndDate").value;

      if (!costStr || !startDate || !endDate) {
        $("modalMonthlyDep").value = "";
        return;
      }

      const cost = parseInt(costStr,10);
      const start = new Date(startDate);
      const end = new Date(endDate);
      const months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth()) + 1;
      if(months <= 0){ $("modalMonthlyDep").value = ""; return; }

      const monthly = Math.round(cost / months);
      $("modalMonthlyDep").value = monthly.toLocaleString();
    }

    async function saveDepreciation() {
      const vehicleNo = $("modalVehicleNo").value.trim();
      const vehicleMgmtNo = $("modalMgmtNo").value.trim();
      const acquisitionCost = $("modalAcquisitionCost").value.replace(/,/g,"");
      const depStartDate = $("modalDepStartDate").value;
      const depEndDate = $("modalDepEndDate").value;
      const voucherDate = $("modalVoucherDate").value;

      if(!vehicleNo) return alert("차량번호를 입력/선택해주세요.");
      if(!acquisitionCost) return alert("최초취득가액을 입력해주세요.");
      if(!depStartDate || !depEndDate) return alert("감가상각 기간을 입력해주세요.");

      if(!confirm("감가상각을 등록하시겠습니까?")) return;

      const payload = {
        vehicleNo,
        vehicleMgmtNo: vehicleMgmtNo || null,
        acquisitionCost: Number(acquisitionCost),
        depMethod: $("modalDepMethod").value,
        assetType: $("modalAssetType").value,
        depStartDate,
        depEndDate,
        voucherDate: voucherDate || null
      };

      const res = await fetch(`${API_BASE_URL}/api/depreciation/assets`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });
      await mustOk(res);

      alert("감가상각이 등록되었습니다.");
      closeAddModal();
      searchAssets();
    }

    async function registerVoucher() {
      const ids = getCheckedAssetIds();
      if(ids.length === 0) return alert("전표등록할 자산을 선택해주세요.");

      const selectedAssets = assetRows.filter(r => ids.includes(Number(r.id)));
      const preview = selectedAssets.map(r =>
        `[${r.vehicleNo || "-"}] 총 ${r.totalRounds ?? "-"}회 / 기등록 ${r.postedRounds ?? 0}회 / 이번 ${r.currentRound ?? "-"}회`
      ).join("\n");

      const baseMonth = $("baseMonth").value;
      const voucherDate = ymdToday();

      if(!confirm(`선택한 ${ids.length}건의 감가상각 전표를 등록하시겠습니까?\n\n${preview}`)) return;

      const res = await fetch(`${API_BASE_URL}/api/depreciation/postings`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ baseMonth, voucherDate, assetIds: ids })
      });
      await mustOk(res);

      const result = await res.json();

      const processedText = Array.isArray(result.processedRounds) && result.processedRounds.length
        ? result.processedRounds.join("\n")
        : "-";

      const voucherText = Array.isArray(result.voucherNos) && result.voucherNos.length
        ? result.voucherNos.join(", ")
        : "-";

      alert(
        `감가상각 전표등록 완료\n\n` +
        `- posting 저장: ${result.postingSavedCount ?? 0}건\n` +
        `- 실제 전표 생성: ${result.voucherCreatedCount ?? 0}건\n` +
        `- 스킵: ${result.skippedCount ?? 0}건\n\n` +
        `[등록 회차]\n${processedText}\n\n` +
        `[생성 전표번호]\n${voucherText}`
      );

      clearSelection();
      searchAssets();
    }

    async function completeDepreciation() {
      const ids = getCheckedAssetIds();
      if(ids.length === 0) return alert("종료할 자산을 선택해주세요.");

      if(!confirm(`선택한 ${ids.length}건의 감가상각을 종료하시겠습니까?`)) return;

      const res = await fetch(`${API_BASE_URL}/api/depreciation/complete`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ assetIds: ids })
      });
      await mustOk(res);

      alert("감가상각이 종료되었습니다.");
      clearSelection();
      searchAssets();
    }

    function changeSchedule() {
      const ids = getCheckedAssetIds();
      if(ids.length === 0) return alert("스케줄을 변경할 자산을 선택해주세요.");
      if(ids.length > 1) return alert("스케줄 변경은 1건씩만 가능합니다.");
      location.href = `depreciation_schedule_change.html?assetId=${ids[0]}`;
    }

    let lookupTarget = "modal";
    function openVehicleLookup(target){
      lookupTarget = target;
      $("vehicleKw").value = (target === "modal") ? $("modalVehicleNo").value : $("searchVehicleNo").value;
      $("vehicleLookupModal").style.display = "flex";
      doVehicleLookup();
    }

    function closeVehicleLookup(){
      $("vehicleLookupModal").style.display = "none";
      $("vehicleLookupBody").innerHTML = "";
    }

    async function doVehicleLookup(){
      const kw = $("vehicleKw").value || "";
      const res = await fetch(`${API_BASE_URL}/api/accounting/depreciation/vehicle-orders/search?kw=` + encodeURIComponent(kw));
      await mustOk(res);
      const list = await res.json();

      const body = $("vehicleLookupBody");
      body.innerHTML = "";

      if(!list || list.length === 0){
        body.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:14px;">검색 결과 없음</td></tr>`;
        return;
      }

      for(const r of list){
        const mgmt = r.vehicle_mgmt_no ?? "";
        const vno = r.vehicle_no ?? "";
        const model = r.car_model ?? "";
        const price = r.total_price ?? 0;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(mgmt)}</td>
          <td>${escapeHtml(vno)}</td>
          <td>${escapeHtml(model)}</td>
          <td class="text-right">${num(price)}</td>
        `;
        tr.addEventListener("click", () => {
          if(lookupTarget === "modal"){
            $("modalVehicleNo").value = vno;
            $("modalMgmtNo").value = mgmt;
          }else{
            $("searchVehicleNo").value = vno;
          }
          closeVehicleLookup();
        });
        body.appendChild(tr);
      }
    }

    window.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        if($("vehicleLookupModal").style.display === "flex") closeVehicleLookup();
        if($("addModal").style.display === "flex") closeAddModal();
      }
    });

    $("vehicleLookupModal").addEventListener("click", (e)=>{ if(e.target === $("vehicleLookupModal")) closeVehicleLookup(); });
    $("addModal").addEventListener("click", (e)=>{ if(e.target === $("addModal")) closeAddModal(); });
  </script>
</body>
</html>
