<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>감가상각스케줄변경 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />
  <link rel="stylesheet" href="../../assets/css/accounting/depreciation_schedule_change.css" />
  <style>
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:44px; }
    .icon-btn{
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      width:34px; height:34px; border:1px solid #ddd; background:#fff;
      border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }
    .changed-row{ background:#fff7e6; }
    .changed{ font-weight:700; color:#b45309; }
    .text-right{ text-align:right; }

    .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); align-items:center; justify-content:center; z-index:9999;}
    .modal-box{ width:min(920px, 92vw); background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 28px rgba(0,0,0,.2);}
    .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee;}
    .modal-body{ padding:14px 16px; }
    .modal-foot{ padding:14px 16px; border-top:1px solid #eee; display:flex; gap:8px; justify-content:flex-end;}
    .modal-close{ border:none; background:transparent; font-size:24px; cursor:pointer;}
    .lookup-table{ width:100%; border-collapse:collapse; }
    .lookup-table th,.lookup-table td{ border-bottom:1px solid #eee; padding:10px; text-align:left; }
    .lookup-table tr:hover{ background:#f8f8f8; cursor:pointer; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>감가상각스케줄변경</h1>
      <p>회계관리 &gt; 감가상각 &gt; 감가상각스케줄변경</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 차량 조회 -->
        <div class="form-section">
          <h3 class="section-title">차량조회</h3>
          <div class="search-row">
            <div class="form-group">
              <label for="vehicleNumber">차량번호</label>
              <div class="input-with-icon">
                <input type="text" id="vehicleNumber" placeholder="차량번호 입력">
                <button class="icon-btn" type="button" onclick="openVehicleLookup()">🔍</button>
              </div>
            </div>
            <div class="form-group">
              <label for="contractNumber">계약번호</label>
              <input type="text" id="contractNumber" placeholder="선택">
            </div>
            <button type="button" class="btn-search" onclick="searchSchedule()">조회</button>
          </div>
        </div>

        <!-- 스케줄 비교 -->
        <div class="schedule-compare" id="scheduleCompare">
          <div class="schedule-panel">
            <div class="panel-header">변경전 스케줄</div>
            <div class="table-container">
              <table class="schedule-table">
                <thead>
                  <tr>
                    <th>회차</th>
                    <th>감가상각일</th>
                    <th>감가상각액</th>
                    <th>미상각잔액</th>
                    <th>비고</th>
                  </tr>
                </thead>
                <tbody id="beforeScheduleBody"></tbody>
              </table>
            </div>
          </div>

          <div class="schedule-panel">
            <div class="panel-header after">변경후 스케줄</div>
            <div class="table-container">
              <table class="schedule-table">
                <thead>
                  <tr>
                    <th>회차</th>
                    <th>감가상각일</th>
                    <th>감가상각액</th>
                    <th>미상각잔액</th>
                    <th>비고</th>
                  </tr>
                </thead>
                <tbody id="afterScheduleBody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 변경 설정 -->
        <div class="change-settings" id="changeSettings">
          <h3 class="section-title">스케줄 변경</h3>
          <div class="settings-grid">
            <div class="form-group">
              <label for="changeType">변경유형</label>
              <select id="changeType" onchange="onChangeTypeSelect()">
                <option value="">선택하세요</option>
                <option value="sale">매각</option>
                <option value="terminate">조기종료</option>
                <option value="extend">기간연장</option>
                <option value="amount">상각액변경</option>
              </select>
            </div>
            <div class="form-group">
              <label for="changeDate">변경적용일</label>
              <input type="date" id="changeDate">
            </div>

            <div class="form-group" id="saleAmountGroup" style="display:none;">
              <label for="saleAmount">매각금액</label>
              <input type="text" id="saleAmount" placeholder="0" oninput="formatNumber(this)">
            </div>

            <div class="form-group" id="newAmountGroup" style="display:none;">
              <label for="newDepAmount">변경후 상각액(월)</label>
              <input type="text" id="newDepAmount" placeholder="0" oninput="formatNumber(this)">
            </div>

            <div class="form-group" id="extendMonthsGroup" style="display:none;">
              <label for="extendMonths">연장개월</label>
              <input type="number" id="extendMonths" placeholder="예: 12" min="1">
            </div>
          </div>
        </div>

        <div class="form-actions" id="formActions">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">초기화</button>
          <button type="button" class="btn btn-primary" onclick="saveScheduleChange()">스케줄 저장</button>
        </div>

      </div>
    </div>
  </div>

  <!-- 차량 돋보기 모달 -->
  <div class="modal-overlay" id="vehicleLookupModal">
    <div class="modal-box">
      <div class="modal-head">
        <h3>차량 선택</h3>
        <button type="button" class="modal-close" onclick="closeVehicleLookup()">&times;</button>
      </div>
      <div class="modal-body">
        <div style="display:flex; gap:8px; align-items:center;">
          <input id="vehicleKw" type="text" placeholder="차량번호/관리번호/모델 검색" style="flex:1;">
          <button class="btn btn-primary" type="button" onclick="doVehicleLookup()">조회</button>
        </div>
        <div style="margin-top:10px; max-height:420px; overflow:auto;">
          <table class="lookup-table">
            <thead>
              <tr>
                <th>차량관리번호</th>
                <th>차량번호</th>
                <th>모델</th>
                <th class="text-right">총가격</th>
              </tr>
            </thead>
            <tbody id="vehicleLookupBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-secondary" onclick="closeVehicleLookup()">닫기</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    function mustOk(res){ if(!res.ok) throw new Error("HTTP "+res.status); return res; }
    function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function num(v){ return (v===null||v===undefined)?"":Number(v).toLocaleString(); }
    function formatNumber(input){
      let v = input.value.replace(/[^0-9]/g,"");
      input.value = v ? parseInt(v,10).toLocaleString() : "";
    }

    let assetId = null;
    let beforeSchedule = [];
    let afterSchedule = [];

    window.addEventListener("load", async () => {
      const params = new URLSearchParams(location.search);
      const id = params.get("assetId");
      if(id){
        assetId = Number(id);
        await loadByAssetId(assetId);
      }
    });

    async function loadByAssetId(id){
      const aRes = await fetch(`${API_BASE_URL}/api/depreciation/assets/${id}`);
      await mustOk(aRes);
      const asset = await aRes.json();

      $("vehicleNumber").value = asset.vehicleNo || "";
      $("contractNumber").value = asset.contractNumber || "";

      const sRes = await fetch(`${API_BASE_URL}/api/depreciation/assets/${id}/schedule`);
      await mustOk(sRes);
      beforeSchedule = await sRes.json();
      afterSchedule = JSON.parse(JSON.stringify(beforeSchedule));

      renderSchedules();
      showUI();
    }

    function showUI(){
      $("scheduleCompare").classList.add("active");
      $("changeSettings").classList.add("active");
      $("formActions").classList.add("active");
    }

    async function searchSchedule(){
      // 차량번호로 자산 찾아서 첫번째로 로딩 (간단하게 구현)
      const vno = $("vehicleNumber").value.trim();
      if(!vno) return alert("차량번호를 입력/선택하세요.");

      const qs = new URLSearchParams({ baseMonth:"", depMethod:"", assetType:"", vehicleNo:vno, depStart:"", depEnd:"" });
      const res = await fetch(`${API_BASE_URL}/api/depreciation/assets?` + qs.toString());
      await mustOk(res);
      const list = await res.json();

      if(!list || list.length === 0) return alert("해당 차량번호로 등록된 감가상각 자산이 없습니다. (감가상각등록에서 먼저 추가)");
      assetId = list[0].id;

      await loadByAssetId(assetId);
    }

    function renderSchedules(){
      const beforeBody = $("beforeScheduleBody");
      const afterBody = $("afterScheduleBody");
      beforeBody.innerHTML = "";
      afterBody.innerHTML = "";

      for(let i=0;i<beforeSchedule.length;i++){
        const b = beforeSchedule[i];
        const a = afterSchedule[i] || b;

        const changed = (b.amount !== a.amount) || (b.balance !== a.balance) || (b.note !== a.note) || (b.date !== a.date);

        beforeBody.insertAdjacentHTML("beforeend", `
          <tr>
            <td>${b.period}</td>
            <td>${escapeHtml(b.date||"")}</td>
            <td class="text-right">${b.amount ? num(b.amount) : ""}</td>
            <td class="text-right">${num(b.balance)}</td>
            <td>${escapeHtml(b.note||"")}</td>
          </tr>
        `);

        afterBody.insertAdjacentHTML("beforeend", `
          <tr class="${changed ? 'changed-row' : ''}">
            <td>${a.period}</td>
            <td class="${a.date!==b.date ? 'changed' : ''}">${escapeHtml(a.date||"")}</td>
            <td class="text-right ${a.amount!==b.amount ? 'changed' : ''}">${a.amount ? num(a.amount) : "-"}</td>
            <td class="text-right ${a.balance!==b.balance ? 'changed' : ''}">${a.balance ? num(a.balance) : "-"}</td>
            <td class="${a.note!==b.note ? 'changed' : ''}">${escapeHtml(a.note||"")}</td>
          </tr>
        `);
      }
    }

    function onChangeTypeSelect(){
      const t = $("changeType").value;

      $("saleAmountGroup").style.display = (t==="sale") ? "flex" : "none";
      $("newAmountGroup").style.display = (t==="amount") ? "flex" : "none";
      $("extendMonthsGroup").style.display = (t==="extend") ? "flex" : "none";
    }

    function resetForm(){
      if(!confirm("모든 변경사항을 초기화하시겠습니까?")) return;
      $("changeType").value = "";
      $("changeDate").value = "";
      $("saleAmount").value = "";
      $("newDepAmount").value = "";
      $("extendMonths").value = "";
      onChangeTypeSelect();

      afterSchedule = JSON.parse(JSON.stringify(beforeSchedule));
      renderSchedules();
    }

    async function saveScheduleChange(){
      if(!assetId) return alert("먼저 조회를 하세요.");
      const changeType = $("changeType").value;
      const changeDate = $("changeDate").value;
      if(!changeType) return alert("변경유형을 선택해주세요.");
      if(!changeDate) return alert("변경적용일을 선택해주세요.");

      const payload = {
        changeType,
        changeDate,
        saleAmount: null,
        newMonthlyAmount: null,
        extendMonths: null
      };

      if(changeType==="sale"){
        payload.saleAmount = Number(($("saleAmount").value||"0").replace(/,/g,""));
      }
      if(changeType==="amount"){
        payload.newMonthlyAmount = Number(($("newDepAmount").value||"0").replace(/,/g,""));
      }
      if(changeType==="extend"){
        payload.extendMonths = Number($("extendMonths").value||"0");
      }

      if(!confirm("스케줄을 저장하시겠습니까? (새 버전으로 저장됩니다)")) return;

      const res = await fetch(`${API_BASE_URL}/api/depreciation/assets/${assetId}/schedule-change`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });
      await mustOk(res);

      // 변경후 스케줄(=새 버전) 받음
      afterSchedule = await res.json();

      // 변경전은 그대로 두고 비교
      renderSchedules();

      alert("스케줄이 저장되었습니다.");
    }

    /* ======================
       차량 돋보기
       ====================== */
    function openVehicleLookup(){
      $("vehicleKw").value = $("vehicleNumber").value || "";
      $("vehicleLookupModal").style.display = "flex";
      doVehicleLookup();
    }
    function closeVehicleLookup(){
      $("vehicleLookupModal").style.display = "none";
      $("vehicleLookupBody").innerHTML = "";
    }
    async function doVehicleLookup(){
      const kw = $("vehicleKw").value || "";
     const res = await fetch(`${API_BASE_URL}/api/accounting/depreciation/vehicle-orders/search?kw=` + encodeURIComponent(kw));
      await mustOk(res);
      const list = await res.json();

      const body = $("vehicleLookupBody");
      body.innerHTML = "";

      if(!list || list.length === 0){
        body.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:14px;">검색 결과 없음</td></tr>`;
        return;
      }

      for(const r of list){
        const mgmt = r.vehicle_mgmt_no ?? "";
        const vno = r.vehicle_no ?? "";
        const model = r.car_model ?? "";
        const price = r.total_price ?? 0;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(mgmt)}</td>
          <td>${escapeHtml(vno)}</td>
          <td>${escapeHtml(model)}</td>
          <td class="text-right">${num(price)}</td>
        `;
        tr.addEventListener("click", () => {
          $("vehicleNumber").value = vno;
          closeVehicleLookup();
        });
        body.appendChild(tr);
      }
    }

    $("vehicleLookupModal").addEventListener("click", (e)=>{ if(e.target === $("vehicleLookupModal")) closeVehicleLookup(); });
  </script>
</body>
</html>
