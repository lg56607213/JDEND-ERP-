<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>손익계산서 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/accounting/income_statement.css">
  <style>
    .clickable-row { cursor: pointer; }
    .clickable-row:hover { background: #f8fafc; }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-box {
      width: min(1200px, 96vw);
      max-height: 88vh;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.2);
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #eee;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { border: none; background: transparent; font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-body { padding: 14px 16px; overflow: auto; }
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table th, .detail-table td {
      border-bottom: 1px solid #eee; padding: 10px 8px; text-align: left; font-size: 13px;
    }
    .detail-table th { background: #f9fafb; position: sticky; top: 0; z-index: 1; }
    .text-right { text-align: right; }
    .muted { color: #64748b; font-size: 12px; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>손익계산서</h1>
      <p>회계관리 &gt; 재무제표관리 &gt; 손익계산서</p>
    </div>

    <div class="info-notice">
      ℹ️ 손익계산서는 입력이 불가하며, 재무제표관리에 등록된 계정과 전표 내용으로 자동 합산되어 출력됩니다. 계정명을 클릭하면 상세내역을 볼 수 있습니다.
    </div>

    <div class="erp-card">
      <div class="card-body">
        <div class="date-section">
          <div class="form-group">
            <label for="startDate">시작일</label>
            <input type="date" id="startDate">
          </div>
          <div class="form-group">
            <label for="endDate">종료일</label>
            <input type="date" id="endDate">
          </div>
          <button type="button" class="btn-search" onclick="loadIncomeStatement()">조회</button>
        </div>

        <div class="statements-grid">
          <div>
            <div class="statement-section">
              <div class="section-header revenue">수익</div>
              <div class="section-content">
                <table class="statement-table">
                  <tbody id="revenueTableBody"></tbody>
                  <tfoot>
                    <tr class="total-row"><td>수익 총계</td><td id="totalRevenue">0</td></tr>
                  </tfoot>
                </table>
              </div>
            </div>
          </div>

          <div>
            <div class="statement-section">
              <div class="section-header expenses">비용</div>
              <div class="section-content">
                <table class="statement-table">
                  <tbody id="expenseTableBody"></tbody>
                  <tfoot>
                    <tr class="total-row"><td>비용 총계</td><td id="totalExpense">0</td></tr>
                  </tfoot>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="statement-section">
          <div class="section-header tax">당기순이익</div>
          <div class="section-content">
            <table class="statement-table">
              <tbody>
                <tr><td>수익 총계</td><td id="netRevenueRow">0</td></tr>
                <tr><td>비용 총계</td><td id="netExpenseRow">0</td></tr>
                <tr class="final-profit-row"><td>당기순이익</td><td id="netIncome">0</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="summary-section">
          <div class="summary-title">손익 요약</div>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="summary-label">총 수익</div>
              <div class="summary-value" id="summaryRevenue">0 원</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">총 비용</div>
              <div class="summary-value" id="summaryExpense">0 원</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">당기순이익</div>
              <div class="summary-value" id="summaryNetIncome">0 원</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div class="modal-backdrop" id="detailModal">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="detailModalTitle">상세내역</div>
          <div class="muted" id="detailModalSubTitle">기간 기준 전표 내역</div>
        </div>
        <button type="button" class="modal-close" onclick="closeDetailModal()">×</button>
      </div>
      <div class="modal-body">
        <table class="detail-table">
          <thead>
            <tr>
              <th style="width:110px;">전표일자</th>
              <th style="width:140px;">전표번호</th>
              <th style="width:80px;">구분</th>
              <th style="width:180px;">계정명</th>
              <th style="width:140px;">금액</th>
              <th style="width:180px;">적요</th>
              <th style="width:140px;">계약번호</th>
              <th style="width:120px;">차량번호</th>
              <th style="width:100px;">상태</th>
            </tr>
          </thead>
          <tbody id="detailTableBody">
            <tr><td colspan="9" style="text-align:center;">조회중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    function mustOk(res){ if(!res.ok) throw new Error("HTTP "+res.status); return res; }
    function formatNumber(num) { return Number(num || 0).toLocaleString(); }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    let lastRange = { startDate: null, endDate: null };

    window.addEventListener('load', function() {
      const today = new Date();
      const startOfYear = new Date(today.getFullYear(), 0, 1);

      document.getElementById('startDate').value = startOfYear.toISOString().split('T')[0];
      document.getElementById('endDate').value = today.toISOString().split('T')[0];

      bindClickableRows();
      loadIncomeStatement();
    });

    function bindClickableRows() {
      document.querySelectorAll('#revenueTableBody, #expenseTableBody').forEach(body => {
        body.addEventListener('click', async function(e) {
          const row = e.target.closest('.clickable-row');
          if (!row) return;
          await openDetailModal(row.dataset.accountCode, row.dataset.accountName);
        });
      });
    }

    function renderNodeRows(node, depth) {
      let rows = `
        <tr class="clickable-row" data-account-code="${escapeHtml(node.accountCode)}" data-account-name="${escapeHtml(node.accountName)}">
          <td style="padding-left:${12 + depth * 18}px;">${escapeHtml(node.accountName)}</td>
          <td>${formatNumber(node.amount)}</td>
        </tr>
      `;
      for (const child of (node.children || [])) {
        rows += renderNodeRows(child, depth + 1);
      }
      return rows;
    }

    function renderSection(bodyId, rootNode) {
      const body = document.getElementById(bodyId);
      const children = rootNode?.children || [];
      if (children.length === 0) {
        body.innerHTML = `<tr><td colspan="2" style="text-align:center;color:#9ca3af;">등록된 계정이 없습니다.</td></tr>`;
        return;
      }
      body.innerHTML = children.map(c => renderNodeRows(c, 0)).join('');
    }

    async function loadIncomeStatement() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      if (!startDate || !endDate) return alert('시작일과 종료일을 모두 선택해주세요.');
      if (startDate > endDate) return alert('시작일은 종료일보다 이전이어야 합니다.');

      lastRange = { startDate, endDate };

      const qs = new URLSearchParams({ startDate, endDate, status: "승인" });

      const res = await fetch(`${API_BASE_URL}/api/statements/income?` + qs.toString());
      await mustOk(res);
      const data = await res.json();

      displayIncomeStatement(data);
    }

    function displayIncomeStatement(data) {
      renderSection('revenueTableBody', data.revenue);
      renderSection('expenseTableBody', data.expense);

      document.getElementById('totalRevenue').textContent = formatNumber(data.totalRevenue);
      document.getElementById('totalExpense').textContent = formatNumber(data.totalExpense);

      document.getElementById('netRevenueRow').textContent = formatNumber(data.totalRevenue);
      document.getElementById('netExpenseRow').textContent = formatNumber(data.totalExpense);
      document.getElementById('netIncome').textContent = formatNumber(data.netIncome);

      document.getElementById('summaryRevenue').textContent = formatNumber(data.totalRevenue) + ' 원';
      document.getElementById('summaryExpense').textContent = formatNumber(data.totalExpense) + ' 원';
      document.getElementById('summaryNetIncome').textContent = formatNumber(data.netIncome) + ' 원';
    }

    async function openDetailModal(accountCode, accountName) {
      if (!lastRange.startDate || !lastRange.endDate) return;

      document.getElementById('detailModalTitle').textContent = `${accountName} 상세내역`;
      document.getElementById('detailModalSubTitle').textContent = `${lastRange.startDate} ~ ${lastRange.endDate} 승인 전표 내역`;
      document.getElementById('detailTableBody').innerHTML = `<tr><td colspan="9" style="text-align:center;">조회중...</td></tr>`;
      document.getElementById('detailModal').style.display = 'flex';

      try {
        const qs = new URLSearchParams({
          accountCode,
          startDate: lastRange.startDate,
          referenceDate: lastRange.endDate,
          status: '승인'
        });

        const res = await fetch(`${API_BASE_URL}/api/statements/balance/details?` + qs.toString());
        await mustOk(res);
        const rows = await res.json();

        renderDetailRows(rows);
      } catch (e) {
        document.getElementById('detailTableBody').innerHTML = `<tr><td colspan="9" style="text-align:center;">조회 실패: ${e.message}</td></tr>`;
      }
    }

    function renderDetailRows(rows) {
      const tbody = document.getElementById('detailTableBody');

      if (!rows || rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;">상세내역이 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.voucherDate || '-'}</td>
          <td>${r.voucherNo || '-'}</td>
          <td>${r.lineType || '-'}</td>
          <td>${r.accountName || '-'}</td>
          <td class="text-right">${formatNumber(r.amount)}</td>
          <td>${r.description || '-'}</td>
          <td>${r.contractNumber || '-'}</td>
          <td>${r.vehicleNo || '-'}</td>
          <td>${r.status || '-'}</td>
        </tr>
      `).join('');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').style.display = 'none';
    }

    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) closeDetailModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeDetailModal();
    });
  </script>
</body>
</html>
