<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>월전표등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/accounting/monthly_voucher.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>월전표등록</h1>
      <p>회계관리 &gt; 전표등록 &gt; 월전표등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <form id="voucherForm">

          <div class="form-section">
            <h3 class="section-title">기본 정보</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="contractNumber">계약번호</label>
                <input type="text" id="contractNumber" name="contractNumber" placeholder="계약번호 입력 (선택사항)">
              </div>

              <div class="form-group">
                <label for="vehicleManagementId">차량관리번호</label>
                <input type="text" id="vehicleManagementId" name="vehicleManagementId" placeholder="차량관리번호 입력 (선택사항)">
              </div>

              <div class="form-group">
                <label for="monthlyDate" class="required">매월 전표발생일</label>
                <select id="monthlyDate" name="monthlyDate" required>
                  <option value="">날짜 선택</option>
                  <option value="1">매월 1일</option>
                  <option value="2">매월 2일</option>
                  <option value="3">매월 3일</option>
                  <option value="4">매월 4일</option>
                  <option value="5">매월 5일</option>
                  <option value="6">매월 6일</option>
                  <option value="7">매월 7일</option>
                  <option value="8">매월 8일</option>
                  <option value="9">매월 9일</option>
                  <option value="10">매월 10일</option>
                  <option value="11">매월 11일</option>
                  <option value="12">매월 12일</option>
                  <option value="13">매월 13일</option>
                  <option value="14">매월 14일</option>
                  <option value="15">매월 15일</option>
                  <option value="16">매월 16일</option>
                  <option value="17">매월 17일</option>
                  <option value="18">매월 18일</option>
                  <option value="19">매월 19일</option>
                  <option value="20">매월 20일</option>
                  <option value="21">매월 21일</option>
                  <option value="22">매월 22일</option>
                  <option value="23">매월 23일</option>
                  <option value="24">매월 24일</option>
                  <option value="25">매월 25일</option>
                  <option value="26">매월 26일</option>
                  <option value="27">매월 27일</option>
                  <option value="28">매월 28일</option>
                  <option value="29">매월 29일</option>
                  <option value="30">매월 30일</option>
                  <option value="31">매월 31일</option>
                </select>
              </div>

              <div class="form-group" style="grid-column: 1 / -1;">
                <label for="memo">메모</label>
                <input type="text" id="memo" name="memo" placeholder="월전표 메모(선택)">
              </div>
            </div>

            <div class="info-box">
              <span class="info-box-icon">ℹ️</span>
              <span class="info-box-text">
                매월 해당일에 자동으로 전표가 발생됩니다. (스케줄러 적용 시)<br>
                차량관리번호를 입력하면 서버에서 vehicle_orders를 조회해 차량번호(vehicle_no)로 저장합니다.
              </span>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title debit-title">차변 (借)</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="debitAccount" class="required">계정명</label>
                <select id="debitAccount" name="debitAccount" required>
                  <option value="">계정 선택</option>
                  <optgroup label="자산">
                    <option value="현금">현금</option>
                    <option value="보통예금">보통예금</option>
                    <option value="정기예금">정기예금</option>
                    <option value="미수금">미수금</option>
                    <option value="선급금">선급금</option>
                    <option value="렌트자산">렌트자산</option>
                    <option value="감가상각누계액">감가상각누계액</option>
                    <option value="부가세대급금">부가세대급금</option>
                  </optgroup>
                  <optgroup label="부채">
                    <option value="미지급금">미지급금</option>
                    <option value="선수금">선수금</option>
                    <option value="차입금">차입금</option>
                    <option value="보증금">보증금</option>
                    <option value="부가세예수금">부가세예수금</option>
                  </optgroup>
                  <optgroup label="자본">
                    <option value="자본금">자본금</option>
                    <option value="자본잉여금">자본잉여금</option>
                    <option value="이익잉여금">이익잉여금</option>
                  </optgroup>
                  <optgroup label="수익">
                    <option value="렌트수익">렌트수익</option>
                    <option value="매각수익">매각수익</option>
                    <option value="이자수익">이자수익</option>
                    <option value="기타수익">기타수익</option>
                  </optgroup>
                  <optgroup label="비용">
                    <option value="급여">급여</option>
                    <option value="감가상각비">감가상각비</option>
                    <option value="차량유지비">차량유지비</option>
                    <option value="보험료">보험료</option>
                    <option value="이자비용">이자비용</option>
                    <option value="기타비용">기타비용</option>
                  </optgroup>
                </select>
              </div>

              <div class="form-group">
                <label for="debitAmount" class="required">금액</label>
                <input type="number" id="debitAmount" name="debitAmount" placeholder="금액을 입력하세요" required min="0">
              </div>

              <div class="form-group form-group-wide">
                <label for="debitDescription">적요</label>
                <input type="text" id="debitDescription" name="debitDescription" placeholder="적요를 입력하세요">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title credit-title">대변 (貸)</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="creditAccount" class="required">계정명</label>
                <select id="creditAccount" name="creditAccount" required>
                  <option value="">계정 선택</option>
                  <optgroup label="자산">
                    <option value="현금">현금</option>
                    <option value="보통예금">보통예금</option>
                    <option value="정기예금">정기예금</option>
                    <option value="미수금">미수금</option>
                    <option value="선급금">선급금</option>
                    <option value="렌트자산">렌트자산</option>
                    <option value="감가상각누계액">감가상각누계액</option>
                    <option value="부가세대급금">부가세대급금</option>
                  </optgroup>
                  <optgroup label="부채">
                    <option value="미지급금">미지급금</option>
                    <option value="선수금">선수금</option>
                    <option value="차입금">차입금</option>
                    <option value="보증금">보증금</option>
                    <option value="부가세예수금">부가세예수금</option>
                  </optgroup>
                  <optgroup label="자본">
                    <option value="자본금">자본금</option>
                    <option value="자본잉여금">자본잉여금</option>
                    <option value="이익잉여금">이익잉여금</option>
                  </optgroup>
                  <optgroup label="수익">
                    <option value="렌트수익">렌트수익</option>
                    <option value="매각수익">매각수익</option>
                    <option value="이자수익">이자수익</option>
                    <option value="기타수익">기타수익</option>
                  </optgroup>
                  <optgroup label="비용">
                    <option value="급여">급여</option>
                    <option value="감가상각비">감가상각비</option>
                    <option value="차량유지비">차량유지비</option>
                    <option value="보험료">보험료</option>
                    <option value="이자비용">이자비용</option>
                    <option value="기타비용">기타비용</option>
                  </optgroup>
                </select>
              </div>

              <div class="form-group">
                <label for="creditAmount" class="required">금액</label>
                <input type="number" id="creditAmount" name="creditAmount" placeholder="금액을 입력하세요" required min="0">
              </div>

              <div class="form-group form-group-wide">
                <label for="creditDescription">적요</label>
                <input type="text" id="creditDescription" name="creditDescription" placeholder="적요를 입력하세요">
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="resetBtn">초기화</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">월전표 등록</button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    const API_BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");

    function apiBase() {
      return API_BASE;
    }

    async function mustOk(res) {
      if (res.ok) return res;
      let msg = '';
      try { msg = await res.text(); } catch (e) {}
      throw new Error('HTTP ' + res.status + (msg ? (' - ' + msg) : ''));
    }

    function resetForm() {
      if (confirm('입력한 내용을 모두 초기화하시겠습니까?')) {
        document.getElementById('voucherForm').reset();
      }
    }

    document.getElementById('resetBtn').addEventListener('click', resetForm);

    document.getElementById('voucherForm').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
      }
    });

    document.getElementById('voucherForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const debitAmount = parseFloat(document.getElementById('debitAmount').value) || 0;
      const creditAmount = parseFloat(document.getElementById('creditAmount').value) || 0;

      if (debitAmount !== creditAmount) {
        alert(
          '차변과 대변의 금액이 일치하지 않습니다.\n\n' +
          '차변: ' + debitAmount.toLocaleString() + '원\n' +
          '대변: ' + creditAmount.toLocaleString() + '원'
        );
        return;
      }

      const monthlyDate = parseInt(document.getElementById('monthlyDate').value || '0', 10);
      if (!monthlyDate) {
        alert('매월 전표발생일을 선택하세요.');
        return;
      }

      const rawMemo = (document.getElementById('memo').value || '').trim();
      const finalMemo = rawMemo ? `[월전표] ${rawMemo}` : `[월전표]`;

      const payload = {
        contractNumber: (document.getElementById('contractNumber').value || '').trim(),
        vehicleManagementId: (document.getElementById('vehicleManagementId').value || '').trim(),
        monthlyDate: monthlyDate,

        debitAccount: document.getElementById('debitAccount').value,
        debitAmount: Math.round(debitAmount),
        debitDescription: (document.getElementById('debitDescription').value || '').trim(),

        creditAccount: document.getElementById('creditAccount').value,
        creditAmount: Math.round(creditAmount),
        creditDescription: (document.getElementById('creditDescription').value || '').trim(),

        memo: finalMemo
      };

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '저장 중...';

      try {
        const url = apiBase() + '/api/accounting/monthly-voucher-rules';
        const res = await mustOk(await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }));
        const saved = await res.json();

        alert(
          '월전표 규칙이 등록되었습니다.\n\n' +
          '- ID: ' + saved.id + '\n' +
          '- 다음 실행일: ' + (saved.nextRunDate || '') + '\n' +
          '- 매월: ' + saved.monthlyDay + '일\n' +
          '- 차변: ' + saved.debitAccount + ' ' + Number(saved.debitAmount).toLocaleString() + '원\n' +
          '- 대변: ' + saved.creditAccount + ' ' + Number(saved.creditAmount).toLocaleString() + '원\n' +
          (saved.vehicleNo ? ('- 차량번호: ' + saved.vehicleNo + '\n') : '')
        );

        document.getElementById('voucherForm').reset();
      } catch (err) {
        console.error(err);
        alert('저장 실패\n\n' + (err && err.message ? err.message : String(err)));
      } finally {
        btn.disabled = false;
        btn.textContent = '월전표 등록';
      }
    });
  </script>
</body>
</html>
