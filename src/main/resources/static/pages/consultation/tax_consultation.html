<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>세무상담</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <style>
    .content-wrapper { margin-left: 220px; padding: 32px 32px 32px 32px; }
    h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: #1b253a; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 24px; }
    .btn { padding: 8px 18px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
    .btn-primary { background: #23304e; color: #fff; }
    .btn-primary:hover { background: #1b253a; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-secondary:hover { background: #d1d5db; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 0.95rem; }
    th { background: #f4f6fa; font-weight: 600; color: #374151; }
    tr:hover td { background: #f9fafb; cursor: pointer; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-answered { background: #d1fae5; color: #065f46; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.93rem; color: #374151; }
    input[type=text], textarea { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 0.95rem; box-sizing: border-box; }
    textarea { resize: vertical; min-height: 120px; }
    .file-hint { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 10px; padding: 28px; max-width: 680px; width: 95%; max-height: 85vh; overflow-y: auto; }
    .modal h3 { margin: 0 0 16px; font-size: 1.1rem; }
    .modal-section { background: #f4f6fa; border-radius: 6px; padding: 14px; margin-bottom: 14px; font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
    .modal-answer { background: #ecfdf5; border-left: 4px solid #10b981; padding: 14px; border-radius: 0 6px 6px 0; font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
    .modal-footer { margin-top: 16px; text-align: right; }
    .empty { text-align: center; color: #9ca3af; padding: 40px 0; }
    .btn-new { float: right; margin-bottom: 16px; }
    .clearfix::after { content: ''; display: table; clear: both; }
  </style>
</head>
<body>
<div id="sidebar-container"></div>
<div class="content-wrapper">
  <div class="clearfix">
    <h2>세무상담</h2>
    <button class="btn btn-primary btn-new" onclick="openForm()">+ 문의 등록</button>
  </div>

  <!-- 등록 폼 -->
  <div class="card" id="formCard" style="display:none;">
    <h3 style="margin:0 0 18px;font-size:1rem;">문의 등록</h3>
    <div class="form-group">
      <label>제목 *</label>
      <input type="text" id="fTitle" placeholder="문의 제목을 입력하세요">
    </div>
    <div class="form-group">
      <label>내용 *</label>
      <textarea id="fContent" placeholder="문의 내용을 상세히 입력해주세요"></textarea>
    </div>
    <div class="form-group">
      <label>첨부파일 (선택)</label>
      <input type="file" id="fFile" accept="image/*,application/pdf">
      <div class="file-hint">이미지(JPG, PNG 등) 또는 PDF 파일, 최대 10MB</div>
    </div>
    <div style="text-align:right; gap:8px; display:flex; justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeForm()">취소</button>
      <button class="btn btn-primary" onclick="submitForm()">등록</button>
    </div>
  </div>

  <!-- 목록 -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th style="width:50px">#</th>
          <th>제목</th>
          <th style="width:100px">상태</th>
          <th style="width:130px">등록일</th>
        </tr>
      </thead>
      <tbody id="listBody">
        <tr><td colspan="4" class="empty">조회 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div style="font-size:0.83rem; color:#6b7280; margin-bottom:12px;" id="modalMeta"></div>
    <div class="modal-section" id="modalContent"></div>
    <div id="modalFileArea" style="margin-bottom:12px;display:none;">
      <a id="modalFileLink" href="#" style="color:#2563eb;font-size:0.9rem;">첨부파일 다운로드</a>
    </div>
    <div id="modalAnswerArea" style="display:none;">
      <div style="font-weight:600;margin-bottom:8px;font-size:0.93rem;color:#065f46;">답변</div>
      <div class="modal-answer" id="modalAnswer"></div>
      <div style="font-size:0.82rem; color:#6b7280; margin-top:6px;" id="modalAnsweredBy"></div>
    </div>
    <div id="modalPending" style="color:#92400e;font-size:0.9rem;display:none;">답변 대기 중입니다.</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script>
  const BASE = '';

  function fmt(dt) {
    if (!dt) return '-';
    return dt.replace('T', ' ').substring(0, 16);
  }

  function loadList() {
    fetch(BASE + '/api/tax-consultations', { credentials: 'include' })
      .then(r => r.json())
      .then(list => {
        const tbody = document.getElementById('listBody');
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">등록된 문의가 없습니다.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map((item, i) => `
          <tr onclick="openDetail(${item.id})">
            <td>${list.length - i}</td>
            <td>${escHtml(item.title)}</td>
            <td><span class="badge ${item.status === 'ANSWERED' ? 'badge-answered' : 'badge-pending'}">${item.status === 'ANSWERED' ? '답변완료' : '답변대기'}</span></td>
            <td>${fmt(item.createdAt)}</td>
          </tr>`).join('');
      });
  }

  function openForm() {
    document.getElementById('formCard').style.display = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fContent').value = '';
    document.getElementById('fFile').value = '';
  }
  function closeForm() { document.getElementById('formCard').style.display = 'none'; }

  function submitForm() {
    const title = document.getElementById('fTitle').value.trim();
    const content = document.getElementById('fContent').value.trim();
    const file = document.getElementById('fFile').files[0];
    if (!title) { alert('제목을 입력해주세요.'); return; }
    if (!content) { alert('내용을 입력해주세요.'); return; }

    const fd = new FormData();
    fd.append('title', title);
    fd.append('content', content);
    if (file) fd.append('file', file);

    fetch(BASE + '/api/tax-consultations', { method: 'POST', credentials: 'include', body: fd })
      .then(r => r.json())
      .then(res => {
        if (res.message) { alert('오류: ' + res.message); return; }
        closeForm();
        loadList();
      });
  }

  function openDetail(id) {
    fetch(BASE + '/api/tax-consultations/' + id, { credentials: 'include' })
      .then(r => r.json())
      .then(item => {
        document.getElementById('modalTitle').textContent = item.title;
        document.getElementById('modalMeta').textContent = '등록일: ' + fmt(item.createdAt);
        document.getElementById('modalContent').textContent = item.content;

        const fileArea = document.getElementById('modalFileArea');
        if (item.hasFile) {
          fileArea.style.display = '';
          document.getElementById('modalFileLink').href = BASE + '/api/tax-consultations/' + id + '/file';
          document.getElementById('modalFileLink').textContent = '첨부파일 다운로드: ' + (item.fileOriginalName || '파일');
        } else {
          fileArea.style.display = 'none';
        }

        const answerArea = document.getElementById('modalAnswerArea');
        const pending = document.getElementById('modalPending');
        if (item.status === 'ANSWERED') {
          answerArea.style.display = '';
          pending.style.display = 'none';
          document.getElementById('modalAnswer').textContent = item.answer;
          document.getElementById('modalAnsweredBy').textContent = item.answeredBy ? '답변자: ' + item.answeredBy + ' · ' + fmt(item.answeredAt) : '';
        } else {
          answerArea.style.display = 'none';
          pending.style.display = '';
        }

        document.getElementById('detailModal').classList.add('open');
      });
  }
  function closeModal() { document.getElementById('detailModal').classList.remove('open'); }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  loadSidebar();
  loadList();
</script>
</body>
</html>
