<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계약 상세 | JDEND ERP</title>

  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />
  <link rel="stylesheet" href="../../assets/css/contract/contract_register.css" />

  <style>
    .hidden { display:none !important; }
    .loading-box { padding:14px; border:1px solid #e5e5e5; border-radius:10px; background:#fff; }
    .error-box { padding:14px; border:1px solid #ffcccc; border-radius:10px; background:#fff3f3; color:#b00020; }
    .field-note { opacity:.7; font-size:12px; margin-top:6px; display:block; }
    .highlight-value, .highlight-field { font-weight:700; }
    .btn-toggle-group { display:flex; gap:8px; }
    .btn-toggle { padding:8px 12px; border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer; }
    .btn-toggle.active { border-color:#333; font-weight:700; }
    .detail-grid { display:grid; gap:12px; }
    .detail-grid.grid-2 { grid-template-columns:repeat(2, minmax(0,1fr)); }
    .detail-grid.grid-4 { grid-template-columns:repeat(4, minmax(0,1fr)); }
    .detail-grid.grid-5 { grid-template-columns:repeat(5, minmax(0,1fr)); }
    .detail-item label { display:block; font-size:12px; opacity:.8; margin-bottom:6px; }
    .detail-value { padding:10px 12px; border:1px solid #eee; border-radius:10px; background:#fafafa; min-height:40px; display:flex; align-items:center; }
    .detail-item.full-width { grid-column:1 / -1; }

    .form-grid { display:grid; gap:12px; grid-template-columns:repeat(2, minmax(0,1fr)); }
    .form-grid.grid-5 { grid-template-columns:repeat(5, minmax(0,1fr)); }
    .form-grid.grid-4 { grid-template-columns:repeat(4, minmax(0,1fr)); }
    .grid-full-width { grid-column:1 / -1; }

    .form-group label { display:block; font-size:12px; opacity:.8; margin-bottom:6px; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:10px; outline:none;
    }
    .input-with-unit { display:flex; align-items:center; gap:8px; }
    .unit, .unit-prefix { opacity:.7; font-size:12px; white-space:nowrap; }
    .form-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:16px; }
    .required::after { content:" *"; color:#d00; }
  </style>
</head>

<body>
<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>계약 상세</h1>
    <p>계약관리 &gt; 계약등록 &gt; 상세보기</p>
  </div>

  <div id="loadingBox" class="loading-box">불러오는 중...</div>
  <div id="errorBox" class="error-box hidden"></div>

  <!-- ✅ 상세 섹션 -->

        <div class="detail-grid">

          <div class="detail-item">
            <label>고객번호</label>
            <div class="detail-value" id="customerNumber">-</div>
          </div>
          <div class="detail-item">
            <label>고객명</label>
            <div class="detail-value" id="customerName">-</div>
          </div>
          <div class="detail-item">
            <label>고객연락처</label>
            <div class="detail-value" id="customerPhone">-</div>
          </div>
          <div class="detail-item">
            <label>주소</label>
            <div class="detail-value" id="customerAddress">-</div>
          </div>
          <div class="detail-item">
            <label>주민/사업자번호</label>
            <div class="detail-value" id="customerRegistrationNumber">-</div>
          </div>
        </div>
      </div>

      <!-- 차량 정보 -->
      <div class="form-section">
        <h3 class="section-title">차량 정보</h3>
        <div class="detail-grid grid-2">
          <div class="detail-item">
            <label>차량번호</label>
            <div class="detail-value" id="vehicleNo">-</div>
          </div>
          <div class="detail-item">
            <label>차종</label>
            <div class="detail-value" id="vehicleModel">-</div>
          </div>
        </div>
      </div>

      <!-- 계약 정보 -->
      <div class="form-section">
        <h3 class="section-title">계약 정보</h3>
        <div class="detail-grid grid-5">
          <div class="detail-item">
            <label>계약구분</label>
            <div class="detail-value" id="contractType">-</div>
          </div>
          <div class="detail-item">
            <label>계약유형</label>
            <div class="detail-value" id="contractCategory">-</div>
          </div>

          <div class="detail-item">
            <label>계약시작일</label>
            <div class="detail-value" id="startDate">-</div>
          </div>
          <div class="detail-item">
            <label>계약종료일</label>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>

<script>
  // -----------------------------
  // 유틸
  // -----------------------------
  const $ = (id) => document.getElementById(id);

  function showLoading(on) { $("loadingBox").classList.toggle("hidden", !on); }
  function showError(msg) {
    const box = $("errorBox");
    box.textContent = msg || "오류가 발생했습니다.";
    box.classList.remove("hidden");
  }
  function hideError() {
    $("errorBox").classList.add("hidden");
    $("errorBox").textContent = "";
  }

  function toInt(v) {
    if (v === null || v === undefined) return null;
    const n = parseInt(String(v).replace(/[^0-9-]/g, ""), 10);
    return Number.isFinite(n) ? n : null;
  }
  function toMoneyText(v) {
    const n = toInt(v);
    return (n === null ? "-" : n.toLocaleString() + "원");
  }
  function setText(id, v, fallback="-") {
    const el = $(id);
    if (!el) return;
    el.textContent = (v === null || v === undefined || v === "") ? fallback : v;
  }

  function calcPeriodText(startDate, endDate) {
    if (!startDate || !endDate) return "-";
    const s = new Date(startDate);
    const e = new Date(endDate);
    if (isNaN(s.getTime()) || isNaN(e.getTime())) return "-";
    let months = (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth());
    if (months < 0) months = 0;
    const diffDays = Math.max(0, Math.ceil((e - s) / (1000*60*60*24)));
    return `${months}개월 ${diffDays}일`;
  }

  function formatNumber(input) {
    let value = input.value.replace(/[^0-9]/g, "");
    input.value = value ? parseInt(value, 10).toLocaleString() : "";
  }

  function selectToggle(btn, inputId, value) {
    const group = btn.closest(".btn-toggle-group");
    if (group) group.querySelectorAll(".btn-toggle").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    $(inputId).value = value;
  }

  // -----------------------------
  // API
  // -----------------------------
  const BASE = (typeof API_BASE_URL !== "undefined" && API_BASE_URL)
    ? String(API_BASE_URL).replace(/\/$/, "")
    : "";

  async function apiFetch(path, opts = {}) {
    if (!BASE) throw new Error("API_BASE_URL이 설정되지 않았습니다. ../../assets/js/config.js 확인하세요.");

    const res = await fetch(BASE + path, {
      headers: { "Content-Type": "application/json", ...(opts.headers || {}) },
      ...opts
    });

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try {
        const t = await res.text();
        if (t) msg += ` - ${t}`;
      } catch {}
      throw new Error(msg);
    }

    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // -----------------------------
  // 파라미터 해석
  // -----------------------------
  const urlParams = new URLSearchParams(window.location.search);

  // ✅ 네가 지금 쓰는 방식: ?id=R00001002 도 지원
  const rawId = urlParams.get("id") || "";
  const isNumericId = /^\d+$/.test(rawId);

  // 계약번호는 ?contractNumber= 우선, 없으면 ?id=R... 를 계약번호로 취급
  const contractNumber = urlParams.get("contractNumber") || (!isNumericId && rawId ? rawId : null);
  const contractId = isNumericId ? rawId : null; // 숫자일 때만 PK로 사용

  let contractData = null; // full 응답 저장 (여기에 id(PK) 있음)

  // -----------------------------
  // 렌더링
  // -----------------------------
  function renderDetail(data) {
    $("contractDetailSection").classList.remove("hidden");

    setText("contractNumber", data.contractNumber);

    setText("customerNumber", data.customerNumber);
    setText("customerName", data.customerName);
    setText("customerPhone", data.customerPhone);
    setText("customerAddress", data.customerAddress);
    setText("customerRegistrationNumber", data.customerRegistrationNumber);

    setText("vehicleNo", data.vehicleNo);
    setText("vehicleModel", data.vehicleModel);

    setText("contractType", data.contractType);
    setText("contractCategory", data.contractCategory);

    // 날짜: LocalDate는 JSON에서 "YYYY-MM-DD"
    setText("startDate", data.startDate);
    setText("endDate", data.endDate);
    setText("contractPeriod", calcPeriodText(data.startDate, data.endDate));

    setText("taxInvoiceDay", (data.taxInvoiceDay != null ? (data.taxInvoiceDay + "일") : "-"));
    setText("paymentDueDay", data.paymentDueDay);

    setText("advancePayment", toMoneyText(data.advancePayment));
    setText("monthlyRent", toMoneyText(data.monthlyRent));
    setText("billingDay", (data.billingDay != null ? ("매달 " + data.billingDay + "일") : "-"));
    setText("billingCount", (data.billingCount != null ? (data.billingCount + "회") : "-"));
    setText("totalRent", toMoneyText(data.totalRent));

    setText("deposit", toMoneyText(data.deposit));
    setText("maturityOption", data.maturityOption);
    setText("residualValue", toMoneyText(data.residualValue));

    setText("vehicleInsurance", data.vehicleInsurance);
    setText("insuranceAge", data.insuranceAge);
    setText("vehicleInsuranceLimit", data.vehicleInsuranceLimit);
    setText("vehicleDeductible", data.vehicleDeductible);

    setText("propertyLiability", data.propertyLiability);
    setText("propertyDeductible", data.propertyDeductible);
    setText("personalDeductible", data.personalDeductible);
    setText("passengerDeductible", data.passengerDeductible);

    setText("remarks", data.remarks, "-");
  }

  function fillEditForm(data) {
    $("editContractNumber").value = data.contractNumber || "";

    $("editCustomerNumber").value = data.customerNumber || "";
    $("editCustomerName").value = data.customerName || "";
    $("editCustomerPhone").value = data.customerPhone || "";
    $("editCustomerAddress").value = data.customerAddress || "";
    $("editCustomerRegistrationNumber").value = data.customerRegistrationNumber || "";

    $("editVehicleNo").value = data.vehicleNo || "";
    $("editVehicleModel").value = data.vehicleModel || "";

    $("editContractType").value = data.contractType || "";
    $("editContractCategory").value = data.contractCategory || "";

    $("editStartDate").value = data.startDate || "";
    $("editEndDate").value = data.endDate || "";
    $("editContractPeriod").value = calcPeriodText(data.startDate, data.endDate);

    $("editTaxInvoiceDay").value = (data.taxInvoiceDay ?? "");
    $("editPaymentDueDay").value = (data.paymentDueDay ?? "");

    $("editAdvancePayment").value = (toInt(data.advancePayment) ?? 0).toLocaleString();
    $("editMonthlyRent").value = (toInt(data.monthlyRent) ?? 0).toLocaleString();
    $("editBillingDay").value = (data.billingDay ?? "");
    $("editBillingCount").value = (data.billingCount ?? 0);
    $("editTotalRent").value = toMoneyText(data.totalRent);

    $("editDeposit").value = (toInt(data.deposit) ?? 0).toLocaleString();
    $("editMaturityOption").value = (data.maturityOption ?? "");
    $("editResidualValue").value = (toInt(data.residualValue) ?? 0).toLocaleString();

    $("editVehicleInsurance").value = (data.vehicleInsurance ?? "가입");
    $("editInsuranceAge").value = (data.insuranceAge ?? "");
    $("editVehicleInsuranceLimit").value = (data.vehicleInsuranceLimit ?? "");
    $("editVehicleDeductible").value = (data.vehicleDeductible ?? "");
    $("editPropertyLiability").value = (data.propertyLiability ?? "");
    $("editPropertyDeductible").value = (data.propertyDeductible ?? "");
    $("editPersonalDeductible").value = (data.personalDeductible ?? "");
    $("editPassengerDeductible").value = (data.passengerDeductible ?? "");

    $("editRemarks").value = (data.remarks ?? "");

    // 토글 active
    const toggles = document.querySelectorAll("#contractEditSection .btn-toggle-group .btn-toggle");
    toggles.forEach(b => b.classList.remove("active"));
    const cur = $("editVehicleInsurance").value || "가입";
    const target = Array.from(toggles).find(b => b.dataset.val === cur);
    if (target) target.classList.add("active");

    calculateEditTotalRent();
  }

  function calculateEditTotalRent() {
    const monthlyRent = toInt($("editMonthlyRent").value) || 0;
    const billingCount = toInt($("editBillingCount").value) || 0;
    const total = monthlyRent * billingCount;
    $("editTotalRent").value = total.toLocaleString() + "원";
  }

  function calculateEditContractPeriod() {
    const s = $("editStartDate").value;
    const e = $("editEndDate").value;
    $("editContractPeriod").value = calcPeriodText(s, e);

    // 개월을 billingCount에 자동 세팅 (싫으면 지워)
    if (s && e) {
      const sd = new Date(s);
      const ed = new Date(e);
      if (!isNaN(sd.getTime()) && !isNaN(ed.getTime())) {
        let months = (ed.getFullYear() - sd.getFullYear()) * 12 + (ed.getMonth() - sd.getMonth());
        if (ed.getDate() >= sd.getDate()) months += 1;
        if (months < 0) months = 0;
        $("editBillingCount").value = months;
        calculateEditTotalRent();
      }
    }
  }

  // -----------------------------
  // 섹션 토글
  // -----------------------------
  const contractDetailSection = $("contractDetailSection");
  const contractEditSection = $("contractEditSection");

  $("editContractBtn").addEventListener("click", () => {
    fillEditForm(contractData || {});
    contractDetailSection.classList.add("hidden");
    contractEditSection.classList.remove("hidden");
  });

  $("cancelEditBtn").addEventListener("click", () => {
    if (confirm("수정을 취소하시겠습니까?")) {
      contractEditSection.classList.add("hidden");
      contractDetailSection.classList.remove("hidden");
    }
  });

  $("editStartDate").addEventListener("change", calculateEditContractPeriod);
  $("editEndDate").addEventListener("change", calculateEditContractPeriod);

  function resetEditForm() {
    if (!contractData) return;
    if (confirm("모든 입력 내용을 초기화하시겠습니까?")) fillEditForm(contractData);
  }

  function goBack() {
    window.location.href = "/pages/management/contract_status.html";
  }

  // -----------------------------
  // 조회: id(숫자) 또는 contractNumber(문자)
  // -----------------------------
  async function fetchContractFull() {
    if (contractNumber) {
      return await apiFetch(`/api/contracts/by-number/${encodeURIComponent(contractNumber)}/full`, { method: "GET" });
    }
    if (contractId) {
      return await apiFetch(`/api/contracts/${contractId}/full`, { method: "GET" });
    }
    throw new Error("URL 파라미터가 없습니다. 예) ?id=1 또는 ?id=R00001002 또는 ?contractNumber=R00001002");
  }

  // -----------------------------
  // 저장(PUT): PK id로만
  // -----------------------------
  $("contractEditForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError();

    if (!confirm("수정하시겠습니까?")) return;

    // ✅ ContractRequest에 맞춰 payload 작성 (네 서비스 update 로직 기준)
    const payload = {
      customerNumber: $("editCustomerNumber").value.trim(),
      vehicleNo: $("editVehicleNo").value.trim(),

      contractType: $("editContractType").value,
      contractCategory: $("editContractCategory").value,

      startDate: $("editStartDate").value,
      endDate: $("editEndDate").value,

      taxInvoiceDay: toInt($("editTaxInvoiceDay").value),
      paymentDueDay: $("editPaymentDueDay").value || null,

      advancePayment: toInt($("editAdvancePayment").value) || 0,
      monthlyRent: toInt($("editMonthlyRent").value) || 0,
      billingDay: toInt($("editBillingDay").value),
      billingCount: toInt($("editBillingCount").value) || 0,

      // 서버에서 totalRent 없으면 monthlyRent*billingCount로 계산해주지만,
      // 프론트에서도 보내도 됨
      totalRent: toInt($("editTotalRent").value),

      deposit: toInt($("editDeposit").value) || 0,
      maturityOption: $("editMaturityOption").value || null,
      residualValue: toInt($("editResidualValue").value) || 0,

      vehicleInsurance: $("editVehicleInsurance").value || null,
      insuranceAge: $("editInsuranceAge").value || null,
      vehicleInsuranceLimit: $("editVehicleInsuranceLimit").value || null,
      vehicleDeductible: $("editVehicleDeductible").value || null,

      propertyLiability: $("editPropertyLiability").value || null,
      propertyDeductible: $("editPropertyDeductible").value || null,
      personalDeductible: $("editPersonalDeductible").value || null,
      passengerDeductible: $("editPassengerDeductible").value || null,

      remarks: $("editRemarks").value || null
    };

    try {
      showLoading(true);

      // ✅ PK(id) 확보 (full 응답에 id 있음)
      const pk = contractData && contractData.id ? String(contractData.id) : "";
      if (!/^\d+$/.test(pk)) throw new Error("저장 불가: contractData.id(PK)가 없습니다. full 응답에 id 포함되어야 합니다.");

      await apiFetch(`/api/contracts/${pk}`, {
        method: "PUT",
        body: JSON.stringify(payload)
      });

      // 저장 후 재조회
      contractData = await fetchContractFull();
      renderDetail(contractData);

      contractEditSection.classList.add("hidden");
      contractDetailSection.classList.remove("hidden");

      alert("수정했습니다");
    } catch (err) {
      console.error(err);
      showError(String(err.message || err));
    } finally {
      showLoading(false);
    }
  });

  // -----------------------------
  // 최초 로드
  // -----------------------------
  (async function init() {
    hideError();

    try {
      showLoading(true);

      contractData = await fetchContractFull();
      renderDetail(contractData);

      $("contractDetailSection").classList.remove("hidden");
    } catch (err) {
      console.error(err);
      showError(String(err.message || err));
    } finally {
      showLoading(false);
    }
  })();
</script>
</body>
</html>
