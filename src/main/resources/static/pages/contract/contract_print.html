<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계약서 출력</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:"맑은 고딕", Arial, sans-serif;
  background:#f5f5f5;
}

.print-bar{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:12px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.print-bar button{
  padding:10px 14px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
  border-radius:6px;
}

.page{
  width:210mm;
  margin:20px auto;
  background:#fff;
  padding:10mm;
}

.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:10px;
}

.meta{
  text-align:right;
  font-size:12px;
  margin-bottom:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td{
  border:1px solid #222;
  padding:5px;
  font-size:12px;
  text-align:center;
  word-break:keep-all;
  overflow-wrap:anywhere;
  vertical-align:middle;
}

.section{
  font-weight:700;
  font-size:14px;
  height:36px;
}

.label{
  font-size:11px;
}

.small{font-size:11px;}
.xsmall{font-size:10px;}

.left{text-align:left;}

.remark{
  height:180px;
  text-align:left;
  vertical-align:top;
  padding:10px;
  white-space:pre-wrap;
}

.sign{
  height:60px;
}

.landlord-address{
  line-height:1.5;
}

.tenant-name{
  white-space:nowrap;
  vertical-align:middle;
}

@media print{
  .print-bar{display:none;}
  body{background:#fff;}
  .page{margin:0; padding:0;}
}
</style>
</head>

<body>

<div class="print-bar">
  <button onclick="window.print()">프린트</button>
  <button onclick="window.close()">닫기</button>
</div>

<div class="page">

<div class="meta" id="printDate"></div>
<div class="title">렌트 계약서</div>

<table>

<!-- 고객정보 -->
<tr>
  <td colspan="9" class="section">* 고객정보</td>
</tr>

<tr>
  <td class="label">고객명</td>
  <td id="customerName"></td>
  <td class="label">고객명</td>
  <td id="customerName2"></td>
  <td class="label">연락처</td>
  <td id="customerPhone"></td>
  <td class="label xsmall">주민등록번호<br>사업자번호</td>
  <td colspan="2" id="regNo"></td>
</tr>

<tr>
  <td class="label">주소</td>
  <td colspan="8" id="address" class="left"></td>
</tr>

<!-- 차량/보험 -->
<tr>
  <td colspan="5" class="section">차량구분</td>
  <td colspan="4" class="section">보험구분</td>
</tr>

<tr>
  <td class="label">차량번호</td>
  <td id="vehicleNo"></td>
  <td class="label">차종</td>
  <td colspan="2" id="vehicleModel"></td>

  <td class="label">대인</td>
  <td>무한</td>
  <td class="label">대물</td>
  <td id="property"></td>
</tr>

<tr>
  <td colspan="5" class="section">계약구분</td>

  <td class="label">자차보험</td>
  <td id="insurance"></td>
  <td class="label xsmall">보험연령</td>
  <td id="insuranceAge"></td>
</tr>

<tr>
  <td class="label">계약구분</td>
  <td class="label">유형</td>
  <td class="label">시작일</td>
  <td class="label">종료일</td>
  <td class="label">개월</td>

  <td class="label xsmall">자차한도</td>
  <td id="limit"></td>
  <td class="label xsmall">자차면책</td>
  <td id="deduct"></td>
</tr>

<tr>
  <td id="type"></td>
  <td id="category"></td>
  <td id="start"></td>
  <td id="end"></td>
  <td id="months"></td>

  <td class="label xsmall">자손부상</td>
  <td>1500만원</td>
  <td class="label xsmall">대물면책</td>
  <td id="propertyDeduct"></td>
</tr>

<tr>
  <td colspan="5" class="section">렌트료</td>

  <td class="label xsmall">자손사망</td>
  <td>1억</td>
  <td class="label xsmall">대인면책</td>
  <td id="personalDeduct"></td>
</tr>

<!-- 자손면책을 대인면책 밑으로 이동 -->
<tr>
  <td class="label">선납금</td>
  <td id="advance"></td>
  <td class="label">월렌트</td>
  <td class="label">횟수</td>
  <td class="label">총액</td>

  <td colspan="2"></td>
  <td class="label xsmall">자손면책</td>
  <td id="passengerDeduct"></td>
</tr>

<tr>
  <td class="label">보증금</td>
  <td id="deposit"></td>
  <td id="monthly"></td>
  <td id="count"></td>
  <td id="total"></td>

  <td colspan="4" class="section">기타사항</td>
</tr>

<!-- 인수/재렌트/반납 라벨 제거, 결과값만 만기시 옆에 표시 -->
<tr>
  <td colspan="5"></td>
  <td class="label">만기시</td>
  <td colspan="3" id="maturityOption"></td>
</tr>

<tr>
  <td colspan="5"></td>
  <td class="label">잔존가액</td>
  <td colspan="3" id="residual"></td>
</tr>

<tr>
  <td colspan="9" class="left">*비고</td>
</tr>

<tr>
  <td colspan="9" class="remark" id="remark"></td>
</tr>

<tr>
  <td colspan="5" class="sign">임대인</td>
  <td colspan="4" class="sign">임차인</td>
</tr>

<tr>
  <td colspan="4">주식회사 제이디엔드렌트카</td>
  <td rowspan="2">(서명 또는 인)</td>
  <td colspan="3" rowspan="2" class="tenant-name" id="tenant"></td>
  <td rowspan="2">(서명 또는 인)</td>
</tr>

<tr>
  <td colspan="4" class="landlord-address">
    서울시 영등포구 여의대방로 379<br>
    605호
  </td>
</tr>

</table>
</div>

<script src="../../assets/js/config.js"></script>

<script>
const API_BASE = `${API_BASE_URL}/api`;

function qs(name){
  return new URLSearchParams(location.search).get(name);
}

function money(n){
  if(n === null || n === undefined || n === '') return '-';
  return Number(n).toLocaleString();
}

function months(s,e){
  if(!s || !e) return '';
  const a = new Date(s);
  const b = new Date(e);
  return (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth());
}

async function load(){
  const id = qs('id');
  const d = await fetch(API_BASE + '/contracts/' + id + '/full').then(r => r.json());

  document.getElementById('printDate').innerText =
    '출력일: ' + new Date().toISOString().slice(0,10);

  document.getElementById('customerName').innerText = d.customerName || '';
  document.getElementById('customerName2').innerText = d.customerName || '';
  document.getElementById('customerPhone').innerText = d.customerPhone || '';
  document.getElementById('regNo').innerText = d.customerRegistrationNumber || '';
  document.getElementById('address').innerText = d.customerAddress || '';

  document.getElementById('vehicleNo').innerText = d.vehicleNo || '';
  document.getElementById('vehicleModel').innerText = d.vehicleModel || '';

  document.getElementById('property').innerText = d.propertyLiability || '';
  document.getElementById('insurance').innerText = d.vehicleInsurance || '';
  document.getElementById('insuranceAge').innerText = d.insuranceAge || '';

  document.getElementById('type').innerText = d.contractType || '';
  document.getElementById('category').innerText = d.contractCategory || '';
  document.getElementById('start').innerText = d.startDate || '';
  document.getElementById('end').innerText = d.endDate || '';
  document.getElementById('months').innerText = months(d.startDate, d.endDate);

  document.getElementById('limit').innerText = d.vehicleInsuranceLimit || '';
  document.getElementById('deduct').innerText = d.vehicleDeductible || '';
  document.getElementById('propertyDeduct').innerText = d.propertyDeductible || '';
  document.getElementById('personalDeduct').innerText = d.personalDeductible || '';
  document.getElementById('passengerDeduct').innerText = d.passengerDeductible || '';

  document.getElementById('advance').innerText = money(d.advancePayment);
  document.getElementById('deposit').innerText = money(d.deposit);
  document.getElementById('monthly').innerText = money(d.monthlyRent);
  document.getElementById('count').innerText = d.billingCount || '';
  document.getElementById('total').innerText = money(d.totalRent);

  // 만기시 옆에는 인수/재렌트/반납 결과값만 표시
  document.getElementById('maturityOption').innerText =
    d.maturityOption || d.maturityStatus || '';

  document.getElementById('residual').innerText = money(d.residualValue);

  document.getElementById('remark').innerText = d.remarks || '';
  document.getElementById('tenant').innerText = d.customerName || '';
}

load();
</script>

</body>
</html>
