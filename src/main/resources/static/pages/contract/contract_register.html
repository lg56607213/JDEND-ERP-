<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계약등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/contract/contract_register.css">

  <style>
    .input-group{display:flex; gap:6px; align-items:center;}
    .btn-icon{
      width:38px; height:38px;
      border:1px solid #ddd; border-radius:6px;
      background:#fff; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center;
    }
    .btn-icon:hover{background:#f7f7f7;}
    .btn-icon:disabled{opacity:.5; cursor:not-allowed;}

    .modal-backdrop{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:9999;
      padding:30px 12px; overflow:auto;
    }
    .modal{
      background:#fff; width:100%; max-width:980px;
      margin:0 auto; border-radius:10px;
      padding:16px; box-shadow:0 10px 30px rgba(0,0,0,.2);
    }
    .modal-header{
      display:flex; justify-content:space-between; align-items:center;
      gap:10px; margin-bottom:10px;
    }
    .modal-title{font-size:18px; font-weight:700;}
    .modal-close{border:0; background:transparent; font-size:22px; cursor:pointer; line-height:1;}
    .modal-body .row{display:flex; gap:8px; margin:10px 0 12px; align-items:center;}
    .modal-body input[type="text"]{
      flex:1; height:38px; padding:0 10px;
      border:1px solid #ddd; border-radius:6px;
    }
    .modal-body .btn{
      height:38px; padding:0 12px; border-radius:6px;
      border:1px solid #ddd; background:#fff; cursor:pointer;
    }
    .modal-body .btn-primary{background:#2f6fed; border-color:#2f6fed; color:#fff;}
    .modal-body table{width:100%; border-collapse:collapse;}
    .modal-body th,.modal-body td{border:1px solid #eee; padding:10px; text-align:left; font-size:14px;}
    .modal-body tr:hover{background:#fafafa;}
    .modal-body .select-btn{
      padding:6px 10px; border-radius:6px;
      border:1px solid #ddd; background:#fff; cursor:pointer; font-size:13px;
    }

    .badge-edit{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:#fff7e6;
      border:1px solid #ffd59a;
      color:#9a5b00;
      font-size:12px;
      margin-left:8px;
    }
  </style>
</head>

<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>계약등록</h1>
      <p>계약관리 &gt; 계약등록 &gt; 등록</p>
    </div>

    <div class="erp-card" id="contractListSection">
      <div class="card-header">
        <h2>계약 목록</h2>
        <button type="button" class="btn btn-primary" id="addContractBtn"><span>+ 계약 추가</span></button>
      </div>

      <div class="card-body">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>번호</th>
                <th>계약번호</th>
                <th>고객명</th>
                <th>차량번호</th>
                <th>차종</th>
                <th>계약구분</th>
                <th>계약유형</th>
                <th>상태</th>
                <th>계약시작일</th>
                <th>계약종료일</th>
                <th>청구횟수</th>
                <th>월렌트료</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="contractTableBody"></tbody>
          </table>
        </div>

        <div class="pagination" id="pagination">
          <button class="pagination-btn" id="prevBtn" disabled>이전</button>
          <div class="pagination-numbers" id="pageNumbers"></div>
          <button class="pagination-btn" id="nextBtn">다음</button>
        </div>
      </div>
    </div>

    <div class="erp-card hidden" id="contractFormSection">
      <div class="card-header">
        <h2>
          계약 등록
          <span class="badge-edit hidden" id="editBadge">수정모드</span>
        </h2>
        <button type="button" class="btn btn-secondary" id="cancelFormBtn">취소</button>
      </div>

      <div class="card-body">
        <form id="contractForm">
          <input type="hidden" id="editingId" value="">

          <div class="form-section">
            <h3 class="section-title">계약 번호</h3>
            <div class="form-grid">
              <div class="form-group">
                <label>계약번호</label>
                <input type="text" id="contractNumber" value="" disabled>
                <small class="field-note">자동산출</small>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">고객 정보</h3>
            <div class="form-grid grid-5">
              <div class="form-group">
                <label for="customerCode" class="required">고객번호</label>
                <div class="input-group">
                  <input type="text" id="customerCode" placeholder="고객번호 입력" required>
                  <button type="button" class="btn-icon" id="btnCustomerSearch" title="고객 조회">🔍</button>
                </div>
              </div>
              <div class="form-group">
                <label>고객명</label>
                <input type="text" id="customerName" placeholder="자동입력" disabled>
              </div>
              <div class="form-group">
                <label>고객연락처</label>
                <input type="text" id="customerPhone" placeholder="자동입력" disabled>
              </div>
              <div class="form-group">
                <label>주소</label>
                <input type="text" id="address" placeholder="자동입력" disabled>
              </div>
              <div class="form-group">
                <label>주민등록번호/사업자등록번호</label>
                <input type="text" id="idNumber" placeholder="자동입력" disabled>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">차량 정보</h3>
            <div class="form-grid grid-2">
              <div class="form-group">
                <label for="vehicleNumber" class="required">차량번호</label>
                <div class="input-group">
                  <input type="text" id="vehicleNumber" placeholder="차량번호 입력" required>
                  <button type="button" class="btn-icon" id="btnVehicleSearch" title="차량 조회">🔍</button>
                </div>
              </div>
              <div class="form-group">
                <label>차종</label>
                <input type="text" id="vehicleModel" placeholder="자동입력" disabled>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">계약 정보</h3>
            <div class="form-grid grid-5">
              <div class="form-group">
                <label class="required">계약구분</label>
                <select id="contractType" required>
                  <option value="">선택</option>
                  <option value="장기">장기</option>
                  <option value="단기">단기</option>
                </select>
              </div>

              <div class="form-group">
                <label class="required">계약유형</label>
                <select id="contractCategory" required>
                  <option value="">선택</option>
                  <option value="일반">일반</option>
                  <option value="정비">정비</option>
                </select>
              </div>

              <div class="form-group">
                <label class="required">상태</label>
                <select id="status" required>
                  <option value="대기" selected>대기</option>
                  <option value="진행중">진행중</option>
                  <option value="종료">종료</option>
                </select>
              </div>

              <div class="form-group">
                <label class="required">계약시작일</label>
                <input type="date" id="startDate" required>
              </div>

              <div class="form-group">
                <label class="required">계약종료일</label>
                <input type="date" id="endDate" required>
              </div>

              <div class="form-group">
                <label>계약기간</label>
                <input type="text" id="contractPeriod" placeholder="자동계산" disabled>
              </div>

              <div class="form-group">
                <label>세금계산서발행일</label>
                <div class="input-with-unit">
                  <input type="number" id="taxInvoiceDay" value="25" min="1" max="31">
                  <span class="unit">일</span>
                </div>
              </div>

              <div class="form-group">
                <label>납부일자</label>
                <select id="paymentDueDay">
                  <option value="말일" selected>말일</option>
                  <option value="25일">25일</option>
                  <option value="15일">15일</option>
                  <option value="10일">10일</option>
                  <option value="5일">5일</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">금액 정보</h3>
            <div class="form-grid grid-5">
              <div class="form-group">
                <label>선납금</label>
                <input type="text" id="advancePayment" placeholder="0" inputmode="numeric">
              </div>
              <div class="form-group">
                <label class="required">월 렌트료</label>
                <input type="text" id="monthlyRent" placeholder="0" inputmode="numeric" required>
              </div>
              <div class="form-group">
                <label>청구일자</label>
                <div class="input-with-unit">
                  <span class="unit-prefix">매달</span>
                  <input type="number" id="billingDay" value="25" min="1" max="31">
                  <span class="unit">일</span>
                </div>
              </div>
              <div class="form-group">
                <label class="required">청구횟수</label>
                <input type="number" id="billingCount" placeholder="0">
              </div>
              <div class="form-group">
                <label>총 렌트료</label>
                <input type="text" id="totalRent" placeholder="자동산출" disabled class="highlight-field">
                <small class="field-note">월 렌트료 × 청구횟수</small>
              </div>

              <div class="form-group">
                <label>보증금</label>
                <input type="text" id="deposit" placeholder="0" inputmode="numeric">
              </div>
              <div class="form-group">
                <label>만기옵션</label>
                <select id="maturityOption">
                  <option value="반납" selected>반납</option>
                  <option value="반납및재렌트">반납 및 재렌트</option>
                  <option value="인수">인수</option>
                  <option value="인수및재렌트">인수 및 재렌트</option>
                </select>
              </div>
              <div class="form-group">
                <label>잔존가액</label>
                <input type="text" id="residualValue" placeholder="0" value="0" inputmode="numeric">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">보험 정보</h3>
            <div class="form-grid grid-4">
              <div class="form-group">
                <label>대인</label>
                <input type="text" id="personalLiability" value="무한" disabled>
              </div>
              <div class="form-group">
                <label>대물</label>
                <input type="text" id="propertyLiability" value="2억">
              </div>

              <div class="form-group">
                <label>자차보험</label>
                <div class="btn-toggle-group">
                  <button type="button" class="btn-toggle active" data-target="vehicleInsurance" data-value="가입">가입</button>
                  <button type="button" class="btn-toggle" data-target="vehicleInsurance" data-value="미가입">미가입</button>
                </div>
                <input type="hidden" id="vehicleInsurance" value="가입">
              </div>

              <div class="form-group">
                <label>보험가입연령</label>
                <select id="insuranceAge">
                  <option value="만21세">만21세</option>
                  <option value="만24세">만24세</option>
                  <option value="만26세" selected>만26세</option>
                  <option value="만30세">만30세</option>
                  <option value="만35세">만35세</option>
                </select>
              </div>

              <div class="form-group">
                <label>자차한도</label>
                <input type="text" id="vehicleInsuranceLimit" value="3천만원">
              </div>
              <div class="form-group">
                <label>자차면책금</label>
                <input type="text" id="vehicleDeductible" value="50만원">
              </div>

              <div class="form-group">
                <label>대물면책금(건당)</label>
                <input type="text" id="propertyDeductible" value="50만원">
              </div>
              <div class="form-group">
                <label>대인면책금(인당)</label>
                <input type="text" id="personalDeductible" value="50만원">
              </div>
              <div class="form-group">
                <label>자손면책금</label>
                <input type="text" id="passengerDeductible" value="50만원">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">비고</h3>
            <div class="form-grid">
              <div class="form-group grid-full-width">
                <textarea id="remarks" rows="4" placeholder="비고 사항을 입력하세요"></textarea>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="btnReset">초기화</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">계약등록</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="customerModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">고객 조회 (전체 고객 조회)</div>
        <button type="button" class="modal-close" id="closeCustomerModal">×</button>
      </div>
      <div class="modal-body">
        <div class="row">
          <input type="text" id="customerSearchKeyword" placeholder="고객번호/고객명/연락처 검색">
          <button type="button" class="btn btn-primary" id="customerSearchBtn">검색</button>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width:120px;">고객번호</th>
                <th style="width:160px;">고객명</th>
                <th style="width:160px;">연락처</th>
                <th>주소</th>
                <th style="width:90px;">선택</th>
              </tr>
            </thead>
            <tbody id="customerSearchTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="vehicleModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">차량 조회 (미계약 차량만)</div>
        <button type="button" class="modal-close" id="closeVehicleModal">×</button>
      </div>
      <div class="modal-body">
        <div class="row">
          <input type="text" id="vehicleSearchKeyword" placeholder="차량번호/차종/관리번호 검색">
          <button type="button" class="btn btn-primary" id="vehicleSearchBtn">검색</button>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width:140px;">차량번호</th>
                <th style="width:220px;">차종</th>
                <th style="width:180px;">차량관리번호</th>
                <th style="width:90px;">선택</th>
              </tr>
            </thead>
            <tbody id="vehicleSearchTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    const API_BASE = `${API_BASE_URL}/api`;

    const contractListSection = document.getElementById('contractListSection');
    const contractFormSection = document.getElementById('contractFormSection');
    const addContractBtn = document.getElementById('addContractBtn');
    const cancelFormBtn = document.getElementById('cancelFormBtn');

    const itemsPerPage = 15;
    let currentPage = 1;
    let allContracts = [];

    function money(n){ return Number(n||0).toLocaleString() + '원'; }
    function onlyDigits(str){ return String(str||'').replace(/[^0-9]/g,''); }

    async function apiGet(path){
      const res = await fetch(API_BASE + path);
      if(!res.ok) throw new Error('GET 실패 ' + res.status);
      return res.json();
    }

    async function apiPost(path, body){
      const res = await fetch(API_BASE + path, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if(!res.ok){
        const txt = await res.text().catch(()=> '');
        throw new Error('POST 실패 ' + res.status + ' ' + txt);
      }
      return res.json();
    }

    async function apiPut(path, body){
      const res = await fetch(API_BASE + path, {
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if(!res.ok){
        const txt = await res.text().catch(()=> '');
        throw new Error('PUT 실패 ' + res.status + ' ' + txt);
      }
      return res.json();
    }

    async function apiDelete(path){
      const res = await fetch(API_BASE + path, { method:'DELETE' });
      if(!res.ok) throw new Error('DELETE 실패 ' + res.status);
    }

    async function loadContracts(){
      allContracts = await apiGet('/contracts');
      renderContractPage(1);
    }

    function renderContractPage(page){
      currentPage = page;
      const tbody = document.getElementById('contractTableBody');
      tbody.innerHTML = '';

      const total = allContracts.length;
      const totalPages = Math.ceil(total / itemsPerPage);
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;

      allContracts.slice(start, end).forEach((c, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${start + idx + 1}</td>
          <td>${c.contractNumber || ''}</td>
          <td>${c.customerName || ''}</td>
          <td>${c.vehicleNo || ''}</td>
          <td>${c.vehicleModel || ''}</td>
          <td>${c.contractType || ''}</td>
          <td>${c.contractCategory || ''}</td>
          <td>${c.status || ''}</td>
          <td>${c.startDate || ''}</td>
          <td>${c.endDate || ''}</td>
          <td>${c.billingCount ?? ''}</td>
          <td>${money(c.monthlyRent)}</td>
          <td>
            <button class="btn-small btn-edit" data-id="${c.id}">수정</button>
            <button class="btn-small btn-delete" data-id="${c.id}">삭제</button>
            <button class="btn-small btn-print" data-id="${c.id}">출력</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          await openEdit(btn.dataset.id);
        });
      });

      tbody.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          if(!confirm('정말로 이 계약을 삭제하시겠습니까?')) return;
          try {
            await apiDelete('/contracts/' + id);
            alert('삭제되었습니다.');
            await loadContracts();
          } catch (err) {
            alert('삭제 실패: ' + err.message);
          }
        });
      });

      tbody.querySelectorAll('.btn-print').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          window.open(`contract_print.html?id=${id}`, '_blank');
        });
      });

      const pageNumbersDiv = document.getElementById('pageNumbers');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      pageNumbersDiv.innerHTML = '';
      for(let i = 1; i <= totalPages; i++){
        const b = document.createElement('button');
        b.textContent = i;
        b.className = 'pagination-number' + (i === currentPage ? ' active' : '');
        b.addEventListener('click', () => renderContractPage(i));
        pageNumbersDiv.appendChild(b);
      }

      prevBtn.disabled = (currentPage === 1);
      nextBtn.disabled = (currentPage === totalPages || totalPages === 0);
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      if(currentPage > 1) renderContractPage(currentPage - 1);
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      const totalPages = Math.ceil(allContracts.length / itemsPerPage);
      if(currentPage < totalPages) renderContractPage(currentPage + 1);
    });

    function setModeCreate(){
      document.getElementById('editingId').value = '';
      document.getElementById('editBadge').classList.add('hidden');
      document.getElementById('submitBtn').textContent = '계약등록';
    }

    function setModeEdit(){
      document.getElementById('editBadge').classList.remove('hidden');
      document.getElementById('submitBtn').textContent = '수정저장';
    }

    addContractBtn.addEventListener('click', async () => {
      setModeCreate();
      contractListSection.classList.add('hidden');
      contractFormSection.classList.remove('hidden');
      document.getElementById('contractForm').reset();
      clearFormFields();

      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDate').value = today;
      document.getElementById('status').value = '대기';

      try {
        const next = await apiGet('/contracts/next-number');
        document.getElementById('contractNumber').value = next.contractNumber || '';
      } catch (e) {
        document.getElementById('contractNumber').value = '';
      }
    });

    async function openEdit(id){
      setModeEdit();
      contractListSection.classList.add('hidden');
      contractFormSection.classList.remove('hidden');
      document.getElementById('contractForm').reset();
      clearFormFields();

      const detail = await apiGet('/contracts/' + id + '/full');

      document.getElementById('editingId').value = detail.id;
      document.getElementById('contractNumber').value = detail.contractNumber || '';

      document.getElementById('customerCode').value = detail.customerNumber || '';
      document.getElementById('customerName').value = detail.customerName || '';
      document.getElementById('customerPhone').value = detail.customerPhone || '';
      document.getElementById('address').value = detail.customerAddress || '';
      document.getElementById('idNumber').value = detail.customerRegistrationNumber || '';

      document.getElementById('vehicleNumber').value = detail.vehicleNo || '';
      document.getElementById('vehicleModel').value = detail.vehicleModel || '';

      document.getElementById('contractType').value = detail.contractType || '';
      document.getElementById('contractCategory').value = detail.contractCategory || '';
      document.getElementById('status').value = detail.status || '대기';

      document.getElementById('startDate').value = detail.startDate || '';
      document.getElementById('endDate').value = detail.endDate || '';
      calculateContractPeriod();

      document.getElementById('taxInvoiceDay').value = detail.taxInvoiceDay ?? 25;
      document.getElementById('paymentDueDay').value = detail.paymentDueDay ?? '말일';

      document.getElementById('advancePayment').value = (detail.advancePayment || 0).toLocaleString();
      document.getElementById('monthlyRent').value = (detail.monthlyRent || 0).toLocaleString();
      document.getElementById('billingDay').value = detail.billingDay ?? 25;
      document.getElementById('billingCount').value = detail.billingCount ?? 0;
      document.getElementById('totalRent').value = (detail.totalRent || 0) ? (detail.totalRent.toLocaleString() + '원') : '';

      document.getElementById('deposit').value = (detail.deposit || 0).toLocaleString();
      document.getElementById('maturityOption').value = detail.maturityOption ?? '반납';
      document.getElementById('residualValue').value = (detail.residualValue || 0).toLocaleString();

      const vin = detail.vehicleInsurance ?? '가입';
      document.getElementById('vehicleInsurance').value = vin;
      document.querySelectorAll('.btn-toggle-group .btn-toggle').forEach(b => {
        b.classList.toggle('active', b.dataset.value === vin);
      });

      document.getElementById('insuranceAge').value = detail.insuranceAge ?? '만26세';
      document.getElementById('vehicleInsuranceLimit').value = detail.vehicleInsuranceLimit ?? '3천만원';
      document.getElementById('vehicleDeductible').value = detail.vehicleDeductible ?? '50만원';

      document.getElementById('propertyLiability').value = detail.propertyLiability ?? '2억';
      document.getElementById('propertyDeductible').value = detail.propertyDeductible ?? '50만원';
      document.getElementById('personalDeductible').value = detail.personalDeductible ?? '50만원';
      document.getElementById('passengerDeductible').value = detail.passengerDeductible ?? '50만원';

      document.getElementById('remarks').value = detail.remarks ?? '';
    }

    cancelFormBtn.addEventListener('click', () => {
      if(!confirm('작성 중인 내용이 있습니다. 취소하시겠습니까?')) return;
      document.getElementById('contractForm').reset();
      clearFormFields();
      contractFormSection.classList.add('hidden');
      contractListSection.classList.remove('hidden');
    });

    function clearFormFields(){
      document.getElementById('customerName').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('address').value = '';
      document.getElementById('idNumber').value = '';
      document.getElementById('vehicleModel').value = '';
      document.getElementById('contractPeriod').value = '';
      document.getElementById('totalRent').value = '';
      document.getElementById('status').value = '대기';

      document.querySelectorAll('.btn-toggle-group').forEach(group => {
        const buttons = group.querySelectorAll('.btn-toggle');
        buttons.forEach(b => b.classList.remove('active'));
        buttons[0].classList.add('active');
        document.getElementById('vehicleInsurance').value = buttons[0].dataset.value;
      });
    }

    function bindMoneyInput(id){
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        const digits = onlyDigits(el.value);
        el.value = digits ? Number(digits).toLocaleString() : '';
        calculateTotalRent();
      });
    }

    bindMoneyInput('advancePayment');
    bindMoneyInput('monthlyRent');
    bindMoneyInput('deposit');
    bindMoneyInput('residualValue');

    document.getElementById('billingCount').addEventListener('input', calculateTotalRent);

    function calculateTotalRent(){
      const monthlyRent = Number(onlyDigits(document.getElementById('monthlyRent').value) || 0);
      const billingCount = Number(document.getElementById('billingCount').value || 0);
      const totalRent = monthlyRent * billingCount;
      document.getElementById('totalRent').value = totalRent ? totalRent.toLocaleString() + '원' : '';
    }

    function calculateContractPeriod(){
      const s = document.getElementById('startDate').value;
      const e = document.getElementById('endDate').value;
      if(!s || !e) return;

      const start = new Date(s);
      const end = new Date(e);

      if(end < start){
        document.getElementById('contractPeriod').value = '';
        return;
      }

      const months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
      const diffDays = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24));
      document.getElementById('contractPeriod').value = `${months}개월 ${diffDays}일`;

      if(!document.getElementById('editingId').value){
        document.getElementById('billingCount').value = months;
      }
      calculateTotalRent();
    }

    document.getElementById('startDate').addEventListener('change', calculateContractPeriod);
    document.getElementById('endDate').addEventListener('change', calculateContractPeriod);

    document.querySelectorAll('.btn-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.closest('.btn-toggle-group');
        group.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.target).value = btn.dataset.value;
      });
    });

    document.getElementById('customerCode').addEventListener('blur', async function(){
      const code = this.value.trim();
      if(!code) return;

      try{
        const c = await apiGet('/customers/lookup?customerNumber=' + encodeURIComponent(code));
        fillCustomer(c);
      }catch(e){
        clearCustomerOnly();
        alert('해당 고객번호를 찾을 수 없습니다.');
      }
    });

    function fillCustomer(c){
      document.getElementById('customerCode').value = c.customerNumber || '';
      document.getElementById('customerName').value = c.customerName || '';
      document.getElementById('customerPhone').value = c.phone || '';
      document.getElementById('address').value = c.address || '';
      document.getElementById('idNumber').value = c.registrationNumber || '';
    }

    function clearCustomerOnly(){
      document.getElementById('customerName').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('address').value = '';
      document.getElementById('idNumber').value = '';
    }

    document.getElementById('vehicleNumber').addEventListener('blur', async function(){
      const no = this.value.trim();
      if(!no) return;

      try{
        const isEdit = !!document.getElementById('editingId').value;
        if(isEdit){
          const v = await apiGet('/vehicle-orders/lookup?vehicleNo=' + encodeURIComponent(no));
          document.getElementById('vehicleModel').value = v.vehicleModel || '';
        }else{
          const list = await apiGet('/vehicle-orders/available?keyword=' + encodeURIComponent(no));
          const exact = (list || []).find(v => String(v.vehicleNo) === no);
          if(!exact) throw new Error('not found');
          fillVehicle(exact);
        }
      }catch(e){
        document.getElementById('vehicleModel').value = '';
        alert('해당 차량번호를 찾을 수 없거나(또는 이미 계약된 차량) 입니다.');
      }
    });

    function fillVehicle(v){
      document.getElementById('vehicleNumber').value = v.vehicleNo || '';
      document.getElementById('vehicleModel').value = v.vehicleModel || '';
    }

    document.getElementById('btnReset').addEventListener('click', () => {
      if(!confirm('모든 입력 내용을 초기화하시겠습니까?')) return;
      document.getElementById('contractForm').reset();
      clearFormFields();

      document.getElementById('taxInvoiceDay').value = '25';
      document.getElementById('billingDay').value = '25';
      document.getElementById('vehicleInsuranceLimit').value = '3천만원';
      document.getElementById('vehicleDeductible').value = '50만원';
      document.getElementById('propertyDeductible').value = '50만원';
      document.getElementById('personalDeductible').value = '50만원';
      document.getElementById('passengerDeductible').value = '50만원';
      document.getElementById('propertyLiability').value = '2억';
      document.getElementById('residualValue').value = '0';
      document.getElementById('status').value = '대기';
    });

    document.getElementById('contractForm').addEventListener('submit', async function(e){
      e.preventDefault();

      const isEdit = !!document.getElementById('editingId').value;
      if(!confirm(isEdit ? '계약을 수정하시겠습니까?' : '계약을 등록하시겠습니까?')) return;

      const payload = {
        customerNumber: document.getElementById('customerCode').value.trim(),
        vehicleNo: document.getElementById('vehicleNumber').value.trim(),
        vehicleModel: document.getElementById('vehicleModel').value.trim(),

        contractType: document.getElementById('contractType').value,
        contractCategory: document.getElementById('contractCategory').value,
        status: document.getElementById('status').value,

        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,

        taxInvoiceDay: Number(document.getElementById('taxInvoiceDay').value || 0),
        paymentDueDay: document.getElementById('paymentDueDay').value,

        advancePayment: Number(onlyDigits(document.getElementById('advancePayment').value) || 0),
        monthlyRent: Number(onlyDigits(document.getElementById('monthlyRent').value) || 0),
        billingDay: Number(document.getElementById('billingDay').value || 0),
        billingCount: Number(document.getElementById('billingCount').value || 0),
        totalRent: Number(onlyDigits(document.getElementById('totalRent').value) || 0),

        deposit: Number(onlyDigits(document.getElementById('deposit').value) || 0),
        maturityOption: document.getElementById('maturityOption').value,
        residualValue: Number(onlyDigits(document.getElementById('residualValue').value) || 0),

        vehicleInsurance: document.getElementById('vehicleInsurance').value,
        insuranceAge: document.getElementById('insuranceAge').value,
        vehicleInsuranceLimit: document.getElementById('vehicleInsuranceLimit').value,
        vehicleDeductible: document.getElementById('vehicleDeductible').value,

        propertyLiability: document.getElementById('propertyLiability').value,
        propertyDeductible: document.getElementById('propertyDeductible').value,
        personalDeductible: document.getElementById('personalDeductible').value,
        passengerDeductible: document.getElementById('passengerDeductible').value,

        remarks: document.getElementById('remarks').value
      };

      try{
        if(isEdit){
          const id = document.getElementById('editingId').value;
          await apiPut('/contracts/' + id, payload);
          alert('수정되었습니다.');
        }else{
          const created = await apiPost('/contracts', payload);
          alert('계약이 성공적으로 등록되었습니다!\n계약번호: ' + (created.contractNumber || ''));
        }

        this.reset();
        clearFormFields();
        contractFormSection.classList.add('hidden');
        contractListSection.classList.remove('hidden');
        await loadContracts();
      }catch(err){
        alert((isEdit ? '수정' : '등록') + ' 실패: ' + err.message);
      }
    });

    const customerModal = document.getElementById('customerModalBackdrop');

    document.getElementById('btnCustomerSearch').addEventListener('click', async () => {
      customerModal.style.display = 'block';
      document.getElementById('customerSearchKeyword').value = '';
      document.getElementById('customerSearchTbody').innerHTML = '';
      document.getElementById('customerSearchKeyword').focus();
      await searchCustomers();
    });

    document.getElementById('closeCustomerModal').addEventListener('click', () => customerModal.style.display = 'none');
    customerModal.addEventListener('click', (e) => {
      if(e.target === customerModal) customerModal.style.display = 'none';
    });

    document.getElementById('customerSearchBtn').addEventListener('click', searchCustomers);
    document.getElementById('customerSearchKeyword').addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        searchCustomers();
      }
    });

    async function searchCustomers(){
      const kw = document.getElementById('customerSearchKeyword').value.trim();
      const tbody = document.getElementById('customerSearchTbody');

      try{
        const list = await apiGet('/customers/search?keyword=' + encodeURIComponent(kw));
        tbody.innerHTML = '';

        (list || []).forEach(c => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${c.customerNumber || ''}</td>
            <td>${c.customerName || ''}</td>
            <td>${c.phone || ''}</td>
            <td>${c.address || ''}</td>
            <td><button type="button" class="select-btn">선택</button></td>
          `;
          tr.querySelector('.select-btn').addEventListener('click', () => {
            fillCustomer(c);
            customerModal.style.display = 'none';
          });
          tbody.appendChild(tr);
        });

        if(!list || list.length === 0){
          tbody.innerHTML = `<tr><td colspan="5">검색 결과가 없습니다.</td></tr>`;
        }
      }catch(e){
        alert('고객 검색 실패: ' + e.message);
      }
    }

    const vehicleModal = document.getElementById('vehicleModalBackdrop');

    document.getElementById('btnVehicleSearch').addEventListener('click', () => {
      vehicleModal.style.display = 'block';
      document.getElementById('vehicleSearchKeyword').value = '';
      document.getElementById('vehicleSearchTbody').innerHTML = '';
      document.getElementById('vehicleSearchKeyword').focus();
      searchVehicles();
    });

    document.getElementById('closeVehicleModal').addEventListener('click', () => vehicleModal.style.display = 'none');
    vehicleModal.addEventListener('click', (e) => {
      if(e.target === vehicleModal) vehicleModal.style.display = 'none';
    });

    document.getElementById('vehicleSearchBtn').addEventListener('click', searchVehicles);
    document.getElementById('vehicleSearchKeyword').addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        searchVehicles();
      }
    });

    async function searchVehicles(){
      const kw = document.getElementById('vehicleSearchKeyword').value.trim();
      const tbody = document.getElementById('vehicleSearchTbody');

      try{
        const list = await apiGet('/vehicle-orders/available?keyword=' + encodeURIComponent(kw));
        tbody.innerHTML = '';

        (list || []).forEach(v => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${v.vehicleNo || ''}</td>
            <td>${v.vehicleModel || ''}</td>
            <td>${v.vehicleMgmtNo || ''}</td>
            <td><button type="button" class="select-btn">선택</button></td>
          `;
          tr.querySelector('.select-btn').addEventListener('click', () => {
            fillVehicle(v);
            vehicleModal.style.display = 'none';
          });
          tbody.appendChild(tr);
        });

        if(!list || list.length === 0){
          tbody.innerHTML = `<tr><td colspan="4">검색 결과가 없습니다.</td></tr>`;
        }
      }catch(e){
        alert('차량 검색 실패: ' + e.message);
      }
    }

    (async function init(){
      try{
        await loadContracts();
      }catch(e){
        alert('계약 목록 로딩 실패: ' + e.message);
      }
    })();
  </script>
</body>
</html>
