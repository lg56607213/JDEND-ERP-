<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만기관리(종료) | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/contract/contract_termination.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>만기관리(종료)</h1>
      <p>계약관리 &gt; 종료</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <form id="terminationForm">
          <!-- 계약 조회 섹션 -->
          <div class="form-section">
            <h3 class="section-title">계약 조회</h3>
            <div class="search-group">
              <div class="form-group">
                <label for="contractNumber" class="required">계약번호</label>
                <input type="text" id="contractNumber" name="contractNumber" placeholder="계약번호를 입력하세요" required>
              </div>
              <button type="button" class="btn-search" onclick="searchContract()">조회</button>
            </div>

            <!-- 계약 정보 표시 (조회 후 표시) -->
            <div class="contract-info" id="contractInfo">
              <h4>📋 계약 정보</h4>
              <div class="info-row">
                <div class="info-item">
                  <span class="info-label">고객명</span>
                  <span class="info-value" id="displayCustomerName">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">차량번호</span>
                  <span class="info-value" id="displayVehicleNumber">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">계약일자</span>
                  <span class="info-value" id="displayContractDate">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">계약종료일</span>
                  <span class="info-value" id="displayContractEndDate">-</span>
                </div>
              </div>
              <div class="info-row">
                <div class="info-item">
                  <span class="info-label">월 렌트료</span>
                  <span class="info-value" id="displayMonthlyRent">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">청구주기</span>
                  <span class="info-value" id="displayBillingFrequency">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">계약상태</span>
                  <span class="info-value" id="displayContractStatus">-</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 종료 정보 섹션 -->
          <div class="form-section" id="terminationSection">
            <h3 class="section-title">종료 정보</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="terminationMethod" class="required">종료방법</label>
                <select id="terminationMethod" name="terminationMethod" required>
                  <option value="">선택하세요</option>
                  <option value="인수">인수</option>
                  <option value="반납">반납</option>
                </select>
              </div>

              <div class="form-group">
                <label for="terminationDate" class="required">종료일자</label>
                <input type="date" id="terminationDate" name="terminationDate" required>
              </div>

              <div class="form-group">
                <label for="unpaidAmount">미청구금액</label>
                <input type="text" id="unpaidAmount" name="unpaidAmount" placeholder="미청구금액을 입력하세요">
              </div>
            </div>
          </div>

          <!-- 버튼 영역 -->
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="resetForm()">초기화</button>
            <button type="submit" class="btn btn-primary">종료 처리</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script>
    // 계약 조회 함수
    function searchContract() {
      const contractNumber = document.getElementById('contractNumber').value;

      if (!contractNumber) {
        alert('계약번호를 입력하세요.');
        return;
      }

      // 여기에 실제 서버 조회 로직을 추가할 수 있습니다
      // 임시 데모 데이터
      const demoData = {
        customerName: '홍길동',
        vehicleNumber: '12가3456',
        contractDate: '2023-01-15',
        contractEndDate: '2025-01-14',
        monthlyRent: '500,000',
        billingFrequency: '1개월',
        contractStatus: '진행중'
      };

      // 계약 정보 표시
      document.getElementById('displayCustomerName').textContent = demoData.customerName;
      document.getElementById('displayVehicleNumber').textContent = demoData.vehicleNumber;
      document.getElementById('displayContractDate').textContent = demoData.contractDate;
      document.getElementById('displayContractEndDate').textContent = demoData.contractEndDate;
      document.getElementById('displayMonthlyRent').textContent = demoData.monthlyRent + ' 원';
      document.getElementById('displayBillingFrequency').textContent = demoData.billingFrequency;
      document.getElementById('displayContractStatus').textContent = demoData.contractStatus;

      // 계약 정보 박스 표시
      document.getElementById('contractInfo').classList.add('active');

      console.log('계약 조회:', contractNumber);
    }

    // 미청구금액 입력 포맷팅
    document.getElementById('unpaidAmount').addEventListener('input', function(e) {
      let value = e.target.value.replace(/[^\d]/g, '');
      if (value) {
        value = parseInt(value).toLocaleString();
        e.target.value = value;
      }
    });

    // 폼 제출 이벤트
    document.getElementById('terminationForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      console.log('종료 처리 데이터:', data);
      alert('계약 종료 처리가 완료되었습니다!');

      // 여기에 실제 서버로 데이터를 전송하는 코드를 추가할 수 있습니다
      // fetch('/api/contract-termination', { method: 'POST', body: JSON.stringify(data) })
    });

    // 폼 초기화 함수
    function resetForm() {
      if(confirm('모든 입력 내용을 초기화하시겠습니까?')) {
        document.getElementById('terminationForm').reset();
        document.getElementById('contractInfo').classList.remove('active');
      }
    }
  </script>
</body>
</html>
