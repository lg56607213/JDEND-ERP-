<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>법적절차 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <style>
    /* ── 계약 검색 아이콘 버튼 ── */
    .input-with-icon { position: relative; }
    .input-with-icon input { width: 100%; padding-right: 44px; }
    .icon-btn {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 34px; height: 34px; border: 1px solid #ddd; background: #fff;
      border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: #f5f5f5; }

    /* ── 섹션 구분 ── */
    .form-section + .form-section { margin-top: 20px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-header h3 { margin: 0; font-size: 15px; font-weight: 700; }
    .section-badge {
      font-size: 12px; padding: 2px 10px; border-radius: 999px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
    }

    /* ── 사건 상태 배지 ── */
    .status-badge {
      display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .st-접수 { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .st-진행 { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
    .st-종료 { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }

    /* ── 사건 목록 테이블 ── */
    .case-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .case-table th, .case-table td {
      padding: 9px 10px; border-bottom: 1px solid #e5e7eb; white-space: nowrap;
    }
    .case-table th { background: #f8fafc; font-weight: 700; text-align: center; }
    .case-table td { text-align: center; }
    .case-table td.left { text-align: left; }
    .case-table td.right { text-align: right; }
    .case-table .row-active { background: #eff6ff !important; }
    .case-table tbody tr:hover { background: #f0f7ff; cursor: pointer; }

    /* ── 진행내역 섹션 ── */
    .progress-section {
      margin-top: 20px;
      padding: 16px;
      border: 1.5px solid #e0e7ff;
      border-radius: 10px;
      background: #f8f9ff;
    }
    .progress-input-row {
      display: flex; gap: 10px; align-items: flex-end; margin-bottom: 14px; flex-wrap: wrap;
    }
    .progress-input-row .prog-date { width: 150px; }
    .progress-input-row .prog-content { flex: 1; min-width: 250px; }
    .progress-input-row textarea {
      width: 100%; resize: vertical; min-height: 62px; padding: 8px 10px;
      border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px;
    }
    .progress-input-row input[type="date"] {
      width: 100%; height: 38px; padding: 0 10px;
      border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px;
    }
    .prog-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #374151; }

    .progress-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .progress-table th, .progress-table td {
      padding: 9px 10px; border-bottom: 1px solid #e5e7eb;
    }
    .progress-table th { background: #eef2ff; font-weight: 700; text-align: center; white-space: nowrap; }
    .progress-table td { text-align: center; }
    .progress-table td.content-cell { text-align: left; white-space: pre-wrap; word-break: break-all; }
    .progress-table td.date-cell { white-space: nowrap; }

    /* ── 수정 상태 표시 ── */
    .edit-banner {
      display: none; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px;
      padding: 8px 14px; margin-bottom: 12px; font-size: 13px; color: #92400e;
      display: flex; align-items: center; gap: 8px;
    }
    .edit-banner.hidden { display: none !important; }

    /* ── 버튼 소형 ── */
    .btn-xs {
      padding: 4px 10px; border: 1px solid #d1d5db; background: #fff;
      border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    .btn-xs:hover { background: #f3f4f6; }
    .btn-xs.danger { border-color: #fca5a5; color: #dc2626; }
    .btn-xs.danger:hover { background: #fef2f2; }
    .btn-xs.primary { border-color: #93c5fd; color: #1d4ed8; background: #eff6ff; }
    .btn-xs.primary:hover { background: #dbeafe; }

    /* ── 계약 검색 모달 ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 9999;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      width: min(980px, 96vw); background: #fff; border-radius: 12px;
      overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,.2);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #eee;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { border: none; background: transparent; font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-body { padding: 14px 16px; }
    .modal-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .modal-search-row input {
      flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
    }
    .modal-search-row button {
      padding: 10px 12px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer;
    }
    .modal-search-row button:hover { background: #f5f5f5; }
    .modal-table { width: 100%; border-collapse: collapse; }
    .modal-table th, .modal-table td { border-bottom: 1px solid #eee; padding: 10px 8px; font-size: 13px; }
    .modal-table th { background: #fafafa; text-align: left; }
    .row-pick { cursor: pointer; }
    .row-pick:hover { background: #f7fbff; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 12px; background: #eef6ff; border: 1px solid #d7eaff;
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>법적절차</h1>
      <p>계약관리 &gt; 법적절차</p>
    </div>

    <div class="erp-card">
      <div class="card-body">

        <!-- ① 계약 정보 -->
        <div class="form-section">
          <h3>계약 정보</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="contractNo">계약번호 <span class="required">*</span></label>
              <div class="input-with-icon">
                <input type="text" id="contractNo" placeholder="계약번호 입력">
                <button type="button" class="icon-btn" id="btnOpenModal" title="계약 검색">🔎</button>
              </div>
            </div>
            <div class="form-group">
              <label>차량번호</label>
              <input type="text" id="vehicleNo" disabled placeholder="자동 산출">
            </div>
            <div class="form-group">
              <label>고객명</label>
              <input type="text" id="customerName" disabled placeholder="자동 산출">
            </div>
          </div>
        </div>

        <!-- ② 사건 등록 / 수정 폼 -->
        <div class="form-section">
          <div class="section-header">
            <h3 id="formTitle">사건 등록</h3>
            <button type="button" class="btn btn-secondary" id="btnNewCase" style="display:none;" onclick="resetCaseForm()">신규 등록 모드</button>
          </div>

          <div class="edit-banner hidden" id="editBanner">
            수정 모드: 기존 사건을 불러왔습니다. 내용 변경 후 [저장]을 누르세요.
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="caseType">사건유형</label>
              <input type="text" id="caseType" placeholder="예) 명도소송, 물품대금청구, 차량반환 등">
            </div>
            <div class="form-group">
              <label for="caseNumber">사건번호</label>
              <input type="text" id="caseNumber" placeholder="예) 2025가단12345">
            </div>
            <div class="form-group">
              <label for="registrationDate">등록일자</label>
              <input type="date" id="registrationDate">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="legalStatus">상태 <span class="required">*</span></label>
              <select id="legalStatus">
                <option value="접수">접수</option>
                <option value="진행">진행</option>
                <option value="종료">종료</option>
              </select>
            </div>
            <div class="form-group">
              <label for="costPayment">법적절차 비용 지급 (원)</label>
              <input type="number" id="costPayment" min="0" placeholder="0">
            </div>
            <div class="form-group">
              <label for="costRefund">법적절차 비용 환급 (원)</label>
              <input type="number" id="costRefund" min="0" placeholder="0">
            </div>
          </div>

          <div class="action-buttons">
            <button type="button" class="btn-submit" id="btnSubmitCase">등록</button>
            <button type="button" class="btn-cancel" id="btnCancelCase">취소</button>
          </div>
        </div>

        <!-- ③ 사건 목록 -->
        <div class="form-section">
          <div class="section-header">
            <h3>사건 목록</h3>
            <span class="section-badge" id="caseCount">총 0건</span>
          </div>
          <div style="overflow-x:auto;">
            <table class="case-table">
              <thead>
                <tr>
                  <th>순번</th>
                  <th class="left">사건유형</th>
                  <th>사건번호</th>
                  <th>등록일자</th>
                  <th>상태</th>
                  <th>비용 지급</th>
                  <th>비용 환급</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="caseListBody">
                <tr><td colspan="8" style="padding:18px;color:#94a3b8;">계약번호를 조회하면 사건 목록이 표시됩니다.</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- ④ 진행내역 -->
        <div class="progress-section" id="progressSection" style="display:none;">
          <div class="section-header">
            <h3>진행내역 <span style="font-size:13px;color:#6b7280;" id="progressCaseLabel"></span></h3>
            <span class="section-badge" id="progressCount">총 0건</span>
          </div>

          <div class="progress-input-row">
            <div class="prog-date">
              <div class="prog-label">일자 <span class="required">*</span></div>
              <input type="date" id="progressDate">
            </div>
            <div class="prog-content">
              <div class="prog-label">내용 <span class="required">*</span></div>
              <textarea id="progressContent" placeholder="진행 내용을 입력하세요"></textarea>
            </div>
            <div>
              <div class="prog-label">&nbsp;</div>
              <button type="button" class="btn btn-primary" id="btnAddProgress">추가</button>
            </div>
          </div>

          <div style="overflow-x:auto;">
            <table class="progress-table">
              <thead>
                <tr>
                  <th style="width:50px;">순번</th>
                  <th style="width:120px;">일자</th>
                  <th>내용</th>
                  <th style="width:130px;">등록일시</th>
                  <th style="width:70px;">삭제</th>
                </tr>
              </thead>
              <tbody id="progressBody">
                <tr><td colspan="5" style="padding:14px;color:#94a3b8;">진행내역이 없습니다.</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- 계약 검색 모달 -->
  <div class="modal-backdrop" id="contractModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">계약 검색</div>
        <button class="modal-close" type="button" id="btnCloseModal">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-search-row">
          <input type="text" id="modalKw" placeholder="계약번호 / 고객명 / 차량번호로 검색">
          <button type="button" id="btnModalSearch">검색</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="modal-table">
            <thead>
              <tr>
                <th style="width:150px;">계약번호</th>
                <th style="width:160px;">고객명</th>
                <th style="width:140px;">차량번호</th>
                <th style="width:110px;">시작일</th>
                <th style="width:110px;">만기일</th>
                <th style="width:120px;">월렌트</th>
                <th style="width:70px;">선택</th>
              </tr>
            </thead>
            <tbody id="modalTbody">
              <tr><td colspan="7" style="text-align:center;padding:14px;">조회중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const BASE = (typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : '').replace(/\/+$/, '');

    // ── 상태 ──
    let currentContractNumber = '';
    let selectedCaseId = null;   // null = 신규 등록 모드

    // ── 엘리먼트 ──
    const contractNoEl  = document.getElementById('contractNo');
    const vehicleNoEl   = document.getElementById('vehicleNo');
    const customerNameEl = document.getElementById('customerName');
    const caseTypeEl    = document.getElementById('caseType');
    const caseNumberEl  = document.getElementById('caseNumber');
    const regDateEl     = document.getElementById('registrationDate');
    const statusEl      = document.getElementById('legalStatus');
    const costPayEl     = document.getElementById('costPayment');
    const costRefEl     = document.getElementById('costRefund');
    const formTitleEl   = document.getElementById('formTitle');
    const editBannerEl  = document.getElementById('editBanner');
    const btnNewCaseEl  = document.getElementById('btnNewCase');
    const btnSubmitEl   = document.getElementById('btnSubmitCase');
    const progressSectionEl = document.getElementById('progressSection');
    const progressCaseLabelEl = document.getElementById('progressCaseLabel');
    const progressCountEl   = document.getElementById('progressCount');
    const progressBodyEl    = document.getElementById('progressBody');
    const progressDateEl    = document.getElementById('progressDate');
    const progressContentEl = document.getElementById('progressContent');

    function mustOk(res) {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res;
    }

    function todayISO() {
      return new Date().toISOString().split('T')[0];
    }

    function fmtKST(dt) {
      if (!dt) return '-';
      return String(dt).replace('T', ' ').slice(0, 16);
    }

    function escHtml(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }

    function fmtMoney(v) {
      if (v == null || v === 0) return '-';
      return Number(v).toLocaleString() + '원';
    }

    function statusBadge(st) {
      const cls = st === '접수' ? 'st-접수' : st === '진행' ? 'st-진행' : 'st-종료';
      return `<span class="status-badge ${cls}">${escHtml(st)}</span>`;
    }

    // ── 초기화 ──
    window.addEventListener('DOMContentLoaded', () => {
      regDateEl.value = todayISO();
      progressDateEl.value = todayISO();
    });

    // ── 계약 조회 ──
    async function loadContractInfo() {
      const cn = contractNoEl.value.trim();
      if (!cn) { clearAll(); return; }

      try {
        const res = await fetch(`${BASE}/api/consultations/contract-summary?contractNumber=${encodeURIComponent(cn)}`);
        mustOk(res);
        const s = await res.json();
        vehicleNoEl.value   = s.vehicleNo || '';
        customerNameEl.value = s.customerName || '';
        currentContractNumber = cn;
        resetCaseForm();
        await loadCaseList(cn);
      } catch (e) {
        clearAll();
        alert('계약 조회 실패: ' + e.message);
      }
    }

    function clearAll() {
      vehicleNoEl.value   = '';
      customerNameEl.value = '';
      currentContractNumber = '';
      document.getElementById('caseListBody').innerHTML =
        `<tr><td colspan="8" style="padding:18px;color:#94a3b8;">계약번호를 조회하면 사건 목록이 표시됩니다.</td></tr>`;
      document.getElementById('caseCount').textContent = '총 0건';
      progressSectionEl.style.display = 'none';
      selectedCaseId = null;
    }

    contractNoEl.addEventListener('change', loadContractInfo);
    contractNoEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); loadContractInfo(); } });

    // ── 사건 목록 ──
    async function loadCaseList(cn) {
      try {
        const res = await fetch(`${BASE}/api/legal-cases?contractNumber=${encodeURIComponent(cn)}`);
        mustOk(res);
        const list = await res.json();
        renderCaseList(list);
      } catch (e) {
        alert('사건 목록 조회 실패: ' + e.message);
      }
    }

    function renderCaseList(list) {
      const tbody = document.getElementById('caseListBody');
      document.getElementById('caseCount').textContent = `총 ${list.length}건`;

      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="padding:14px;color:#94a3b8;">등록된 사건이 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = list.map((c, i) => `
        <tr data-id="${c.id}" class="${c.id === selectedCaseId ? 'row-active' : ''}">
          <td>${i + 1}</td>
          <td class="left">${escHtml(c.caseType || '-')}</td>
          <td>${escHtml(c.caseNumber || '-')}</td>
          <td>${c.registrationDate ?? '-'}</td>
          <td>${statusBadge(c.status)}</td>
          <td class="right">${fmtMoney(c.legalCostPayment)}</td>
          <td class="right">${fmtMoney(c.legalCostRefund)}</td>
          <td>
            <button class="btn-xs primary" onclick="openCase(${c.id})">진행내역</button>
            <button class="btn-xs" onclick="editCase(${c.id})" style="margin:0 4px;">수정</button>
            <button class="btn-xs danger" onclick="deleteCase(${c.id})">삭제</button>
          </td>
        </tr>
      `).join('');
    }

    // ── 사건 폼 초기화 ──
    function resetCaseForm() {
      selectedCaseId = null;
      formTitleEl.textContent = '사건 등록';
      btnSubmitEl.textContent = '등록';
      editBannerEl.classList.add('hidden');
      btnNewCaseEl.style.display = 'none';
      caseTypeEl.value   = '';
      caseNumberEl.value = '';
      regDateEl.value    = todayISO();
      statusEl.value     = '접수';
      costPayEl.value    = '';
      costRefEl.value    = '';
    }

    // ── 사건 수정 로드 ──
    async function editCase(id) {
      try {
        const res = await fetch(`${BASE}/api/legal-cases/${id}`);
        mustOk(res);
        const c = await res.json();
        selectedCaseId = c.id;
        formTitleEl.textContent = '사건 수정';
        btnSubmitEl.textContent = '저장';
        editBannerEl.classList.remove('hidden');
        btnNewCaseEl.style.display = '';
        caseTypeEl.value   = c.caseType   || '';
        caseNumberEl.value = c.caseNumber || '';
        regDateEl.value    = c.registrationDate || todayISO();
        statusEl.value     = c.status || '접수';
        costPayEl.value    = c.legalCostPayment ?? '';
        costRefEl.value    = c.legalCostRefund  ?? '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (e) {
        alert('사건 조회 실패: ' + e.message);
      }
    }

    // ── 진행내역 열기 ──
    async function openCase(id) {
      selectedCaseId = id;
      try {
        const res = await fetch(`${BASE}/api/legal-cases/${id}`);
        mustOk(res);
        const c = await res.json();
        progressCaseLabelEl.textContent = `— ${c.caseType || ''} ${c.caseNumber || ''}`;
        renderProgressEntries(c.progressEntries || [], id);
        progressSectionEl.style.display = '';
        progressDateEl.value = todayISO();
        progressContentEl.value = '';
        progressSectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

        // 목록 행 하이라이트
        document.querySelectorAll('#caseListBody tr').forEach(tr => {
          tr.classList.toggle('row-active', parseInt(tr.dataset.id) === id);
        });
      } catch (e) {
        alert('진행내역 조회 실패: ' + e.message);
      }
    }

    function renderProgressEntries(entries, caseId) {
      progressCountEl.textContent = `총 ${entries.length}건`;
      if (!entries.length) {
        progressBodyEl.innerHTML = `<tr><td colspan="5" style="padding:14px;color:#94a3b8;">등록된 진행내역이 없습니다.</td></tr>`;
        return;
      }
      progressBodyEl.innerHTML = entries.map((e, i) => `
        <tr>
          <td>${i + 1}</td>
          <td class="date-cell">${e.progressDate ?? '-'}</td>
          <td class="content-cell">${escHtml(e.progressContent)}</td>
          <td class="date-cell" style="color:#94a3b8;font-size:12px;">${fmtKST(e.createdAt)}</td>
          <td><button class="btn-xs danger" onclick="deleteProgress(${caseId}, ${e.id})">삭제</button></td>
        </tr>
      `).join('');
    }

    // ── 사건 등록/저장 ──
    async function submitCase() {
      const cn = contractNoEl.value.trim();
      if (!cn) { alert('계약번호를 먼저 조회해주세요.'); contractNoEl.focus(); return; }

      const payload = {
        contractNumber:   cn,
        caseType:         caseTypeEl.value.trim()   || null,
        caseNumber:       caseNumberEl.value.trim() || null,
        registrationDate: regDateEl.value || null,
        legalCostPayment: costPayEl.value !== '' ? parseInt(costPayEl.value) : 0,
        legalCostRefund:  costRefEl.value !== '' ? parseInt(costRefEl.value) : 0,
        status:           statusEl.value,
      };

      try {
        let res;
        if (selectedCaseId) {
          res = await fetch(`${BASE}/api/legal-cases/${selectedCaseId}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
          });
        } else {
          res = await fetch(`${BASE}/api/legal-cases`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
          });
        }
        mustOk(res);
        const saved = await res.json();
        alert(selectedCaseId ? '사건이 수정되었습니다.' : '사건이 등록되었습니다.');
        resetCaseForm();
        await loadCaseList(cn);
        // 신규 등록이면 바로 진행내역 열기
        if (!selectedCaseId) await openCase(saved.id);
      } catch (e) {
        alert('저장 실패: ' + e.message);
      }
    }

    // ── 사건 삭제 ──
    async function deleteCase(id) {
      if (!confirm('이 사건과 관련된 진행내역이 모두 삭제됩니다. 계속하시겠습니까?')) return;
      try {
        const res = await fetch(`${BASE}/api/legal-cases/${id}`, { method: 'DELETE' });
        mustOk(res);
        if (selectedCaseId === id) {
          progressSectionEl.style.display = 'none';
          selectedCaseId = null;
        }
        await loadCaseList(currentContractNumber);
      } catch (e) {
        alert('삭제 실패: ' + e.message);
      }
    }

    // ── 진행내역 추가 ──
    async function addProgress() {
      if (!selectedCaseId) { alert('먼저 사건을 선택해주세요.'); return; }
      const date    = progressDateEl.value;
      const content = progressContentEl.value.trim();
      if (!date)    { alert('일자를 입력해주세요.'); progressDateEl.focus(); return; }
      if (!content) { alert('내용을 입력해주세요.'); progressContentEl.focus(); return; }

      try {
        const res = await fetch(`${BASE}/api/legal-cases/${selectedCaseId}/progress`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ progressDate: date, progressContent: content })
        });
        mustOk(res);
        progressContentEl.value = '';
        progressDateEl.value    = todayISO();
        await openCase(selectedCaseId);
      } catch (e) {
        alert('진행내역 추가 실패: ' + e.message);
      }
    }

    // ── 진행내역 삭제 ──
    async function deleteProgress(caseId, entryId) {
      if (!confirm('이 진행내역을 삭제하시겠습니까?')) return;
      try {
        const res = await fetch(`${BASE}/api/legal-cases/${caseId}/progress/${entryId}`, { method: 'DELETE' });
        mustOk(res);
        await openCase(caseId);
      } catch (e) {
        alert('삭제 실패: ' + e.message);
      }
    }

    // ── 이벤트 바인딩 ──
    btnSubmitEl.addEventListener('click', submitCase);
    document.getElementById('btnCancelCase').addEventListener('click', resetCaseForm);
    document.getElementById('btnAddProgress').addEventListener('click', addProgress);

    // ── 계약 검색 모달 ──
    const modalBackdrop = document.getElementById('contractModalBackdrop');
    const modalKwEl     = document.getElementById('modalKw');
    const modalTbody    = document.getElementById('modalTbody');

    async function openModal() {
      modalBackdrop.style.display = 'flex';
      modalKwEl.value = '';
      setTimeout(() => modalKwEl.focus(), 30);
      await searchContracts();
    }
    function closeModal() { modalBackdrop.style.display = 'none'; }

    document.getElementById('btnOpenModal').addEventListener('click', openModal);
    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', e => { if (e.target === modalBackdrop) closeModal(); });

    async function searchContracts() {
      const kw = modalKwEl.value.trim();
      modalTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:14px;">검색중...</td></tr>`;
      try {
        const res = await fetch(`${BASE}/api/contracts/search?kw=${encodeURIComponent(kw)}`);
        mustOk(res);
        const list = await res.json();
        if (!list.length) {
          modalTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:14px;">검색 결과가 없습니다.</td></tr>`;
          return;
        }
        modalTbody.innerHTML = '';
        list.forEach(row => {
          const tr = document.createElement('tr');
          tr.className = 'row-pick';
          tr.innerHTML = `
            <td><span class="badge">${escHtml(row.contractNumber ?? '-')}</span></td>
            <td>${escHtml(row.customerName ?? '-')}</td>
            <td>${escHtml(row.vehicleNo ?? '-')}</td>
            <td>${row.startDate ?? '-'}</td>
            <td>${row.endDate ?? '-'}</td>
            <td>${(row.monthlyRent ?? 0).toLocaleString()}원</td>
            <td><button type="button" class="btn-xs primary">선택</button></td>
          `;
          tr.addEventListener('click', async () => {
            contractNoEl.value = row.contractNumber || '';
            closeModal();
            await loadContractInfo();
          });
          modalTbody.appendChild(tr);
        });
      } catch (e) {
        modalTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:14px;">조회 실패: ${e.message}</td></tr>`;
      }
    }

    document.getElementById('btnModalSearch').addEventListener('click', searchContracts);
    modalKwEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); searchContracts(); } });
  </script>
</body>
</html>
