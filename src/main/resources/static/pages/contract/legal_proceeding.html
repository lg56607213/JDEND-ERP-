<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>법적절차 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <style>
    body { font-size: 14px; }

    /* ── 페이지 헤더 ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px 14px 80px;
    }
    .page-header-left h1 { font-size: 1.25rem; }
    .page-header-left p  { font-size: 0.8rem; color: #718096; margin-top: 2px; }

    /* ── 검색바 ── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
      flex-wrap: wrap;
    }
    .search-bar input, .search-bar select {
      height: 40px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
    }
    .search-bar input { min-width: 280px; flex: 1; }
    .search-bar select { width: 130px; }
    .btn-search {
      height: 40px; padding: 0 20px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-search:hover { background: #1d4ed8; }
    .btn-reset {
      height: 40px; padding: 0 14px;
      background: #fff; color: #374151;
      border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 14px; cursor: pointer;
    }
    .btn-reset:hover { background: #f3f4f6; }

    /* ── 메인 테이블 ── */
    .list-section { padding: 24px 40px; }
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .list-title { font-size: 15px; font-weight: 700; color: #1e293b; }
    .total-badge {
      display: inline-block; padding: 3px 12px;
      background: #eff6ff; color: #1d4ed8;
      border: 1px solid #bfdbfe; border-radius: 999px;
      font-size: 13px; font-weight: 600; margin-left: 10px;
    }
    .main-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .main-table th {
      background: #f1f5f9; padding: 12px 10px;
      text-align: center; font-weight: 700;
      color: #334155; border-bottom: 2px solid #e2e8f0;
      white-space: nowrap;
    }
    .main-table td {
      padding: 11px 10px; border-bottom: 1px solid #e5e7eb;
      text-align: center; vertical-align: middle;
    }
    .main-table td.left  { text-align: left; }
    .main-table td.right { text-align: right; font-variant-numeric: tabular-nums; }
    .main-table tbody tr:hover { background: #f0f7ff; }
    .main-table .row-selected { background: #eff6ff !important; }

    /* ── 상태 배지 ── */
    .st-badge {
      display: inline-block; padding: 3px 12px;
      border-radius: 999px; font-size: 13px; font-weight: 700;
    }
    .st-접수 { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .st-진행 { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
    .st-종료 { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }

    /* ── 비용 배지 ── */
    .cost-badge {
      display: inline-block; padding: 2px 9px;
      border-radius: 999px; font-size: 12px; font-weight: 600;
    }
    .cost-신청비용 { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .cost-추가비용 { background: #fce7f3; color: #9d174d; border: 1px solid #f9a8d4; }
    .cost-확인비용 { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; }
    .cost-환입    { background: #dcfce7; color: #166534; border: 1px solid #86efac; }

    /* ── 진행건수 링크 ── */
    .prog-count-btn {
      display: inline-block; padding: 3px 10px;
      background: #f0fdf4; color: #166534;
      border: 1px solid #bbf7d0; border-radius: 999px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .prog-count-btn:hover { background: #dcfce7; }

    /* ── 관리 버튼 ── */
    .btn-sm {
      padding: 5px 12px; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid;
    }
    .btn-sm.edit  { background: #fff; color: #2563eb; border-color: #93c5fd; }
    .btn-sm.edit:hover  { background: #eff6ff; }
    .btn-sm.del   { background: #fff; color: #dc2626; border-color: #fca5a5; }
    .btn-sm.del:hover   { background: #fef2f2; }

    /* ── 하단 패널 (탭 구조) ── */
    .detail-panel {
      margin: 0 40px 30px;
      border: 1.5px solid #c7d2fe;
      border-radius: 12px;
      background: #f5f7ff;
      overflow: hidden;
    }
    .detail-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: #eef2ff;
      border-bottom: 1px solid #c7d2fe;
    }
    .detail-panel-title { font-size: 15px; font-weight: 700; color: #312e81; }
    .detail-panel-subtitle { font-size: 13px; color: #6b7280; margin-left: 8px; }
    .btn-close-panel {
      padding: 4px 12px; background: #fff;
      border: 1px solid #c7d2fe; border-radius: 6px;
      font-size: 13px; color: #4f46e5; cursor: pointer;
    }
    .btn-close-panel:hover { background: #e0e7ff; }

    /* ── 탭 ── */
    .panel-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid #c7d2fe;
      background: #eef2ff;
    }
    .panel-tab {
      padding: 10px 24px; cursor: pointer;
      font-size: 14px; font-weight: 600;
      color: #6b7280; border: none; background: transparent;
      border-bottom: 2px solid transparent;
      transition: color .15s;
    }
    .panel-tab:hover { color: #4f46e5; }
    .panel-tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── 진행내역 탭 ── */
    .progress-input-area {
      padding: 16px 20px; border-bottom: 1px solid #e0e7ff;
    }
    .prog-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .prog-row label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
    .prog-row input[type="date"] {
      height: 40px; padding: 0 10px;
      border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 14px; width: 160px;
    }
    .prog-row textarea {
      flex: 1; min-width: 240px; min-height: 60px;
      padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 14px; resize: vertical;
    }
    .btn-add-prog {
      height: 40px; padding: 0 18px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-add-prog:hover { background: #4338ca; }

    .progress-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .progress-table th {
      background: #e0e7ff; padding: 10px 12px;
      text-align: center; font-weight: 700; color: #312e81; white-space: nowrap;
    }
    .progress-table td {
      padding: 10px 12px; border-bottom: 1px solid #e5e7eb; text-align: center;
    }
    .progress-table td.content { text-align: left; white-space: pre-wrap; word-break: break-all; }
    .progress-table .ts { color: #94a3b8; font-size: 12px; }

    /* ── 비용내역 탭 ── */
    .cost-input-area {
      padding: 16px 20px; border-bottom: 1px solid #e0e7ff;
    }
    .cost-input-row {
      display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
    }
    .cost-input-row label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
    .cost-input-row select,
    .cost-input-row input[type="number"],
    .cost-input-row input[type="date"],
    .cost-input-row input[type="text"] {
      height: 40px; padding: 0 10px;
      border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px;
    }
    .cost-input-row select { width: 130px; }
    .cost-input-row input[type="number"] { width: 140px; }
    .cost-input-row input[type="date"] { width: 160px; }
    .cost-input-row .cost-memo-input { flex: 1; min-width: 160px; }
    .btn-add-cost {
      height: 40px; padding: 0 18px;
      background: #0891b2; color: #fff;
      border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-add-cost:hover { background: #0e7490; }

    /* ── 비용 요약 카드 ── */
    .cost-summary {
      display: flex; gap: 12px; flex-wrap: wrap;
      padding: 16px 20px; border-bottom: 1px solid #e0e7ff;
    }
    .cost-sum-card {
      flex: 1; min-width: 120px;
      background: #fff; border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      padding: 12px 16px; text-align: center;
    }
    .cost-sum-card .sum-label {
      font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 4px;
    }
    .cost-sum-card .sum-value {
      font-size: 16px; font-weight: 700; color: #1e293b;
      font-variant-numeric: tabular-nums;
    }
    .cost-sum-card.refund { border-color: #86efac; background: #f0fdf4; }
    .cost-sum-card.refund .sum-label { color: #166534; }
    .cost-sum-card.refund .sum-value { color: #15803d; }
    .cost-sum-card.net { border-color: #93c5fd; background: #eff6ff; }
    .cost-sum-card.net .sum-label { color: #1d4ed8; }
    .cost-sum-card.net .sum-value { color: #1d4ed8; }

    .cost-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .cost-table th {
      background: #e0f2fe; padding: 10px 12px;
      text-align: center; font-weight: 700; color: #0c4a6e; white-space: nowrap;
    }
    .cost-table td {
      padding: 10px 12px; border-bottom: 1px solid #e5e7eb; text-align: center;
    }
    .cost-table td.right { text-align: right; font-variant-numeric: tabular-nums; }
    .cost-table td.left  { text-align: left; }
    .cost-table .ts { color: #94a3b8; font-size: 12px; }

    /* ── 등록/수정 모달 ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 9000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: 14px;
      width: min(640px, 96vw);
      box-shadow: 0 16px 40px rgba(0,0,0,.22); overflow: hidden;
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid #e2e8f0;
    }
    .modal-head-title { font-size: 17px; font-weight: 700; color: #1e293b; }
    .modal-close-btn {
      width: 32px; height: 32px; border: none; background: #f1f5f9;
      border-radius: 50%; font-size: 18px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close-btn:hover { background: #e2e8f0; }
    .modal-body { padding: 24px; }
    .modal-row { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .modal-field { flex: 1; min-width: 180px; }
    .modal-field label {
      display: block; font-size: 13px; font-weight: 600;
      color: #475569; margin-bottom: 6px;
    }
    .modal-field label .req { color: #e11d48; }
    .modal-field input,
    .modal-field select {
      width: 100%; height: 42px; padding: 0 12px;
      border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px;
    }
    .modal-field input:focus, .modal-field select:focus {
      outline: none; border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap input { padding-right: 44px; }
    .icon-search-btn {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 34px; height: 34px; background: #fff;
      border: 1px solid #d1d5db; border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .icon-search-btn:hover { background: #f3f4f6; }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      padding: 16px 24px; border-top: 1px solid #e2e8f0; background: #f8fafc;
    }
    .btn-submit {
      padding: 10px 28px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn-submit:hover { background: #1d4ed8; }
    .btn-cancel-modal {
      padding: 10px 20px; background: #fff; color: #374151;
      border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 15px; cursor: pointer;
    }
    .btn-cancel-modal:hover { background: #f3f4f6; }

    /* ── 계약 검색 모달 ── */
    .contract-modal-box {
      background: #fff; border-radius: 14px;
      width: min(980px, 96vw);
      box-shadow: 0 16px 40px rgba(0,0,0,.22); overflow: hidden;
    }
    .cmodal-search-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .cmodal-search-row input {
      flex: 1; height: 42px; padding: 0 14px;
      border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px;
    }
    .cmodal-search-row button {
      height: 42px; padding: 0 18px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .cmodal-search-row button:hover { background: #1d4ed8; }
    .cmodal-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .cmodal-table th {
      background: #f8fafc; padding: 11px 10px; text-align: left;
      border-bottom: 2px solid #e2e8f0; font-weight: 700; white-space: nowrap;
    }
    .cmodal-table td { padding: 10px 10px; border-bottom: 1px solid #f1f5f9; }
    .row-pick { cursor: pointer; }
    .row-pick:hover { background: #f0f9ff; }
    .contract-badge {
      display: inline-block; padding: 2px 10px;
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 999px; font-size: 13px; font-weight: 600;
    }

    .empty-row td { padding: 32px; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">

    <!-- 페이지 헤더 -->
    <div class="page-header">
      <div class="page-header-left">
        <h1>법적절차</h1>
        <p>계약관리 &gt; 법적절차</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn-excel" onclick="exportTableToExcel('mainTbody','법적절차')">엑셀 내보내기</button>
        <button class="btn-submit" id="btnOpenRegModal" style="font-size:14px;padding:9px 22px;">+ 등록</button>
      </div>
    </div>

    <!-- 검색 바 -->
    <div class="search-bar">
      <input type="text" id="kwInput" placeholder="계약번호 / 고객명 / 차량번호 검색">
      <select id="statusFilter">
        <option value="">전체 상태</option>
        <option value="접수">접수</option>
        <option value="진행">진행</option>
        <option value="종료">종료</option>
      </select>
      <button class="btn-search" id="btnSearch">조회</button>
      <button class="btn-reset" id="btnReset">초기화</button>
    </div>

    <!-- 목록 -->
    <div class="list-section">
      <div class="list-header">
        <div>
          <span class="list-title">사건 목록</span>
          <span class="total-badge" id="totalBadge">총 0건</span>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table class="main-table">
          <thead>
            <tr>
              <th style="width:44px;">#</th>
              <th style="width:140px;">계약번호</th>
              <th style="width:110px;">고객명</th>
              <th style="width:110px;">차량번호</th>
              <th>사건유형</th>
              <th style="width:130px;">사건번호</th>
              <th style="width:100px;">등록일</th>
              <th style="width:80px;">상태</th>
              <th style="width:130px;">비용합계 / 환입</th>
              <th style="width:80px;">진행내역</th>
              <th style="width:120px;">관리</th>
            </tr>
          </thead>
          <tbody id="mainTbody">
            <tr class="empty-row"><td colspan="11">조회 버튼을 눌러 목록을 불러오세요.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 하단 상세 패널 -->
    <div class="detail-panel" id="detailPanel" style="display:none;">
      <div class="detail-panel-header">
        <div>
          <span class="detail-panel-title" id="panelCaseTitle">사건 상세</span>
          <span class="detail-panel-subtitle" id="panelSubtitle"></span>
        </div>
        <button class="btn-close-panel" onclick="closeDetailPanel()">닫기 ✕</button>
      </div>

      <!-- 탭 -->
      <div class="panel-tabs">
        <button class="panel-tab active" id="tabProg" onclick="switchTab('prog')">
          진행내역 <span id="progCountLabel" style="font-size:12px;color:#6b7280;"></span>
        </button>
        <button class="panel-tab" id="tabCost" onclick="switchTab('cost')">
          비용내역 <span id="costCountLabel" style="font-size:12px;color:#6b7280;"></span>
        </button>
      </div>

      <!-- ── 진행내역 탭 ── -->
      <div class="tab-content active" id="contentProg">
        <div class="progress-input-area">
          <div class="prog-row">
            <div>
              <label>일자 <span style="color:#e11d48;">*</span></label>
              <input type="date" id="progDate">
            </div>
            <div style="flex:1;">
              <label>내용 <span style="color:#e11d48;">*</span></label>
              <textarea id="progContent" placeholder="진행 내용을 입력하세요"></textarea>
            </div>
            <div style="padding-bottom:2px;">
              <label>&nbsp;</label>
              <button class="btn-add-prog" id="btnAddProg">추가</button>
            </div>
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table class="progress-table">
            <thead>
              <tr>
                <th style="width:44px;">#</th>
                <th style="width:110px;">일자</th>
                <th>내용</th>
                <th style="width:140px;">등록일시</th>
                <th style="width:70px;">삭제</th>
              </tr>
            </thead>
            <tbody id="progTbody">
              <tr><td colspan="5" style="padding:20px;color:#94a3b8;">진행내역이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ── 비용내역 탭 ── -->
      <div class="tab-content" id="contentCost">

        <!-- 비용 입력 -->
        <div class="cost-input-area">
          <div class="cost-input-row">
            <div>
              <label>비용유형 <span style="color:#e11d48;">*</span></label>
              <select id="costType">
                <option value="신청비용">신청비용</option>
                <option value="추가비용">추가비용</option>
                <option value="확인비용">확인비용</option>
                <option value="환입">환입 (비용 회수)</option>
              </select>
            </div>
            <div>
              <label>금액 (원) <span style="color:#e11d48;">*</span></label>
              <input type="number" id="costAmount" min="1" placeholder="0">
            </div>
            <div>
              <label>일자 <span style="color:#e11d48;">*</span></label>
              <input type="date" id="costDate">
            </div>
            <div style="flex:1;">
              <label>메모</label>
              <input type="text" class="cost-memo-input" id="costMemo" placeholder="비고 (선택)">
            </div>
            <div style="padding-bottom:2px;">
              <label>&nbsp;</label>
              <button class="btn-add-cost" id="btnAddCost">추가</button>
            </div>
          </div>
        </div>

        <!-- 비용 요약 -->
        <div class="cost-summary" id="costSummary">
          <div class="cost-sum-card">
            <div class="sum-label">신청비용</div>
            <div class="sum-value" id="sumApp">-</div>
          </div>
          <div class="cost-sum-card">
            <div class="sum-label">추가비용</div>
            <div class="sum-value" id="sumAdd">-</div>
          </div>
          <div class="cost-sum-card">
            <div class="sum-label">확인비용</div>
            <div class="sum-value" id="sumConf">-</div>
          </div>
          <div class="cost-sum-card refund">
            <div class="sum-label">환입 (회수)</div>
            <div class="sum-value" id="sumRef">-</div>
          </div>
          <div class="cost-sum-card net">
            <div class="sum-label">순 비용</div>
            <div class="sum-value" id="sumNet">-</div>
          </div>
        </div>

        <!-- 비용 목록 -->
        <div style="overflow-x:auto;">
          <table class="cost-table">
            <thead>
              <tr>
                <th style="width:44px;">#</th>
                <th style="width:120px;">비용유형</th>
                <th style="width:130px;">금액</th>
                <th style="width:110px;">일자</th>
                <th>메모</th>
                <th style="width:130px;">등록일시</th>
                <th style="width:70px;">삭제</th>
              </tr>
            </thead>
            <tbody id="costTbody">
              <tr><td colspan="7" style="padding:20px;color:#94a3b8;">등록된 비용내역이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- /content-wrapper -->

  <!-- ══════════ 사건 등록/수정 모달 ══════════ -->
  <div class="overlay" id="regOverlay">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-head-title" id="modalTitle">사건 등록</div>
        <button class="modal-close-btn" id="btnCloseReg">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-row">
          <div class="modal-field">
            <label>계약번호 <span class="req">*</span></label>
            <div class="input-icon-wrap">
              <input type="text" id="mContractNo" placeholder="계약번호 입력 또는 검색">
              <button class="icon-search-btn" id="btnOpenContractModal" title="계약 검색">🔎</button>
            </div>
          </div>
          <div class="modal-field">
            <label>차량번호</label>
            <input type="text" id="mVehicleNo" disabled placeholder="자동 산출">
          </div>
          <div class="modal-field">
            <label>고객명</label>
            <input type="text" id="mCustomerName" disabled placeholder="자동 산출">
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>사건유형</label>
            <input type="text" id="mCaseType" placeholder="예) 명도소송, 차량반환">
          </div>
          <div class="modal-field">
            <label>사건번호</label>
            <input type="text" id="mCaseNumber" placeholder="예) 2025가단12345">
          </div>
          <div class="modal-field">
            <label>등록일자</label>
            <input type="date" id="mRegDate">
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field" style="max-width:200px;">
            <label>상태 <span class="req">*</span></label>
            <select id="mStatus">
              <option value="접수">접수</option>
              <option value="진행">진행</option>
              <option value="종료">종료</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel-modal" id="btnCancelReg">취소</button>
        <button class="btn-submit" id="btnSubmitReg">등록</button>
      </div>
    </div>
  </div>

  <!-- ══════════ 계약 검색 모달 ══════════ -->
  <div class="overlay" id="contractOverlay" style="z-index:9100;">
    <div class="contract-modal-box">
      <div class="modal-head">
        <div class="modal-head-title">계약 검색</div>
        <button class="modal-close-btn" id="btnCloseContract">✕</button>
      </div>
      <div class="modal-body">
        <div class="cmodal-search-row">
          <input type="text" id="cModalKw" placeholder="계약번호 / 고객명 / 차량번호로 검색">
          <button type="button" id="btnCModalSearch">검색</button>
        </div>
        <div style="overflow-x:auto;max-height:420px;overflow-y:auto;">
          <table class="cmodal-table">
            <thead>
              <tr>
                <th style="width:150px;">계약번호</th>
                <th style="width:130px;">고객명</th>
                <th style="width:120px;">차량번호</th>
                <th style="width:100px;">시작일</th>
                <th style="width:100px;">만기일</th>
                <th style="width:110px;">월렌트</th>
                <th style="width:60px;">선택</th>
              </tr>
            </thead>
            <tbody id="cModalTbody">
              <tr><td colspan="7" style="text-align:center;padding:20px;">검색어를 입력하세요.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const BASE = (typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : '').replace(/\/+$/, '');

    let editingCaseId = null;
    let selectedCaseId = null;
    let currentTab = 'prog';

    const $ = id => document.getElementById(id);

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function fmtMoney(v) {
      if (!v || v === 0) return '-';
      return Number(v).toLocaleString() + '원';
    }
    function fmtNum(v) { return Number(v ?? 0).toLocaleString() + '원'; }
    function today() { return new Date().toISOString().split('T')[0]; }
    function fmtDt(dt) { return dt ? String(dt).replace('T',' ').slice(0,16) : '-'; }
    function stBadge(st) {
      const cls = st === '접수' ? 'st-접수' : st === '진행' ? 'st-진행' : 'st-종료';
      return `<span class="st-badge ${cls}">${esc(st)}</span>`;
    }
    function costBadge(type) {
      const cls = { '신청비용':'cost-신청비용', '추가비용':'cost-추가비용', '확인비용':'cost-확인비용', '환입':'cost-환입' }[type] || '';
      return `<span class="cost-badge ${cls}">${esc(type)}</span>`;
    }
    async function mustOk(res) {
      if (!res.ok) { const t = await res.text().catch(()=>''); throw new Error(`HTTP ${res.status}: ${t}`); }
      return res;
    }

    // 비용 합계 계산
    function calcCostSums(items) {
      const sums = { '신청비용': 0, '추가비용': 0, '확인비용': 0, '환입': 0 };
      (items || []).forEach(it => {
        if (sums[it.costType] !== undefined) sums[it.costType] += (it.amount || 0);
        else sums['확인비용'] += (it.amount || 0);
      });
      return sums;
    }

    // ── 초기 로드 ──
    window.addEventListener('DOMContentLoaded', () => {
      $('mRegDate').value = today();
      $('progDate').value = today();
      $('costDate').value = today();
      loadList();
    });

    // ── 목록 조회 ──
    async function loadList() {
      const kw     = $('kwInput').value.trim();
      const status = $('statusFilter').value;
      let url = `${BASE}/api/legal-cases?`;
      if (kw)     url += `kw=${encodeURIComponent(kw)}&`;
      if (status) url += `status=${encodeURIComponent(status)}&`;
      try {
        const res = await fetch(url);
        await mustOk(res);
        renderList(await res.json());
      } catch(e) { alert('목록 조회 실패: ' + e.message); }
    }

    function renderList(list) {
      $('totalBadge').textContent = `총 ${list.length}건`;
      const tb = $('mainTbody');
      if (!list.length) {
        tb.innerHTML = `<tr class="empty-row"><td colspan="11">검색 결과가 없습니다.</td></tr>`;
        return;
      }
      tb.innerHTML = list.map((c, i) => {
        const sums = calcCostSums(c.costItems);
        const totalPaid = sums['신청비용'] + sums['추가비용'] + sums['확인비용'];
        const refund = sums['환입'];
        const costCell = totalPaid > 0 || refund > 0
          ? `<span style="font-weight:600;">${totalPaid.toLocaleString()}원</span>${refund > 0 ? ` <span style="color:#15803d;font-size:12px;">/ 환입 ${refund.toLocaleString()}원</span>` : ''}`
          : '-';
        return `
        <tr data-id="${c.id}" class="${c.id === selectedCaseId ? 'row-selected' : ''}">
          <td>${i + 1}</td>
          <td><span class="contract-badge">${esc(c.contractNumber ?? '-')}</span></td>
          <td class="left">${esc(c.customerName ?? '-')}</td>
          <td>${esc(c.vehicleNo ?? '-')}</td>
          <td class="left">${esc(c.caseType ?? '-')}</td>
          <td>${esc(c.caseNumber ?? '-')}</td>
          <td>${c.registrationDate ?? '-'}</td>
          <td>${stBadge(c.status)}</td>
          <td class="right">${costCell}</td>
          <td>
            <button class="prog-count-btn" onclick="openDetailPanel(${c.id}, 'prog')">
              ${(c.progressEntries || []).length}건
            </button>
          </td>
          <td>
            <button class="btn-sm edit" onclick="openEditModal(${c.id})" style="margin-right:4px;">수정</button>
            <button class="btn-sm del" onclick="deleteCase(${c.id})">삭제</button>
          </td>
        </tr>`;
      }).join('');
    }

    // ── 검색 이벤트 ──
    $('btnSearch').addEventListener('click', loadList);
    $('kwInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadList(); });
    $('btnReset').addEventListener('click', () => {
      $('kwInput').value = '';
      $('statusFilter').value = '';
      loadList();
    });

    // ── 탭 전환 ──
    function switchTab(tab) {
      currentTab = tab;
      ['prog','cost'].forEach(t => {
        $(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle('active', t === tab);
        $(`content${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle('active', t === tab);
      });
    }

    // ── 상세 패널 열기 ──
    async function openDetailPanel(caseId, tab) {
      selectedCaseId = caseId;
      tab = tab || currentTab || 'prog';
      document.querySelectorAll('#mainTbody tr').forEach(tr => {
        tr.classList.toggle('row-selected', parseInt(tr.dataset.id) === caseId);
      });
      try {
        const res = await fetch(`${BASE}/api/legal-cases/${caseId}`);
        await mustOk(res);
        const c = await res.json();
        $('panelCaseTitle').textContent = c.caseType || '사건 상세';
        $('panelSubtitle').textContent = c.caseNumber ? `— ${c.caseNumber} (${c.contractNumber})` : `— ${c.contractNumber}`;
        renderProgressList(c.progressEntries || [], caseId);
        renderCostList(c.costItems || [], caseId);
        $('progDate').value  = today();
        $('progContent').value = '';
        $('costDate').value  = today();
        $('costAmount').value = '';
        $('costMemo').value  = '';
        $('detailPanel').style.display = '';
        switchTab(tab);
        $('detailPanel').scrollIntoView({ behavior:'smooth', block:'start' });
      } catch(e) { alert('상세 조회 실패: ' + e.message); }
    }

    function closeDetailPanel() {
      selectedCaseId = null;
      $('detailPanel').style.display = 'none';
      document.querySelectorAll('#mainTbody tr').forEach(tr => tr.classList.remove('row-selected'));
    }

    // ── 진행내역 렌더 ──
    function renderProgressList(entries, caseId) {
      $('progCountLabel').textContent = `(${entries.length}건)`;
      if (!entries.length) {
        $('progTbody').innerHTML = `<tr><td colspan="5" style="padding:20px;color:#94a3b8;">등록된 진행내역이 없습니다.</td></tr>`;
        return;
      }
      $('progTbody').innerHTML = entries.map((e, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${e.progressDate ?? '-'}</td>
          <td class="content">${esc(e.progressContent)}</td>
          <td class="ts">${fmtDt(e.createdAt)}</td>
          <td><button class="btn-sm del" onclick="deleteProgress(${caseId}, ${e.id})">삭제</button></td>
        </tr>
      `).join('');
    }

    // ── 비용내역 렌더 ──
    function renderCostList(items, caseId) {
      $('costCountLabel').textContent = `(${items.length}건)`;
      const sums = calcCostSums(items);
      const paid = sums['신청비용'] + sums['추가비용'] + sums['확인비용'];
      const net  = paid - sums['환입'];
      $('sumApp').textContent  = fmtNum(sums['신청비용']);
      $('sumAdd').textContent  = fmtNum(sums['추가비용']);
      $('sumConf').textContent = fmtNum(sums['확인비용']);
      $('sumRef').textContent  = fmtNum(sums['환입']);
      $('sumNet').textContent  = fmtNum(net);

      if (!items.length) {
        $('costTbody').innerHTML = `<tr><td colspan="7" style="padding:20px;color:#94a3b8;">등록된 비용내역이 없습니다.</td></tr>`;
        return;
      }
      $('costTbody').innerHTML = items.map((it, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${costBadge(it.costType)}</td>
          <td class="right" style="font-weight:600;">${fmtNum(it.amount)}</td>
          <td>${it.costDate ?? '-'}</td>
          <td class="left">${esc(it.memo ?? '')}</td>
          <td class="ts">${fmtDt(it.createdAt)}</td>
          <td><button class="btn-sm del" onclick="deleteCostItem(${caseId}, ${it.id})">삭제</button></td>
        </tr>
      `).join('');
    }

    // ── 진행내역 추가 ──
    $('btnAddProg').addEventListener('click', async () => {
      if (!selectedCaseId) { alert('먼저 사건을 선택하세요.'); return; }
      const dt      = $('progDate').value;
      const content = $('progContent').value.trim();
      if (!dt)      { alert('일자를 입력해주세요.'); return; }
      if (!content) { alert('내용을 입력해주세요.'); return; }
      try {
        await mustOk(await fetch(`${BASE}/api/legal-cases/${selectedCaseId}/progress`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ progressDate:dt, progressContent:content })
        }));
        $('progContent').value = '';
        await openDetailPanel(selectedCaseId, 'prog');
      } catch(e) { alert('추가 실패: ' + e.message); }
    });

    // ── 진행내역 삭제 ──
    async function deleteProgress(caseId, entryId) {
      if (!confirm('이 진행내역을 삭제하시겠습니까?')) return;
      try {
        await mustOk(await fetch(`${BASE}/api/legal-cases/${caseId}/progress/${entryId}`, { method:'DELETE' }));
        await openDetailPanel(caseId, 'prog');
      } catch(e) { alert('삭제 실패: ' + e.message); }
    }

    // ── 비용항목 추가 ──
    $('btnAddCost').addEventListener('click', async () => {
      if (!selectedCaseId) { alert('먼저 사건을 선택하세요.'); return; }
      const type   = $('costType').value;
      const amount = parseInt($('costAmount').value);
      const date   = $('costDate').value;
      if (!type)       { alert('비용유형을 선택해주세요.'); return; }
      if (!amount || amount <= 0) { alert('금액을 올바르게 입력해주세요.'); $('costAmount').focus(); return; }
      if (!date)       { alert('일자를 입력해주세요.'); return; }
      try {
        await mustOk(await fetch(`${BASE}/api/legal-cases/${selectedCaseId}/costs`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ costType:type, amount:amount, costDate:date, memo:$('costMemo').value.trim()||null })
        }));
        $('costAmount').value = '';
        $('costMemo').value   = '';
        await openDetailPanel(selectedCaseId, 'cost');
        await loadList();
      } catch(e) { alert('비용 추가 실패: ' + e.message); }
    });

    // ── 비용항목 삭제 ──
    async function deleteCostItem(caseId, itemId) {
      if (!confirm('이 비용항목을 삭제하시겠습니까?\n해당 전표도 별도 확인 후 삭제하세요.')) return;
      try {
        await mustOk(await fetch(`${BASE}/api/legal-cases/${caseId}/costs/${itemId}`, { method:'DELETE' }));
        await openDetailPanel(caseId, 'cost');
        await loadList();
      } catch(e) { alert('삭제 실패: ' + e.message); }
    }

    // ── 등록 모달 열기 ──
    $('btnOpenRegModal').addEventListener('click', openRegModal);
    function openRegModal() {
      editingCaseId = null;
      $('modalTitle').textContent = '사건 등록';
      $('btnSubmitReg').textContent = '등록';
      $('mContractNo').value = '';
      $('mVehicleNo').value  = '';
      $('mCustomerName').value = '';
      $('mCaseType').value   = '';
      $('mCaseNumber').value = '';
      $('mRegDate').value    = today();
      $('mStatus').value     = '접수';
      $('mContractNo').disabled = false;
      $('regOverlay').classList.add('open');
    }

    // ── 수정 모달 열기 ──
    async function openEditModal(id) {
      try {
        const res = await fetch(`${BASE}/api/legal-cases/${id}`);
        await mustOk(res);
        const c = await res.json();
        editingCaseId = c.id;
        $('modalTitle').textContent = '사건 수정';
        $('btnSubmitReg').textContent = '저장';
        $('mContractNo').value   = c.contractNumber ?? '';
        $('mVehicleNo').value    = c.vehicleNo ?? '';
        $('mCustomerName').value = c.customerName ?? '';
        $('mCaseType').value     = c.caseType ?? '';
        $('mCaseNumber').value   = c.caseNumber ?? '';
        $('mRegDate').value      = c.registrationDate ?? today();
        $('mStatus').value       = c.status ?? '접수';
        $('mContractNo').disabled = true;
        $('regOverlay').classList.add('open');
      } catch(e) { alert('사건 조회 실패: ' + e.message); }
    }

    // ── 모달 닫기 ──
    $('btnCloseReg').addEventListener('click', closeRegModal);
    $('btnCancelReg').addEventListener('click', closeRegModal);
    $('regOverlay').addEventListener('click', e => { if (e.target === $('regOverlay')) closeRegModal(); });
    function closeRegModal() { $('regOverlay').classList.remove('open'); }

    // ── 사건 저장 ──
    $('btnSubmitReg').addEventListener('click', async () => {
      const cn = $('mContractNo').value.trim();
      if (!cn) { alert('계약번호를 입력해주세요.'); $('mContractNo').focus(); return; }

      const payload = {
        contractNumber:   cn,
        caseType:         $('mCaseType').value.trim()   || null,
        caseNumber:       $('mCaseNumber').value.trim() || null,
        registrationDate: $('mRegDate').value  || null,
        status:           $('mStatus').value,
      };

      try {
        let res;
        if (editingCaseId) {
          res = await fetch(`${BASE}/api/legal-cases/${editingCaseId}`,
            { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        } else {
          res = await fetch(`${BASE}/api/legal-cases`,
            { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        }
        await mustOk(res);
        const saved = await res.json();
        closeRegModal();
        await loadList();
        openDetailPanel(saved.id, 'cost');
      } catch(e) { alert('저장 실패: ' + e.message); }
    });

    // ── 사건 삭제 ──
    async function deleteCase(id) {
      if (!confirm('이 사건과 관련된 진행내역 및 비용내역이 모두 삭제됩니다. 계속하시겠습니까?')) return;
      try {
        await mustOk(await fetch(`${BASE}/api/legal-cases/${id}`, { method:'DELETE' }));
        if (selectedCaseId === id) closeDetailPanel();
        loadList();
      } catch(e) { alert('삭제 실패: ' + e.message); }
    }

    // ── 모달 내 계약번호 직접 입력 ──
    $('mContractNo').addEventListener('change', fetchContractInfo);
    $('mContractNo').addEventListener('keydown', e => { if (e.key === 'Enter') fetchContractInfo(); });
    async function fetchContractInfo() {
      const cn = $('mContractNo').value.trim();
      if (!cn) { $('mVehicleNo').value = ''; $('mCustomerName').value = ''; return; }
      try {
        const res = await fetch(`${BASE}/api/consultations/contract-summary?contractNumber=${encodeURIComponent(cn)}`);
        if (!res.ok) { $('mVehicleNo').value = ''; $('mCustomerName').value = ''; return; }
        const s = await res.json();
        $('mVehicleNo').value    = s.vehicleNo    || '';
        $('mCustomerName').value = s.customerName || '';
      } catch {}
    }

    // ── 계약 검색 모달 ──
    $('btnOpenContractModal').addEventListener('click', () => {
      $('cModalKw').value = '';
      $('cModalTbody').innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;">검색어를 입력하세요.</td></tr>`;
      $('contractOverlay').classList.add('open');
      setTimeout(() => $('cModalKw').focus(), 30);
    });
    $('btnCloseContract').addEventListener('click', () => $('contractOverlay').classList.remove('open'));
    $('contractOverlay').addEventListener('click', e => {
      if (e.target === $('contractOverlay')) $('contractOverlay').classList.remove('open');
    });
    $('btnCModalSearch').addEventListener('click', searchContracts);
    $('cModalKw').addEventListener('keydown', e => { if (e.key === 'Enter') searchContracts(); });

    async function searchContracts() {
      const kw = $('cModalKw').value.trim();
      $('cModalTbody').innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;">검색 중...</td></tr>`;
      try {
        const res = await fetch(`${BASE}/api/contracts/search?kw=${encodeURIComponent(kw)}`);
        await mustOk(res);
        const list = await res.json();
        if (!list.length) {
          $('cModalTbody').innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;">검색 결과가 없습니다.</td></tr>`;
          return;
        }
        $('cModalTbody').innerHTML = list.map(r => `
          <tr class="row-pick" onclick="pickContract('${esc(r.contractNumber)}','${esc(r.vehicleNo??'')}','${esc(r.customerName??'')}')">
            <td><span class="contract-badge">${esc(r.contractNumber ?? '-')}</span></td>
            <td>${esc(r.customerName ?? '-')}</td>
            <td>${esc(r.vehicleNo ?? '-')}</td>
            <td>${r.startDate ?? '-'}</td>
            <td>${r.endDate ?? '-'}</td>
            <td>${(r.monthlyRent ?? 0).toLocaleString()}원</td>
            <td><button class="btn-sm edit">선택</button></td>
          </tr>
        `).join('');
      } catch(e) {
        $('cModalTbody').innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;color:#ef4444;">조회 실패: ${esc(e.message)}</td></tr>`;
      }
    }

    function pickContract(cn, vehicleNo, customerName) {
      $('mContractNo').value    = cn;
      $('mVehicleNo').value     = vehicleNo;
      $('mCustomerName').value  = customerName;
      $('contractOverlay').classList.remove('open');
    }
  </script>
  <script src="../../assets/js/excel-export.js"></script>
</body>
</html>
