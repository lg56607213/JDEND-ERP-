<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만기관리(재렌트) 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/contract/maturity_management.css">

  <style>
    .modal-backdrop{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.45);
      z-index:9999; padding:40px 14px; overflow:auto;
    }
    .modal-box{ background:#fff; max-width:1100px; margin:0 auto; border-radius:10px; padding:16px; }
    .modal-header{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
    .modal-title{ font-size:18px; font-weight:700; }
    .modal-body .row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .modal-body input{ flex:1; padding:10px; border:1px solid #ddd; border-radius:8px; }
    .modal-table{ width:100%; border-collapse:collapse; }
    .modal-table th,.modal-table td{ border:1px solid #e6e6e6; padding:10px; text-align:left; font-size:14px; }
    .modal-table tbody tr{ cursor:pointer; }
    .modal-table tbody tr:hover{ background:#f7f7f7; }
    .btn-icon{
      width:42px; height:42px; display:inline-flex; align-items:center; justify-content:center;
      border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer;
    }
    .muted{ color:#666; font-size:13px; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>만기관리(재렌트) 상세</h1>
      <p>계약관리 &gt; 만기관리 &gt; 재렌트 &gt; 상세보기</p>
    </div>

    <!-- 상세 섹션 -->
    <div class="erp-card" id="maturityDetailSection">
      <div class="card-header">
        <h2>재렌트 상세 정보</h2>
        <div style="display:flex; gap:8px;">
          <button type="button" class="btn btn-secondary" id="btnBack">목록으로</button>
          <button type="button" class="btn btn-danger" id="btnDelete">삭제</button>
        </div>
      </div>

      <div class="card-body">
        <!-- 기존 계약 정보 -->
        <div class="form-section">
          <h3 class="section-title">기존 계약 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>기존 계약번호</label>
              <div class="detail-value" id="oldContractNumber">-</div>
            </div>
            <div class="detail-item">
              <label>고객명</label>
              <div class="detail-value" id="customerName">-</div>
            </div>
            <div class="detail-item">
              <label>차량번호</label>
              <div class="detail-value" id="vehicleNumber">-</div>
            </div>
            <div class="detail-item">
              <label>기존 종료일</label>
              <div class="detail-value" id="oldEndDate">-</div>
            </div>
          </div>
        </div>

        <!-- 재렌트 계약 정보 -->
        <div class="form-section">
          <h3 class="section-title">재렌트 계약 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>신규 계약번호</label>
              <div class="detail-value" id="newContractNumber">-</div>
            </div>
            <div class="detail-item">
              <label>신규 계약시작일</label>
              <div class="detail-value" id="newStartDate">-</div>
            </div>
            <div class="detail-item">
              <label>신규 계약종료일</label>
              <div class="detail-value" id="newEndDate">-</div>
            </div>
            <div class="detail-item">
              <label>신규 월 렌트료</label>
              <div class="detail-value" id="newMonthlyRent">-</div>
            </div>
            <div class="detail-item">
              <label>상태</label>
              <div class="detail-value" id="status">-</div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="editMaturityBtn">수정하기</button>
        </div>
      </div>
    </div>

    <!-- 수정 섹션 -->
    <div class="erp-card hidden" id="maturityEditSection">
      <div class="card-header">
        <h2>재렌트 정보 수정</h2>
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">취소</button>
      </div>

      <div class="card-body">
        <form id="maturityEditForm">
          <!-- 기존 계약 조회 -->
          <div class="form-section">
            <h3 class="section-title">기존 계약 조회</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="editSearchContractNumber" class="required">기존 계약번호</label>
                <div class="flex-row-gap">
                  <input type="text" id="editSearchContractNumber" class="flex-1" placeholder="돋보기로 계약을 선택하세요" required>
                  <button type="button" class="btn-icon" id="btnOpenContractModal" title="계약 조회">🔍</button>
                </div>
                <small class="help-text">계약 변경 시 기존 계약 정보가 자동으로 갱신됩니다</small>
              </div>
            </div>

            <div class="contract-info" id="editContractInfo">
              <h4>기존 계약 현황</h4>
              <div class="info-row">
                <div class="info-item">
                  <span class="info-label">고객명</span>
                  <span class="info-value" id="editDisplayCustomerName">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">차량번호</span>
                  <span class="info-value" id="editDisplayVehicleNumber">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">기존 종료일</span>
                  <span class="info-value" id="editDisplayOldEndDate">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">월 렌트료</span>
                  <span class="info-value" id="editDisplayMonthlyRent">-</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 재렌트 계약 정보 -->
          <div class="form-section">
            <h3 class="section-title">재렌트 계약 정보</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="editNewContractNumber">신규 계약번호</label>
                <input type="text" id="editNewContractNumber" placeholder="자동생성" disabled>
              </div>

              <div class="form-group">
                <label for="editNewStartDate" class="required">계약시작일</label>
                <input type="date" id="editNewStartDate" required>
              </div>

              <div class="form-group">
                <label for="editNewEndDate" class="required">계약종료일</label>
                <input type="date" id="editNewEndDate" required>
              </div>

              <div class="form-group">
                <label for="editNewMonthlyRent" class="required">신규 월 렌트료</label>
                <input type="number" id="editNewMonthlyRent" placeholder="월 렌트료를 입력하세요" required>
              </div>

              <div class="form-group">
                <label for="editStatus" class="required">상태</label>
                <select id="editStatus" required>
                  <option value="">선택하세요</option>
                  <option value="만기예정">만기예정</option>
                  <option value="재계약완료">재계약완료</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="btnResetEdit">초기화</button>
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 계약조회 모달 -->
  <div class="modal-backdrop" id="contractModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">계약 조회</div>
        <button type="button" class="btn btn-secondary" id="btnCloseContractModal">닫기</button>
      </div>

      <div class="modal-body">
        <div class="row">
          <input type="text" id="contractSearchKw" placeholder="검색어(계약번호/고객명/차량번호)">
          <button type="button" class="btn btn-primary" id="btnContractSearch">검색</button>
        </div>
        <div class="muted">행을 클릭하면 해당 계약이 선택됩니다.</div>

        <div style="margin-top:10px; overflow:auto;">
          <table class="modal-table">
            <thead>
              <tr>
                <th style="width:140px;">계약번호</th>
                <th style="width:140px;">고객명</th>
                <th style="width:120px;">차량번호</th>
                <th style="width:90px;">구분</th>
                <th>기간</th>
                <th style="width:120px;">월렌트료</th>
              </tr>
            </thead>
            <tbody id="contractSearchBody">
              <tr><td colspan="6" style="text-align:center; padding:14px;">검색어를 입력하고 검색하세요.</td></tr>
            </tbody>
          </table>
        </div>

        <div style="margin-top:10px;" class="muted" id="contractSearchCount"></div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    const BASE = (typeof API_BASE_URL !== 'undefined') ? API_BASE_URL : '';

    // ===== URL 파라미터 =====
    const urlParams = new URLSearchParams(window.location.search);
    const maturityId = urlParams.get('id');

    // ===== 섹션 =====
    const maturityDetailSection = document.getElementById('maturityDetailSection');
    const maturityEditSection = document.getElementById('maturityEditSection');

    // ===== 상태 =====
    let maturityData = null;          // 서버에서 가져온 상세
    let selectedOldContract = null;   // 수정 화면에서 선택한 계약(모달)

    // ===== 유틸 =====
    function mustOk(res){ if(!res.ok) throw new Error('HTTP ' + res.status); return res; }
    function ymd(d){ return d ? String(d).slice(0,10) : '-'; }
    function formatWon(n){ return (n === null || n === undefined) ? '-' : Number(n).toLocaleString('ko-KR') + '원'; }

    function setText(id, v){ document.getElementById(id).textContent = (v === null || v === undefined || v === '') ? '-' : v; }
    function setVal(id, v){ document.getElementById(id).value = (v === null || v === undefined) ? '' : v; }

    function goBack(){
      window.location.href = 'maturity_management.html';
    }

    // ===== 상세 조회 =====
    async function fetchDetail(){
      if(!maturityId){
        alert('잘못된 접근입니다. id가 없습니다.');
        goBack();
        return;
      }

      try{
        maturityData = await fetch(`${BASE}/api/maturity-managements/${maturityId}`, {
          headers:{'Accept':'application/json'}
        }).then(mustOk).then(r=>r.json());

        renderDetail(maturityData);
      }catch(err){
        console.error(err);
        alert('상세 조회 실패: 서버 확인');
        goBack();
      }
    }

    function renderDetail(d){
      // 기존 계약
      setText('oldContractNumber', d.oldContractNumber);
      setText('customerName', d.customerName);
      setText('vehicleNumber', d.vehicleNo);
      setText('oldEndDate', ymd(d.oldEndDate));

      // 재렌트
      setText('newContractNumber', d.newContractNumber);
      setText('newStartDate', ymd(d.newStartDate));
      setText('newEndDate', ymd(d.newEndDate));
      setText('newMonthlyRent', formatWon(d.newMonthlyRent));
      setText('status', d.status);
    }

    // ===== 수정 화면 진입 =====
    document.getElementById('editMaturityBtn').addEventListener('click', () => {
      if(!maturityData) return;

      // 폼 값 채우기
      setVal('editSearchContractNumber', maturityData.oldContractNumber);
      setVal('editNewContractNumber', maturityData.newContractNumber);
      setVal('editNewStartDate', ymd(maturityData.newStartDate));
      setVal('editNewEndDate', ymd(maturityData.newEndDate));
      setVal('editNewMonthlyRent', maturityData.newMonthlyRent);
      setVal('editStatus', maturityData.status);

      // 기존 계약 현황(현재 저장값)
      document.getElementById('editDisplayCustomerName').textContent = maturityData.customerName || '-';
      document.getElementById('editDisplayVehicleNumber').textContent = maturityData.vehicleNo || '-';
      document.getElementById('editDisplayOldEndDate').textContent = ymd(maturityData.oldEndDate);
      document.getElementById('editDisplayMonthlyRent').textContent = '-'; // 현재 테이블에 old monthly rent는 저장 안 함
      // (원하면 maturity_managements 테이블에 old_monthly_rent 컬럼 추가해서 저장 가능)

      maturityDetailSection.classList.add('hidden');
      maturityEditSection.classList.remove('hidden');
    });

    // 취소
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      if(!confirm('수정을 취소하시겠습니까?')) return;
      maturityEditSection.classList.add('hidden');
      maturityDetailSection.classList.remove('hidden');
      selectedOldContract = null;
    });

    // 목록으로
    document.getElementById('btnBack').addEventListener('click', goBack);

    // 삭제
    document.getElementById('btnDelete').addEventListener('click', async () => {
      if(!maturityId) return;
      if(!confirm('정말로 삭제하시겠습니까?')) return;

      try{
        await fetch(`${BASE}/api/maturity-managements/${maturityId}`, { method:'DELETE' }).then(mustOk);
        alert('삭제되었습니다.');
        goBack();
      }catch(err){
        console.error(err);
        alert('삭제 실패: 서버 확인');
      }
    });

    // ===== 수정 저장 (PUT) =====
    document.getElementById('maturityEditForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if(!confirm('수정하시겠습니까?')) return;

      const payload = {
        newStartDate: document.getElementById('editNewStartDate').value,
        newEndDate: document.getElementById('editNewEndDate').value,
        newMonthlyRent: Number(document.getElementById('editNewMonthlyRent').value || 0),
        status: document.getElementById('editStatus').value
      };

      // ✅ 기존 계약번호 변경까지 하고 싶으면 -> 아래 방식은 "update API가 oldContractNumber를 안 받음"
      // 지금 백엔드는 update에서 oldContractNumber를 변경하도록 설계 안 했음(안전).
      // 만약 "기존계약 변경도 수정에서 가능"하게 하려면, 백엔드 update DTO/서비스도 변경해야 함.
      // 그래서 프론트에서는 계약번호 변경을 막는게 정석이긴 한데,
      // 사용자 요구가 "돋보기로 조회"였으니까 화면에서는 보여주되 저장은 안 바꿈.

      try{
        await fetch(`${BASE}/api/maturity-managements/${maturityId}`, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        }).then(mustOk);

        alert('수정했습니다.');

        // 다시 상세 조회해서 화면 갱신
        maturityEditSection.classList.add('hidden');
        maturityDetailSection.classList.remove('hidden');
        selectedOldContract = null;

        await fetchDetail();
      }catch(err){
        console.error(err);
        alert('수정 실패: 서버 확인');
      }
    });

    // 초기화
    document.getElementById('btnResetEdit').addEventListener('click', () => {
      if(!confirm('모든 입력 내용을 초기화하시겠습니까?')) return;
      // 서버값으로 되돌리기
      document.getElementById('editMaturityBtn').click();
    });

    // ===== 계약 조회 모달 =====
    const contractModal = document.getElementById('contractModal');
    const btnOpenContractModal = document.getElementById('btnOpenContractModal');
    const btnCloseContractModal = document.getElementById('btnCloseContractModal');
    const btnContractSearch = document.getElementById('btnContractSearch');
    const contractSearchKw = document.getElementById('contractSearchKw');
    const contractSearchBody = document.getElementById('contractSearchBody');
    const contractSearchCount = document.getElementById('contractSearchCount');

    btnOpenContractModal.addEventListener('click', async () => {
      contractModal.style.display = 'block';
      contractSearchKw.focus();
      await doContractSearch('');
    });

    btnCloseContractModal.addEventListener('click', () => contractModal.style.display = 'none');
    contractModal.addEventListener('click', (e) => { if(e.target === contractModal) contractModal.style.display = 'none'; });

    contractSearchKw.addEventListener('keydown', async (e) => {
      if(e.key === 'Enter'){ e.preventDefault(); await doContractSearch(contractSearchKw.value); }
      if(e.key === 'Escape'){ contractModal.style.display = 'none'; }
    });

    btnContractSearch.addEventListener('click', async () => {
      await doContractSearch(contractSearchKw.value);
    });

    async function doContractSearch(kw){
      const q = (kw || '').trim();
      try{
        const list = await fetch(`${BASE}/api/contracts/search?kw=${encodeURIComponent(q)}`, {
          headers:{'Accept':'application/json'}
        }).then(mustOk).then(r=>r.json());

        renderContractSearch(list || []);
      }catch(err){
        console.error(err);
        contractSearchBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:14px;">검색 실패(서버 확인)</td></tr>`;
        contractSearchCount.textContent = '';
      }
    }

    function renderContractSearch(list){
      contractSearchBody.innerHTML = '';
      contractSearchCount.textContent = '';

      if(!list.length){
        contractSearchBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:14px;">검색 결과가 없습니다.</td></tr>`;
        return;
      }
      contractSearchCount.textContent = `총 ${list.length}건`;

      list.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${c.contractNumber || '-'}</td>
          <td>${c.customerName || '-'}</td>
          <td>${c.vehicleNo || '-'}</td>
          <td>${c.contractType || '-'}</td>
          <td>${ymd(c.startDate)} ~ ${ymd(c.endDate)}</td>
          <td>${formatWon(c.monthlyRent)}</td>
        `;
        tr.addEventListener('click', () => {
          applyOldContract(c);
          contractModal.style.display = 'none';
        });
        contractSearchBody.appendChild(tr);
      });
    }

    function applyOldContract(c){
      // 화면상 표시만. (저장 반영은 백엔드 update 확장 필요)
      selectedOldContract = c;

      document.getElementById('editSearchContractNumber').value = c.contractNumber || '';

      document.getElementById('editDisplayCustomerName').textContent = c.customerName || '-';
      document.getElementById('editDisplayVehicleNumber').textContent = c.vehicleNo || '-';
      document.getElementById('editDisplayOldEndDate').textContent = ymd(c.endDate);
      document.getElementById('editDisplayMonthlyRent').textContent = formatWon(c.monthlyRent);

      // 신규 시작일 기본값 = 기존 종료일 + 1일
      if(c.endDate){
        const end = new Date(c.endDate);
        end.setDate(end.getDate() + 1);
        document.getElementById('editNewStartDate').value = end.toISOString().slice(0,10);
      }
    }

    // ===== 최초 실행 =====
    fetchDetail();
  </script>
</body>
</html>
