<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만기관리(종료) | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/contract/maturity_termination.css">

  <style>
    .modal-backdrop{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.45);
      z-index:9999; padding:40px 14px; overflow:auto;
    }
    .modal-box{ background:#fff; max-width:1100px; margin:0 auto; border-radius:10px; padding:16px; }
    .modal-header{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
    .modal-title{ font-size:18px; font-weight:700; }
    .modal-body .row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .modal-body input{ flex:1; padding:10px; border:1px solid #ddd; border-radius:8px; }
    .modal-table{ width:100%; border-collapse:collapse; }
    .modal-table th,.modal-table td{ border:1px solid #e6e6e6; padding:10px; text-align:left; font-size:14px; }
    .modal-table tbody tr{ cursor:pointer; }
    .modal-table tbody tr:hover{ background:#f7f7f7; }
    .btn-icon{
      width:42px; height:42px; display:inline-flex; align-items:center; justify-content:center;
      border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer;
    }
    .muted{ color:#666; font-size:13px; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>만기관리 (종료)</h1>
      <p>계약관리 &gt; 만기관리 &gt; 종료</p>
    </div>

    <!-- 목록 -->
    <div class="erp-card" id="terminationListSection">
      <div class="card-header">
        <h2>만기종료 목록</h2>
        <button type="button" class="btn btn-primary" id="addTerminationBtn"><span>+ 종료 추가</span></button>
      </div>

      <div class="card-body">
        <div class="filter-section">
          <label for="statusFilter">상태:</label>
          <select id="statusFilter" class="filter-select">
            <option value="all">전체</option>
            <option value="종료예정">종료예정</option>
            <option value="종료완료">종료완료</option>
          </select>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>번호</th>
                <th>계약번호</th>
                <th>고객명</th>
                <th>차량번호</th>
                <th>종료방법</th>
                <th>종료일자</th>
                <th>미청구금액</th>
                <th>상태</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="terminationTableBody"></tbody>
          </table>
        </div>

        <div class="pagination" id="pagination">
          <button class="pagination-btn" id="prevBtn">이전</button>
          <div class="pagination-numbers" id="pageNumbers"></div>
          <button class="pagination-btn" id="nextBtn">다음</button>
        </div>
      </div>
    </div>

    <!-- 등록 -->
    <div class="erp-card hidden" id="terminationFormSection">
      <div class="card-header">
        <h2>종료 등록</h2>
        <button type="button" class="btn btn-secondary" id="cancelFormBtn">취소</button>
      </div>

      <div class="card-body">
        <form id="terminationForm">
          <!-- 계약 조회 -->
          <div class="form-section">
            <h3 class="section-title">계약 조회</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="contractNumber" class="required">계약번호</label>
                <div class="flex-row-gap">
                  <input type="text" id="contractNumber" name="contractNumber" class="flex-1" placeholder="돋보기로 계약을 선택하세요" required>
                  <button type="button" class="btn-icon" id="btnOpenContractModal" title="계약 조회">🔍</button>
                </div>
                <small class="help-text">돋보기로 계약 선택 시 계약 현황이 자동으로 출력됩니다</small>
              </div>
            </div>

            <div class="contract-info hidden" id="contractInfo">
              <h4>계약 현황</h4>
              <div class="info-row">
                <div class="info-item">
                  <span class="info-label">고객명</span>
                  <span class="info-value" id="displayCustomerName">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">차량번호</span>
                  <span class="info-value" id="displayVehicleNumber">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">계약유형</span>
                  <span class="info-value" id="displayContractType">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">계약기간</span>
                  <span class="info-value" id="displayContractPeriod">-</span>
                </div>
              </div>
              <div class="info-row">
                <div class="info-item">
                  <span class="info-label">계약 시작일</span>
                  <span class="info-value" id="displayStartDate">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">계약 종료일</span>
                  <span class="info-value" id="displayEndDate">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">월 렌트료</span>
                  <span class="info-value" id="displayMonthlyRent">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">계약상태</span>
                  <span class="info-value" id="displayStatus">-</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 종료 정보 -->
          <div class="form-section">
            <h3 class="section-title">종료 정보</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="terminationMethod" class="required">종료방법</label>
                <select id="terminationMethod" name="terminationMethod" required>
                  <option value="">선택하세요</option>
                  <option value="인수">인수</option>
                  <option value="반납">반납</option>
                </select>
              </div>

              <div class="form-group">
                <label for="terminationDate" class="required">종료일자</label>
                <input type="date" id="terminationDate" name="terminationDate" required>
              </div>

              <div class="form-group">
                <label for="unpaidAmount">미청구금액</label>
                <input type="number" id="unpaidAmount" name="unpaidAmount" placeholder="미청구금액을 입력하세요">
              </div>

              <div class="form-group">
                <label for="status" class="required">상태</label>
                <select id="status" name="status" required>
                  <option value="">선택하세요</option>
                  <option value="종료예정">종료예정</option>
                  <option value="종료완료">종료완료</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="btnReset">초기화</button>
            <button type="submit" class="btn btn-primary">종료 등록</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 계약조회 모달 -->
  <div class="modal-backdrop" id="contractModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">계약 조회</div>
        <button type="button" class="btn btn-secondary" id="btnCloseContractModal">닫기</button>
      </div>

      <div class="modal-body">
        <div class="row">
          <input type="text" id="contractSearchKw" placeholder="검색어(계약번호/고객명/차량번호)">
          <button type="button" class="btn btn-primary" id="btnContractSearch">검색</button>
        </div>
        <div class="muted">행을 클릭하면 해당 계약이 선택됩니다.</div>

        <div style="margin-top:10px; overflow:auto;">
          <table class="modal-table">
            <thead>
              <tr>
                <th style="width:140px;">계약번호</th>
                <th style="width:140px;">고객명</th>
                <th style="width:120px;">차량번호</th>
                <th style="width:90px;">구분</th>
                <th>기간</th>
                <th style="width:120px;">월렌트료</th>
              </tr>
            </thead>
            <tbody id="contractSearchBody">
              <tr><td colspan="6" style="text-align:center; padding:14px;">검색어를 입력하고 검색하세요.</td></tr>
            </tbody>
          </table>
        </div>

        <div style="margin-top:10px;" class="muted" id="contractSearchCount"></div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/html-escape.js"></script>

  <script>
    const BASE = (typeof API_BASE_URL !== 'undefined') ? API_BASE_URL : '';

    const terminationListSection = document.getElementById('terminationListSection');
    const terminationFormSection = document.getElementById('terminationFormSection');
    const addTerminationBtn = document.getElementById('addTerminationBtn');
    const cancelFormBtn = document.getElementById('cancelFormBtn');

    const statusFilter = document.getElementById('statusFilter');
    const tbody = document.getElementById('terminationTableBody');

    const pageSize = 15;
    let currentPage = 1;
    let totalPages = 1;

    let selectedContract = null;

    function mustOk(res){ if(!res.ok) throw new Error('HTTP ' + res.status); return res; }
    function ymd(d){ return d ? String(d).slice(0,10) : '-'; }
    function formatWon(n){ return Number(n||0).toLocaleString('ko-KR') + '원'; }

    // ===== 목록 로드 =====
    async function loadList(){
      const status = statusFilter.value;

      const qs = new URLSearchParams();
      qs.set('page', String(currentPage));
      qs.set('size', String(pageSize));
      if(status && status !== 'all') qs.set('status', status);

      const data = await fetch(`${BASE}/api/maturity-terminations?${qs.toString()}`, {
        headers:{'Accept':'application/json'}
      }).then(mustOk).then(r=>r.json());

      const rows = data.content || [];
      totalPages = data.totalPages || 1;

      renderTable(rows, data.number, data.size);
      renderPagination();
    }

    function renderTable(rows, pageZeroBased, size){
      tbody.innerHTML = '';
      if(!rows.length){
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:16px;">데이터가 없습니다.</td></tr>`;
        return;
      }

      const startNo = pageZeroBased * size;

      rows.forEach((r, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${startNo + idx + 1}</td>
          <td>${escHtml(r.contractNumber || '-')}</td>
          <td>${escHtml(r.customerName || '-')}</td>
          <td>${escHtml(r.vehicleNo || '-')}</td>
          <td>${r.terminationMethod || '-'}</td>
          <td>${ymd(r.terminationDate)}</td>
          <td>${formatWon(r.unpaidAmount)}</td>
          <td>${r.status || '-'}</td>
          <td>
            <button class="btn-small btn-edit" type="button">수정</button>
            <button class="btn-small btn-delete" type="button">삭제</button>
          </td>
        `;

        tr.querySelector('.btn-edit').addEventListener('click', (e) => {
          e.stopPropagation();
          window.location.href = `maturity_termination_detail.html?id=${r.id}`;
        });

        tr.querySelector('.btn-delete').addEventListener('click', async (e) => {
          e.stopPropagation();
          if(!confirm('정말로 삭제하시겠습니까?')) return;
          await fetch(`${BASE}/api/maturity-terminations/${r.id}`, { method:'DELETE' }).then(mustOk);
          alert('삭제되었습니다.');
          await loadList();
        });

        tr.addEventListener('click', (e) => {
          if(e.target.closest('.btn-edit') || e.target.closest('.btn-delete')) return;
          window.location.href = `maturity_termination_detail.html?id=${r.id}`;
        });

        tbody.appendChild(tr);
      });
    }

    function renderPagination(){
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const pageNumbersDiv = document.getElementById('pageNumbers');

      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;

      pageNumbersDiv.innerHTML = '';
      for(let i=1;i<=totalPages;i++){
        const b = document.createElement('button');
        b.textContent = i;
        b.className = 'pagination-number' + (i===currentPage ? ' active' : '');
        b.addEventListener('click', async () => {
          currentPage = i;
          await loadList();
        });
        pageNumbersDiv.appendChild(b);
      }
    }

    document.getElementById('prevBtn').addEventListener('click', async () => {
      if(currentPage <= 1) return;
      currentPage--;
      await loadList();
    });
    document.getElementById('nextBtn').addEventListener('click', async () => {
      if(currentPage >= totalPages) return;
      currentPage++;
      await loadList();
    });

    statusFilter.addEventListener('change', async () => {
      currentPage = 1;
      await loadList();
    });

    // ===== 화면 토글 =====
    addTerminationBtn.addEventListener('click', () => {
      terminationListSection.classList.add('hidden');
      terminationFormSection.classList.remove('hidden');
    });

    cancelFormBtn.addEventListener('click', () => {
      if(!confirm('작성 중인 내용이 있습니다. 취소하시겠습니까?')) return;
      resetFormHard();
      terminationFormSection.classList.add('hidden');
      terminationListSection.classList.remove('hidden');
    });

    // ===== 계약조회 모달 =====
    const contractModal = document.getElementById('contractModal');
    const btnOpenContractModal = document.getElementById('btnOpenContractModal');
    const btnCloseContractModal = document.getElementById('btnCloseContractModal');
    const btnContractSearch = document.getElementById('btnContractSearch');
    const contractSearchKw = document.getElementById('contractSearchKw');
    const contractSearchBody = document.getElementById('contractSearchBody');
    const contractSearchCount = document.getElementById('contractSearchCount');

    btnOpenContractModal.addEventListener('click', async () => {
      contractModal.style.display = 'block';
      contractSearchKw.focus();
      await doContractSearch('');
    });

    btnCloseContractModal.addEventListener('click', () => contractModal.style.display = 'none');
    contractModal.addEventListener('click', (e) => { if(e.target === contractModal) contractModal.style.display = 'none'; });

    contractSearchKw.addEventListener('keydown', async (e) => {
      if(e.key === 'Enter'){ e.preventDefault(); await doContractSearch(contractSearchKw.value); }
      if(e.key === 'Escape'){ contractModal.style.display = 'none'; }
    });

    btnContractSearch.addEventListener('click', async () => {
      await doContractSearch(contractSearchKw.value);
    });

    async function doContractSearch(kw){
      const q = (kw || '').trim();
      const list = await fetch(`${BASE}/api/contracts/search?kw=${encodeURIComponent(q)}`, {
        headers:{'Accept':'application/json'}
      }).then(mustOk).then(r=>r.json());

      renderContractSearch(list || []);
    }

    function renderContractSearch(list){
      contractSearchBody.innerHTML = '';
      contractSearchCount.textContent = '';

      if(!list.length){
        contractSearchBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:14px;">검색 결과가 없습니다.</td></tr>`;
        return;
      }
      contractSearchCount.textContent = `총 ${list.length}건`;

      list.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escHtml(c.contractNumber || '-')}</td>
          <td>${escHtml(c.customerName || '-')}</td>
          <td>${escHtml(c.vehicleNo || '-')}</td>
          <td>${escHtml(c.contractType || '-')}</td>
          <td>${ymd(c.startDate)} ~ ${ymd(c.endDate)}</td>
          <td>${formatWon(c.monthlyRent)}</td>
        `;
        tr.addEventListener('click', () => {
          applyContract(c);
          contractModal.style.display = 'none';
        });
        contractSearchBody.appendChild(tr);
      });
    }

    function applyContract(c){
      selectedContract = c;

      document.getElementById('contractNumber').value = c.contractNumber || '';

      document.getElementById('displayCustomerName').textContent = c.customerName || '-';
      document.getElementById('displayVehicleNumber').textContent = c.vehicleNo || '-';
      document.getElementById('displayContractType').textContent = c.contractType || '-';
      document.getElementById('displayStartDate').textContent = ymd(c.startDate);
      document.getElementById('displayEndDate').textContent = ymd(c.endDate);
      document.getElementById('displayContractPeriod').textContent = `${ymd(c.startDate)} ~ ${ymd(c.endDate)}`;
      document.getElementById('displayMonthlyRent').textContent = formatWon(c.monthlyRent);
      document.getElementById('displayStatus').textContent = '만기'; // contracts 테이블에 상태 컬럼이 없어서 표시용

      document.getElementById('contractInfo').classList.remove('hidden');

      // 종료일자 기본값: 계약 종료일
      if(c.endDate){
        document.getElementById('terminationDate').value = ymd(c.endDate);
      }
    }

    // ===== 등록 =====
    document.getElementById('terminationForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const contractNumber = document.getElementById('contractNumber').value.trim();
      if(!contractNumber){
        alert('계약번호를 선택하세요(돋보기).');
        return;
      }

      const payload = {
        contractNumber: contractNumber,
        terminationMethod: document.getElementById('terminationMethod').value,
        terminationDate: document.getElementById('terminationDate').value,
        unpaidAmount: Number(document.getElementById('unpaidAmount').value || 0),
        status: document.getElementById('status').value
      };

      try{
        await fetch(`${BASE}/api/maturity-terminations`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        }).then(mustOk).then(r=>r.json());

        alert('종료 처리가 성공적으로 등록되었습니다!');

        resetFormHard();
        terminationFormSection.classList.add('hidden');
        terminationListSection.classList.remove('hidden');

        currentPage = 1;
        await loadList();
      }catch(err){
        console.error(err);
        alert('등록 실패: 서버 확인');
      }
    });

    // 초기화
    document.getElementById('btnReset').addEventListener('click', () => {
      if(!confirm('모든 입력 내용을 초기화하시겠습니까?')) return;
      resetFormHard();
    });

    function resetFormHard(){
      document.getElementById('terminationForm').reset();
      document.getElementById('contractInfo').classList.add('hidden');
      selectedContract = null;
    }

    // ===== 최초 로드 =====
    (async function init(){
      await loadList();
    })();
  </script>
</body>
</html>
