<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만기관리(종료) 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/contract/maturity_termination.css">

  <style>
    .modal-backdrop{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.45);
      z-index:9999; padding:40px 14px; overflow:auto;
    }
    .modal-box{ background:#fff; max-width:1100px; margin:0 auto; border-radius:10px; padding:16px; }
    .modal-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .modal-table{ width:100%; border-collapse:collapse; }
    .modal-table th,.modal-table td{ border:1px solid #e6e6e6; padding:8px; }
    .modal-table tbody tr{ cursor:pointer; }
    .modal-table tbody tr:hover{ background:#f5f5f5; }
    .btn-icon{
      width:42px; height:42px; border:1px solid #ddd;
      border-radius:8px; background:#fff; cursor:pointer;
    }
  </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="content-wrapper">

  <div class="page-header">
    <h1>만기관리(종료) 상세</h1>
    <p>계약관리 &gt; 만기관리 &gt; 종료 &gt; 상세보기</p>
  </div>

  <!-- 상세 -->
  <div class="erp-card" id="detailSection">
    <div class="card-header">
      <h2>종료 상세 정보</h2>
      <button type="button" class="btn btn-secondary" onclick="goBack()">목록으로</button>
    </div>

    <div class="card-body">
      <div class="form-section">
        <h3 class="section-title">계약 정보</h3>
        <div class="detail-grid">
          <div class="detail-item"><label>계약번호</label><div id="contractNumber"></div></div>
          <div class="detail-item"><label>고객명</label><div id="customerName"></div></div>
          <div class="detail-item"><label>차량번호</label><div id="vehicleNo"></div></div>
          <div class="detail-item"><label>계약유형</label><div id="contractType"></div></div>
          <div class="detail-item"><label>계약기간</label><div id="contractPeriod"></div></div>
          <div class="detail-item"><label>월 렌트료</label><div id="monthlyRent"></div></div>
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">종료 정보</h3>
        <div class="detail-grid">
          <div class="detail-item"><label>종료방법</label><div id="terminationMethod"></div></div>
          <div class="detail-item"><label>종료일자</label><div id="terminationDate"></div></div>
          <div class="detail-item"><label>미청구금액</label><div id="unpaidAmount"></div></div>
          <div class="detail-item"><label>상태</label><div id="status"></div></div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="btnEdit">수정하기</button>
        <button class="btn btn-danger" id="btnDelete">삭제</button>
      </div>
    </div>
  </div>

  <!-- 수정 -->
  <div class="erp-card hidden" id="editSection">
    <div class="card-header">
      <h2>종료 정보 수정</h2>
      <button class="btn btn-secondary" id="btnCancelEdit">취소</button>
    </div>

    <div class="card-body">
      <form id="editForm">

        <div class="form-grid">
          <div class="form-group">
            <label>계약번호</label>
            <div style="display:flex; gap:8px;">
              <input type="text" id="editContractNumber" readonly>
              <button type="button" class="btn-icon" id="btnOpenModal">🔍</button>
            </div>
          </div>

          <div class="form-group">
            <label>종료방법</label>
            <select id="editTerminationMethod">
              <option value="인수">인수</option>
              <option value="반납">반납</option>
            </select>
          </div>

          <div class="form-group">
            <label>종료일자</label>
            <input type="date" id="editTerminationDate">
          </div>

          <div class="form-group">
            <label>미청구금액</label>
            <input type="number" id="editUnpaidAmount">
          </div>

          <div class="form-group">
            <label>상태</label>
            <select id="editStatus">
              <option value="종료예정">종료예정</option>
              <option value="종료완료">종료완료</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary">수정 완료</button>
        </div>
      </form>
    </div>
  </div>

</div>

<!-- 계약 조회 모달 -->
<div class="modal-backdrop" id="contractModal">
  <div class="modal-box">
    <div class="modal-header">
      <strong>계약 조회</strong>
      <button class="btn btn-secondary" id="btnCloseModal">닫기</button>
    </div>
    <input type="text" id="searchKw" placeholder="계약번호/고객명/차량번호">
    <button id="btnSearch" class="btn btn-primary">검색</button>
    <table class="modal-table">
      <thead>
        <tr>
          <th>계약번호</th>
          <th>고객명</th>
          <th>차량번호</th>
          <th>기간</th>
        </tr>
      </thead>
      <tbody id="modalBody"></tbody>
    </table>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>

<script>
const BASE = API_BASE_URL;
const id = new URLSearchParams(location.search).get("id");

function mustOk(r){ if(!r.ok) throw new Error(); return r; }
function won(n){ return Number(n||0).toLocaleString()+"원"; }
function ymd(d){ return d?d.substring(0,10):"-"; }

async function loadDetail(){
  const data = await fetch(`${BASE}/api/maturity-terminations/${id}`).then(mustOk).then(r=>r.json());

  document.getElementById("contractNumber").textContent = data.contractNumber;
  document.getElementById("customerName").textContent = data.customerName;
  document.getElementById("vehicleNo").textContent = data.vehicleNo;
  document.getElementById("contractType").textContent = data.contractType;
  document.getElementById("contractPeriod").textContent = ymd(data.startDate)+" ~ "+ymd(data.endDate);
  document.getElementById("monthlyRent").textContent = won(data.monthlyRent);

  document.getElementById("terminationMethod").textContent = data.terminationMethod;
  document.getElementById("terminationDate").textContent = ymd(data.terminationDate);
  document.getElementById("unpaidAmount").textContent = won(data.unpaidAmount);
  document.getElementById("status").textContent = data.status;

  // 수정폼 세팅
  document.getElementById("editContractNumber").value = data.contractNumber;
  document.getElementById("editTerminationMethod").value = data.terminationMethod;
  document.getElementById("editTerminationDate").value = ymd(data.terminationDate);
  document.getElementById("editUnpaidAmount").value = data.unpaidAmount;
  document.getElementById("editStatus").value = data.status;
}

document.getElementById("btnEdit").onclick=()=>{
  detailSection.classList.add("hidden");
  editSection.classList.remove("hidden");
};

document.getElementById("btnCancelEdit").onclick=()=>{
  editSection.classList.add("hidden");
  detailSection.classList.remove("hidden");
};

document.getElementById("btnDelete").onclick=async()=>{
  if(!confirm("삭제하시겠습니까?")) return;
  await fetch(`${BASE}/api/maturity-terminations/${id}`,{method:"DELETE"}).then(mustOk);
  alert("삭제 완료");
  goBack();
};

document.getElementById("editForm").onsubmit=async(e)=>{
  e.preventDefault();
  if(!confirm("수정하시겠습니까?")) return;

  const payload={
    terminationMethod: editTerminationMethod.value,
    terminationDate: editTerminationDate.value,
    unpaidAmount: Number(editUnpaidAmount.value||0),
    status: editStatus.value
  };

  await fetch(`${BASE}/api/maturity-terminations/${id}`,{
    method:"PUT",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).then(mustOk);

  alert("수정 완료");
  await loadDetail();
  editSection.classList.add("hidden");
  detailSection.classList.remove("hidden");
};

function goBack(){
  location.href="maturity_termination.html";
}

loadDetail();
</script>

</body>
</html>
