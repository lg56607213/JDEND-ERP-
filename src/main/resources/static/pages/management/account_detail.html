<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회계계정 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <style>
    .card-header-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
    }
    .card-header-detail h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
    }
    .card-body-detail {
      padding: 20px;
    }
    .form-section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e7eb;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 768px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .detail-item label {
      font-size: 0.85rem;
      color: #6b7280;
      font-weight: 500;
    }
    .detail-value {
      font-size: 0.95rem;
      color: #1f2937;
      font-weight: 500;
      padding: 8px 12px;
      background: #f9fafb;
      border-radius: 6px;
      min-height: 38px;
      display: flex;
      align-items: center;
    }
    .detail-value.code {
      font-family: monospace;
      font-weight: 600;
      color: #2563eb;
    }
    .detail-value.active {
      color: #059669;
    }
    .detail-value.inactive {
      color: #dc2626;
    }
    .form-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }
    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    .btn-secondary {
      background: #6b7280;
      color: white;
    }
    .btn-secondary:hover {
      background: #4b5563;
    }
    .hidden {
      display: none !important;
    }
    .form-group-column {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group-column label {
      font-size: 0.85rem;
      color: #6b7280;
      font-weight: 500;
    }
    .form-input {
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.95rem;
      min-height: 38px;
    }
    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .type-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .type-badge.asset { background: #dbeafe; color: #1d4ed8; }
    .type-badge.liability { background: #fce7f3; color: #be185d; }
    .type-badge.equity { background: #d1fae5; color: #047857; }
    .type-badge.revenue { background: #fef3c7; color: #b45309; }
    .type-badge.expense { background: #fee2e2; color: #b91c1c; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>회계계정 상세</h1>
      <p>총괄관리 &gt; 회계계정관리 &gt; 상세보기</p>
    </div>

    <!-- 회계계정 상세 정보 섹션 -->
    <div class="erp-card" id="accountDetailSection">
      <div class="card-header card-header-detail">
        <h2>회계계정 상세 정보</h2>
        <button type="button" class="btn btn-secondary" onclick="goBack()">목록으로</button>
      </div>
      <div class="card-body card-body-detail">
        <!-- 기본 정보 섹션 -->
        <div class="form-section">
          <h3 class="section-title">기본 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>계정코드</label>
              <div class="detail-value code" id="accountCode">1010</div>
            </div>
            <div class="detail-item">
              <label>계정명</label>
              <div class="detail-value" id="accountName">현금</div>
            </div>
            <div class="detail-item">
              <label>계정구분</label>
              <div class="detail-value" id="accountType"><span class="type-badge asset">자산</span></div>
            </div>
            <div class="detail-item">
              <label>상위계정</label>
              <div class="detail-value" id="parentAccount">1000</div>
            </div>
            <div class="detail-item">
              <label>사용여부</label>
              <div class="detail-value active" id="isActive">사용</div>
            </div>
          </div>
        </div>

        <!-- 수정하기 버튼 -->
        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="editAccountBtn">수정하기</button>
        </div>
      </div>
    </div>

    <!-- 회계계정 수정 폼 섹션 (초기에는 숨김) -->
    <div class="erp-card hidden" id="accountEditSection">
      <div class="card-header card-header-detail">
        <h2>회계계정 정보 수정</h2>
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">취소</button>
      </div>
      <div class="card-body card-body-detail">
        <form id="accountEditForm">
          <!-- 기본 정보 섹션 -->
          <div class="form-section">
            <h3 class="section-title">기본 정보</h3>
            <div class="detail-grid">
              <div class="detail-item">
                <label>계정코드</label>
                <div class="detail-value code" id="editAccountCodeDisplay">1010</div>
                <input type="hidden" id="editAccountCode" name="code">
              </div>
              <div class="form-group-column">
                <label for="editAccountName">계정명 *</label>
                <input type="text" id="editAccountName" name="name" class="form-input" placeholder="계정명 입력" required>
              </div>
              <div class="form-group-column">
                <label for="editAccountType">계정구분 *</label>
                <select id="editAccountType" name="type" class="form-input" required>
                  <option value="자산">자산</option>
                  <option value="부채">부채</option>
                  <option value="자본">자본</option>
                  <option value="수익">수익</option>
                  <option value="비용">비용</option>
                </select>
              </div>
              <div class="form-group-column">
                <label for="editParentAccount">상위계정</label>
                <input type="text" id="editParentAccount" name="parent" class="form-input" placeholder="상위계정코드 입력 (선택)">
              </div>
              <div class="form-group-column">
                <label for="editIsActive">사용여부 *</label>
                <select id="editIsActive" name="isActive" class="form-input" required>
                  <option value="사용">사용</option>
                  <option value="미사용">미사용</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 버튼 영역 -->
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="resetEditForm()">초기화</button>
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script>
    // URL에서 계정코드 가져오기
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    // 섹션 토글 관련 요소
    const accountDetailSection = document.getElementById('accountDetailSection');
    const accountEditSection = document.getElementById('accountEditSection');
    const editAccountBtn = document.getElementById('editAccountBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    // 샘플 데이터
    const accountDataMap = {
      '1000': { code: '1000', name: '자산', type: '자산', parent: '', isActive: '사용' },
      '1010': { code: '1010', name: '현금', type: '자산', parent: '1000', isActive: '사용' },
      '1020': { code: '1020', name: '렌트자산', type: '자산', parent: '1000', isActive: '사용' },
      '1030': { code: '1030', name: '부가세대급금', type: '자산', parent: '1000', isActive: '사용' },
      '2000': { code: '2000', name: '부채', type: '부채', parent: '', isActive: '사용' },
      '2010': { code: '2010', name: '차입부채', type: '부채', parent: '2000', isActive: '사용' },
      '2020': { code: '2020', name: '선수금', type: '부채', parent: '2000', isActive: '사용' },
      '2030': { code: '2030', name: '미지급금', type: '부채', parent: '2000', isActive: '사용' },
      '3000': { code: '3000', name: '자본', type: '자본', parent: '', isActive: '사용' },
      '3010': { code: '3010', name: '자본금', type: '자본', parent: '3000', isActive: '사용' },
      '4000': { code: '4000', name: '수익', type: '수익', parent: '', isActive: '사용' },
      '4010': { code: '4010', name: '매출액', type: '수익', parent: '4000', isActive: '사용' },
      '5000': { code: '5000', name: '비용', type: '비용', parent: '', isActive: '사용' },
      '5010': { code: '5010', name: '급여', type: '비용', parent: '5000', isActive: '사용' },
      '5020': { code: '5020', name: '임차료', type: '비용', parent: '5000', isActive: '사용' }
    };

    // 현재 데이터
    let currentData = accountDataMap[code] || accountDataMap['1010'];

    // 계정구분별 배지 클래스
    function getTypeBadgeClass(type) {
      const typeMap = {
        '자산': 'asset',
        '부채': 'liability',
        '자본': 'equity',
        '수익': 'revenue',
        '비용': 'expense'
      };
      return typeMap[type] || 'asset';
    }

    // 페이지 로드 시 데이터 표시
    function loadAccountDetail() {
      document.getElementById('accountCode').textContent = currentData.code;
      document.getElementById('accountName').textContent = currentData.name;

      const badgeClass = getTypeBadgeClass(currentData.type);
      document.getElementById('accountType').innerHTML = `<span class="type-badge ${badgeClass}">${currentData.type}</span>`;

      document.getElementById('parentAccount').textContent = currentData.parent || '-';

      const isActiveEl = document.getElementById('isActive');
      isActiveEl.textContent = currentData.isActive;
      isActiveEl.className = 'detail-value ' + (currentData.isActive === '사용' ? 'active' : 'inactive');
    }

    // 수정하기 버튼 클릭
    editAccountBtn.addEventListener('click', function() {
      document.getElementById('editAccountCodeDisplay').textContent = currentData.code;
      document.getElementById('editAccountCode').value = currentData.code;
      document.getElementById('editAccountName').value = currentData.name;
      document.getElementById('editAccountType').value = currentData.type;
      document.getElementById('editParentAccount').value = currentData.parent || '';
      document.getElementById('editIsActive').value = currentData.isActive;

      accountDetailSection.classList.add('hidden');
      accountEditSection.classList.remove('hidden');
    });

    // 취소 버튼 클릭
    cancelEditBtn.addEventListener('click', function() {
      if(confirm('수정을 취소하시겠습니까?')) {
        accountEditSection.classList.add('hidden');
        accountDetailSection.classList.remove('hidden');
      }
    });

    // 폼 제출 이벤트
    document.getElementById('accountEditForm').addEventListener('submit', function(e) {
      e.preventDefault();

      if(!confirm('수정하시겠습니까?')) {
        return;
      }

      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      // 수정된 데이터로 업데이트
      Object.assign(currentData, {
        name: data.name,
        type: data.type,
        parent: data.parent,
        isActive: data.isActive
      });
      loadAccountDetail();

      accountEditSection.classList.add('hidden');
      accountDetailSection.classList.remove('hidden');

      alert('수정되었습니다.');
    });

    // 수정 폼 초기화 함수
    function resetEditForm() {
      if(confirm('모든 입력 내용을 초기화하시겠습니까?')) {
        editAccountBtn.click();
      }
    }

    // 목록으로 돌아가기
    function goBack() {
      window.location.href = 'account_management.html';
    }

    // 페이지 로드 시 상세 정보 표시
    loadAccountDetail();
  </script>
</body>
</html>
