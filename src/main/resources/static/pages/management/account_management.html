<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회계계정관리 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/management/account_management.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>회계계정관리</h1>
      <p>총괄관리 &gt; 회계계정관리</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 툴바 -->
        <div class="toolbar">
          <div class="info-text">💡 계정을 더블클릭하면 수정할 수 있습니다</div>
          <button type="button" class="btn-add" onclick="openAddModal()">+ 회계계정 추가</button>
        </div>

        <!-- 테이블 -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>계정코드</th>
                <th>계정명</th>
                <th>계정구분</th>
                <th>상위계정</th>
                <th>사용여부</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="accountTableBody">
              <!-- JavaScript로 동적 생성 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 계정 추가/수정 모달 -->
  <div id="accountModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">회계계정 추가</h2>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label for="accountCode">계정코드 *</label>
          <input type="text" id="accountCode" placeholder="예: 1010" required>
        </div>
        <div class="form-row">
          <label for="accountName">계정명 *</label>
          <input type="text" id="accountName" placeholder="예: 현금" required>
        </div>
        <div class="form-row">
          <label for="accountType">계정구분 *</label>
          <select id="accountType" required>
            <option value="">선택</option>
            <option value="자산">자산</option>
            <option value="부채">부채</option>
            <option value="자본">자본</option>
            <option value="수익">수익</option>
            <option value="비용">비용</option>
          </select>
        </div>
        <div class="form-row">
          <label for="parentAccount">상위계정</label>
          <input type="text" id="parentAccount" placeholder="예: 1000 (선택사항)">
        </div>
        <div class="form-row">
          <label for="isActive">사용여부 *</label>
          <select id="isActive" required>
            <option value="사용">사용</option>
            <option value="미사용">미사용</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
        <button type="button" class="btn-save" onclick="saveAccount()">저장</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script>
    // 샘플 회계계정 데이터
    let accountData = [
      { code: '1000', name: '자산', type: '자산', parent: '', isActive: '사용' },
      { code: '1010', name: '현금', type: '자산', parent: '1000', isActive: '사용' },
      { code: '1020', name: '렌트자산', type: '자산', parent: '1000', isActive: '사용' },
      { code: '1030', name: '부가세대급금', type: '자산', parent: '1000', isActive: '사용' },
      { code: '2000', name: '부채', type: '부채', parent: '', isActive: '사용' },
      { code: '2010', name: '차입부채', type: '부채', parent: '2000', isActive: '사용' },
      { code: '2020', name: '선수금', type: '부채', parent: '2000', isActive: '사용' },
      { code: '2030', name: '미지급금', type: '부채', parent: '2000', isActive: '사용' },
      { code: '3000', name: '자본', type: '자본', parent: '', isActive: '사용' },
      { code: '3010', name: '자본금', type: '자본', parent: '3000', isActive: '사용' },
      { code: '4000', name: '수익', type: '수익', parent: '', isActive: '사용' },
      { code: '4010', name: '매출액', type: '수익', parent: '4000', isActive: '사용' },
      { code: '5000', name: '비용', type: '비용', parent: '', isActive: '사용' },
      { code: '5010', name: '급여', type: '비용', parent: '5000', isActive: '사용' },
      { code: '5020', name: '임차료', type: '비용', parent: '5000', isActive: '사용' }
    ];

    let editingIndex = -1;

    // 페이지 로드 시 계정 목록 표시
    window.addEventListener('load', function() {
      displayAccounts();
    });

    // 계정 목록 표시
    function displayAccounts() {
      const tbody = document.getElementById('accountTableBody');

      tbody.innerHTML = accountData.map((item, index) => {
        return `
          <tr style="cursor: pointer;" ondblclick="editAccount(${index})">
            <td>${item.code}</td>
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${item.parent || '-'}</td>
            <td>${item.isActive}</td>
            <td>
              <button class="btn-delete" onclick="deleteAccount(${index}, event)">삭제</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // 추가 모달 열기
    function openAddModal() {
      editingIndex = -1;
      document.getElementById('modalTitle').textContent = '회계계정 추가';
      document.getElementById('accountCode').value = '';
      document.getElementById('accountName').value = '';
      document.getElementById('accountType').value = '';
      document.getElementById('parentAccount').value = '';
      document.getElementById('isActive').value = '사용';
      document.getElementById('accountModal').style.display = 'block';
    }

    // 수정 모달 열기 (더블클릭)
    function editAccount(index) {
      editingIndex = index;
      const account = accountData[index];

      document.getElementById('modalTitle').textContent = '회계계정 수정';
      document.getElementById('accountCode').value = account.code;
      document.getElementById('accountName').value = account.name;
      document.getElementById('accountType').value = account.type;
      document.getElementById('parentAccount').value = account.parent;
      document.getElementById('isActive').value = account.isActive;
      document.getElementById('accountModal').style.display = 'block';
    }

    // 모달 닫기
    function closeModal() {
      document.getElementById('accountModal').style.display = 'none';
      editingIndex = -1;
    }

    // 계정 저장
    function saveAccount() {
      const code = document.getElementById('accountCode').value.trim();
      const name = document.getElementById('accountName').value.trim();
      const type = document.getElementById('accountType').value;
      const parent = document.getElementById('parentAccount').value.trim();
      const isActive = document.getElementById('isActive').value;

      if (!code || !name || !type) {
        alert('필수 항목을 모두 입력해주세요.');
        return;
      }

      const newAccount = {
        code: code,
        name: name,
        type: type,
        parent: parent,
        isActive: isActive
      };

      if (editingIndex === -1) {
        // 새로 추가
        // 중복 체크
        const exists = accountData.some(item => item.code === code);
        if (exists) {
          alert('이미 존재하는 계정코드입니다.');
          return;
        }
        accountData.push(newAccount);
      } else {
        // 수정
        accountData[editingIndex] = newAccount;
      }

      // 계정코드로 정렬
      accountData.sort((a, b) => a.code.localeCompare(b.code));

      displayAccounts();
      closeModal();
    }

    // 계정 삭제
    function deleteAccount(index, event) {
      event.stopPropagation(); // 더블클릭 이벤트 방지

      if (confirm('정말 삭제하시겠습니까?')) {
        accountData.splice(index, 1);
        displayAccounts();
      }
    }

    // 모달 외부 클릭 시 닫기
    window.onclick = function(event) {
      const modal = document.getElementById('accountModal');
      if (event.target == modal) {
        closeModal();
      }
    }
  </script>
</body>
</html>
