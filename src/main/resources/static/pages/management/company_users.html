<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용자관리 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />
  <style>
    .erp-card { background:#fff; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.06); overflow:hidden; }
    .card-body { padding: 20px; }
    .info-text { font-size: 14px; color: #555; margin-bottom: 16px; }

    .form-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-weight: 700; font-size: 13px; color: #374151; }
    .form-group input, .form-group select {
      height: 38px; padding: 0 10px; border: 1px solid #d1d5db; border-radius: 10px; box-sizing: border-box;
    }
    .form-actions { display: flex; gap: 8px; margin-bottom: 24px; }

    .btn { height: 38px; padding: 0 16px; border-radius: 10px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-gray { background: #e5e7eb; color: #111827; border-color: #e5e7eb; }
    .btn-danger { background: #fff; color: #dc2626; border-color: #fecaca; }

    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #edf0f2; padding: 10px; text-align: center; font-size: 14px; }
    th { background: #f8fafc; font-weight: 700; color: #334155; }

    .badge { padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge-admin { background: #fef3c7; color: #92400e; }
    .badge-manager { background: #eff6ff; color: #1d4ed8; }
    .badge-staff { background: #f3f4f6; color: #374151; }
    .empty-row { text-align: center; color: #6b7280; padding: 28px 0; }
  </style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>사용자관리</h1>
    <p>총괄관리 &gt; 회사관리 &gt; 사용자관리</p>
  </div>

  <div class="erp-card">
    <div class="card-body">
      <div class="info-text">
        우리 회사 안에서 쓸 직원 로그인 계정을 등록/수정/삭제합니다. 사용자 아이디는 우리 회사 안에서만 유일하면 됩니다.
        로그인 시 통합 아이디/비밀번호 + 여기서 만든 사용자 아이디/비밀번호를 같이 입력합니다.
      </div>

      <input type="hidden" id="editId" />

      <div class="form-grid">
        <div class="form-group">
          <label>사용자 아이디</label>
          <input type="text" id="userLoginId" />
        </div>
        <div class="form-group">
          <label>사용자 비밀번호</label>
          <input type="password" id="userPassword" placeholder="수정 시 비워두면 유지" />
        </div>
        <div class="form-group">
          <label>권한</label>
          <select id="role">
            <option value="STAFF">실무자(등록만)</option>
            <option value="MANAGER">책임자(등록/수정/삭제/승인)</option>
            <option value="COMPANY_ADMIN">회사관리자(+사용자관리)</option>
          </select>
        </div>
        <div class="form-group">
          <label>상태</label>
          <select id="isActive">
            <option value="true">활성</option>
            <option value="false">비활성</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveUser()">저장</button>
        <button class="btn btn-gray" onclick="resetForm()">초기화</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>사용자 아이디</th>
            <th>권한</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="userBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/role.js"></script>
<script>
  function apiBase() {
    return (typeof API_BASE_URL !== "undefined" && API_BASE_URL) ? String(API_BASE_URL).replace(/\/+$/, "") : "";
  }

  function esc(s) {
    return String(s ?? "")
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
  }

  function roleBadge(role) {
    const labels = { COMPANY_ADMIN: "회사관리자", MANAGER: "책임자", STAFF: "실무자" };
    const classes = { COMPANY_ADMIN: "badge-admin", MANAGER: "badge-manager", STAFF: "badge-staff" };
    const r = ["COMPANY_ADMIN", "MANAGER", "STAFF"].includes(role) ? role : "STAFF";
    return `<span class="badge ${classes[r]}">${labels[r]}</span>`;
  }

  async function mustOk(res) {
    if (!res.ok) {
      const text = await res.text().catch(() => "");
      throw new Error(text || ("HTTP " + res.status));
    }
    return res;
  }

  async function loadUsers() {
    try {
      const res = await fetch(apiBase() + "/api/company-users", { credentials: "include" });
      await mustOk(res);
      const list = await res.json();

      const tbody = document.getElementById("userBody");
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="4" class="empty-row">등록된 사용자가 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = list.map(u => `
        <tr>
          <td>${esc(u.userLoginId)}</td>
          <td>${roleBadge(u.role)}</td>
          <td>${u.isActive ? "활성" : "비활성"}</td>
          <td>
            <button class="btn btn-gray" onclick='editUser(${JSON.stringify(u)})'>수정</button>
            <button class="btn btn-danger" onclick="deleteUser(${u.id})">삭제</button>
          </td>
        </tr>
      `).join("");
    } catch (e) {
      alert("사용자 목록 조회 실패: " + e.message);
    }
  }

  async function saveUser() {
    const id = document.getElementById("editId").value;

    const body = {
      userLoginId: document.getElementById("userLoginId").value.trim(),
      userPassword: document.getElementById("userPassword").value.trim(),
      role: document.getElementById("role").value,
      isActive: document.getElementById("isActive").value === "true",
    };

    if (!id && !body.userLoginId) return alert("사용자 아이디를 입력하세요.");
    if (!id && !body.userPassword) return alert("사용자 비밀번호를 입력하세요.");

    const url = apiBase() + (id ? `/api/company-users/${id}` : "/api/company-users");
    const method = id ? "PUT" : "POST";

    try {
      const res = await fetch(url, {
        method,
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      await mustOk(res);

      alert("저장되었습니다.");
      resetForm();
      await loadUsers();
    } catch (e) {
      alert("저장 실패: " + e.message);
    }
  }

  function editUser(u) {
    document.getElementById("editId").value = u.id;
    document.getElementById("userLoginId").value = u.userLoginId;
    document.getElementById("userLoginId").disabled = true;
    document.getElementById("userPassword").value = "";
    document.getElementById("role").value = u.role;
    document.getElementById("isActive").value = String(u.isActive);
  }

  async function deleteUser(id) {
    if (!confirm("삭제하시겠습니까?")) return;

    try {
      const res = await fetch(apiBase() + `/api/company-users/${id}`, { method: "DELETE", credentials: "include" });
      await mustOk(res);
      alert("삭제되었습니다.");
      await loadUsers();
    } catch (e) {
      alert("삭제 실패: " + e.message);
    }
  }

  function resetForm() {
    document.getElementById("editId").value = "";
    document.getElementById("userLoginId").disabled = false;
    document.getElementById("userLoginId").value = "";
    document.getElementById("userPassword").value = "";
    document.getElementById("role").value = "STAFF";
    document.getElementById("isActive").value = "true";
  }

  window.addEventListener("load", async () => {
    if (!(await isCompanyAdmin())) {
      alert("회사관리자 권한이 필요합니다.");
      location.href = "/index.html";
      return;
    }
    await loadUsers();
  });
</script>
</body>
</html>
