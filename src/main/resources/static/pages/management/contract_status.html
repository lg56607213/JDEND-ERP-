<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계약현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />
  <link rel="stylesheet" href="../../assets/css/management/contract_status.css" />
</head>
<body>
<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>계약현황</h1>
    <p>총괄관리 &gt; 계약현황</p>
  </div>

  <div class="erp-card">
    <div class="card-body">

      <!-- 검색 -->
      <div class="search-section">
        <div class="search-grid">
          <div class="form-group">
            <label for="searchContractNumber">계약번호</label>
            <input type="text" id="searchContractNumber" placeholder="계약번호 검색" />
          </div>
          <div class="form-group">
            <label for="searchCustomer">거래처명</label>
            <input type="text" id="searchCustomer" placeholder="거래처명 검색" />
          </div>
          <div class="form-group">
            <label for="searchVehicle">차량번호</label>
            <input type="text" id="searchVehicle" placeholder="차량번호 검색" />
          </div>
          <div class="form-group">
            <label for="searchStatus">차량상태</label>
            <select id="searchStatus">
              <option value="">전체</option>
              <option value="장기">장기</option>
              <option value="단기">단기</option>
              <option value="대기">대기</option>
            </select>
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn-search" onclick="searchContracts()">조회</button>
          </div>
        </div>
      </div>

      <!-- 테이블 -->
      <div class="table-container">
        <table>
          <thead>
          <tr>
            <th>차량번호</th>
            <th>계약번호</th>
            <th>차량상태</th>
            <th>거래처명</th>
            <th>계약시작일</th>
            <th>계약종료일</th>
            <th>월 렌트료</th>
            <th>총렌트료</th>
            <th>미수금</th>
            <th>선수금</th>
            <th>차종</th>
          </tr>
          </thead>
          <tbody id="contractTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>
<!-- ❌ 여기 http.js 제거 -->
<!-- <script src="../../assets/js/common/http.js"></script> -->

<script>
  function fmtAmount(v) {
    if (v === null || v === undefined) return "-";
    if (typeof v === "number") return v.toLocaleString();
    const n = Number(v);
    return Number.isFinite(n) ? n.toLocaleString() : "-";
  }

  function fmtDate(v) {
    return v ? String(v) : "-";
  }

  function statusBadge(status) {
    let cls = "";
    if (status === "장기") cls = "long-term";
    else if (status === "단기") cls = "short-term";
    else if (status === "대기") cls = "standby";
    return `<span class="status-badge ${cls}">${status || "-"}</span>`;
  }

  function renderRows(list) {
    const tbody = document.getElementById("contractTableBody");

    if (!list || list.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="11" class="no-data">
            <div class="no-data-icon">📋</div>
            <div>검색 결과가 없습니다.</div>
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = list.map(row => `
      <tr onclick="viewContractDetail('${row.contractNumber || ""}')" class="clickable-row">
        <td>${row.vehicleNumber || "-"}</td>
        <td>${row.contractNumber || "-"}</td>
        <td>${statusBadge(row.status)}</td>
        <td>${row.customerName || "-"}</td>
        <td>${fmtDate(row.contractStart)}</td>
        <td>${fmtDate(row.contractEnd)}</td>
        <td class="amount-cell">${fmtAmount(row.monthlyRent)}</td>
        <td class="amount-cell">${fmtAmount(row.totalRent)}</td>
        <td class="receivable-cell">${fmtAmount(row.receivable)}</td>
        <td class="advance-cell">${fmtAmount(row.advance)}</td>
        <td>${row.vehicleType || "-"}</td>
      </tr>
    `).join("");
  }

  async function searchContracts() {
    try {
      const contractNumber = document.getElementById("searchContractNumber").value.trim();
      const customerName = document.getElementById("searchCustomer").value.trim();
      const vehicleNo = document.getElementById("searchVehicle").value.trim();
      const status = document.getElementById("searchStatus").value;

      const qs = new URLSearchParams({
        contractNumber,
        customerName,
        vehicleNo,
        status
      });

      // ✅ const API_BASE_URL 사용 (config.js)
      const url = API_BASE_URL.replace(/\/$/, "") + "/api/contracts/status?" + qs.toString();
      console.log("API 호출 URL =", url);

      const res = await fetch(url, { method: "GET" });

      if (!res.ok) {
        const t = await res.text();
        throw new Error(`HTTP ${res.status} - ${t}`);
      }

      const data = await res.json();
      renderRows(data);

    } catch (e) {
      alert("조회 실패: " + e.message);
      renderRows([]);
    }
  }

  function viewContractDetail(contractNumber) {
    if (!contractNumber) return;
    window.location.href = "../contract/contract_detail.html?id=" + encodeURIComponent(contractNumber);
  }

  window.addEventListener("load", () => {
    searchContracts(); // 최초 진입 시 전체 조회
  });
</script>
</body>
</html>
