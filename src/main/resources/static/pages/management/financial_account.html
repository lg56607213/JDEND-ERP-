<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재무제표계정관리 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />
  <link rel="stylesheet" href="../../assets/css/management/financial_account.css" />
</head>
<body>
<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>재무제표계정관리</h1>
    <p>총괄관리 &gt; 회계계정관리 &gt; 재무제표계정관리</p>
  </div>

  <div class="erp-card">
    <div class="card-body">

      <div class="toolbar">
        <div class="info-text">재무제표에 표시되는 계정과목을 관리합니다. 계정을 더블클릭하면 수정할 수 있습니다.</div>
        <button type="button" class="btn-add" onclick="openAddModal()">+ 재무제표계정 추가</button>
      </div>

      <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('bs')">재무상태표</button>
        <button class="tab-btn" onclick="switchTab('is')">손익계산서</button>
      </div>

      <div id="bsTable" class="table-section active">
        <div class="table-container">
          <table>
            <thead>
            <tr>
              <th>계정코드</th>
              <th>계정명</th>
              <th>계정구분</th>
              <th>표시순서</th>
              <th>사용여부</th>
              <th>관리</th>
            </tr>
            </thead>
            <tbody id="bsAccountBody"></tbody>
          </table>
        </div>
      </div>

      <div id="isTable" class="table-section">
        <div class="table-container">
          <table>
            <thead>
            <tr>
              <th>계정코드</th>
              <th>계정명</th>
              <th>계정구분</th>
              <th>표시순서</th>
              <th>사용여부</th>
              <th>관리</th>
            </tr>
            </thead>
            <tbody id="isAccountBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 모달 -->
<div id="accountModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">재무제표계정 추가</h2>
      <span class="close" onclick="closeModal()">&times;</span>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label for="statementType">재무제표 구분 *</label>
        <select id="statementType" required>
          <option value="bs">재무상태표</option>
          <option value="is">손익계산서</option>
        </select>
      </div>
      <div class="form-row">
        <label for="accountCode">계정코드 *</label>
        <input type="text" id="accountCode" placeholder="예: 1010" required />
      </div>
      <div class="form-row">
        <label for="accountName">계정명 *</label>
        <input type="text" id="accountName" placeholder="예: 현금및현금성자산" required />
      </div>
      <div class="form-row">
        <label for="accountType">계정구분 *</label>
        <select id="accountType" required>
          <option value="">선택</option>
          <optgroup label="재무상태표">
            <option value="유동자산">유동자산</option>
            <option value="비유동자산">비유동자산</option>
            <option value="유동부채">유동부채</option>
            <option value="비유동부채">비유동부채</option>
            <option value="자본">자본</option>
          </optgroup>
          <optgroup label="손익계산서">
            <option value="매출">매출</option>
            <option value="매출원가">매출원가</option>
            <option value="판매비와관리비">판매비와관리비</option>
            <option value="영업외수익">영업외수익</option>
            <option value="영업외비용">영업외비용</option>
          </optgroup>
        </select>
      </div>
      <div class="form-row">
        <label for="displayOrder">표시순서 *</label>
        <input type="number" id="displayOrder" placeholder="예: 100" required />
      </div>
      <div class="form-row">
        <label for="isActive">사용여부 *</label>
        <select id="isActive" required>
          <option value="사용">사용</option>
          <option value="미사용">미사용</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
      <button type="button" class="btn-save" onclick="saveAccount()">저장</button>
    </div>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/html-escape.js"></script>

<script>
  // ====== 공통 fetch 유틸 ======
  // const API_BASE_URL = "";
  // 이 프로젝트 패턴 그대로 사용
  function buildUrl(path) {
    const base = (typeof API_BASE_URL !== "undefined") ? API_BASE_URL : "";
    const normalizedBase = String(base).replace(/\/$/, "");
    const normalizedPath = path.startsWith("/") ? path : "/" + path;
    return normalizedBase + normalizedPath;
  }

  async function request(method, path, body) {
    const res = await fetch(buildUrl(path), {
      method,
      headers: { "Content-Type": "application/json" },
      body: body ? JSON.stringify(body) : undefined
    });

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try {
        const ct = res.headers.get("content-type") || "";
        if (ct.includes("application/json")) {
          const json = await res.json();
          msg = json?.message || json?.error || JSON.stringify(json);
        } else {
          const text = await res.text();
          if (text) msg = text;
        }
      } catch (_) {}
      throw new Error(msg);
    }

    const ct = res.headers.get("content-type") || "";
    if (ct.includes("application/json")) {
      return await res.json();
    }
    return await res.text();
  }

  const api = {
    get: (path) => request("GET", path),
    post: (path, body) => request("POST", path, body),
    put: (path, body) => request("PUT", path, body),
    del: (path) => request("DELETE", path)
  };

  // ====== 페이지 로직 ======
  let currentTab = "bs";
  let editingId = null;

  async function fetchList(statementType) {
    return await api.get("/api/financial-statement-accounts?statementType=" + encodeURIComponent(statementType));
  }

  function rowHtml(item) {
    return `
      <tr ondblclick="editAccount(${item.id})">
        <td>${escHtml(item.accountCode ?? "")}</td>
        <td>${escHtml(item.accountName ?? "")}</td>
        <td>${item.accountType ?? ""}</td>
        <td>${item.displayOrder ?? ""}</td>
        <td>${item.isActive ?? ""}</td>
        <td>
          <button class="btn-delete" onclick="deleteAccount(${item.id}, event)">삭제</button>
        </td>
      </tr>
    `;
  }

  async function displayAccounts() {
    try {
      const [bsList, isList] = await Promise.all([
        fetchList("bs"),
        fetchList("is")
      ]);

      document.getElementById("bsAccountBody").innerHTML = (bsList || []).map(rowHtml).join("");
      document.getElementById("isAccountBody").innerHTML = (isList || []).map(rowHtml).join("");
    } catch (e) {
      console.error(e);
      alert("목록 조회 실패: " + e.message);
      document.getElementById("bsAccountBody").innerHTML = "";
      document.getElementById("isAccountBody").innerHTML = "";
    }
  }

  function switchTab(tab) {
    currentTab = tab;

    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelectorAll(".table-section").forEach(section => section.classList.remove("active"));

    document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add("active");
    document.getElementById(tab === "bs" ? "bsTable" : "isTable").classList.add("active");
  }

  function openAddModal() {
    editingId = null;

    document.getElementById("modalTitle").textContent = "재무제표계정 추가";
    document.getElementById("statementType").value = currentTab;
    document.getElementById("accountCode").value = "";
    document.getElementById("accountName").value = "";
    document.getElementById("accountType").value = "";
    document.getElementById("displayOrder").value = "";
    document.getElementById("isActive").value = "사용";

    document.getElementById("accountModal").style.display = "block";
  }

  async function editAccount(id) {
    try {
      const list = await fetchList(currentTab);
      const item = (list || []).find(x => x.id === id);

      if (!item) {
        alert("선택한 계정을 찾을 수 없습니다.");
        return;
      }

      editingId = id;
      document.getElementById("modalTitle").textContent = "재무제표계정 수정";
      document.getElementById("statementType").value = item.statementType ?? currentTab;
      document.getElementById("accountCode").value = item.accountCode ?? "";
      document.getElementById("accountName").value = item.accountName ?? "";
      document.getElementById("accountType").value = item.accountType ?? "";
      document.getElementById("displayOrder").value = item.displayOrder ?? "";
      document.getElementById("isActive").value = item.isActive ?? "사용";

      document.getElementById("accountModal").style.display = "block";
    } catch (e) {
      console.error(e);
      alert("수정 데이터 조회 실패: " + e.message);
    }
  }

  function closeModal() {
    document.getElementById("accountModal").style.display = "none";
    editingId = null;
  }

  async function saveAccount() {
    const statementType = document.getElementById("statementType").value;
    const accountCode = document.getElementById("accountCode").value.trim();
    const accountName = document.getElementById("accountName").value.trim();
    const accountType = document.getElementById("accountType").value;
    const displayOrder = Number(document.getElementById("displayOrder").value);
    const isActive = document.getElementById("isActive").value;

    if (!accountCode || !accountName || !accountType || !Number.isFinite(displayOrder)) {
      alert("필수 항목을 모두 입력해주세요.");
      return;
    }

    const payload = {
      statementType,
      accountCode,
      accountName,
      accountType,
      displayOrder,
      isActive
    };

    try {
      if (editingId === null) {
        await api.post("/api/financial-statement-accounts", payload);
      } else {
        await api.put("/api/financial-statement-accounts/" + editingId, payload);
      }

      await displayAccounts();
      closeModal();
      alert("저장되었습니다.");
    } catch (e) {
      console.error(e);
      alert("저장 실패: " + e.message);
    }
  }

  async function deleteAccount(id, event) {
    if (event) event.stopPropagation();

    if (!confirm("정말 삭제하시겠습니까?")) return;

    try {
      await api.del("/api/financial-statement-accounts/" + id);
      await displayAccounts();
      alert("삭제되었습니다.");
    } catch (e) {
      console.error(e);
      alert("삭제 실패: " + e.message);
    }
  }

  window.onclick = function(event) {
    const modal = document.getElementById("accountModal");
    if (event.target === modal) {
      closeModal();
    }
  };

  window.addEventListener("load", () => {
    displayAccounts();
  });
</script>
</body>
</html>
