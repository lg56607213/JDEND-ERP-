<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재무제표관리 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />

  <style>
    .erp-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      overflow: hidden;
    }

    .card-body {
      padding: 20px;
    }

    .top-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .info-text {
      font-size: 14px;
      color: #555;
    }

    .tab-container {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: 1px solid #d0d7de;
      background: #fff;
      color: #333;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .tab-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .table-container {
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }

    .statement-table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: #fff;
    }

    .statement-table th,
    .statement-table td {
      border-bottom: 1px solid #edf0f2;
      padding: 10px 10px;
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    .statement-table th {
      background: #f8fafc;
      font-weight: 700;
      color: #334155;
    }

    .statement-table td.left {
      text-align: left;
    }

    .tree-name-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .level-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .level-1 { background: #eef2ff; color: #4338ca; }
    .level-2 { background: #ecfeff; color: #0e7490; }
    .level-3 { background: #f0fdf4; color: #15803d; }
    .level-4 { background: #fff7ed; color: #c2410c; }

    .account-link {
      color: #1d4ed8;
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
    }

    .account-plain {
      font-weight: 600;
      color: #374151;
    }

    .status-use { color: #059669; font-weight: 700; }
    .status-stop { color: #dc2626; font-weight: 700; }

    .btn-mini {
      border: 1px solid #d0d7de;
      background: #fff;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      margin: 0 2px;
    }
    .btn-mini:hover { background: #f5f5f5; }
    .btn-mini.danger { color: #dc2626; border-color: #fecaca; }
    .btn-mini.danger:hover { background: #fef2f2; }
    .btn-mini:disabled { opacity: .4; cursor: not-allowed; }

    .btn-add-root {
      background: #2563eb; color: #fff; border: none;
      border-radius: 10px; padding: 10px 16px; font-weight: 600; cursor: pointer;
    }
    .btn-add-root:hover { filter: brightness(.96); }

    .empty-row {
      text-align: center;
      color: #6b7280;
      padding: 28px 0;
    }

    /* 하위분류 추가 모달 */
    .add-modal, .voucher-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .add-modal.show, .voucher-modal.show { display: flex; }

    .add-modal-content {
      width: min(440px, calc(100vw - 30px));
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      overflow: hidden;
    }
    .voucher-modal-content {
      width: min(1450px, calc(100vw - 30px));
      max-height: calc(100vh - 30px);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid #e5e7eb;
    }
    .modal-header2 h2 { margin: 0; font-size: 18px; color: #111827; }
    .modal-close2 {
      border: none; background: transparent; font-size: 24px; line-height: 1; cursor: pointer;
    }
    .modal-body2 { padding: 18px 22px; }

    .form-row2 { margin-bottom: 14px; }
    .form-row2 label {
      display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #374151;
    }
    .form-row2 input, .form-row2 select {
      width: 100%; height: 38px; border: 1px solid #d1d5db; border-radius: 10px;
      padding: 0 10px; box-sizing: border-box; font-size: 14px;
    }
    .form-row2 .hint { font-size: 12px; color: #888; margin-top: 4px; }
    .form-actions2 {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px;
    }
    .form-actions2 button {
      height: 38px; padding: 0 16px; border-radius: 10px; border: 1px solid #d1d5db;
      background: #fff; cursor: pointer;
    }
    .form-actions2 .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }

    .voucher-search-bar {
      display: grid;
      grid-template-columns: 160px 160px 220px 1fr;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }
    .voucher-search-bar label {
      display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #374151;
    }
    .voucher-search-bar input {
      width: 100%; height: 38px; border: 1px solid #d1d5db; border-radius: 10px; padding: 0 10px; box-sizing: border-box;
    }
    .voucher-search-actions { display: flex; gap: 8px; }
    .voucher-search-actions button {
      height: 38px; padding: 0 16px; border: 1px solid #d1d5db; border-radius: 10px; background: #fff; cursor: pointer;
    }
    .voucher-search-actions .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .voucher-summary { margin-bottom: 14px; font-size: 14px; font-weight: 600; color: #374151; }
    .voucher-history-wrap { overflow: auto; border: 1px solid #e5e7eb; border-radius: 12px; }
    .voucher-history-table { width: 100%; min-width: 1200px; border-collapse: collapse; }
    .voucher-history-table th, .voucher-history-table td {
      border-bottom: 1px solid #edf0f2; padding: 10px 8px; font-size: 13px; text-align: center; white-space: nowrap;
    }
    .voucher-history-table th { background: #f8fafc; font-weight: 700; }
    .voucher-history-table td.left { text-align: left; }
    .voucher-history-table td.amount { text-align: right; padding-right: 12px; }
    .badge-debit {
      display: inline-block; min-width: 56px; padding: 4px 8px; border-radius: 999px;
      background: #eff6ff; color: #1d4ed8; font-weight: 700;
    }
    .badge-credit {
      display: inline-block; min-width: 56px; padding: 4px 8px; border-radius: 999px;
      background: #fef2f2; color: #dc2626; font-weight: 700;
    }
  </style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>재무제표관리</h1>
    <p>총괄관리 &gt; 회계관리 &gt; 재무제표관리</p>
  </div>

  <div class="erp-card">
    <div class="card-body">

      <div class="top-toolbar">
        <div class="info-text">
          자산/부채/자본/수익/비용 카테고리별로 대분류&gt;중분류&gt;소분류&gt;소소분류 계정을 등록합니다.
          여기 등록한 계정만 재무상태표·손익계산서·전표등록 화면에 표시됩니다. 계정명을 클릭하면 전표내역을 확인할 수 있습니다.
        </div>
      </div>

      <div class="tab-container" id="categoryTabs">
        <button class="tab-btn active" data-category="ASSET" onclick="switchCategory('ASSET')">자산</button>
        <button class="tab-btn" data-category="LIABILITY" onclick="switchCategory('LIABILITY')">부채</button>
        <button class="tab-btn" data-category="EQUITY" onclick="switchCategory('EQUITY')">자본</button>
        <button class="tab-btn" data-category="REVENUE" onclick="switchCategory('REVENUE')">수익</button>
        <button class="tab-btn" data-category="EXPENSE" onclick="switchCategory('EXPENSE')">비용</button>
      </div>

      <div class="table-container">
        <table class="statement-table">
          <thead>
          <tr>
            <th style="width: 14%;">계정코드</th>
            <th style="width: 28%;">계정명</th>
            <th style="width: 10%;">레벨</th>
            <th style="width: 10%;">사용여부</th>
            <th style="width: 10%;">전기가능</th>
            <th style="width: 28%;">관리</th>
          </tr>
          </thead>
          <tbody id="treeBody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- 하위분류 추가 모달 -->
<div id="addModal" class="add-modal">
  <div class="add-modal-content">
    <div class="modal-header2">
      <h2 id="addModalTitle">하위 분류 추가</h2>
      <button type="button" class="modal-close2" onclick="closeAddModal()">&times;</button>
    </div>
    <div class="modal-body2">
      <div class="form-row2">
        <label>상위 분류</label>
        <input type="text" id="addParentLabel" readonly />
      </div>
      <div class="form-row2">
        <label for="addAccountName">계정명 *</label>
        <input type="text" id="addAccountName" placeholder="예: 보통예금" />
        <div class="hint">계정코드는 자동으로 부여됩니다.</div>
      </div>
      <div class="form-row2">
        <label for="addIsActive">사용여부</label>
        <select id="addIsActive">
          <option value="사용">사용</option>
          <option value="미사용">미사용</option>
        </select>
      </div>
      <div class="form-row2">
        <label for="addIsPostable">전기가능(전표등록 노출)</label>
        <select id="addIsPostable">
          <option value="사용">사용 (전표에서 선택 가능)</option>
          <option value="미사용">미사용 (분류헤더, 전표에는 안 보임)</option>
        </select>
      </div>
      <div class="form-actions2">
        <button type="button" onclick="closeAddModal()">취소</button>
        <button type="button" class="btn-primary" onclick="submitAddNode()">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- 전표내역 조회 모달 -->
<div id="voucherHistoryModal" class="voucher-modal">
  <div class="voucher-modal-content">
    <div class="modal-header2">
      <h2 id="voucherHistoryTitle">전표내역 조회</h2>
      <button type="button" class="modal-close2" onclick="closeVoucherHistoryModal()">&times;</button>
    </div>

    <div class="modal-body2">
      <div class="voucher-search-bar">
        <div>
          <label for="voucherStartDate">조회 시작일</label>
          <input type="date" id="voucherStartDate" />
        </div>
        <div>
          <label for="voucherEndDate">조회 종료일</label>
          <input type="date" id="voucherEndDate" />
        </div>
        <div>
          <label for="voucherAccountName">계정명</label>
          <input type="text" id="voucherAccountName" readonly />
        </div>
        <div class="voucher-search-actions">
          <button type="button" class="btn-primary" onclick="searchVoucherHistory()">조회</button>
          <button type="button" onclick="resetVoucherHistoryDates()">초기화</button>
        </div>
      </div>

      <div class="voucher-summary" id="voucherSummaryText">조회된 전표내역이 없습니다.</div>

      <div class="voucher-history-wrap">
        <table class="voucher-history-table">
          <thead>
          <tr>
            <th>전표일자</th>
            <th>전표번호</th>
            <th>구분</th>
            <th>계정명</th>
            <th>금액</th>
            <th>적요</th>
            <th>계약번호</th>
            <th>차량번호</th>
            <th>메모</th>
            <th>상태</th>
          </tr>
          </thead>
          <tbody id="voucherHistoryBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>

<script>
  function buildUrl(path) {
    const base = (typeof API_BASE_URL !== "undefined") ? API_BASE_URL : "";
    const normalizedBase = String(base).replace(/\/$/, "");
    const normalizedPath = path.startsWith("/") ? path : "/" + path;
    return normalizedBase + normalizedPath;
  }

  async function request(method, path, body) {
    const res = await fetch(buildUrl(path), {
      method,
      headers: { "Content-Type": "application/json" },
      body: body ? JSON.stringify(body) : undefined
    });

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try {
        const ct = res.headers.get("content-type") || "";
        if (ct.includes("application/json")) {
          const json = await res.json();
          msg = json?.message || json?.error || JSON.stringify(json);
        } else {
          const text = await res.text();
          if (text) msg = text;
        }
      } catch (_) {}
      throw new Error(msg);
    }

    const ct = res.headers.get("content-type") || "";
    if (ct.includes("application/json")) {
      return await res.json();
    }
    return await res.text();
  }

  const api = {
    get: (path) => request("GET", path),
    post: (path, body) => request("POST", path, body),
    del: (path) => request("DELETE", path),
  };

  let currentCategory = "ASSET";
  let nodeIndex = new Map(); // id -> node (현재 트리에서 빠르게 조회)
  let selectedParentId = null;
  let selectedVoucherAccountId = null;
  let selectedVoucherAccountName = "";

  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeHtmlJs(value) {
    return String(value ?? "")
      .replaceAll("\\", "\\\\")
      .replaceAll("'", "\\'");
  }

  function levelLabel(level) {
    return { 1: "대분류", 2: "중분류", 3: "소분류", 4: "소소분류" }[level] || level;
  }

  function flattenAndIndex(nodes) {
    for (const n of nodes) {
      nodeIndex.set(n.id, n);
      if (n.children && n.children.length) flattenAndIndex(n.children);
    }
  }

  function renderNode(node, depth) {
    const indent = depth * 22;
    const activeClass = node.isActive === "사용" ? "status-use" : "status-stop";
    const postableClass = node.isPostable === "사용" ? "status-use" : "status-stop";
    const canHaveChild = node.level < 4;
    const canDelete = node.leaf && node.level > 1;
    const nameCell = node.isPostable === "사용"
      ? `<span class="account-link" onclick="openVoucherHistoryModal(${node.id}, '${escapeHtmlJs(node.accountName)}')">${escapeHtml(node.accountName)}</span>`
      : `<span class="account-plain">${escapeHtml(node.accountName)}</span>`;

    let rows = `
      <tr>
        <td>${escapeHtml(node.accountCode)}</td>
        <td class="left">
          <div class="tree-name-cell" style="padding-left:${indent}px;">
            <span class="level-badge level-${node.level}">${levelLabel(node.level)}</span>
            ${nameCell}
          </div>
        </td>
        <td>${levelLabel(node.level)}</td>
        <td class="${activeClass}">${escapeHtml(node.isActive)}</td>
        <td class="${postableClass}">${escapeHtml(node.isPostable)}</td>
        <td>
          ${canHaveChild ? `<button type="button" class="btn-mini" onclick="openAddModal(${node.id}, '${escapeHtmlJs(node.accountName)}')">+ 하위분류추가</button>` : ""}
          <button type="button" class="btn-mini danger" ${canDelete ? "" : "disabled"} onclick="deleteNode(${node.id}, '${escapeHtmlJs(node.accountName)}')">삭제</button>
        </td>
      </tr>
    `;

    if (node.children && node.children.length) {
      for (const child of node.children) {
        rows += renderNode(child, depth + 1);
      }
    }
    return rows;
  }

  async function loadTree() {
    try {
      const roots = await api.get(`/api/financial-statement-accounts/tree?category=${encodeURIComponent(currentCategory)}`);
      nodeIndex = new Map();
      flattenAndIndex(roots || []);

      const body = document.getElementById("treeBody");
      if (!roots || roots.length === 0) {
        body.innerHTML = `<tr><td colspan="6" class="empty-row">등록된 계정이 없습니다.</td></tr>`;
        return;
      }
      body.innerHTML = roots.map(r => renderNode(r, 0)).join("");
    } catch (e) {
      console.error(e);
      alert("계정 트리 조회 실패: " + e.message);
    }
  }

  function switchCategory(category) {
    currentCategory = category;
    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelector(`.tab-btn[data-category="${category}"]`).classList.add("active");
    loadTree();
  }

  function openAddModal(parentId, parentName) {
    selectedParentId = parentId;
    document.getElementById("addParentLabel").value = parentName;
    document.getElementById("addAccountName").value = "";
    document.getElementById("addIsActive").value = "사용";
    document.getElementById("addIsPostable").value = "사용";
    document.getElementById("addModal").classList.add("show");
  }

  function closeAddModal() {
    document.getElementById("addModal").classList.remove("show");
    selectedParentId = null;
  }

  async function submitAddNode() {
    const accountName = document.getElementById("addAccountName").value.trim();
    if (!accountName) {
      alert("계정명을 입력하세요.");
      return;
    }
    try {
      await api.post("/api/financial-statement-accounts/nodes", {
        parentId: selectedParentId,
        accountName,
        isActive: document.getElementById("addIsActive").value,
        isPostable: document.getElementById("addIsPostable").value,
      });
      closeAddModal();
      await loadTree();
    } catch (e) {
      alert("등록 실패\n\n" + e.message);
    }
  }

  async function deleteNode(id, name) {
    if (!confirm(`'${name}' 계정을 삭제하시겠습니까?`)) return;
    try {
      await api.del(`/api/financial-statement-accounts/${id}`);
      await loadTree();
    } catch (e) {
      alert("삭제 실패\n\n" + e.message);
    }
  }

  function ymd(date) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function firstDayOfMonth() {
    const now = new Date();
    return ymd(new Date(now.getFullYear(), now.getMonth(), 1));
  }

  function today() {
    return ymd(new Date());
  }

  function openVoucherHistoryModal(accountId, accountName) {
    selectedVoucherAccountId = accountId;
    selectedVoucherAccountName = accountName;

    document.getElementById("voucherHistoryTitle").textContent = `전표내역 조회 - ${accountName}`;
    document.getElementById("voucherAccountName").value = accountName;
    document.getElementById("voucherStartDate").value = firstDayOfMonth();
    document.getElementById("voucherEndDate").value = today();
    document.getElementById("voucherHistoryBody").innerHTML = "";
    document.getElementById("voucherSummaryText").textContent = "조회 중...";
    document.getElementById("voucherHistoryModal").classList.add("show");

    searchVoucherHistory();
  }

  function closeVoucherHistoryModal() {
    document.getElementById("voucherHistoryModal").classList.remove("show");
    selectedVoucherAccountId = null;
    selectedVoucherAccountName = "";
  }

  function resetVoucherHistoryDates() {
    document.getElementById("voucherStartDate").value = firstDayOfMonth();
    document.getElementById("voucherEndDate").value = today();
    searchVoucherHistory();
  }

  function formatNumber(v) {
    return v == null ? "" : Number(v).toLocaleString();
  }

  function typeBadge(type) {
    if (type === "DEBIT") return `<span class="badge-debit">차변</span>`;
    return `<span class="badge-credit">대변</span>`;
  }

  async function searchVoucherHistory() {
    if (!selectedVoucherAccountId) return;

    const startDate = document.getElementById("voucherStartDate").value;
    const endDate = document.getElementById("voucherEndDate").value;

    try {
      const query = new URLSearchParams();
      if (startDate) query.set("startDate", startDate);
      if (endDate) query.set("endDate", endDate);

      const rows = await api.get(`/api/financial-statement-accounts/${selectedVoucherAccountId}/voucher-rows?` + query.toString());

      const body = document.getElementById("voucherHistoryBody");
      body.innerHTML = "";

      if (!rows || rows.length === 0) {
        body.innerHTML = `<tr><td colspan="10" class="empty-row">조회된 전표내역이 없습니다.</td></tr>`;
        document.getElementById("voucherSummaryText").textContent =
          `${selectedVoucherAccountName} 계정의 전표내역이 없습니다.`;
        return;
      }

      body.innerHTML = rows.map(r => `
        <tr>
          <td>${r.voucherDate ?? ""}</td>
          <td>${escapeHtml(r.voucherNo)}</td>
          <td>${typeBadge(r.lineType)}</td>
          <td>${escapeHtml(r.accountName)}</td>
          <td class="amount">${formatNumber(r.amount)}</td>
          <td class="left">${escapeHtml(r.description)}</td>
          <td>${escapeHtml(r.contractNumber)}</td>
          <td>${escapeHtml(r.vehicleNo)}</td>
          <td class="left">${escapeHtml(r.memo)}</td>
          <td>${escapeHtml(r.status)}</td>
        </tr>
      `).join("");

      document.getElementById("voucherSummaryText").textContent =
        `${selectedVoucherAccountName} 계정 전표내역 ${rows.length}건 조회됨`;
    } catch (e) {
      console.error(e);
      alert("전표내역 조회 실패: " + e.message);
    }
  }

  window.addEventListener("load", () => {
    loadTree();
  });

  window.addEventListener("click", (event) => {
    const voucherModal = document.getElementById("voucherHistoryModal");
    const addModal = document.getElementById("addModal");
    if (event.target === voucherModal) closeVoucherHistoryModal();
    if (event.target === addModal) closeAddModal();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeVoucherHistoryModal();
      closeAddModal();
    }
  });
</script>
</body>
</html>
