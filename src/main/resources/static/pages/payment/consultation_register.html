<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상담등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/payment/consultation_register.css">

  <style>
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:44px; }
    .icon-btn{
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      width:34px; height:34px; border:1px solid #ddd; background:#fff;
      border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }

    .modal-backdrop{
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:9999;
      align-items:center; justify-content:center; padding:20px;
    }
    .modal{
      width:min(980px,96vw);
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.2);
    }
    .modal-header{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; border-bottom:1px solid #eee;
    }
    .modal-title{ font-size:16px; font-weight:700; }
    .modal-close{
      border:none; background:transparent; font-size:22px; cursor:pointer; line-height:1;
    }
    .modal-body{ padding:14px 16px; }
    .modal-search-row{ display:flex; gap:8px; margin-bottom:12px; }
    .modal-search-row input{
      flex:1; padding:10px 12px; border:1px solid #ddd; border-radius:8px;
    }
    .modal-search-row button{
      padding:10px 12px; border:1px solid #ddd; background:#fff; border-radius:8px; cursor:pointer;
    }
    .modal-search-row button:hover{ background:#f5f5f5; }
    .modal-table{ width:100%; border-collapse:collapse; }
    .modal-table th,.modal-table td{
      border-bottom:1px solid #eee; padding:10px 8px; font-size:13px;
    }
    .modal-table th{ background:#fafafa; text-align:left; }
    .row-pick{ cursor:pointer; }
    .row-pick:hover{ background:#f7fbff; }
    .badge{
      display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px;
      background:#eef6ff; border:1px solid #d7eaff;
    }
    .btn-small{
      padding:6px 10px;
      border:1px solid #ddd;
      background:#fff;
      border-radius:6px;
      cursor:pointer;
      font-size:12px;
    }
    .btn-small:hover{
      background:#f5f5f5;
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>상담등록</h1>
      <p>수납관리 &gt; 상담관리 &gt; 상담등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">

        <!-- 계약 정보 조회 -->
        <div class="form-section">
          <h3>계약 정보</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="contractNo">계약번호 <span class="required">*</span></label>

              <div class="input-with-icon">
                <input type="text" id="contractNo" placeholder="계약번호 입력">
                <button type="button" class="icon-btn" id="btnOpenContractModal" title="계약 검색">🔎</button>
              </div>
            </div>

            <div class="form-group">
              <label for="vehicleNo">차량번호</label>
              <input type="text" id="vehicleNo" placeholder="자동 산출" disabled>
            </div>

            <div class="form-group">
              <label for="customerName">고객명</label>
              <input type="text" id="customerName" placeholder="자동 산출" disabled>
            </div>
          </div>
        </div>

        <!-- 상담 내용 입력 -->
        <div class="form-section">
          <h3>상담 내용 입력</h3>
          <div class="form-row two-col">
            <div class="form-group">
              <label for="consultDate">상담일자 <span class="required">*</span></label>
              <input type="date" id="consultDate">
            </div>
            <div class="form-group"></div>
          </div>

          <div class="form-row one-col">
            <div class="form-group">
              <label for="consultContent">상담내용 <span class="required">*</span></label>
              <textarea id="consultContent" placeholder="상담 내용을 입력하세요"></textarea>
            </div>
          </div>
        </div>

        <!-- 상담 이력 테이블 -->
        <div class="table-section">
          <div class="table-header">
            <div class="table-title">
              상담 이력
              <span class="info-badge" id="historyCount">총 0건</span>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th class="col-width-60">No</th>
                <th class="col-width-130">상담일자</th>
                <th>상담내용</th>
                <th class="col-width-130">등록일시</th>
                <th class="col-width-100">삭제</th>
              </tr>
            </thead>
            <tbody id="consultHistoryBody">
              <tr>
                <td colspan="5" class="no-data">
                  <div class="no-data-icon">📋</div>
                  <div>계약번호를 입력하면 상담 이력이 표시됩니다.</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- 액션 버튼 -->
        <div class="action-buttons">
          <button type="button" class="btn-submit" id="btnSubmit">등록</button>
          <button type="button" class="btn-cancel" id="btnCancel">취소</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 계약 돋보기 모달 -->
  <div class="modal-backdrop" id="contractModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">계약 검색</div>
        <button class="modal-close" type="button" id="btnCloseContractModal">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-search-row">
          <input type="text" id="contractModalKw" placeholder="계약번호 / 고객명 / 차량번호로 검색">
          <button type="button" id="btnContractModalSearch">검색</button>
        </div>

        <table class="modal-table">
          <thead>
            <tr>
              <th style="width:150px;">계약번호</th>
              <th style="width:200px;">고객명</th>
              <th style="width:140px;">차량번호</th>
              <th style="width:120px;">시작일</th>
              <th style="width:120px;">만기일</th>
              <th style="width:120px;">월렌트</th>
              <th style="width:80px;">선택</th>
            </tr>
          </thead>
          <tbody id="contractModalTbody">
            <tr><td colspan="7" style="text-align:center;padding:14px;">조회중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    function mustOk(res){
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      return res;
    }

    function todayISO(){
      return new Date().toISOString().split('T')[0];
    }

    function fmtKST(dt){
      if(!dt) return '-';
      return String(dt).replace('T',' ').slice(0,16);
    }

    const contractNoEl = document.getElementById('contractNo');
    const vehicleNoEl = document.getElementById('vehicleNo');
    const customerNameEl = document.getElementById('customerName');
    const consultDateEl = document.getElementById('consultDate');
    const consultContentEl = document.getElementById('consultContent');

    const historyCountEl = document.getElementById('historyCount');
    const historyBodyEl = document.getElementById('consultHistoryBody');

    // 초기 날짜
    window.addEventListener('DOMContentLoaded', () => {
      consultDateEl.value = todayISO();
    });

    // ===== 계약 요약 + 이력 로드 =====
    async function loadContractInfo(){
      const cn = contractNoEl.value.trim();
      if(!cn){
        clearContractInfo();
        return;
      }

      try{
        const res = await fetch(`${API_BASE_URL}/api/consultations/contract-summary?contractNumber=${encodeURIComponent(cn)}`);
        mustOk(res);
        const s = await res.json();

        vehicleNoEl.value = s.vehicleNo || '';
        customerNameEl.value = s.customerName || '';

        await loadHistory(cn);
      }catch(e){
        console.error(e);
        clearContractInfo();
        alert('계약 조회 실패: ' + e.message);
      }
    }

    async function loadHistory(contractNumber){
      historyBodyEl.innerHTML = `
        <tr><td colspan="5" class="no-data"><div class="no-data-icon">⏳</div><div>불러오는 중...</div></td></tr>
      `;

      const res = await fetch(`${API_BASE_URL}/api/consultations?contractNumber=${encodeURIComponent(contractNumber)}`);
      mustOk(res);
      const list = await res.json();

      historyCountEl.textContent = `총 ${list.length}건`;

      if(!list.length){
        historyBodyEl.innerHTML = `
          <tr>
            <td colspan="5" class="no-data">
              <div class="no-data-icon">📝</div>
              <div>등록된 상담 이력이 없습니다.</div>
            </td>
          </tr>
        `;
        return;
      }

      historyBodyEl.innerHTML = list.map((it, idx) => `
        <tr>
          <td class="text-center">${idx + 1}</td>
          <td class="date-cell">${it.consultDate ?? '-'}</td>
          <td class="content-cell">${escapeHtml(it.consultContent ?? '')}</td>
          <td class="date-cell text-muted">${fmtKST(it.createdAt)}</td>
          <td class="text-center">
            <button type="button" class="btn-delete" data-id="${it.id}">삭제</button>
          </td>
        </tr>
      `).join('');

      historyBodyEl.querySelectorAll('button[data-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          await deleteConsultation(id);
        });
      });
    }

    function clearContractInfo(){
      vehicleNoEl.value = '';
      customerNameEl.value = '';
      historyCountEl.textContent = '총 0건';
      historyBodyEl.innerHTML = `
        <tr>
          <td colspan="5" class="no-data">
            <div class="no-data-icon">📋</div>
            <div>계약번호를 입력하면 상담 이력이 표시됩니다.</div>
          </td>
        </tr>
      `;
    }

    function escapeHtml(s){
      return String(s ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    // 계약번호 입력 후 엔터/포커스아웃 시 조회
    contractNoEl.addEventListener('change', loadContractInfo);
    contractNoEl.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        loadContractInfo();
      }
    });

    // ===== 등록 =====
    async function addConsultation(){
      const cn = contractNoEl.value.trim();
      const d = consultDateEl.value;
      const content = consultContentEl.value.trim();

      if(!cn){ alert('계약번호를 입력해주세요.'); contractNoEl.focus(); return; }
      if(!d){ alert('상담일자를 입력해주세요.'); consultDateEl.focus(); return; }
      if(!content){ alert('상담내용을 입력해주세요.'); consultContentEl.focus(); return; }

      try{
        const resChk = await fetch(`${API_BASE_URL}/api/consultations/contract-summary?contractNumber=${encodeURIComponent(cn)}`);
        mustOk(resChk);

        const payload = { contractNumber: cn, consultDate: d, consultContent: content };

        const res = await fetch(`${API_BASE_URL}/api/consultations`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });
        mustOk(res);

        alert('상담 내역이 등록되었습니다.');
        consultContentEl.value = '';
        consultDateEl.value = todayISO();

        await loadContractInfo();
      }catch(e){
        console.error(e);
        alert('등록 실패: ' + e.message);
      }
    }

    // ===== 삭제 =====
    async function deleteConsultation(id){
      if(!confirm('이 상담 내역을 삭제하시겠습니까?')) return;
      try{
        const res = await fetch(`${API_BASE_URL}/api/consultations/${id}`, { method:'DELETE' });
        mustOk(res);
        alert('삭제 완료');
        await loadContractInfo();
      }catch(e){
        console.error(e);
        alert('삭제 실패: ' + e.message);
      }
    }

    // ===== 취소(초기화) =====
    function resetForm(){
      contractNoEl.value = '';
      consultContentEl.value = '';
      consultDateEl.value = todayISO();
      clearContractInfo();
      contractNoEl.focus();
    }

    document.getElementById('btnSubmit').addEventListener('click', addConsultation);
    document.getElementById('btnCancel').addEventListener('click', resetForm);

    // ===== 돋보기 모달: 계약 검색 =====
    const modalBackdrop = document.getElementById('contractModalBackdrop');
    const modalKw = document.getElementById('contractModalKw');
    const modalTbody = document.getElementById('contractModalTbody');

    async function openModal(){
      modalBackdrop.style.display = 'flex';
      modalKw.value = '';
      modalTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:14px;">조회중...</td></tr>`;
      setTimeout(() => modalKw.focus(), 30);

      // ✅ 돋보기 클릭 시 바로 전체조회
      await searchContracts();
    }

    function closeModal(){
      modalBackdrop.style.display = 'none';
    }

    document.getElementById('btnOpenContractModal').addEventListener('click', openModal);
    document.getElementById('btnCloseContractModal').addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', (e) => {
      if(e.target === modalBackdrop) closeModal();
    });

    async function searchContracts(){
      const kw = modalKw.value.trim();

      try{
        modalTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:14px;">검색중...</td></tr>`;
        const res = await fetch(`${API_BASE_URL}/api/contracts/search?kw=${encodeURIComponent(kw)}`);
        mustOk(res);
        const list = await res.json();

        if(!list.length){
          modalTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:14px;">검색 결과가 없습니다.</td></tr>`;
          return;
        }

        modalTbody.innerHTML = '';
        list.forEach(row => {
          const tr = document.createElement('tr');
          tr.className = 'row-pick';
          tr.innerHTML = `
            <td><span class="badge">${row.contractNumber ?? '-'}</span></td>
            <td>${row.customerName ?? '-'}</td>
            <td>${row.vehicleNo ?? '-'}</td>
            <td>${row.startDate ?? '-'}</td>
            <td>${row.endDate ?? '-'}</td>
            <td>${(row.monthlyRent ?? 0).toLocaleString()} 원</td>
            <td><button type="button" class="btn-small">선택</button></td>
          `;

          tr.addEventListener('click', async () => {
            contractNoEl.value = row.contractNumber || '';
            closeModal();
            await loadContractInfo();
          });

          modalTbody.appendChild(tr);
        });
      }catch(e){
        console.error(e);
        modalTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:14px;">조회 실패: ${e.message}</td></tr>`;
      }
    }

    document.getElementById('btnContractModalSearch').addEventListener('click', searchContracts);
    modalKw.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        searchContracts();
      }
    });
  </script>
</body>
</html>
