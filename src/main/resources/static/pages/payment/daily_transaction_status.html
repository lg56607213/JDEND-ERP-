<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일자별 입출금현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/payment/daily_transaction_status.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>일자별 입출금현황</h1>
      <p>수납관리 &gt; 은행관리 &gt; 일자별 입출금현황</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 검색 섹션 -->
        <div class="search-section">
          <div class="search-grid">
            <div class="form-group">
              <label for="searchStartDate">시작일</label>
              <input type="date" id="searchStartDate">
            </div>
            <div class="form-group">
              <label for="searchEndDate">종료일</label>
              <input type="date" id="searchEndDate">
            </div>
            <div class="form-group">
              <label>&nbsp;</label>
              <button type="button" class="btn-search" onclick="searchTransactions()">조회</button>
            </div>
          </div>
        </div>

        <!-- 요약 섹션 -->
        <div class="summary-section">
          <div class="summary-card bank">
            <h3>은행내역 총계</h3>
            <div class="value" id="bankTotal">₩ 0</div>
          </div>
          <div class="summary-card voucher">
            <h3>전표내역 총계</h3>
            <div class="value" id="voucherTotal">₩ 0</div>
          </div>
          <div class="summary-card difference">
            <h3>차이금액</h3>
            <div class="value" id="differenceTotal">₩ 0</div>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th rowspan="2" class="valign-middle">일자</th>
                <th colspan="2" class="section-header">은행내역</th>
                <th colspan="2" class="section-header">전표내역</th>
                <th colspan="2" class="section-header">비고</th>
              </tr>
              <tr>
                <th>입금</th>
                <th>출금</th>
                <th>입금</th>
                <th>출금</th>
                <th>입금</th>
                <th>출금</th>
              </tr>
            </thead>
            <tbody id="transactionTableBody">
              <!-- 데이터가 여기에 동적으로 추가됨 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script>
    // 샘플 거래 데이터
    const transactionData = [
      { date: '2025-11-01', bankDeposit: 100000, bankWithdraw: 0, voucherDeposit: 100000, voucherWithdraw: 0 },
      { date: '2025-11-02', bankDeposit: 0, bankWithdraw: 200000, voucherDeposit: 0, voucherWithdraw: 200000 },
      { date: '2025-11-03', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-04', bankDeposit: 200000, bankWithdraw: 200000, voucherDeposit: 150000, voucherWithdraw: 200000 },
      { date: '2025-11-05', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 50000, voucherWithdraw: 0 },
      { date: '2025-11-06', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-07', bankDeposit: 300000, bankWithdraw: 200000, voucherDeposit: 300000, voucherWithdraw: 200000 },
      { date: '2025-11-08', bankDeposit: 200000, bankWithdraw: 0, voucherDeposit: 200000, voucherWithdraw: 0 },
      { date: '2025-11-09', bankDeposit: 100000, bankWithdraw: 0, voucherDeposit: 100000, voucherWithdraw: 0 },
      { date: '2025-11-10', bankDeposit: 0, bankWithdraw: 300000, voucherDeposit: 0, voucherWithdraw: 300000 },
      { date: '2025-11-11', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-12', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-13', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-14', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-15', bankDeposit: 0, bankWithdraw: 400000, voucherDeposit: 0, voucherWithdraw: 400000 },
      { date: '2025-11-16', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-17', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-18', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-19', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-20', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-21', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-22', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-23', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-24', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-25', bankDeposit: 0, bankWithdraw: 500000, voucherDeposit: 0, voucherWithdraw: 500000 },
      { date: '2025-11-26', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-27', bankDeposit: 0, bankWithdraw: 0, voucherDeposit: 0, voucherWithdraw: 0 },
      { date: '2025-11-28', bankDeposit: 4000000, bankWithdraw: 0, voucherDeposit: 4000000, voucherWithdraw: 0 },
      { date: '2025-11-29', bankDeposit: 500000, bankWithdraw: 0, voucherDeposit: 500000, voucherWithdraw: 0 },
      { date: '2025-11-30', bankDeposit: 20000000, bankWithdraw: 4000000, voucherDeposit: 20000000, voucherWithdraw: 4000000 }
    ];

    // 페이지 로드 시 날짜 설정 및 데이터 표시
    window.addEventListener('load', function() {
      const today = new Date('2025-11-30');
      const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);

      document.getElementById('searchStartDate').value = startOfMonth.toISOString().split('T')[0];
      document.getElementById('searchEndDate').value = today.toISOString().split('T')[0];

      displayTransactions(transactionData);
      updateSummary(transactionData);
    });

    // 검색 함수
    function searchTransactions() {
      const startDate = new Date(document.getElementById('searchStartDate').value);
      const endDate = new Date(document.getElementById('searchEndDate').value);

      const filteredData = transactionData.filter(item => {
        const itemDate = new Date(item.date);
        return itemDate >= startDate && itemDate <= endDate;
      });

      displayTransactions(filteredData);
      updateSummary(filteredData);
    }

    // 거래 목록 표시
    function displayTransactions(data) {
      const tbody = document.getElementById('transactionTableBody');

      if (data.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="empty-state">
              검색 결과가 없습니다.
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = data.map(item => {
        const diffDeposit = item.bankDeposit - item.voucherDeposit;
        const diffWithdraw = item.bankWithdraw - item.voucherWithdraw;

        return `
          <tr>
            <td class="date-cell">${item.date}</td>
            <td class="amount-cell">${formatAmount(item.bankDeposit)}</td>
            <td class="amount-cell">${formatAmount(item.bankWithdraw)}</td>
            <td class="amount-cell">${formatAmount(item.voucherDeposit)}</td>
            <td class="amount-cell">${formatAmount(item.voucherWithdraw)}</td>
            <td class="amount-cell ${diffDeposit !== 0 ? 'difference-deposit' : ''}">${formatDifference(diffDeposit)}</td>
            <td class="amount-cell ${diffWithdraw !== 0 ? 'difference-withdraw' : ''}">${formatDifference(diffWithdraw)}</td>
          </tr>
        `;
      }).join('');
    }

    // 금액 포맷 함수
    function formatAmount(amount) {
      if (amount === 0) {
        return '<span class="empty-cell">-</span>';
      }
      return amount.toLocaleString();
    }

    // 차이 금액 포맷 함수
    function formatDifference(diff) {
      if (diff === 0) {
        return '<span class="empty-cell">-</span>';
      }
      return (diff > 0 ? '+' : '') + diff.toLocaleString();
    }

    // 요약 정보 업데이트
    function updateSummary(data) {
      let bankTotal = 0;
      let voucherTotal = 0;

      data.forEach(item => {
        bankTotal += (item.bankDeposit - item.bankWithdraw);
        voucherTotal += (item.voucherDeposit - item.voucherWithdraw);
      });

      const difference = bankTotal - voucherTotal;

      document.getElementById('bankTotal').textContent = '₩ ' + bankTotal.toLocaleString();
      document.getElementById('voucherTotal').textContent = '₩ ' + voucherTotal.toLocaleString();
      document.getElementById('differenceTotal').textContent = '₩ ' + difference.toLocaleString();
    }
  </script>
</body>
</html>
