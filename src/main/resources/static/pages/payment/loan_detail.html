<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차입금 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/payment/loan_status.css">
  <style>
    .card-header-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
    }
    .card-header-detail h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
    }
    .card-body-detail { padding: 20px; }
    .form-section { margin-bottom: 24px; }
    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e7eb;
    }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-item label { font-size: 0.85rem; color: #6b7280; font-weight: 500; }
    .detail-value {
      font-size: 0.95rem; color: #1f2937; font-weight: 500;
      padding: 8px 12px; background: #f9fafb; border-radius: 6px;
      min-height: 38px; display: flex; align-items: center;
    }
    .detail-value.amount { color: #dc2626; font-weight: 600; }
    .detail-value.rate { color: #2563eb; font-weight: 600; }
    .form-actions {
      display: flex; justify-content: center; gap: 12px; margin-top: 24px;
      padding-top: 20px; border-top: 1px solid #e5e7eb;
    }
    .btn {
      padding: 10px 24px; border-radius: 6px; font-size: 0.9rem;
      font-weight: 500; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #6b7280; color: white; }
    .btn-secondary:hover { background: #4b5563; }
    .hidden { display: none !important; }

    .form-group-column { display: flex; flex-direction: column; gap: 4px; }
    .form-group-column label { font-size: 0.85rem; color: #6b7280; font-weight: 500; }
    .form-input {
      padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 0.95rem; min-height: 38px;
    }
    .form-input:focus {
      outline: none; border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .schedule-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .schedule-table th, .schedule-table td {
      padding: 10px 12px; text-align: center; border: 1px solid #e5e7eb; font-size: 0.85rem;
    }
    .schedule-table th { background: #f8fafc; font-weight: 600; color: #374151; }
    .schedule-table tbody tr:hover { background: #f1f5f9; }
    .schedule-table .amount-cell { text-align: right; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>차입금 상세</h1>
      <p>수납관리 &gt; 차입금관리 &gt; 차입금현황 &gt; 상세보기</p>
    </div>

    <!-- 차입금 상세 정보 섹션 -->
    <div class="erp-card" id="loanDetailSection">
      <div class="card-header card-header-detail">
        <h2>차입금 상세 정보</h2>
        <button type="button" class="btn btn-secondary" onclick="goBack()">목록으로</button>
      </div>
      <div class="card-body card-body-detail">
        <!-- 계약 정보 섹션 -->
        <div class="form-section">
          <h3 class="section-title">계약 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>계약번호</label>
              <div class="detail-value" id="contractNo">-</div>
            </div>
            <div class="detail-item">
              <label>차량번호</label>
              <div class="detail-value" id="vehicleNo">-</div>
            </div>
          </div>
        </div>

        <!-- 차입금 정보 섹션 -->
        <div class="form-section">
          <h3 class="section-title">차입금 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>차입처</label>
              <div class="detail-value" id="lender">-</div>
            </div>
            <div class="detail-item">
              <label>최초차입금액</label>
              <div class="detail-value amount" id="initialAmount">-</div>
            </div>
            <div class="detail-item">
              <label>금리</label>
              <div class="detail-value rate" id="rate">-</div>
            </div>
            <div class="detail-item">
              <label>차입기간</label>
              <div class="detail-value" id="term">-</div>
            </div>
            <div class="detail-item">
              <label>월 원리금상환액</label>
              <div class="detail-value amount" id="monthlyPayment">-</div>
            </div>
            <div class="detail-item">
              <label>현재잔액(미회수원금)</label>
              <div class="detail-value amount" id="balance">-</div>
            </div>
            <div class="detail-item">
              <label>상환상태</label>
              <div class="detail-value" id="status">-</div>
            </div>
            <div class="detail-item">
              <label>최근차입금상환일</label>
              <div class="detail-value" id="lastPayDate">-</div>
            </div>
          </div>
        </div>

        <!-- 최근 전표(상환 내역) -->
        <div class="form-section">
          <h3 class="section-title">상환 스케줄 (최근 6회차)</h3>
          <table class="schedule-table">
            <thead>
              <tr>
                <th>No</th>
                <th>상환일</th>
                <th>금액</th>
                <th>메모</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>

        <!-- 수정하기 버튼 -->
        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="editLoanBtn">수정하기</button>
        </div>
      </div>
    </div>

    <!-- 차입금 수정 폼 섹션 (초기에는 숨김) -->
    <div class="erp-card hidden" id="loanEditSection">
      <div class="card-header card-header-detail">
        <h2>차입금 정보 수정</h2>
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">취소</button>
      </div>
      <div class="card-body card-body-detail">
        <form id="loanEditForm">
          <div class="form-section">
            <h3 class="section-title">계약 정보</h3>
            <div class="detail-grid">
              <div class="detail-item">
                <label>계약번호</label>
                <div class="detail-value" id="editContractNo">-</div>
              </div>
              <div class="detail-item">
                <label>차량번호</label>
                <div class="detail-value" id="editVehicleNo">-</div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">차입금 정보</h3>
            <div class="detail-grid">
              <div class="form-group-column">
                <label for="editLender">차입처</label>
                <input type="text" id="editLender" class="form-input" required>
              </div>

              <div class="form-group-column">
                <label for="editMonthlyPayment">월 원리금상환액</label>
                <input type="text" id="editMonthlyPayment" class="form-input" required>
              </div>

              <div class="form-group-column">
                <label for="editPaymentDay">매월상환일자</label>
                <input type="number" id="editPaymentDay" class="form-input" min="1" max="31" required>
              </div>

              <div class="form-group-column">
                <label for="editAccount">상환계좌</label>
                <input type="text" id="editAccount" class="form-input">
              </div>

              <div class="form-group-column">
                <label for="editBalance">현재잔액(미회수원금)</label>
                <input type="text" id="editBalance" class="form-input">
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="resetEditForm()">초기화</button>
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/html-escape.js"></script>
  <script>
   const API_BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");

    async function apiGet(path) {
      const res = await fetch(API_BASE + path, { headers: { "Accept": "application/json" } });
      if (!res.ok) throw new Error("HTTP " + res.status + " " + await res.text());
      return res.json();
    }
    async function apiJson(method, path, body) {
      const res = await fetch(API_BASE + path, {
        method,
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: body == null ? null : JSON.stringify(body)
      });
      if (!res.ok) throw new Error("HTTP " + res.status + " " + await res.text());
      if (res.status === 204) return null;
      const txt = await res.text();
      return txt ? JSON.parse(txt) : null;
    }

    function fmtMoney(v) {
      if (v == null) return "-";
      return Number(v).toLocaleString();
    }
    function digitsOnly(s) {
      return String(s ?? "").replace(/[^0-9]/g,'');
    }

    // URL에서 id 가져오기
    const urlParams = new URLSearchParams(window.location.search);
    const loanId = urlParams.get('id');

    const loanDetailSection = document.getElementById('loanDetailSection');
    const loanEditSection = document.getElementById('loanEditSection');
    const editLoanBtn = document.getElementById('editLoanBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    let current = null;

    async function loadLoanDetail() {
      if (!loanId) {
        alert("잘못된 접근입니다. (id 없음)");
        goBack();
        return;
      }

      const data = await apiGet(`/api/vehicle-loans/${loanId}`);
      current = data;

      document.getElementById('contractNo').textContent = data.makerContractNo || "-";
      document.getElementById('vehicleNo').textContent = data.vehicleNo || "-";

      document.getElementById('lender').textContent = data.financeName || "-";
      document.getElementById('initialAmount').textContent = (data.loanPrincipal != null ? fmtMoney(data.loanPrincipal) + "원" : "-");
      document.getElementById('rate').textContent = (data.loanInterest != null ? Number(data.loanInterest).toFixed(2) + "%" : "-");
      document.getElementById('term').textContent = (data.repaymentPeriod != null ? data.repaymentPeriod + "개월" : "-");
      document.getElementById('monthlyPayment').textContent = (data.monthlyPayment ? data.monthlyPayment : "-");
      document.getElementById('balance').textContent = (data.remainingPrincipal != null ? fmtMoney(data.remainingPrincipal) + "원" : "-");
      document.getElementById('status').textContent = (data.terminated ? "종료" : "상환중");
      document.getElementById('lastPayDate').textContent = data.lastPaymentDate || "-";

      // 최근 전표(6건)
      const tbody = document.getElementById('scheduleBody');
      const list = Array.isArray(data.recentVouchers) ? data.recentVouchers : [];
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="4" style="padding:14px; color:#64748b;">상환 내역이 없습니다.</td></tr>`;
      } else {
        tbody.innerHTML = list.map((v, idx) => `
          <tr>
            <td>${idx + 1}</td>
            <td>${v.voucherDate || "-"}</td>
            <td class="amount-cell">${v.amount != null ? fmtMoney(v.amount) : "-"}</td>
            <td>${escHtml(v.memo || "-")}</td>
          </tr>
        `).join('');
      }
    }

    // 수정하기 버튼
    editLoanBtn.addEventListener('click', function() {
      if (!current) return;

      document.getElementById('editContractNo').textContent = current.makerContractNo || "-";
      document.getElementById('editVehicleNo').textContent = current.vehicleNo || "-";

      document.getElementById('editLender').value = current.financeName || "";
      document.getElementById('editMonthlyPayment').value = digitsOnly(current.monthlyPayment) || "";
      document.getElementById('editPaymentDay').value = current.paymentDay ?? "";
      document.getElementById('editAccount').value = current.repaymentAccount || "";
      document.getElementById('editBalance').value = current.remainingPrincipal != null ? String(current.remainingPrincipal) : "";

      loanDetailSection.classList.add('hidden');
      loanEditSection.classList.remove('hidden');
    });

    cancelEditBtn.addEventListener('click', function() {
      if(confirm('수정을 취소하시겠습니까?')) {
        loanEditSection.classList.add('hidden');
        loanDetailSection.classList.remove('hidden');
      }
    });

    // 수정 폼 제출(PATCH)
    document.getElementById('loanEditForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!current) return;
      if(!confirm('수정하시겠습니까?')) return;

      // ✅ 서버가 PATCH로 받는 필드만 반영
      const patch = {
        paymentDay: document.getElementById('editPaymentDay').value ? Number(document.getElementById('editPaymentDay').value) : null,
        monthlyPayment: document.getElementById('editMonthlyPayment').value ? digitsOnly(document.getElementById('editMonthlyPayment').value) : null,
        repaymentAccount: document.getElementById('editAccount').value.trim() || null,
        remainingPrincipal: document.getElementById('editBalance').value ? Number(digitsOnly(document.getElementById('editBalance').value)) : null
      };

      await apiJson("PATCH", `/api/vehicle-loans/${loanId}`, patch);

      alert('수정되었습니다.');
      loanEditSection.classList.add('hidden');
      loanDetailSection.classList.remove('hidden');
      await loadLoanDetail();
    });

    function resetEditForm() {
      if(confirm('모든 입력 내용을 초기화하시겠습니까?')) {
        editLoanBtn.click();
      }
    }

    function goBack() {
      window.location.href = 'loan_status.html';
    }

    loadLoanDetail().catch(err => {
      console.error(err);
      alert("상세 로드 실패: " + err.message);
      goBack();
    });
  </script>
</body>
</html>
