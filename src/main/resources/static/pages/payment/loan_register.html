<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차입금등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/maintenance_status.css">
  <link rel="stylesheet" href="../../assets/css/payment/loan_register.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>차입금등록</h1>
      <p>수납관리 &gt; 차입금관리 &gt; 차입금등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 검색 섹션 -->
        <div class="search-section">
          <div class="search-grid">
            <div class="form-group">
              <label for="searchContract">계약번호</label>
              <input type="text" id="searchContract" placeholder="계약번호 검색">
            </div>
            <div class="form-group">
              <label for="searchVehicle">차량번호</label>
              <input type="text" id="searchVehicle" placeholder="차량번호 검색">
            </div>
            <div class="form-group">
              <label for="searchLender">차입처</label>
              <input type="text" id="searchLender" placeholder="차입처 검색">
            </div>
            <div class="form-group">
              <label>&nbsp;</label>
              <button type="button" class="btn-search" onclick="searchLoan()">조회</button>
            </div>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>계약번호</th>
                <th>차량번호</th>
                <th>차입처</th>
                <th>차입금액</th>
                <th>금리</th>
                <th>차입기간(월)</th>
                <th>원리금상환액</th>
                <th>차입금상환스케줄등록</th>
              </tr>
            </thead>
            <tbody id="loanTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/html-escape.js"></script>
  <script>
    const API_BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");

    async function apiGet(path) {
      const res = await fetch(API_BASE + path, { headers: { "Accept": "application/json" } });
      if (!res.ok) throw new Error("HTTP " + res.status + " " + await res.text());
      return res.json();
    }

    function fmtMoney(v) {
      if (v == null) return "-";
      return Number(v).toLocaleString();
    }

    async function searchLoan() {
      const contract = document.getElementById('searchContract').value.trim();
      const vehicle = document.getElementById('searchVehicle').value.trim();
      const lender = document.getElementById('searchLender').value.trim();

      const qs = new URLSearchParams();
      if (contract) qs.set("contractNo", contract);
      if (vehicle) qs.set("vehicleNo", vehicle);
      if (lender) qs.set("financeName", lender);

      const data = await apiGet("/api/vehicle-loans" + (qs.toString() ? "?" + qs.toString() : ""));
      displayLoan(Array.isArray(data) ? data : []);
    }

    function displayLoan(data) {
      const tbody = document.getElementById('loanTableBody');

      if (!data.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="9" class="no-data">
              <div class="no-data-icon">💰</div>
              <div>검색 결과가 없습니다.</div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = data.map((row, idx) => {
        const contractNo = row.makerContractNo || "-";
        const vehicleNo = row.vehicleNo || "-";
        const lender = row.financeName || "-";
        const loanAmount = fmtMoney(row.loanPrincipal);
        const rate = row.loanInterest != null ? Number(row.loanInterest).toFixed(2) + "%" : "-";
        const period = row.repaymentPeriod != null ? row.repaymentPeriod : "-";
        const monthlyPayment = row.monthlyPayment ? row.monthlyPayment : "-";

        return `
          <tr>
            <td>${idx + 1}</td>
            <td>${escHtml(contractNo)}</td>
            <td>${escHtml(vehicleNo)}</td>
            <td>${escHtml(lender)}</td>
            <td class="amount-cell">${loanAmount}</td>
            <td>${rate}</td>
            <td>${period}</td>
            <td class="amount-cell">${monthlyPayment}</td>
            <td><button class="btn-small btn-primary" onclick="registerSchedule(${row.id})">스케줄별등록</button></td>
          </tr>
        `;
      }).join('');
    }

    function registerSchedule(id) {
      // 너 퍼블리싱 문구는 "스케줄별등록"인데 실제 기능은
      // 지금 서버가 "선택건 전표 생성" 형태라 상세로 보내는게 현실적임
      window.location.href = `loan_detail.html?id=${id}`;
    }

    // 최초 전체 목록
    searchLoan().catch(err => {
      console.error(err);
      alert("목록 조회 실패: " + err.message);
    });
  </script>
</body>
</html>
