<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차입금스케줄조정 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <style>
    .search-row{display:flex;gap:12px;align-items:end;flex-wrap:wrap;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-group input{padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;}
    .input-with-icon{display:flex;gap:6px;align-items:center;}
    .btn-search-small{
      padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;
    }
    .btn{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;}
    .btn-primary{background:#2563eb;color:#fff;}
    .btn-secondary{background:#e5e7eb;color:#111827;}
    .erp-card{background:#fff;border-radius:12px;padding:20px;}
    .section-title{font-size:18px;font-weight:700;margin-bottom:14px;}
    .info-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:12px;margin-bottom:24px;}
    .info-box{border:1px solid #e5e7eb;border-radius:10px;padding:12px;background:#fafafa;}
    .info-box .label{font-size:12px;color:#6b7280;}
    .info-box .value{font-size:16px;font-weight:700;margin-top:4px;}
    .schedule-wrap{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
    .table-box{border:1px solid #e5e7eb;border-radius:10px;overflow:auto;max-height:650px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th,td{border-bottom:1px solid #eee;padding:8px;text-align:center;white-space:nowrap;}
    thead th{background:#f9fafb;position:sticky;top:0;}
    .amount{text-align:right;}
    .changed{color:#dc2626 !important;font-weight:700 !important;}
    .toolbar{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;}
    .editable{width:120px;padding:6px;border:1px solid #d1d5db;border-radius:6px;}
    .editable.money{width:110px;text-align:right;}
    .modal-backdrop{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.45);
      z-index:9999; align-items:center; justify-content:center;
      padding:20px;
    }
    .modal{
      width:min(980px, 96vw);
      max-height:84vh;
      background:#fff; border-radius:12px; overflow:hidden;
      box-shadow:0 12px 40px rgba(0,0,0,.25);
      display:flex; flex-direction:column;
    }
    .modal-header{
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 16px; border-bottom:1px solid #eee;
    }
    .modal-title{ font-weight:700; color:#111827; }
    .modal-close{
      border:1px solid #ddd; background:#fff; border-radius:8px;
      width:34px; height:34px; cursor:pointer;
    }
    .modal-body{ padding:14px 16px; overflow:auto; }
    .modal-search{ display:flex; gap:8px; margin-bottom:12px; }
    .modal-search input{
      flex:1; padding:10px 12px; border:1px solid #d1d5db;
      border-radius:10px; outline:none;
    }
    .modal-search button{
      padding:10px 14px; border:1px solid #d1d5db; background:#fff;
      border-radius:10px; cursor:pointer;
    }
    .pick-table{ width:100%; border-collapse:collapse; }
    .pick-table th, .pick-table td{
      border-bottom:1px solid #eee; padding:10px; text-align:left; font-size:14px;
    }
    .pick-table thead th{
      background:#f9fafb; position:sticky; top:0; z-index:1;
    }
  </style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>차입금스케줄조정</h1>
    <p>차량등록 &gt; 차량 차입금관리 &gt; 차입금스케줄조정</p>
  </div>

  <div class="erp-card">
    <div class="section-title">차량조회</div>
    <div class="search-row">
      <div class="form-group">
        <label for="vehicleNo">차량번호</label>
        <div class="input-with-icon">
          <input type="text" id="vehicleNo" placeholder="예: 123노1234">
          <button type="button" class="btn-search-small" onclick="openVehicleModal()">🔍</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="searchSchedule()">조회</button>
    </div>

    <div id="loanInfoSection" style="display:none; margin-top:24px;">
      <div class="section-title">차입금정보</div>
      <div class="info-grid">
        <div class="info-box"><div class="label">차량번호</div><div class="value" id="infoVehicleNo"></div></div>
        <div class="info-box"><div class="label">차량관리번호</div><div class="value" id="infoMgmtNo"></div></div>
        <div class="info-box"><div class="label">차입처</div><div class="value" id="infoFinanceName"></div></div>
        <div class="info-box"><div class="label">대출원금</div><div class="value" id="infoLoanPrincipal"></div></div>
        <div class="info-box"><div class="label">금리</div><div class="value" id="infoLoanInterest"></div></div>
        <div class="info-box"><div class="label">차입기간</div><div class="value" id="infoRepaymentPeriod"></div></div>
        <div class="info-box"><div class="label">월상환액</div><div class="value" id="infoMonthlyPayment"></div></div>
        <div class="info-box"><div class="label">상환일자</div><div class="value" id="infoPaymentDay"></div></div>
        <div class="info-box"><div class="label">상환계좌</div><div class="value" id="infoRepaymentAccount"></div></div>
      </div>

      <div class="schedule-wrap">
        <div>
          <div class="section-title">변경전 스케줄</div>
          <div class="table-box">
            <table>
              <thead>
              <tr>
                <th>회차</th>
                <th>상환일자</th>
                <th>월상환금액</th>
                <th>원금</th>
                <th>이자</th>
                <th>미회수원금</th>
                <th>상환계좌</th>
              </tr>
              </thead>
              <tbody id="beforeBody"></tbody>
            </table>
          </div>
        </div>

        <div>
          <div class="section-title">변경후 스케줄</div>
          <div class="table-box">
            <table>
              <thead>
              <tr>
                <th>회차</th>
                <th>상환일자</th>
                <th>월상환금액</th>
                <th>원금</th>
                <th>이자</th>
                <th>미회수원금</th>
              </tr>
              </thead>
              <tbody id="afterBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn btn-secondary" onclick="goBack()">돌아가기</button>
        <button class="btn btn-primary" onclick="saveSchedule()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="vehicleModalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">차입금 등록 차량 선택</div>
      <button type="button" class="modal-close" onclick="closeVehicleModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-search">
        <input type="text" id="vehicleKw" placeholder="차량번호/차량관리번호/차종/차입처">
        <button type="button" onclick="loadVehicles()">검색</button>
      </div>
      <table class="pick-table">
        <thead>
        <tr>
          <th>차량관리번호</th>
          <th>차량번호</th>
          <th>차종</th>
          <th>차입처</th>
          <th>선택</th>
        </tr>
        </thead>
        <tbody id="vehiclePickBody">
        <tr><td colspan="5" style="text-align:center;color:#888;">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/html-escape.js"></script>
<script>
  const API_BASE = API_BASE_URL;
  let originalSchedule = [];
  let adjustedSchedule = [];
  let currentLoanInfo = null;

  function fmtMoney(v){
    if(v === null || v === undefined) return '-';
    return Number(v).toLocaleString();
  }

  function compareAndClass(a, b){
    return String(a ?? '') !== String(b ?? '') ? 'changed' : '';
  }

  async function searchSchedule(){
    const vehicleNo = document.getElementById('vehicleNo').value.trim();
    if(!vehicleNo) return alert('차량번호를 입력해주세요.');

    try {
      const res = await fetch(`${API_BASE}/api/loan-schedule-adjust/by-vehicle-no/${encodeURIComponent(vehicleNo)}`);
      if(!res.ok){
        const t = await res.text();
        throw new Error(t);
      }

      const data = await res.json();
      currentLoanInfo = data;
      originalSchedule = data.originalSchedule || [];
      adjustedSchedule = JSON.parse(JSON.stringify(data.adjustedSchedule || []));

      document.getElementById('loanInfoSection').style.display = 'block';
      document.getElementById('infoVehicleNo').textContent = data.vehicleNo || '';
      document.getElementById('infoMgmtNo').textContent = data.vehicleMgmtNo || '';
      document.getElementById('infoFinanceName').textContent = data.financeName || '';
      document.getElementById('infoLoanPrincipal').textContent = fmtMoney(data.loanPrincipal);
      document.getElementById('infoLoanInterest').textContent = (data.loanInterest ?? 0) + '%';
      document.getElementById('infoRepaymentPeriod').textContent = (data.repaymentPeriod ?? 0) + '개월';
      document.getElementById('infoMonthlyPayment').textContent = data.monthlyPayment || '';
      document.getElementById('infoPaymentDay').textContent = (data.paymentDay ?? '') + '일';
      document.getElementById('infoRepaymentAccount').textContent = data.repaymentAccount || '';

      renderBefore();
      renderAfter();
    } catch (e) {
      alert('조회 실패: ' + e.message);
    }
  }

  function renderBefore(){
    const body = document.getElementById('beforeBody');
    body.innerHTML = '';

    originalSchedule.forEach(r=>{
      body.insertAdjacentHTML('beforeend', `
        <tr>
          <td>${r.installmentNo ?? ''}</td>
          <td>${r.paymentDate ?? '-'}</td>
          <td class="amount">${fmtMoney(r.monthlyPayment)}</td>
          <td class="amount">${fmtMoney(r.principalAmount)}</td>
          <td class="amount">${fmtMoney(r.interestAmount)}</td>
          <td class="amount">${fmtMoney(r.remainingPrincipal)}</td>
          <td>${escHtml(r.repaymentAccount ?? '-')}</td>
        </tr>
      `);
    });
  }

  function renderAfter(){
    const body = document.getElementById('afterBody');
    body.innerHTML = '';

    adjustedSchedule.forEach((r, idx)=>{
      const org = originalSchedule[idx] || {};

      body.insertAdjacentHTML('beforeend', `
        <tr>
          <td>${r.installmentNo ?? ''}</td>
          <td>
            ${r.installmentNo === 0
              ? `<span class="${compareAndClass(r.paymentDate, org.paymentDate)}">${r.paymentDate ?? '-'}</span>`
              : `<input type="date" class="editable ${compareAndClass(r.paymentDate, org.paymentDate)}" value="${r.paymentDate ?? ''}" onchange="changeDate(${idx}, this.value)">`
            }
          </td>
          <td>
            ${r.installmentNo === 0
              ? `<span class="${compareAndClass(r.monthlyPayment, org.monthlyPayment)}">${fmtMoney(r.monthlyPayment)}</span>`
              : `<input type="text" class="editable money ${compareAndClass(r.monthlyPayment, org.monthlyPayment)}" value="${r.monthlyPayment == null ? '' : Number(r.monthlyPayment).toLocaleString()}" oninput="formatMoneyInput(this)" onchange="changeMonthlyPayment(${idx}, this.value)">`
            }
          </td>
          <td class="amount ${compareAndClass(r.principalAmount, org.principalAmount)}">${fmtMoney(r.principalAmount)}</td>
          <td class="amount ${compareAndClass(r.interestAmount, org.interestAmount)}">${fmtMoney(r.interestAmount)}</td>
          <td class="amount ${compareAndClass(r.remainingPrincipal, org.remainingPrincipal)}">${fmtMoney(r.remainingPrincipal)}</td>
        </tr>
      `);
    });
  }

  function formatMoneyInput(el){
    const raw = String(el.value || '').replace(/[^\d]/g,'');
    el.value = raw ? Number(raw).toLocaleString() : '';
  }

  function changeDate(index, value){
    adjustedSchedule[index].paymentDate = value || null;
    renderAfter();
  }

  function changeMonthlyPayment(index, value){
    const num = Number(String(value || '').replace(/[^\d]/g, '')) || 0;
    adjustedSchedule[index].monthlyPayment = num;
    recalcFrom(index);
    renderAfter();
  }

  function recalcFrom(startIndex){
    if(!currentLoanInfo) return;

    const annualRate = Number(currentLoanInfo.loanInterest || 0);
    const monthlyRate = annualRate / 100 / 12;

    let prevBalance;
    if(startIndex <= 1){
      prevBalance = originalSchedule[0]?.remainingPrincipal || 0;
    }else{
      prevBalance = adjustedSchedule[startIndex - 1]?.remainingPrincipal || 0;
    }

    for(let i = startIndex; i < adjustedSchedule.length; i++){
      const row = adjustedSchedule[i];
      if(row.installmentNo === 0) continue;

      const pay = Number(row.monthlyPayment || 0);
      const interest = Math.round(prevBalance * monthlyRate);
      let principal = pay - interest;

      if(principal < 0) principal = 0;
      if(principal > prevBalance) principal = prevBalance;

      let remaining = prevBalance - principal;

      if(i === adjustedSchedule.length - 1){
        principal = prevBalance;
        row.principalAmount = principal;
        row.interestAmount = interest;
        row.monthlyPayment = principal + interest;
        row.remainingPrincipal = null;
        prevBalance = 0;
        continue;
      }

      row.interestAmount = interest;
      row.principalAmount = principal;
      row.remainingPrincipal = remaining === 0 ? null : remaining;

      prevBalance = remaining;
    }
  }

  async function saveSchedule(){
    if(!currentLoanInfo) return alert('먼저 차량 조회를 해주세요.');

    try {
      const res = await fetch(`${API_BASE}/api/loan-schedule-adjust`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          vehicleNo: currentLoanInfo.vehicleNo,
          adjustedSchedule
        })
      });

      if(!res.ok){
        const t = await res.text();
        throw new Error(t);
      }

      alert('저장되었습니다.');
      await searchSchedule();
    } catch (e) {
      alert('저장 실패: ' + e.message);
    }
  }

  function goBack(){
    history.back();
  }

  function openVehicleModal(){
    document.getElementById('vehicleModalBackdrop').style.display = 'flex';
    document.getElementById('vehicleKw').value = '';
    loadVehicles();
  }

  function closeVehicleModal(){
    document.getElementById('vehicleModalBackdrop').style.display = 'none';
  }

  async function loadVehicles(){
    const kw = document.getElementById('vehicleKw').value.trim();
    const body = document.getElementById('vehiclePickBody');

    try {
      const res = await fetch(`${API_BASE}/api/loan-schedule-adjust/picker?kw=${encodeURIComponent(kw)}`);
      if(!res.ok){
        throw new Error('차량 목록 조회 실패');
      }

      const list = await res.json();

      if(!list || list.length === 0){
        body.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#888;">조회 결과 없음</td></tr>`;
        return;
      }

      body.innerHTML = list.map(v => `
        <tr>
          <td>${escHtml(v.vehicleMgmtNo || '')}</td>
          <td>${escHtml(v.vehicleNo || '')}</td>
          <td>${escHtml(v.carModel || '')}</td>
          <td>${escHtml(v.financeName || '')}</td>
          <td><button type="button" class="btn-search-small" onclick="selectVehicle('${String(v.vehicleNo || '').replace(/'/g, "\\'")}')">선택</button></td>
        </tr>
      `).join('');
    } catch (e) {
      body.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#d00;">${e.message}</td></tr>`;
    }
  }

  function selectVehicle(vehicleNo){
    document.getElementById('vehicleNo').value = vehicleNo;
    closeVehicleModal();
    searchSchedule();
  }

  window.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(location.search);
    const qVehicleNo = params.get('vehicleNo');
    if (qVehicleNo) {
      document.getElementById('vehicleNo').value = qVehicleNo;
      await searchSchedule();
    }
  });
</script>
</body>
</html>
