<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차입금스케줄등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/payment/loan_schedule_register.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>차입금스케줄등록</h1>
      <p>차량등록 &gt; 차량 차입금관리 &gt; 차입금스케줄등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 차량조회 섹션 -->
        <div class="form-section">
          <h3 class="section-title">차량조회</h3>
          <div class="search-row">
            <div class="form-group">
              <label for="vehicleNo">차량번호</label>

              <div style="display:flex; gap:6px; align-items:center;">
                <input
                  type="text"
                  id="vehicleNo"
                  placeholder="차량번호 입력 또는 선택"
                  onchange="searchVehicle()"
                >
                <button
                  type="button"
                  class="btn-search-small"
                  title="차량번호 선택"
                  onclick="openVehicleNoSearch()"
                >🔍</button>
              </div>

              <small id="lookupHint" style="display:block; margin-top:6px; color:#666;"></small>
            </div>
          </div>
        </div>

        <!-- 대출정보 섹션 -->
        <div class="form-section" id="loanInfoSection" style="display: none;">
          <h3 class="section-title">대출정보</h3>

          <div class="loan-form-grid">
            <!-- 좌측 컬럼 -->
            <div class="loan-column">
              <div class="form-group">
                <label>대출구분 <span class="required">*</span></label>
                <div class="btn-toggle-group">
                  <button type="button" class="btn-toggle active" onclick="selectLoanType(this, '금융리스')">금융리스</button>
                  <button type="button" class="btn-toggle" onclick="selectLoanType(this, '할부')">할부</button>
                </div>
                <input type="hidden" id="loanType" value="금융리스">
              </div>

              <div class="form-group">
                <label for="financeName">금융사명 <span class="required">*</span></label>
                <input id="financeName" list="financeNameList" placeholder="금융사 선택 또는 직접입력" onchange="calculateMonthlyPayment()">
                <datalist id="financeNameList">
                  <option value="오릭스캐피탈"></option>
                  <option value="현대캐피탈"></option>
                  <option value="KB캐피탈"></option>
                  <option value="하나캐피탈"></option>
                  <option value="우리금융캐피탈"></option>
                  <option value="신한캐피탈"></option>
                  <option value="BNK캐피탈"></option>
                  <option value="DGB캐피탈"></option>
                </datalist>

                <small style="display:block; margin-top:6px; color:#999;">
                  * 목록에 없어도 그대로 입력하면 됩니다(직접입력).
                </small>
              </div>

              <div class="form-group">
                <label for="downPayment">선납금</label>
                <input type="text" id="downPayment" placeholder="0" value="0" oninput="formatNumber(this); calculateMonthlyPayment()">
              </div>

              <div class="form-group">
                <label for="deposit">보증금</label>
                <input type="text" id="deposit" placeholder="0" value="0" oninput="formatNumber(this); calculateMonthlyPayment()">
              </div>

              <div class="form-group">
                <label for="repaymentAccount">상환계좌 <span class="required">*</span></label>
                <input
                  type="text"
                  id="repaymentAccount"
                  placeholder="예: 국민6062 또는 국민은행 123-45-67890"
                >
                <small style="display:block; margin-top:6px; color:#999;">
                  * 상환계좌를 직접 입력하세요.
                </small>
              </div>
            </div>

            <!-- 우측 컬럼 -->
            <div class="loan-column">
              <div class="form-group">
                <label for="loanPrincipal">대출원금 <span class="required">*</span></label>
                <input type="text" id="loanPrincipal" placeholder="0" oninput="formatNumber(this); calculateMonthlyPayment()">
              </div>

              <div class="form-group">
                <label for="loanInterest">대출이자 <span class="required">*</span></label>
                <div class="input-with-unit">
                  <input type="number" id="loanInterest" placeholder="0.00" step="0.01" onchange="calculateMonthlyPayment()">
                  <span class="unit">%</span>
                </div>
              </div>

              <div class="form-group">
                <label for="repaymentMethod">상환방식 <span class="required">*</span></label>
                <select id="repaymentMethod" onchange="calculateMonthlyPayment()">
                  <option value="원리금균등상환" selected>원리금균등상환</option>
                  <option value="원금균등상환">원금균등상환</option>
                  <option value="만기일시상환">만기일시상환</option>
                </select>
              </div>

              <div class="form-group">
                <label for="repaymentPeriod">상환기간 <span class="required">*</span></label>
                <div class="input-with-unit">
                  <input type="number" id="repaymentPeriod" placeholder="48" value="48" onchange="calculateEndDate(); calculateMonthlyPayment()">
                  <span class="unit">개월</span>
                </div>
              </div>

              <div class="form-group">
                <label for="startDate">시작일 <span class="required">*</span></label>
                <input type="date" id="startDate" onchange="calculateEndDate()">
              </div>

              <div class="form-group">
                <label for="endDate">종료일</label>
                <input type="date" id="endDate" readonly>
              </div>

              <div class="form-group">
                <label for="paymentDay">매월 상환일자 <span class="required">*</span></label>
                <div class="input-with-unit">
                  <input type="number" id="paymentDay" placeholder="25" value="25" min="1" max="31">
                  <span class="unit">일</span>
                </div>
              </div>

              <div class="form-group">
                <label>월 납입금액</label>
                <input type="text" id="monthlyPayment" readonly class="highlight-field">
                <small id="calcHint" style="display:block; margin-top:6px; color:#666;"></small>
              </div>

              <div class="form-group">
                <label>월납입금액 처리</label>

                <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                  <select id="roundingMode" onchange="calculateMonthlyPayment()">
                    <option value="ROUND" selected>반올림</option>
                    <option value="CEIL">절상</option>
                    <option value="FLOOR">절사</option>
                  </select>

                  <select id="roundingUnit" onchange="calculateMonthlyPayment()">
                    <option value="1" selected>원단위</option>
                    <option value="10">십원단위</option>
                    <option value="100">백원단위</option>
                  </select>
                </div>

                <small style="display:block; margin-top:6px; color:#999;">
                  * 예: 절사 + 백원단위 = 123,456 → 123,400
                </small>
              </div>
            </div>
          </div>
        </div>

        <!-- 버튼 영역 -->
        <div class="form-actions" id="actionButtons" style="display: none;">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">초기화</button>
          <button type="button" class="btn btn-primary" onclick="registerLoanSchedule()">등록하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 차량번호 돋보기 모달 -->
  <div id="vehicleNoSearchModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:9999;">
    <div style="width:900px; max-width:92vw; background:#fff; margin:60px auto; padding:16px; border-radius:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">차량번호 선택</h3>
        <button type="button" onclick="closeVehicleNoSearch()">X</button>
      </div>

      <div style="display:flex; gap:8px; margin:12px 0;">
        <input type="text" id="vehicleNoSearchKeyword" placeholder="차량번호/차종/관리번호 검색" style="flex:1;">
        <button type="button" onclick="fetchVehicleNoList()">검색</button>
      </div>

      <div style="max-height:420px; overflow:auto; border:1px solid #ddd; border-radius:8px;">
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="background:#f5f5f5;">
              <th style="padding:10px; border-bottom:1px solid #ddd;">차량번호</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">차량관리번호</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">차종</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">상태</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleNoSearchBody"></tbody>
        </table>
      </div>

      <div style="margin-top:10px; font-size:12px; color:#666;">
        * 여기 목록은 <b>실행완료</b> 차량 중 <b>차입금 미등록 차량만</b> 보여줍니다.
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/html-escape.js"></script>
  <script>
    const API_BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");
    let lookedUp = null;

    function apiUrl(path) {
      const normalizedPath = path.startsWith("/") ? path : "/" + path;
      return API_BASE + normalizedPath;
    }

    function openVehicleNoSearch() {
      document.getElementById('vehicleNoSearchModal').style.display = 'block';
      document.getElementById('vehicleNoSearchKeyword').value = '';
      fetchVehicleNoList();
    }

    function closeVehicleNoSearch() {
      document.getElementById('vehicleNoSearchModal').style.display = 'none';
    }

    async function hasActiveLoan(vehicleNo) {
      const normalized = String(vehicleNo || '').trim().replace(/\s+/g, '').replace(/-/g, '');
      if (!normalized) return false;

      try {
        const res = await fetch(apiUrl(`/api/vehicle-loans/by-vehicle-no/${encodeURIComponent(normalized)}`));
        if (!res.ok) {
          return false;
        }

        const loan = await res.json();

        if (!loan || !loan.id) return false;
        if (loan.terminated === true) return false;

        return true;
      } catch (e) {
        console.warn('차입금 여부 확인 실패:', e);
        return false;
      }
    }

    async function fetchVehicleNoList() {
      const kw = document.getElementById('vehicleNoSearchKeyword').value.trim();

      try {
        const url = new URL(apiUrl('/api/vehicle-orders'), window.location.origin);
        url.searchParams.set('status', '실행완료');

        const res = await fetch(url.toString());
        if (!res.ok) {
          return alert('차량 목록 조회 실패: ' + res.status + '\\nGET /api/vehicle-orders?status=실행완료');
        }

        let list = await res.json();
        if (!Array.isArray(list)) list = [];

        let filtered = list.filter(v =>
          v.vehicleNo &&
          String(v.vehicleNo).trim() !== '' &&
          v.vehicleNo !== '-'
        );

        if (kw) {
          const keyword = kw.toLowerCase();
          filtered = filtered.filter(v => {
            const vehicleNo = (v.vehicleNo || '').toLowerCase();
            const mgmtNo = (v.vehicleMgmtNo || '').toLowerCase();
            const carModel = (v.carModel || '').toLowerCase();
            return vehicleNo.includes(keyword) || mgmtNo.includes(keyword) || carModel.includes(keyword);
          });
        }

        const checked = await Promise.all(
          filtered.map(async (v) => {
            const activeLoan = await hasActiveLoan(v.vehicleNo);
            return { vehicle: v, activeLoan };
          })
        );

        filtered = checked
          .filter(x => !x.activeLoan)
          .map(x => x.vehicle);

        const tbody = document.getElementById('vehicleNoSearchBody');
        tbody.innerHTML = '';

        if (filtered.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="5" style="padding:14px; text-align:center; color:#666;">
                조회 가능한 차량이 없습니다.<br>
                <small>(실행완료 + 차량번호 있음 + 차입금 미등록 차량만 표시)</small>
              </td>
            </tr>
          `;
          return;
        }

        filtered.forEach(v => {
          const tr = document.createElement('tr');
          const safeVehicleNo = String(v.vehicleNo ?? '').replace(/'/g, "\\\\'");
          tr.innerHTML = `
            <td style="padding:10px; border-bottom:1px solid #eee;">${escHtml(v.vehicleNo ?? '')}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${escHtml(v.vehicleMgmtNo ?? '')}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${escHtml(v.carModel ?? '')}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.orderStatus ?? '-'}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">
              <button type="button" onclick="selectVehicleNo('${safeVehicleNo}')">선택</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        alert('차량 목록 조회 중 오류: ' + e.message);
      }
    }

    async function selectVehicleNo(vehicleNo) {
      document.getElementById('vehicleNo').value = vehicleNo;
      closeVehicleNoSearch();
      await searchVehicle();
    }

    function formatNumber(input) {
      let value = input.value.replace(/[^0-9]/g, '');
      input.value = value ? parseInt(value, 10).toLocaleString() : '';
    }

    function selectLoanType(btn, type) {
      document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('loanType').value = type;
    }

    function calculateEndDate() {
      const startDate = document.getElementById('startDate').value;
      const period = parseInt(document.getElementById('repaymentPeriod').value, 10) || 48;

      if (startDate) {
        const start = new Date(startDate);
        start.setMonth(start.getMonth() + period);
        start.setDate(start.getDate() - 1);
        document.getElementById('endDate').value = start.toISOString().split('T')[0];
      }
    }

    function pmt(rate, nper, pv, fv, type) {
      if (nper === 0) return 0;
      if (rate === 0) return -(pv + fv) / nper;

      const r1 = Math.pow(1 + rate, nper);
      return -(rate * (pv * r1 + fv)) / ((r1 - 1) * (1 + rate * (type || 0)));
    }

    function applyRounding(amount, mode, unit) {
      const u = unit || 1;
      if (u <= 0) return Math.round(amount);

      const x = amount / u;
      if (mode === 'CEIL') return Math.ceil(x) * u;
      if (mode === 'FLOOR') return Math.floor(x) * u;
      return Math.round(x) * u;
    }

    function calculateMonthlyPayment() {
      const principalStr = document.getElementById('loanPrincipal').value;
      const principal = parseInt((principalStr || '').replace(/,/g, ''), 10) || 0;

      const annualRate = parseFloat(document.getElementById('loanInterest').value) || 0;
      const months = parseInt(document.getElementById('repaymentPeriod').value, 10) || 48;
      const method = document.getElementById('repaymentMethod').value;

      const downPayment = parseInt((document.getElementById('downPayment').value || '0').replace(/,/g,''), 10) || 0;
      const deposit = parseInt((document.getElementById('deposit').value || '0').replace(/,/g,''), 10) || 0;

      const roundingMode = document.getElementById('roundingMode').value;
      const roundingUnit = parseInt(document.getElementById('roundingUnit').value, 10) || 1;

      const hint = document.getElementById('calcHint');

      let monthlyPayment = 0;
      hint.textContent = '';

      if (!(principal > 0 && annualRate >= 0 && months > 0)) {
        document.getElementById('monthlyPayment').value = '';
        return;
      }

      const monthlyRate = annualRate / 100 / 12;
      const fv = 0;
      const type = 0;

      if (method === '원리금균등상환') {
        if (downPayment > 0 && deposit > 0) {
          monthlyPayment = pmt(monthlyRate, months, (-principal + downPayment), fv, type);
          hint.textContent = '선납금/보증금 모두 입력됨 → 선납금 기준으로 계산 적용';
        } else if (downPayment > 0) {
          monthlyPayment = pmt(monthlyRate, months, (-principal + downPayment), fv, type);
          hint.textContent = '선납금 적용: PMT(rate, nper, -pv+선납금, fv, 후불)';
        } else if (deposit > 0) {
          monthlyPayment = pmt(monthlyRate, months, (-principal + deposit), (fv - deposit), type);
          hint.textContent = '보증금 적용: PMT(rate, nper, -pv+보증금, fv-보증금, 후불)';
        } else {
          monthlyPayment = pmt(monthlyRate, months, (-principal), fv, type);
          hint.textContent = '기본 PMT 적용: PMT(rate, nper, pv, fv, 후불)';
        }
      } else if (method === '원금균등상환') {
        const principalPayment = principal / months;
        const interestPayment = principal * monthlyRate;
        monthlyPayment = principalPayment + interestPayment;
        hint.textContent = '원금균등상환은 첫달 기준으로 표시';
      } else if (method === '만기일시상환') {
        monthlyPayment = principal * monthlyRate;
        hint.textContent = '만기일시상환은 이자만 표시';
      }

      monthlyPayment = applyRounding(monthlyPayment, roundingMode, roundingUnit);

      if (!isFinite(monthlyPayment) || monthlyPayment < 0) monthlyPayment = 0;

      document.getElementById('monthlyPayment').value = '₩' + Math.trunc(monthlyPayment).toLocaleString();
    }

    async function searchVehicle() {
      const hint = document.getElementById('lookupHint');
      hint.textContent = '';

      let vehicleNo = document.getElementById('vehicleNo').value || '';
      vehicleNo = vehicleNo.trim().replace(/\s+/g, '').replace(/-/g, '');
      document.getElementById('vehicleNo').value = vehicleNo;

      if (!vehicleNo) {
        alert('차량번호를 입력해주세요.');
        return;
      }

      try {
        const res = await fetch(apiUrl(`/api/vehicle-orders/by-vehicle-no/${encodeURIComponent(vehicleNo)}`));
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`HTTP ${res.status} - ${txt}`);
        }

        lookedUp = await res.json();

        if (lookedUp.orderStatus !== '실행완료') {
          lookedUp = null;
          alert('실행완료 차량만 차입금 스케줄 등록이 가능합니다.');
          document.getElementById('loanInfoSection').style.display = 'none';
          document.getElementById('actionButtons').style.display = 'none';
          return;
        }

        const activeLoan = await hasActiveLoan(vehicleNo);
        if (activeLoan) {
          lookedUp = null;
          alert('이미 차입금이 등록된 차량입니다.\\n차입금 미등록 차량만 스케줄 등록 가능합니다.');
          document.getElementById('loanInfoSection').style.display = 'none';
          document.getElementById('actionButtons').style.display = 'none';
          return;
        }

        hint.textContent = `관리번호: ${lookedUp.vehicleMgmtNo} / 상태: ${lookedUp.orderStatus} / 차종: ${lookedUp.carModel || '-'}`;

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = today;
        calculateEndDate();

        document.getElementById('loanInfoSection').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';

        calculateMonthlyPayment();
      } catch (e) {
        lookedUp = null;
        alert('해당 차량번호를 찾을 수 없습니다.\\n\\n' + e.message);
        document.getElementById('loanInfoSection').style.display = 'none';
        document.getElementById('actionButtons').style.display = 'none';
      }
    }

    function resetForm() {
      if (confirm('모든 입력 내용을 초기화하시겠습니까?')) {
        document.getElementById('loanPrincipal').value = '';
        document.getElementById('loanInterest').value = '';
        document.getElementById('financeName').value = '';
        document.getElementById('repaymentMethod').value = '원리금균등상환';
        document.getElementById('repaymentPeriod').value = '48';
        document.getElementById('downPayment').value = '0';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('deposit').value = '0';
        document.getElementById('paymentDay').value = '25';
        document.getElementById('monthlyPayment').value = '';
        document.getElementById('repaymentAccount').value = '';
        document.getElementById('roundingMode').value = 'ROUND';
        document.getElementById('roundingUnit').value = '1';
        document.getElementById('calcHint').textContent = '';

        document.querySelectorAll('.btn-toggle').forEach((b, i) => {
          if (i === 0) b.classList.add('active');
          else b.classList.remove('active');
        });
        document.getElementById('loanType').value = '금융리스';
      }
    }

    async function registerLoanSchedule() {
      if (!lookedUp || !lookedUp.vehicleMgmtNo) {
        alert('먼저 차량번호 조회를 해주세요.');
        return;
      }

      const activeLoan = await hasActiveLoan(lookedUp.vehicleNo);
      if (activeLoan) {
        return alert('이미 차입금이 등록된 차량입니다.\\n중복 등록할 수 없습니다.');
      }

      const loanPrincipalStr = document.getElementById('loanPrincipal').value;
      const loanPrincipal = parseInt((loanPrincipalStr || '').replace(/,/g, ''), 10) || 0;

      const loanInterestVal = document.getElementById('loanInterest').value;
      const loanInterest = loanInterestVal === '' ? NaN : parseFloat(loanInterestVal);

      const financeName = document.getElementById('financeName').value;
      const repaymentMethod = document.getElementById('repaymentMethod').value;
      const repaymentPeriod = parseInt(document.getElementById('repaymentPeriod').value, 10) || 0;

      const downPayment = parseInt((document.getElementById('downPayment').value || '0').replace(/,/g,''), 10) || 0;
      const deposit = parseInt((document.getElementById('deposit').value || '0').replace(/,/g,''), 10) || 0;

      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      const paymentDay = parseInt(document.getElementById('paymentDay').value, 10) || 0;
      const monthlyPayment = document.getElementById('monthlyPayment').value;

      const repaymentAccount = document.getElementById('repaymentAccount').value.trim();

      if (!loanPrincipal || loanPrincipal <= 0) return alert('대출원금을 입력해주세요.');
      if (isNaN(loanInterest)) return alert('대출이자를 입력해주세요.');
      if (!financeName) return alert('금융사명을 입력/선택해주세요.');
      if (!startDate) return alert('시작일을 입력해주세요.');
      if (!repaymentMethod) return alert('상환방식을 선택해주세요.');
      if (!repaymentPeriod || repaymentPeriod <= 0) return alert('상환기간을 입력해주세요.');
      if (!paymentDay || paymentDay < 1 || paymentDay > 31) return alert('매월 상환일자(1~31)를 입력해주세요.');
      if (!repaymentAccount) return alert('상환계좌를 입력해주세요.');

      const payload = {
        loanType: document.getElementById('loanType').value,
        loanPrincipal,
        loanInterest,
        financeName,
        repaymentMethod,
        repaymentPeriod,
        downPayment,
        startDate,
        endDate: endDate || null,
        deposit,
        paymentDay,
        monthlyPayment,
        repaymentAccount
      };

      if (!confirm(`차량번호 ${lookedUp.vehicleNo} (관리번호 ${lookedUp.vehicleMgmtNo})\\n차입금 스케줄을 등록(=실행)하시겠습니까?`)) return;

      try {
        const res = await fetch(apiUrl(`/api/vehicle-orders/${encodeURIComponent(lookedUp.vehicleMgmtNo)}/execute`), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          let errMsg = `HTTP ${res.status}`;
          try {
            const errJson = await res.json();
            errMsg = errJson.message || errMsg;
          } catch (_) {
            errMsg = (await res.text()) || errMsg;
          }
          throw new Error(errMsg);
        }

        const result = await res.json();
        alert(`등록 완료!\\n상태: ${result.orderStatus}\\nloanId: ${result.loanId}\\n\\n차입금현황으로 이동합니다.`);
        window.location.href = 'loan_status.html';
      } catch (e) {
        alert("등록 실패: " + e.message);
      }
    }
  </script>
</body>
</html>
