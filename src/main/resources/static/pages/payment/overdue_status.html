<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연체현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <style>
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-bar input {
      height: 36px;
      padding: 0 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      min-width: 200px;
    }

    .summary-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .summary-chip {
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }
    .summary-chip span { font-weight: 800; margin-left: 4px; }
    .summary-chip.danger { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .summary-chip.danger span { color: #dc2626; }

    .overdue-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .overdue-table th, .overdue-table td {
      padding: 10px 11px;
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
    }
    .overdue-table th {
      background: #f8fafc;
      font-weight: 700;
      text-align: center;
    }
    .overdue-table td { text-align: center; }
    .overdue-table td.left { text-align: left; }
    .overdue-table td.right { text-align: right; }
    .overdue-table tbody tr:hover { background: #fff5f5; }

    .days-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .days-low    { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
    .days-mid    { background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
    .days-high   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .days-severe { background: #991b1b; color: #ffffff; }

    @media (prefers-color-scheme: dark) {
      .overdue-table th  { background: #1e293b; }
      .overdue-table tbody tr:hover { background: #2d1515; }
      .summary-chip { background: #1e293b; border-color: #334155; }
      .summary-chip.danger { background: #2d1515; border-color: #7f1d1d; color: #fca5a5; }
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>연체현황</h1>
      <p>수납관리 &gt; 연체현황</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <div class="filter-bar">
          <input type="text" id="filterKeyword" placeholder="계약번호 / 차량번호 / 계약자명 검색">
          <button type="button" class="btn btn-primary" onclick="applyFilter()">조회</button>
          <button type="button" class="btn btn-secondary" onclick="resetFilter()">초기화</button>
          <button type="button" class="btn-excel" onclick="exportTableToExcel('overdueTableBody', '연체현황')">엑셀 내보내기</button>
        </div>

        <div class="summary-bar" id="summaryBar"></div>

        <div style="overflow-x:auto;">
          <table class="overdue-table">
            <thead>
              <tr>
                <th>순번</th>
                <th>계약번호</th>
                <th>차량번호</th>
                <th class="left">계약자명</th>
                <th>회차</th>
                <th>납기일</th>
                <th>렌탈료</th>
                <th>납부금액</th>
                <th>미납금액</th>
                <th>연체일수</th>
              </tr>
            </thead>
            <tbody id="overdueTableBody">
              <tr><td colspan="10" style="padding:20px;color:#94a3b8;">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/html-escape.js"></script>
  <script>
    const API_BASE = (typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : '').replace(/\/+$/, '');

    let allData = [];
    let filtered = [];

    function fmtMoney(v) {
      if (v == null) return '-';
      return Number(v).toLocaleString() + '원';
    }

    function daysBadge(days) {
      let cls = 'days-low';
      if (days >= 90)      cls = 'days-severe';
      else if (days >= 30) cls = 'days-high';
      else if (days >= 14) cls = 'days-mid';
      return `<span class="days-badge ${cls}">${days}일</span>`;
    }

    function renderSummary(data) {
      const totalUnpaid = data.reduce((s, r) => s + (r.unpaidAmount || 0), 0);
      const contracts = new Set(data.map(r => r.contractNumber)).size;
      document.getElementById('summaryBar').innerHTML = `
        <div class="summary-chip danger">연체 건수<span>${data.length}건</span></div>
        <div class="summary-chip danger">연체 계약 수<span>${contracts}건</span></div>
        <div class="summary-chip danger">총 미납금액<span>${totalUnpaid.toLocaleString()}원</span></div>
      `;
    }

    function renderTable(data) {
      const tbody = document.getElementById('overdueTableBody');
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="10" style="padding:18px;color:#94a3b8;">연체 내역이 없습니다.</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${escHtml(r.contractNumber ?? '-')}</td>
          <td>${escHtml(r.vehicleNo ?? '-')}</td>
          <td class="left">${escHtml(r.customerName ?? '-')}</td>
          <td>${r.installmentNo ?? '-'}회</td>
          <td>${r.paymentDate ?? '-'}</td>
          <td class="right">${fmtMoney(r.rentAmount)}</td>
          <td class="right">${fmtMoney(r.paidAmount)}</td>
          <td class="right" style="color:#dc2626;font-weight:700;">${fmtMoney(r.unpaidAmount)}</td>
          <td>${daysBadge(r.overdueDays ?? 0)}</td>
        </tr>
      `).join('');
    }

    function applyFilter() {
      const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();
      filtered = allData.filter(r => {
        if (!kw) return true;
        return (
          (r.contractNumber ?? '').toLowerCase().includes(kw) ||
          (r.vehicleNo ?? '').toLowerCase().includes(kw) ||
          (r.customerName ?? '').toLowerCase().includes(kw)
        );
      });
      renderSummary(filtered);
      renderTable(filtered);
    }

    function resetFilter() {
      document.getElementById('filterKeyword').value = '';
      filtered = [...allData];
      renderSummary(filtered);
      renderTable(filtered);
    }

    document.getElementById('filterKeyword').addEventListener('keydown', e => {
      if (e.key === 'Enter') applyFilter();
    });

    async function load() {
      try {
        const res = await fetch(API_BASE + '/api/overdue');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allData = await res.json();
        filtered = [...allData];
        renderSummary(filtered);
        renderTable(filtered);
      } catch (e) {
        document.getElementById('overdueTableBody').innerHTML =
          `<tr><td colspan="10" style="padding:18px;color:#dc2626;">로드 실패: ${e.message}</td></tr>`;
      }
    }

    load();
  </script>
  <script src="../../assets/js/excel-export.js"></script>
</body>
</html>
