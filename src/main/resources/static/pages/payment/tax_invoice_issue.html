<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세금계산서 발행 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <style>
    .search-bar {
      display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 18px;
    }
    .search-bar .field { display: flex; flex-direction: column; gap: 4px; }
    .search-bar label { font-size: 12px; font-weight: 600; color: #374151; }
    .search-bar input, .search-bar select {
      height: 36px; padding: 0 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 13px; min-width: 140px;
    }

    .summary-bar {
      display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .summary-chip {
      padding: 5px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
      background: #f8fafc; border: 1px solid #e5e7eb;
    }
    .summary-chip span { font-weight: 800; margin-left: 4px; }

    .pagination-bar {
      display: flex; gap: 6px; align-items: center; justify-content: space-between;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    .pagination-bar .page-info { font-size: 13px; color: #6b7280; }
    .page-btns { display: flex; gap: 6px; }
    .page-btn {
      padding: 5px 12px; border: 1px solid #d1d5db; background: #fff;
      border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    .page-btn:hover { background: #f3f4f6; }
    .page-btn.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    .tax-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .tax-table th, .tax-table td {
      padding: 8px 9px; border-bottom: 1px solid #e5e7eb; white-space: nowrap;
    }
    .tax-table th { background: #f8fafc; font-weight: 700; text-align: center; }
    .tax-table td { text-align: center; }
    .tax-table td.left { text-align: left; }
    .tax-table td.right { text-align: right; }
    .tax-table tbody tr:hover { background: #f0f7ff; }
    .req { color: #dc2626; font-weight: 700; }  /* 주황 필수 컬럼 강조 */

    .download-bar {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .btn-download {
      padding: 9px 18px; background: #16a34a; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-download:hover { background: #15803d; }
    .btn-download:disabled { background: #9ca3af; cursor: default; }
    .page-download-note { font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>세금계산서 발행</h1>
      <p>수납관리 &gt; 청구관리 &gt; 세금계산서 발행</p>
    </div>

    <div class="erp-card">
      <div class="card-body">

        <!-- 검색 바 -->
        <div class="search-bar">
          <div class="field">
            <label>세금계산서 발행일자 (시작)</label>
            <input type="date" id="taxStart">
          </div>
          <div class="field">
            <label>세금계산서 발행일자 (종료)</label>
            <input type="date" id="taxEnd">
          </div>
          <div class="field">
            <label>발행 유형</label>
            <select id="issueType">
              <option value="all">전체 발행</option>
              <option value="individual">개별 발행</option>
            </select>
          </div>
          <div class="field" id="customerField" style="display:none;">
            <label>고객번호</label>
            <input type="text" id="customerNumber" placeholder="예) C001">
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="btn btn-primary" id="btnSearch">조회</button>
          </div>
        </div>

        <!-- 요약 -->
        <div class="summary-bar" id="summaryBar" style="display:none;"></div>

        <!-- 다운로드 + 페이지 바 -->
        <div class="pagination-bar" id="paginationTopBar" style="display:none;">
          <div class="page-info" id="pageInfo"></div>
          <div class="download-bar">
            <button type="button" class="btn-download" id="btnDownload" disabled>
              현재 페이지 엑셀 다운로드 (50건)
            </button>
            <span class="page-download-note">※ 국세청 양식 그대로 다운로드 → 바로 업로드 가능</span>
          </div>
        </div>

        <!-- 페이지 버튼 -->
        <div class="page-btns" id="pageBtns" style="margin-bottom:10px;"></div>

        <!-- 미리보기 테이블 -->
        <div style="overflow-x:auto;">
          <table class="tax-table">
            <thead>
              <tr>
                <th>순번</th>
                <th class="req">작성일자</th>
                <th class="req">계약번호</th>
                <th>회차</th>
                <th>차량번호</th>
                <th class="left">차종</th>
                <th class="req">공급받는자 상호</th>
                <th class="req">공급받는자 성명</th>
                <th class="req">사업자등록번호</th>
                <th>주소</th>
                <th>업태</th>
                <th>종목</th>
                <th>이메일</th>
                <th class="req right">공급가액</th>
                <th class="req right">세액</th>
                <th class="right">합계</th>
              </tr>
            </thead>
            <tbody id="taxTableBody">
              <tr><td colspan="16" style="padding:24px;color:#94a3b8;">위 검색 조건을 입력 후 조회를 눌러주세요.</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const BASE = (typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : '').replace(/\/+$/, '');
    const PAGE_SIZE = 50;

    let allRows = [];
    let currentPage = 0;

    // 초기 날짜 설정 (이번 달)
    window.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2, '0');
      document.getElementById('taxStart').value = `${y}-${m}-01`;
      document.getElementById('taxEnd').value   = `${y}-${m}-${new Date(y, now.getMonth()+1, 0).getDate().toString().padStart(2,'0')}`;
    });

    document.getElementById('issueType').addEventListener('change', function() {
      document.getElementById('customerField').style.display = this.value === 'individual' ? '' : 'none';
    });

    function fmtMoney(v) {
      if (v == null) return '-';
      return Number(v).toLocaleString();
    }

    function escHtml(s) {
      return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
    }

    function renderPage(page) {
      currentPage = page;
      const from = page * PAGE_SIZE;
      const to   = Math.min(from + PAGE_SIZE, allRows.length);
      const pageRows = allRows.slice(from, to);
      const total = allRows.length;
      const totalPages = Math.ceil(total / PAGE_SIZE);

      // 페이지 정보
      document.getElementById('pageInfo').textContent =
        `${from + 1} ~ ${to} / 전체 ${total}건 (${page + 1}/${totalPages} 페이지)`;

      // 다운로드 버튼 활성화
      document.getElementById('btnDownload').disabled = pageRows.length === 0;

      // 페이지 버튼
      const btns = document.getElementById('pageBtns');
      btns.innerHTML = '';
      for (let p = 0; p < totalPages; p++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (p === page ? ' active' : '');
        btn.textContent = p + 1;
        btn.addEventListener('click', () => renderPage(p));
        btns.appendChild(btn);
      }

      // 테이블 렌더링
      const tbody = document.getElementById('taxTableBody');
      if (!pageRows.length) {
        tbody.innerHTML = `<tr><td colspan="16" style="padding:18px;color:#94a3b8;">데이터가 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = pageRows.map((r, i) => `
        <tr>
          <td>${from + i + 1}</td>
          <td>${r.taxInvoiceDate ?? '-'}</td>
          <td>${escHtml(r.contractNumber ?? '-')}</td>
          <td>${r.installmentNo ?? '-'}회</td>
          <td>${escHtml(r.vehicleNo ?? '-')}</td>
          <td class="left">${escHtml(r.vehicleModel ?? '-')}</td>
          <td>${escHtml(r.customerName ?? '-')}</td>
          <td>${escHtml(r.ceo ?? '-')}</td>
          <td>${escHtml(r.registrationNumber ?? '-')}</td>
          <td class="left" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;" title="${escHtml(r.address ?? '')}">${escHtml(r.address ?? '-')}</td>
          <td>${escHtml(r.businessType ?? '-')}</td>
          <td>${escHtml(r.businessItem ?? '-')}</td>
          <td>${escHtml(r.email ?? '-')}</td>
          <td class="right" style="font-weight:600;">${fmtMoney(r.supplyAmount)}</td>
          <td class="right">${fmtMoney(r.taxAmount)}</td>
          <td class="right" style="font-weight:700;">${fmtMoney((r.supplyAmount ?? 0) + (r.taxAmount ?? 0))}</td>
        </tr>
      `).join('');

      // 요약
      const totalSupply = allRows.reduce((s, r) => s + (r.supplyAmount ?? 0), 0);
      const totalTax    = allRows.reduce((s, r) => s + (r.taxAmount ?? 0), 0);
      document.getElementById('summaryBar').innerHTML = `
        <div class="summary-chip">전체 건수<span>${total}건</span></div>
        <div class="summary-chip">공급가액 합계<span>${totalSupply.toLocaleString()}원</span></div>
        <div class="summary-chip">세액 합계<span>${totalTax.toLocaleString()}원</span></div>
        <div class="summary-chip">합계<span>${(totalSupply + totalTax).toLocaleString()}원</span></div>
        <div class="summary-chip" style="background:#fef3c7;border-color:#fcd34d;">
          파일 수<span>${Math.ceil(total / PAGE_SIZE)}개</span> (50건씩)
        </div>
      `;
    }

    // 조회
    async function search() {
      const taxStart = document.getElementById('taxStart').value;
      const taxEnd   = document.getElementById('taxEnd').value;
      const type     = document.getElementById('issueType').value;
      const custNo   = document.getElementById('customerNumber').value.trim();

      if (!taxStart || !taxEnd) { alert('발행일자 범위를 입력해주세요.'); return; }

      const tbody = document.getElementById('taxTableBody');
      tbody.innerHTML = `<tr><td colspan="16" style="padding:18px;color:#94a3b8;">조회 중...</td></tr>`;

      try {
        let url = `${BASE}/api/tax-invoices/preview?taxStartDate=${taxStart}&taxEndDate=${taxEnd}&type=${type}`;
        if (type === 'individual' && custNo) url += `&customerNumber=${encodeURIComponent(custNo)}`;

        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        allRows = await res.json();
        currentPage = 0;

        document.getElementById('summaryBar').style.display = '';
        document.getElementById('paginationTopBar').style.display = '';

        if (!allRows.length) {
          tbody.innerHTML = `<tr><td colspan="16" style="padding:18px;color:#94a3b8;">해당 기간에 세금계산서 발행 대상이 없습니다.</td></tr>`;
          document.getElementById('pageInfo').textContent = '0건';
          document.getElementById('pageBtns').innerHTML = '';
          document.getElementById('btnDownload').disabled = true;
          return;
        }

        renderPage(0);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="16" style="padding:18px;color:#dc2626;">조회 실패: ${e.message}</td></tr>`;
      }
    }

    // 다운로드
    async function download() {
      const taxStart = document.getElementById('taxStart').value;
      const taxEnd   = document.getElementById('taxEnd').value;
      const type     = document.getElementById('issueType').value;
      const custNo   = document.getElementById('customerNumber').value.trim();

      let url = `${BASE}/api/tax-invoices/download?taxStartDate=${taxStart}&taxEndDate=${taxEnd}&type=${type}&page=${currentPage}`;
      if (type === 'individual' && custNo) url += `&customerNumber=${encodeURIComponent(custNo)}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const blob = await res.blob();
        const link = document.createElement('a');
        const disposition = res.headers.get('Content-Disposition') || '';
        let filename = `세금계산서_${taxStart}_${taxEnd}_p${currentPage + 1}.xlsx`;
        const m = disposition.match(/filename\*=UTF-8''(.+)/);
        if (m) filename = decodeURIComponent(m[1]);

        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
      } catch (e) {
        alert('다운로드 실패: ' + e.message);
      }
    }

    document.getElementById('btnSearch').addEventListener('click', search);
    document.getElementById('btnDownload').addEventListener('click', download);
    document.getElementById('taxEnd').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
  </script>
</body>
</html>
