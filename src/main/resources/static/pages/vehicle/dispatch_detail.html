<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배차 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/maintenance_status.css">
  <style>
    .card-header-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
    }

    .card-header-detail h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
    }

    .card-body-detail {
      padding: 20px;
    }

    .form-section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e7eb;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-item label {
      font-size: 0.85rem;
      color: #6b7280;
      font-weight: 500;
    }

    .detail-value {
      font-size: 0.95rem;
      color: #1f2937;
      font-weight: 500;
      padding: 8px 12px;
      background: #f9fafb;
      border-radius: 6px;
      min-height: 38px;
      display: flex;
      align-items: center;
    }

    .detail-value.highlight {
      color: #2563eb;
      font-weight: 600;
    }

    .detail-value.memo {
      min-height: 80px;
      align-items: flex-start;
      white-space: pre-wrap;
    }

    .form-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-secondary {
      background: #6b7280;
      color: white;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    .hidden {
      display: none !important;
    }

    .form-group-column {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group-column label {
      font-size: 0.85rem;
      color: #6b7280;
      font-weight: 500;
    }

    .form-input {
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.95rem;
      min-height: 38px;
      box-sizing: border-box;
      width: 100%;
    }

    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .full-width {
      grid-column: 1 / -1;
    }

    textarea.form-input {
      min-height: 80px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>배차 상세</h1>
      <p>차량관리 &gt; 배차등록 &gt; 배차현황 &gt; 상세보기</p>
    </div>

    <!-- 상세 보기 -->
    <div class="erp-card" id="dispatchDetailSection">
      <div class="card-header card-header-detail">
        <h2>배차 상세 정보</h2>
        <button type="button" class="btn btn-secondary" onclick="goBack()">목록으로</button>
      </div>

      <div class="card-body card-body-detail">
        <div class="form-section">
          <h3 class="section-title">기본 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>배차일자</label>
              <div class="detail-value" id="dispatchDate"></div>
            </div>

            <div class="detail-item">
              <label>배차구분</label>
              <div class="detail-value highlight" id="dispatchType"></div>
            </div>

            <div class="detail-item">
              <label>계약번호</label>
              <div class="detail-value" id="contractNo"></div>
            </div>

            <div class="detail-item">
              <label>차량번호</label>
              <div class="detail-value" id="vehicleNo"></div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">배차 상세</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>출발지주소</label>
              <div class="detail-value" id="departureAddress"></div>
            </div>

            <div class="detail-item">
              <label>출발지연락처</label>
              <div class="detail-value" id="departureContact"></div>
            </div>

            <div class="detail-item">
              <label>도착지주소</label>
              <div class="detail-value" id="arrivalAddress"></div>
            </div>

            <div class="detail-item">
              <label>도착지연락처</label>
              <div class="detail-value" id="arrivalContact"></div>
            </div>

            <div class="detail-item full-width">
              <label>기타사항</label>
              <div class="detail-value memo" id="remarks"></div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="editDispatchBtn">수정하기</button>
        </div>
      </div>
    </div>

    <!-- 수정 -->
    <div class="erp-card hidden" id="dispatchEditSection">
      <div class="card-header card-header-detail">
        <h2>배차 정보 수정</h2>
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">취소</button>
      </div>

      <div class="card-body card-body-detail">
        <form id="dispatchEditForm">
          <div class="form-section">
            <h3 class="section-title">기본 정보</h3>
            <div class="detail-grid">
              <div class="form-group-column">
                <label for="editDispatchDate">배차일자</label>
                <input type="date" id="editDispatchDate" name="dispatchDate" class="form-input" required>
              </div>

              <div class="form-group-column">
                <label for="editDispatchType">배차구분</label>
                <select id="editDispatchType" name="dispatchType" class="form-input" required>
                  <option value="납품">납품</option>
                  <option value="회수">회수</option>
                  <option value="기타">기타</option>
                </select>
              </div>

              <div class="detail-item">
                <label>계약번호</label>
                <div class="detail-value" id="editContractNo"></div>
              </div>

              <div class="detail-item">
                <label>차량번호</label>
                <div class="detail-value" id="editVehicleNo"></div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">배차 상세</h3>
            <div class="detail-grid">
              <div class="form-group-column">
                <label for="editDepartureAddress">출발지주소</label>
                <input type="text" id="editDepartureAddress" name="departureAddress" class="form-input" required>
              </div>

              <div class="form-group-column">
                <label for="editDepartureContact">출발지연락처</label>
                <input type="text" id="editDepartureContact" name="departureContact" class="form-input" required>
              </div>

              <div class="form-group-column">
                <label for="editArrivalAddress">도착지주소</label>
                <input type="text" id="editArrivalAddress" name="arrivalAddress" class="form-input" required>
              </div>

              <div class="form-group-column">
                <label for="editArrivalContact">도착지연락처</label>
                <input type="text" id="editArrivalContact" name="arrivalContact" class="form-input" required>
              </div>

              <div class="form-group-column full-width">
                <label for="editRemarks">기타사항</label>
                <textarea id="editRemarks" name="remarks" class="form-input"></textarea>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="resetEditBtn">초기화</button>
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");

    function mustOk(res) {
      if (!res.ok) {
        throw new Error("HTTP " + res.status);
      }
      return res;
    }

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      await mustOk(res);
      return res.json();
    }

    const urlParams = new URLSearchParams(window.location.search);
    const dispatchId = urlParams.get("id");

    const dispatchDetailSection = $("dispatchDetailSection");
    const dispatchEditSection = $("dispatchEditSection");
    const editDispatchBtn = $("editDispatchBtn");
    const cancelEditBtn = $("cancelEditBtn");
    const resetEditBtn = $("resetEditBtn");
    const dispatchEditForm = $("dispatchEditForm");

    let current = null;

    function fillDetail(d) {
      $("dispatchDate").textContent = d.dispatchDate || "-";
      $("dispatchType").textContent = d.dispatchType || "-";
      $("contractNo").textContent = d.contractNumber || "-";
      $("vehicleNo").textContent = d.vehicleNo || "-";

      $("departureAddress").textContent = d.departureAddress || "-";
      $("departureContact").textContent = d.departureContact || "-";
      $("arrivalAddress").textContent = d.arrivalAddress || "-";
      $("arrivalContact").textContent = d.arrivalContact || "-";
      $("remarks").textContent = d.remarks || "-";
    }

    function fillEdit(d) {
      $("editDispatchDate").value = d.dispatchDate || "";
      $("editDispatchType").value = d.dispatchType || "납품";
      $("editContractNo").textContent = d.contractNumber || "-";
      $("editVehicleNo").textContent = d.vehicleNo || "-";

      $("editDepartureAddress").value = d.departureAddress || "";
      $("editDepartureContact").value = d.departureContact || "";
      $("editArrivalAddress").value = d.arrivalAddress || "";
      $("editArrivalContact").value = d.arrivalContact || "";
      $("editRemarks").value = d.remarks || "";
    }

    async function load() {
      if (!dispatchId) {
        alert("id 파라미터가 없습니다.");
        goBack();
        return;
      }

      try {
        current = await fetchJson(`${BASE}/api/dispatches/${encodeURIComponent(dispatchId)}`);
        fillDetail(current);
      } catch (e) {
        console.error(e);
        alert("상세 조회 실패");
        goBack();
      }
    }

    editDispatchBtn.addEventListener("click", () => {
      if (!current) return;
      fillEdit(current);
      dispatchDetailSection.classList.add("hidden");
      dispatchEditSection.classList.remove("hidden");
    });

    cancelEditBtn.addEventListener("click", () => {
      if (!confirm("수정을 취소할까요?")) return;
      dispatchEditSection.classList.add("hidden");
      dispatchDetailSection.classList.remove("hidden");
    });

    resetEditBtn.addEventListener("click", () => {
      if (!current) return;
      if (!confirm("입력을 초기화할까요?")) return;
      fillEdit(current);
    });

    dispatchEditForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!confirm("수정하시겠습니까?")) return;

      const payload = {
        dispatchDate: $("editDispatchDate").value,
        dispatchType: $("editDispatchType").value,
        departureAddress: $("editDepartureAddress").value.trim(),
        departureContact: $("editDepartureContact").value.trim(),
        arrivalAddress: $("editArrivalAddress").value.trim(),
        arrivalContact: $("editArrivalContact").value.trim(),
        remarks: $("editRemarks").value.trim()
      };

      try {
        const updated = await fetchJson(`${BASE}/api/dispatches/${encodeURIComponent(dispatchId)}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        current = updated;
        fillDetail(current);

        dispatchEditSection.classList.add("hidden");
        dispatchDetailSection.classList.remove("hidden");

        alert("수정되었습니다.");
      } catch (e) {
        console.error(e);
        alert("수정 실패");
      }
    });

    function goBack() {
      window.location.href = "dispatch_status.html";
    }

    window.goBack = goBack;

    load();
  </script>
</body>
</html>
