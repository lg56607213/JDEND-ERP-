<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배차등록 | JDEND ERP</title>

  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />
  <link rel="stylesheet" href="../../assets/css/vehicle/dispatch_register.css" />

  <style>
    /* ===== 돋보기 입력 ===== */
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:45px; }
    .icon-btn{
      position:absolute; right:5px; top:50%;
      transform:translateY(-50%);
      width:34px; height:34px;
      border:1px solid #ddd; background:#fff;
      border-radius:8px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }

    /* ===== 모달 ===== */
    .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; }
    .modal{
      display:none; position:fixed; left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:min(920px,94vw);
      background:#fff; border-radius:12px; z-index:10000; overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
    }
    .modal-header{ display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid #eee; }
    .modal-body{ padding:14px 16px; }
    .modal-footer{ padding:12px 16px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:8px; }
    .btn{
      padding:8px 12px; border-radius:8px;
      border:1px solid #ddd; background:#fff; cursor:pointer;
    }
    .btn-primary{ background:#1f6feb; color:#fff; border-color:#1f6feb; }
    .btn-primary:disabled{ opacity:.6; cursor:not-allowed; }

    .search-row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .search-row input{
      flex:1; padding:9px 10px;
      border:1px solid #ddd; border-radius:8px;
    }
    .search-row .icon-btn{
      position:static; transform:none;
      width:40px; height:40px; border-radius:10px;
    }

    .list{ max-height:380px; overflow:auto; border:1px solid #eee; border-radius:10px; }
    .list table{ width:100%; border-collapse:collapse; }
    .list th, .list td{ padding:10px; border-bottom:1px solid #f0f0f0; font-size:14px; text-align:left; }
    .list tr:hover{ background:#fafafa; }
    .muted{ color:#888; }
    .err{ color:#d00; }
  </style>
</head>

<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>배차등록</h1>
      <p>차량관리 &gt; 배차등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <form id="dispatchForm">

          <!-- 차량 정보 섹션 -->
          <div class="form-section">
            <h3 class="section-title">차량 정보</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="vehicleManagementId" class="required">차량관리번호</label>

                <div class="input-with-icon">
                  <input type="text" id="vehicleManagementId" name="vehicleManagementId" placeholder="돋보기로 차량 선택" required />
                  <button type="button" class="icon-btn" id="openVehicleModalBtn" title="차량 선택">🔍</button>
                </div>
              </div>

              <div class="form-group">
                <label for="vehicleNumber">차량번호</label>
                <input type="text" id="vehicleNumber" name="vehicleNumber" placeholder="자동 출력" readonly />
              </div>
            </div>

            <div class="info-box">
              <span class="info-box-icon">ℹ️</span>
              <span class="info-box-text">돋보기로 차량을 선택하면 차량번호가 자동으로 채워집니다.</span>
            </div>
          </div>

          <!-- 배차 정보 섹션 -->
          <div class="form-section">
            <h3 class="section-title">배차 정보</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="dispatchType" class="required">배차구분</label>
                <select id="dispatchType" name="dispatchType" required>
                  <option value="">선택하세요</option>
                  <option value="납품">납품</option>
                  <option value="회수">회수</option>
                  <option value="기타">기타</option>
                </select>
              </div>

              <div class="form-group">
                <label for="dispatchDate" class="required">배차일</label>
                <input type="date" id="dispatchDate" name="dispatchDate" required />
              </div>
            </div>
          </div>

          <!-- 출발지 정보 섹션 -->
          <div class="form-section">
            <h3 class="section-title">출발지 정보</h3>
            <div class="form-grid">
              <div class="form-group form-group-wide">
                <label for="departureAddress" class="required">출발지주소</label>
                <input type="text" id="departureAddress" name="departureAddress" placeholder="출발지 주소를 입력하세요" required />
              </div>

              <div class="form-group">
                <label for="departureContact" class="required">출발지연락처</label>
                <input type="tel" id="departureContact" name="departureContact" placeholder="010-0000-0000" required />
              </div>
            </div>
          </div>

          <!-- 도착지 정보 섹션 -->
          <div class="form-section">
            <h3 class="section-title">도착지 정보</h3>
            <div class="form-grid">
              <div class="form-group form-group-wide">
                <label for="arrivalAddress" class="required">도착지주소</label>
                <input type="text" id="arrivalAddress" name="arrivalAddress" placeholder="도착지 주소를 입력하세요" required />
              </div>

              <div class="form-group">
                <label for="arrivalContact" class="required">도착지연락처</label>
                <input type="tel" id="arrivalContact" name="arrivalContact" placeholder="010-0000-0000" required />
              </div>
            </div>
          </div>

          <!-- 기타 정보 섹션 -->
          <div class="form-section">
            <h3 class="section-title">기타 정보</h3>
            <div class="form-grid">
              <div class="form-group form-group-full">
                <label for="remarks">기타사항</label>
                <textarea id="remarks" name="remarks" placeholder="기타사항을 입력하세요" rows="4"></textarea>
              </div>
            </div>
          </div>

          <!-- 버튼 영역 -->
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="resetBtn">초기화</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">배차 등록</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== 차량 선택 모달 ===== -->
  <div class="modal-backdrop" id="vehicleModalBackdrop"></div>
  <div class="modal" id="vehicleModal">
    <div class="modal-header">
      <b>차량 선택</b>
      <button type="button" class="btn" id="closeVehicleModalBtn">닫기</button>
    </div>

    <div class="modal-body">
      <div class="search-row">
        <input type="text" id="vehicleSearchKw" placeholder="차량관리번호/차량번호/차종 검색" />
        <button type="button" class="icon-btn" id="vehicleSearchIconBtn" title="검색">🔍</button>
      </div>

      <div class="list">
        <table>
          <thead>
            <tr>
              <th style="width:180px;">차량관리번호</th>
              <th style="width:150px;">차량번호</th>
              <th>차종</th>
              <th style="width:140px;">검사기간</th>
              <th style="width:110px;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleSearchTbody">
            <tr><td colspan="5" class="muted">조회중...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="muted" style="margin-top:8px; font-size:12px;">
        * 검색어 비워도 조회됩니다.
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn" id="vehicleModalClose2">닫기</button>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
   const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");

    function mustOk(res){
      if(!res.ok){
        return res.json().catch(()=> ({})).then(b=>{
          const msg = (b && (b.message || b.error || b.msg))
            ? (b.message || b.error || b.msg)
            : ("HTTP " + res.status);
          throw new Error(msg);
        });
      }
      return res;
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll("\"","&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(s){ return String(s ?? "").replaceAll("'","\\'"); }

    function fmtDate(d){
      if(!d) return "";
      return String(d);
    }

    // ===== 날짜 기본값(오늘) =====
    window.addEventListener("load", ()=>{
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("dispatchDate").value = today;
    });

    // ===== 돋보기 모달 열기/닫기 =====
    function openVehicleModal(){
      document.getElementById("vehicleModalBackdrop").style.display="block";
      document.getElementById("vehicleModal").style.display="block";
      document.getElementById("vehicleSearchKw").value="";
      doVehicleSearch();
      setTimeout(()=>document.getElementById("vehicleSearchKw").focus(),0);
    }

    function closeVehicleModal(){
      document.getElementById("vehicleModalBackdrop").style.display="none";
      document.getElementById("vehicleModal").style.display="none";
    }

    async function doVehicleSearch(){
      const kw = document.getElementById("vehicleSearchKw").value.trim();
      const tbody = document.getElementById("vehicleSearchTbody");
      tbody.innerHTML = `<tr><td colspan="5" class="muted">조회중...</td></tr>`;

      try{
        // ✅ 여기 API는 VehicleOrderController의 /api/vehicle-orders/search?kw= 를 사용
        // (VehicleOrderQueryController랑 중복 매핑 나면 서버가 안뜸. QueryController는 지우거나 경로 바꿔야 함)
        const res = await fetch(`${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw)}`);
        await mustOk(res);
        const list = await res.json();

        if(!Array.isArray(list) || list.length===0){
          tbody.innerHTML = `<tr><td colspan="5" class="muted">결과없음</td></tr>`;
          return;
        }

        tbody.innerHTML = list.map(v=>{
          const mgmt = v.vehicleMgmtNo || "";
          const vno = v.vehicleNo || "";
          const model = v.carModel || v.vehicleModel || "";
          const s = v.inspectionStart || "";
          const e = v.inspectionEnd || "";
          const period = (s || e) ? `${fmtDate(s)} ~ ${fmtDate(e)}` : "-";

          return `
            <tr>
              <td>${escapeHtml(mgmt)}</td>
              <td>${escapeHtml(vno)}</td>
              <td>${escapeHtml(model)}</td>
              <td>${escapeHtml(period)}</td>
              <td>
                <button type="button" class="btn btn-primary"
                  onclick="selectVehicle('${escapeAttr(mgmt)}')">선택</button>
              </td>
            </tr>
          `;
        }).join("");

      }catch(e){
        tbody.innerHTML = `<tr><td colspan="5" class="err">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    async function selectVehicle(mgmtNo){
      closeVehicleModal();
      document.getElementById("vehicleManagementId").value = mgmtNo;
      await loadVehicleInfoByMgmtNo();
    }

    // ===== 차량관리번호로 상세 조회해서 차량번호 채우기 =====
    async function loadVehicleInfoByMgmtNo(){
      const mgmtNo = document.getElementById("vehicleManagementId").value.trim().toUpperCase();
      if(!mgmtNo){
        document.getElementById("vehicleNumber").value = "";
        return;
      }

      const res = await fetch(`${BASE}/api/vehicle-orders/${encodeURIComponent(mgmtNo)}`);
      await mustOk(res);
      const v = await res.json();

      document.getElementById("vehicleNumber").value = v.vehicleNo || "";
    }

    // 혹시 사용자가 직접 차량관리번호를 타이핑한 경우(blur 때 조회)
    document.getElementById("vehicleManagementId").addEventListener("blur", async ()=>{
      try{ await loadVehicleInfoByMgmtNo(); }
      catch(e){
        document.getElementById("vehicleNumber").value = "";
        alert("차량 조회 실패: " + e.message);
      }
    });

    // ===== 연락처 포맷 =====
    function formatPhoneNumber(input) {
      const value = input.value.replace(/[^\d]/g, '');
      let formatted = '';

      if (value.length <= 3) formatted = value;
      else if (value.length <= 7) formatted = value.slice(0, 3) + '-' + value.slice(3);
      else formatted = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);

      input.value = formatted;
    }

    document.getElementById('departureContact').addEventListener('input', e => formatPhoneNumber(e.target));
    document.getElementById('arrivalContact').addEventListener('input', e => formatPhoneNumber(e.target));

    // ===== 초기화 =====
    function resetForm(){
      if(!confirm("입력한 내용을 모두 초기화하시겠습니까?")) return;

      document.getElementById("dispatchForm").reset();
      document.getElementById("vehicleNumber").value = "";

      const today = new Date().toISOString().split("T")[0];
      document.getElementById("dispatchDate").value = today;
    }

    // ===== 배차 등록 (POST /api/dispatches) =====
    async function submitDispatch(){
      const body = {
        vehicleMgmtNo: document.getElementById('vehicleManagementId').value.trim().toUpperCase(),
        vehicleNo: document.getElementById('vehicleNumber').value.trim(),

        dispatchType: document.getElementById('dispatchType').value,
        dispatchDate: document.getElementById('dispatchDate').value,

        departureAddress: document.getElementById('departureAddress').value.trim(),
        departureContact: document.getElementById('departureContact').value.trim(),

        arrivalAddress: document.getElementById('arrivalAddress').value.trim(),
        arrivalContact: document.getElementById('arrivalContact').value.trim(),

        remarks: document.getElementById('remarks').value.trim()
      };

      if(!body.vehicleMgmtNo){ alert("차량관리번호는 필수입니다."); return; }
      if(!body.dispatchType){ alert("배차구분은 필수입니다."); return; }
      if(!body.dispatchDate){ alert("배차일은 필수입니다."); return; }
      if(!body.departureAddress){ alert("출발지주소는 필수입니다."); return; }
      if(!body.departureContact){ alert("출발지연락처는 필수입니다."); return; }
      if(!body.arrivalAddress){ alert("도착지주소는 필수입니다."); return; }
      if(!body.arrivalContact){ alert("도착지연락처는 필수입니다."); return; }

      if(!confirm("배차를 등록하시겠습니까?")) return;

      const btn = document.getElementById("submitBtn");
      const old = btn.textContent;
      btn.disabled = true;
      btn.textContent = "등록중...";

      try{
        const res = await fetch(`${BASE}/api/dispatches`, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify(body)
        });

        await mustOk(res);
        await res.json();

        alert("배차가 등록되었습니다.");
        resetForm();

      }catch(e){
        alert("배차 등록 실패: " + e.message);
      }finally{
        btn.disabled = false;
        btn.textContent = old;
      }
    }

    // ===== 이벤트 바인딩 =====
    document.addEventListener("DOMContentLoaded", ()=>{
      document.getElementById("openVehicleModalBtn").addEventListener("click", openVehicleModal);
      document.getElementById("closeVehicleModalBtn").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalClose2").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalBackdrop").addEventListener("click", closeVehicleModal);

      document.getElementById("vehicleSearchIconBtn").addEventListener("click", doVehicleSearch);
      document.getElementById("vehicleSearchKw").addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){ e.preventDefault(); doVehicleSearch(); }
      });

      document.getElementById("resetBtn").addEventListener("click", resetForm);

      document.getElementById("dispatchForm").addEventListener("submit", (e)=>{
        e.preventDefault();
        submitDispatch();
      });

      // 엔터키 제출 방지(텍스트에어리어 제외)
      document.getElementById("dispatchForm").addEventListener("keydown", function(e){
        if(e.key === "Enter" && e.target.tagName !== "TEXTAREA"){
          e.preventDefault();
        }
      });
    });
  </script>
</body>
</html>
