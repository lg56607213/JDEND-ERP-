<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배차현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/pages.css" />
  <link rel="stylesheet" href="../../assets/css/vehicle/maintenance_status.css" />

  <style>
    /* ===== input + 돋보기 버튼 ===== */
    .input-with-icon { position: relative; }
    .input-with-icon input { width: 100%; padding-right: 44px; }

    .icon-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
    }

    .icon-btn:hover { background: #f5f5f5; }

    /* ===== 모달 ===== */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 9998;
    }

    .modal {
      display: none;
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(920px, 92vw);
      max-height: 80vh;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      z-index: 9999;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .modal-close {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .modal-close:hover { background: #f3f4f6; }

    .modal-body {
      padding: 14px 16px 16px;
      overflow: auto;
      max-height: calc(80vh - 58px);
    }

    .modal-searchbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .modal-searchbar input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }

    .modal-searchbar button {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .modal-searchbar button:hover { background: #f5f5f5; }

    .modal-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .modal-table thead th {
      text-align: left;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      font-weight: 700;
      color: #111827;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .modal-table tbody td {
      padding: 10px;
      border-bottom: 1px solid #f1f5f9;
      color: #111827;
    }

    .modal-table tbody tr:hover {
      background: #f9fafb;
      cursor: pointer;
    }

    .muted { color: #6b7280; }
    .error-text { color: #dc2626; font-weight: 600; }
  </style>
</head>

<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>배차현황</h1>
      <p>차량관리 &gt; 배차등록 &gt; 배차현황</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 검색 섹션 -->
        <div class="search-section">
          <div class="search-grid">
            <div class="form-group">
              <label for="searchContract">계약번호</label>
              <div class="input-with-icon">
                <input type="text" id="searchContract" placeholder="계약번호 검색" />
                <button type="button" class="icon-btn" id="contractPickerBtn" title="계약번호 선택">🔍</button>
              </div>
            </div>

            <div class="form-group">
              <label for="searchVehicle">차량번호</label>
              <div class="input-with-icon">
                <input type="text" id="searchVehicle" placeholder="차량번호 검색" />
                <button type="button" class="icon-btn" id="vehiclePickerBtn" title="차량 선택">🔍</button>
              </div>
            </div>

            <div class="form-group">
              <label for="searchStartDate">배차일자(시작)</label>
              <input type="date" id="searchStartDate" />
            </div>

            <div class="form-group">
              <label for="searchEndDate">배차일자(종료)</label>
              <input type="date" id="searchEndDate" />
            </div>

            <div class="form-group">
              <label>&nbsp;</label>
              <button type="button" class="btn-search" id="searchBtn">조회</button>
            </div>
            <div class="form-group">
              <label>&nbsp;</label>
              <button type="button" class="btn-excel" onclick="exportTableToExcel('dispatchTableBody', '배차현황')">엑셀 내보내기</button>
            </div>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>배차일자</th>
                <th>계약번호</th>
                <th>차량번호</th>
                <th>배차구분</th>
              </tr>
            </thead>
            <tbody id="dispatchTableBody">
              <tr>
                <td colspan="5" style="text-align:center; color:#888;">조회하세요.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 공용 모달(계약/차량 공용) ===== -->
  <div class="modal-backdrop" id="pickerBackdrop"></div>

  <div class="modal" id="pickerModal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="pickerTitle">선택</h3>
      <button type="button" class="modal-close" id="pickerCloseBtn">✕</button>
    </div>

    <div class="modal-body">
      <div class="modal-searchbar">
        <input type="text" id="pickerKw" placeholder="검색어 입력" />
        <button type="button" id="pickerSearchBtn">검색</button>
      </div>

      <div id="pickerHint" class="muted" style="margin-bottom:8px;"></div>

      <table class="modal-table">
        <thead>
          <tr id="pickerHeadRow"></tr>
        </thead>
        <tbody id="pickerBody">
          <tr>
            <td class="muted">검색하세요.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function mustOk(res) {
      if (res.ok) return res;

      let msg = "HTTP " + res.status;
      try {
        const body = await res.json();
        msg = body.message || body.error || body.msg || msg;
      } catch (e) {}

      throw new Error(msg);
    }

    function goToDetail(id) {
      window.location.href = "dispatch_detail.html?id=" + encodeURIComponent(id);
    }

    function render(list) {
      const tbody = $("dispatchTableBody");

      if (!list || list.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="no-data">
              <div class="no-data-icon">🚗</div>
              <div>검색 결과가 없습니다.</div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = list.map((item, idx) => `
        <tr style="cursor:pointer;" onclick="goToDetail('${String(item.id).replaceAll("'", "")}')">
          <td>${idx + 1}</td>
          <td>${escapeHtml(item.dispatchDate || "-")}</td>
          <td>${escapeHtml(item.contractNumber || "-")}</td>
          <td>${escapeHtml(item.vehicleNo || "-")}</td>
          <td>${escapeHtml(item.dispatchType || "-")}</td>
        </tr>
      `).join("");
    }

    async function searchDispatch() {
      const contractNumber = $("searchContract").value.trim();
      const vehicleNo = $("searchVehicle").value.trim();
      const startDate = $("searchStartDate").value;
      const endDate = $("searchEndDate").value;

      const qs = new URLSearchParams();
      if (contractNumber) qs.set("contractNumber", contractNumber);
      if (vehicleNo) qs.set("vehicleNo", vehicleNo);
      if (startDate) qs.set("startDate", startDate);
      if (endDate) qs.set("endDate", endDate);

      const tbody = $("dispatchTableBody");
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#888;">조회중...</td></tr>`;

      try {
        const res = await fetch(`${BASE}/api/dispatches?${qs.toString()}`);
        await mustOk(res);
        const data = await res.json();
        render(Array.isArray(data) ? data : []);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    // =========================
    // 공용 돋보기 모달
    // =========================
    const picker = {
      mode: null, // "contract" | "vehicle"

      open(mode) {
        this.mode = mode;
        $("pickerKw").value = "";
        $("pickerBody").innerHTML = `<tr><td class="muted">조회중...</td></tr>`;

        if (mode === "vehicle") {
          $("pickerTitle").textContent = "차량 선택";
          $("pickerHint").textContent = "차량번호/차종/차량관리번호로 검색 후 클릭하면 차량번호가 입력됩니다.";
          $("pickerHeadRow").innerHTML = `
            <th style="width:120px;">차량관리번호</th>
            <th style="width:140px;">차량번호</th>
            <th>차종</th>
          `;
        } else {
          $("pickerTitle").textContent = "계약 선택";
          $("pickerHint").textContent = "계약번호/차량번호로 검색 후 클릭하면 계약번호가 입력됩니다.";
          $("pickerHeadRow").innerHTML = `
            <th style="width:160px;">계약번호</th>
            <th style="width:160px;">차량번호</th>
            <th>차종</th>
          `;
        }

        $("pickerBackdrop").style.display = "block";
        $("pickerModal").style.display = "block";

        setTimeout(() => {
          $("pickerKw").focus();
          pickerSearch(); // ✅ 돋보기 클릭 즉시 전체조회
        }, 0);
      },

      close() {
        $("pickerBackdrop").style.display = "none";
        $("pickerModal").style.display = "none";
      }
    };

    async function pickerSearch() {
      const kw = $("pickerKw").value.trim();
      $("pickerBody").innerHTML = `<tr><td class="muted">조회중...</td></tr>`;

      try {
        if (picker.mode === "vehicle") {
          const res = await fetch(`${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw)}`);
          await mustOk(res);
          const list = await res.json();

          if (!Array.isArray(list) || list.length === 0) {
            $("pickerBody").innerHTML = `<tr><td class="muted">검색 결과 없음</td></tr>`;
            return;
          }

          $("pickerBody").innerHTML = list.map(v => `
            <tr data-vehicleno="${escapeHtml(v.vehicleNo || "")}">
              <td>${escapeHtml(v.vehicleMgmtNo || "-")}</td>
              <td>${escapeHtml(v.vehicleNo || "-")}</td>
              <td>${escapeHtml(v.carModel || "-")}</td>
            </tr>
          `).join("");

          [...$("pickerBody").querySelectorAll("tr")].forEach(tr => {
            tr.addEventListener("click", () => {
              const vehicleNo = tr.getAttribute("data-vehicleno") || "";
              if (!vehicleNo) {
                alert("선택한 행에 차량번호가 없습니다.");
                return;
              }

              $("searchVehicle").value = vehicleNo;
              picker.close();
              searchDispatch();
            });
          });

        } else {
          const res = await fetch(`${BASE}/api/contracts/search?kw=${encodeURIComponent(kw)}`);
          await mustOk(res);
          const list = await res.json();

          if (!Array.isArray(list) || list.length === 0) {
            $("pickerBody").innerHTML = `<tr><td class="muted">검색 결과 없음</td></tr>`;
            return;
          }

          $("pickerBody").innerHTML = list.map(c => `
            <tr data-contractno="${escapeHtml(c.contractNumber || "")}">
              <td>${escapeHtml(c.contractNumber || "-")}</td>
              <td>${escapeHtml(c.vehicleNo || "-")}</td>
              <td>${escapeHtml(c.vehicleModel || "-")}</td>
            </tr>
          `).join("");

          [...$("pickerBody").querySelectorAll("tr")].forEach(tr => {
            tr.addEventListener("click", () => {
              const contractNo = tr.getAttribute("data-contractno") || "";
              if (!contractNo) {
                alert("선택한 행에 계약번호가 없습니다.");
                return;
              }

              $("searchContract").value = contractNo;
              picker.close();
              searchDispatch();
            });
          });
        }
      } catch (e) {
        $("pickerBody").innerHTML = `<tr><td class="error-text">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    $("pickerBackdrop").addEventListener("click", () => picker.close());
    $("pickerCloseBtn").addEventListener("click", () => picker.close());

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") picker.close();
    });

    $("pickerSearchBtn").addEventListener("click", pickerSearch);

    $("pickerKw").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        pickerSearch();
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      $("searchBtn").addEventListener("click", searchDispatch);

      ["searchContract", "searchVehicle", "searchStartDate", "searchEndDate"].forEach(id => {
        $(id).addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            searchDispatch();
          }
        });
      });

      $("vehiclePickerBtn").addEventListener("click", () => picker.open("vehicle"));
      $("contractPickerBtn").addEventListener("click", () => picker.open("contract"));

      searchDispatch();
    });
  </script>
  <script src="../../assets/js/excel-export.js"></script>
</body>
</html>
