<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>검사관리 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/inspection_register.css">

  <style>
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:45px; }
    .icon-btn{
      position:absolute; right:5px; top:50%;
      transform:translateY(-50%);
      width:34px; height:34px;
      border:1px solid #ddd; background:#fff;
      border-radius:8px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }

    .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; }
    .modal{
      display:none; position:fixed; left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:min(920px,94vw);
      background:#fff; border-radius:12px; z-index:10000; overflow:hidden;
    }
    .modal-header{ display:flex; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee; }
    .modal-body{ padding:14px 16px; }
    .modal-footer{ padding:12px 16px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:8px; }
    .btn{ padding:8px 12px; border-radius:8px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    .btn-primary{ background:#1f6feb; color:#fff; border-color:#1f6feb; }

    .search-row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .search-row input{ flex:1; padding:9px 10px; border:1px solid #ddd; border-radius:8px; }
    .search-row .icon-btn{ position:static; transform:none; width:40px; height:40px; border-radius:10px; }

    .list{ max-height:380px; overflow:auto; border:1px solid #eee; border-radius:10px; }
    .list table{ width:100%; border-collapse:collapse; }
    .list th, .list td{ padding:10px; border-bottom:1px solid #f0f0f0; font-size:14px; text-align:left; }
    .list tr:hover{ background:#fafafa; }
  </style>
</head>

<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>검사관리 (정기검사 등록)</h1>
      <p>차량관리 &gt; 정비 &gt; 검사관리</p>
    </div>

    <div class="erp-card">
      <div class="card-body">

        <div class="form-section">
          <div class="form-row">
            <div class="form-group">
              <label for="vehicleMgmtNo">차량관리번호 *</label>
              <div class="input-with-icon">
                <input type="text" id="vehicleMgmtNo" placeholder="돋보기로 차량 선택" readonly>
                <button type="button" class="icon-btn" id="openVehicleModalBtn">🔍</button>
              </div>
            </div>

            <div class="form-group">
              <label for="vehicleNo">차량번호</label>
              <input type="text" id="vehicleNo" placeholder="-" disabled>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>현재 유효기간(시작)</label>
              <input type="text" id="vehicleInspectionStart" placeholder="-" disabled>
            </div>
            <div class="form-group">
              <label>현재 유효기간(종료)</label>
              <input type="text" id="vehicleInspectionEnd" placeholder="-" disabled>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-row">
            <div class="form-group">
              <label for="inspectionDate">검사일</label>
              <input type="date" id="inspectionDate">
            </div>
            <div class="form-group">
              <label for="vendor">검사기관(선택)</label>
              <input type="text" id="vendor" placeholder="예: 교통안전공단">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="inspectionPlace">검사처(선택)</label>
              <input type="text" id="inspectionPlace" placeholder="예: 송파 검사소">
            </div>
            <div class="form-group">
              <label for="inspectionCost">검사비용(선택)</label>
              <input type="text" id="inspectionCost" placeholder="0" inputmode="numeric">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="inspectionStart">검사유효기간(시작) *</label>
              <input type="date" id="inspectionStart">
            </div>
            <div class="form-group">
              <label for="inspectionEnd">검사유효기간(종료) *</label>
              <input type="date" id="inspectionEnd">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group" style="width:100%;">
              <label for="memo">비고(선택)</label>
              <input type="text" id="memo" placeholder="메모">
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button type="button" class="btn-submit" id="submitBtn">등록</button>
          <button type="button" class="btn-cancel" id="resetBtn">취소</button>
        </div>

      </div>
    </div>
  </div>

  <!-- 차량 선택 모달 -->
  <div class="modal-backdrop" id="vehicleModalBackdrop"></div>
  <div class="modal" id="vehicleModal">
    <div class="modal-header">
      <b>차량 선택</b>
      <button type="button" class="btn" id="closeVehicleModalBtn">닫기</button>
    </div>

    <div class="modal-body">
      <div class="search-row">
        <input type="text" id="vehicleSearchKw" placeholder="차량관리번호/차량번호/차종 검색">
        <button type="button" class="icon-btn" id="vehicleSearchIconBtn">🔍</button>
      </div>

      <div class="list">
        <table>
          <thead>
            <tr>
              <th style="width:220px;">차량관리번호</th>
              <th style="width:160px;">차량번호</th>
              <th>차종</th>
              <th style="width:110px;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleSearchTbody">
            <tr><td colspan="4" style="color:#888;">조회중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn" id="vehicleModalClose2">닫기</button>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    // ✅ localhost fallback 제거
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/$/, "");

    async function mustOk(res){
      if (res.ok) return res;

      let msg = "HTTP " + res.status;
      try {
        const b = await res.json();
        msg = (b && (b.message || b.error || b.msg)) ? (b.message || b.error || b.msg) : msg;
      } catch (e) {
        try {
          const text = await res.text();
          if (text) msg = text;
        } catch (e2) {}
      }
      throw new Error(msg);
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll("\"","&quot;")
        .replaceAll("'","&#039;");
    }

    function escapeAttr(s){
      return String(s ?? "").replaceAll("'","\\'");
    }

    function parseMoneyToLong(str){
      const n = String(str ?? "").replace(/[^\d]/g, "");
      if(!n) return 0;
      try { return parseInt(n, 10); } catch(e){ return 0; }
    }

    function formatMoneyInput(el){
      const n = parseMoneyToLong(el.value);
      el.value = n ? n.toLocaleString() : "";
    }

    function openVehicleModal(){
      document.getElementById("vehicleModalBackdrop").style.display = "block";
      document.getElementById("vehicleModal").style.display = "block";
      document.getElementById("vehicleSearchKw").value = "";
      doVehicleSearch();
      setTimeout(()=>document.getElementById("vehicleSearchKw").focus(),0);
    }

    function closeVehicleModal(){
      document.getElementById("vehicleModalBackdrop").style.display = "none";
      document.getElementById("vehicleModal").style.display = "none";
    }

    async function doVehicleSearch(){
      const kw = document.getElementById("vehicleSearchKw").value.trim();
      const tbody = document.getElementById("vehicleSearchTbody");
      tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">조회중...</td></tr>`;

      try{
        const res = await fetch(`${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw)}`);
        await mustOk(res);
        const list = await res.json();

        if(!Array.isArray(list) || list.length===0){
          tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">결과없음</td></tr>`;
          return;
        }

        tbody.innerHTML = list.map(v=>`
          <tr>
            <td>${escapeHtml(v.vehicleMgmtNo || "")}</td>
            <td>${escapeHtml(v.vehicleNo || "")}</td>
            <td>${escapeHtml(v.carModel || "")}</td>
            <td><button type="button" class="btn btn-primary" onclick="selectVehicle('${escapeAttr(v.vehicleMgmtNo || "")}')">선택</button></td>
          </tr>
        `).join("");

      }catch(e){
        tbody.innerHTML = `<tr><td colspan="4" style="color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    async function selectVehicle(mgmtNo){
      closeVehicleModal();
      document.getElementById("vehicleMgmtNo").value = mgmtNo;
      await loadVehicleInfo();
    }

    async function loadVehicleInfo(){
      const mgmtNo = document.getElementById("vehicleMgmtNo").value.trim();
      if(!mgmtNo){
        document.getElementById("vehicleNo").value = "";
        document.getElementById("vehicleInspectionStart").value = "";
        document.getElementById("vehicleInspectionEnd").value = "";
        return;
      }

      const res = await fetch(`${BASE}/api/vehicle-orders/${encodeURIComponent(mgmtNo)}`);
      await mustOk(res);
      const v = await res.json();

      document.getElementById("vehicleNo").value = v.vehicleNo || "";
      document.getElementById("vehicleInspectionStart").value = v.inspectionStart || "";
      document.getElementById("vehicleInspectionEnd").value = v.inspectionEnd || "";
    }

    async function submitInspection(){
      const vehicleMgmtNo = document.getElementById("vehicleMgmtNo").value.trim();
      if(!vehicleMgmtNo){
        alert("차량관리번호를 선택하세요.");
        return;
      }

      const inspectionDate = document.getElementById("inspectionDate").value || null;
      const validStart = document.getElementById("inspectionStart").value;
      const validEnd = document.getElementById("inspectionEnd").value;
      const vendor = document.getElementById("vendor").value.trim();
      const inspectionPlace = document.getElementById("inspectionPlace").value.trim();
      const inspectionCost = parseMoneyToLong(document.getElementById("inspectionCost").value);
      const memo = document.getElementById("memo").value.trim();

      if(!validStart || !validEnd){
        alert("검사유효기간(시작/종료)은 필수입니다.");
        return;
      }
      if(validStart > validEnd){
        alert("유효기간 시작일이 종료일보다 클 수 없습니다.");
        return;
      }

      const body = {
        vehicleMgmtNo,
        inspectionDate,
        validStart,
        validEnd,
        vendor,
        inspectionPlace,
        inspectionCost,
        memo
      };

      if(!confirm("검사 이력을 등록하시겠습니까?")) return;

      const btn = document.getElementById("submitBtn");
      const old = btn.textContent;
      btn.disabled = true;
      btn.textContent = "등록중...";

      try{
        const res = await fetch(`${BASE}/api/vehicle-inspections`, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify(body)
        });
        await mustOk(res);

        try { await res.json(); } catch(_) {}

        alert("검사 이력이 등록되었습니다.");
        await loadVehicleInfo();
      }catch(e){
        alert("등록 실패: " + e.message);
      }finally{
        btn.disabled = false;
        btn.textContent = old;
      }
    }

    function resetForm(){
      document.getElementById("vehicleMgmtNo").value = "";
      document.getElementById("vehicleNo").value = "";
      document.getElementById("vehicleInspectionStart").value = "";
      document.getElementById("vehicleInspectionEnd").value = "";
      document.getElementById("inspectionDate").value = "";
      document.getElementById("vendor").value = "";
      document.getElementById("inspectionPlace").value = "";
      document.getElementById("inspectionCost").value = "";
      document.getElementById("inspectionStart").value = "";
      document.getElementById("inspectionEnd").value = "";
      document.getElementById("memo").value = "";
    }

    document.addEventListener("DOMContentLoaded", ()=>{
      document.getElementById("openVehicleModalBtn").addEventListener("click", openVehicleModal);
      document.getElementById("closeVehicleModalBtn").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalClose2").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalBackdrop").addEventListener("click", closeVehicleModal);

      document.getElementById("vehicleSearchIconBtn").addEventListener("click", doVehicleSearch);
      document.getElementById("vehicleSearchKw").addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault();
          doVehicleSearch();
        }
      });

      const costEl = document.getElementById("inspectionCost");
      costEl.addEventListener("input", ()=>formatMoneyInput(costEl));

      document.getElementById("submitBtn").addEventListener("click", submitInspection);
      document.getElementById("resetBtn").addEventListener("click", resetForm);
    });
  </script>
</body>
</html>
