<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보험등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/insurance_register.css">
  <style>
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:44px; }
    .icon-btn{
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      width:34px; height:34px; border:1px solid #d1d5db; background:#fff;
      border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }

    .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9998; }
    .modal{
      display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
      width:min(920px, 92vw); max-height:80vh; background:#fff; border-radius:14px; overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.2); z-index:9999;
    }
    .modal-header{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #e5e7eb; }
    .modal-header h3{ margin:0; font-size:16px; font-weight:700; }
    .modal-close{ border:none; background:transparent; cursor:pointer; font-size:18px; padding:6px 10px; border-radius:8px; }
    .modal-close:hover{ background:#f3f4f6; }
    .modal-body{ padding:14px 16px 16px; overflow:auto; max-height:calc(80vh - 58px); }
    .modal-searchbar{ display:flex; gap:8px; margin-bottom:10px; }
    .modal-searchbar input{ flex:1; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; }
    .modal-searchbar button{ padding:10px 14px; border:1px solid #d1d5db; background:#fff; border-radius:10px; cursor:pointer; font-weight:600; }
    .modal-searchbar button:hover{ background:#f5f5f5; }
    .modal-table{ width:100%; border-collapse:collapse; font-size:14px; }
    .modal-table thead th{ text-align:left; background:#f8fafc; border-bottom:1px solid #e5e7eb; padding:10px; font-weight:700; position:sticky; top:0; }
    .modal-table tbody td{ padding:10px; border-bottom:1px solid #f1f5f9; }
    .modal-table tbody tr:hover{ background:#f9fafb; cursor:pointer; }
    .muted{ color:#6b7280; }
    .error-text{ color:#dc2626; font-weight:600; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>보험등록</h1>
      <p>차량관리 &gt; 보험관리 &gt; 보험등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 차량 정보 -->
        <div class="form-section">
          <div class="section-title">차량 정보</div>
          <div class="form-row">
            <div class="form-group">
              <label for="vehicleMgmtNo">차량관리번호 *</label>
              <div class="input-with-icon">
                <input type="text" id="vehicleMgmtNo" placeholder="차량관리번호 입력">
                <button type="button" class="icon-btn" id="vehiclePickerBtn" title="차량 선택">🔍</button>
              </div>
            </div>
            <div class="form-group">
              <label for="vehicleNo">차량번호</label>
              <input type="text" id="vehicleNo" placeholder="차량번호" disabled>
            </div>
          </div>
          <div id="vehicleInfoBox" class="vehicle-info-box" style="display:none;">
            차량번호: <strong id="vehicleNoDisplay">-</strong>
          </div>
        </div>

        <!-- 보험 기간 -->
        <div class="form-section">
          <div class="section-title">보험 기간</div>
          <div class="form-row">
            <div class="form-group">
              <label for="insuranceStartDate">보험기간시작일 *</label>
              <input type="date" id="insuranceStartDate">
            </div>
            <div class="form-group">
              <label for="insuranceEndDate">보험기간종료일 *</label>
              <input type="date" id="insuranceEndDate">
            </div>
          </div>
        </div>

        <!-- 보험 담보 내용 -->
        <div class="form-section">
          <div class="section-title">보험 담보 내용</div>
          <div class="coverage-grid">
            <div class="form-group"><label for="bodilyInjury">대인</label><input type="text" id="bodilyInjury" placeholder="예: 무한"></div>
            <div class="form-group"><label for="propertyDamage">대물</label><input type="text" id="propertyDamage" placeholder="예: 2억"></div>
            <div class="form-group"><label for="personalInjury">자기신체사고(자손)</label><input type="text" id="personalInjury" placeholder="예: 1억"></div>
            <div class="form-group"><label for="autoInjury">자동차상해(자상)</label><input type="text" id="autoInjury" placeholder="예: 1천만원"></div>
            <div class="form-group"><label for="uninsured">무보험차상해</label><input type="text" id="uninsured" placeholder="예: 2억"></div>
            <div class="form-group"><label for="ownVehicle">자기차량손해</label><input type="text" id="ownVehicle" placeholder="예: 가입금액"></div>
            <div class="form-group"><label for="emergency">긴급출동</label><input type="text" id="emergency" placeholder="예: 가입"></div>
          </div>
        </div>

        <!-- 운전자 정보 -->
        <div class="form-section">
          <div class="section-title">운전자 정보</div>
          <div class="form-row">
            <div class="form-group">
              <label for="ageRange">연령</label>
              <select id="ageRange">
                <option value="">선택</option>
                <option value="21">만 21세 이상</option>
                <option value="24">만 24세 이상</option>
                <option value="26">만 26세 이상</option>
                <option value="30">만 30세 이상</option>
                <option value="all">전연령</option>
              </select>
            </div>
            <div class="form-group">
              <label for="driverRange">운전자범위</label>
              <select id="driverRange">
                <option value="">선택</option>
                <option value="named">기명피보험자 1인</option>
                <option value="named-spouse">기명피보험자+배우자</option>
                <option value="family">가족한정</option>
                <option value="anyone">누구나</option>
              </select>
            </div>
          </div>
        </div>

        <!-- 기타 정보 -->
        <div class="form-section">
          <div class="section-title">기타 정보</div>
          <div class="form-row single">
            <div class="form-group">
              <label for="specialTerms">기타특약사항</label>
              <textarea id="specialTerms" placeholder="기타 특약사항을 입력하세요"></textarea>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="insurancePremium">보험료 *</label>
              <input type="text" id="insurancePremium" placeholder="0" inputmode="numeric">
            </div>
          </div>
        </div>

        <!-- 액션 버튼 -->
        <div class="action-buttons">
          <button type="button" class="btn-submit" id="submitBtn">등록</button>
          <button type="button" class="btn-cancel" id="resetBtn">취소</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 차량 선택 모달 -->
  <div class="modal-backdrop" id="pickerBackdrop"></div>
  <div class="modal" id="pickerModal">
    <div class="modal-header">
      <h3>차량 선택</h3>
      <button type="button" class="modal-close" id="pickerCloseBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-searchbar">
        <input type="text" id="pickerKw" placeholder="차량관리번호/차량번호/차종 검색">
        <button type="button" id="pickerSearchBtn">검색</button>
      </div>
      <div class="muted" style="margin-bottom:8px;">모달이 열리면 자동으로 전체조회됩니다. (kw=빈값)</div>
      <table class="modal-table">
        <thead>
          <tr>
            <th style="width:140px;">차량관리번호</th>
            <th style="width:140px;">차량번호</th>
            <th>차종</th>
          </tr>
        </thead>
        <tbody id="pickerBody">
          <tr><td class="muted" colspan="3">조회중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll("\"","&quot;")
        .replaceAll("'","&#039;");
    }

    async function mustOk(res){
      if(res.ok) return res;
      let msg = "HTTP " + res.status;
      try{
        const b = await res.json();
        msg = b.message || b.error || b.msg || msg;
      }catch(e){}
      throw new Error(msg);
    }

    async function fetchJson(url, opt){
      const res = await fetch(url, opt);
      await mustOk(res);
      return res.json();
    }

    function parseMoneyToLong(str){
      const n = String(str ?? "").replace(/[^\d]/g, "");
      if(!n) return 0;
      try { return parseInt(n, 10); } catch(e){ return 0; }
    }

    function formatMoneyInput(el){
      const n = parseMoneyToLong(el.value);
      el.value = n ? n.toLocaleString("ko-KR") : "";
    }

    async function loadVehicleInfoByMgmtNo(){
      const mgmtNo = $("vehicleMgmtNo").value.trim();
      if(!mgmtNo) return;

      try{
        const v = await fetchJson(`${BASE}/api/vehicle-orders/${encodeURIComponent(mgmtNo)}`);
        const vehicleNo = v.vehicleNo || v.vehicleNumber || v.vehicle_no || "";

        $("vehicleNo").value = vehicleNo;
        $("vehicleNoDisplay").textContent = vehicleNo || "-";
        $("vehicleInfoBox").style.display = vehicleNo ? "block" : "none";
      }catch(e){
        $("vehicleNo").value = "";
        $("vehicleNoDisplay").textContent = "-";
        $("vehicleInfoBox").style.display = "none";
        alert("차량 조회 실패: " + e.message);
      }
    }

    $("vehicleMgmtNo").addEventListener("change", loadVehicleInfoByMgmtNo);

    const picker = {
      open(){
        $("pickerBackdrop").style.display = "block";
        $("pickerModal").style.display = "block";
        $("pickerKw").value = "";
        $("pickerBody").innerHTML = `<tr><td class="muted" colspan="3">조회중...</td></tr>`;

        setTimeout(() => {
          $("pickerKw").focus();
          pickerSearch("");
        }, 0);
      },

      close(){
        $("pickerBackdrop").style.display = "none";
        $("pickerModal").style.display = "none";
      }
    };

    async function pickerSearch(kw){
      $("pickerBody").innerHTML = `<tr><td class="muted" colspan="3">조회중...</td></tr>`;

      try{
        const res = await fetch(`${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw ?? "")}`);
        await mustOk(res);
        const list = await res.json();

        if(!Array.isArray(list) || list.length === 0){
          $("pickerBody").innerHTML = `<tr><td class="muted" colspan="3">검색 결과 없음</td></tr>`;
          return;
        }

        $("pickerBody").innerHTML = list.map(v => `
          <tr data-mgmt="${escapeHtml(v.vehicleMgmtNo || "")}">
            <td>${escapeHtml(v.vehicleMgmtNo || "-")}</td>
            <td>${escapeHtml(v.vehicleNo || "-")}</td>
            <td>${escapeHtml(v.carModel || "-")}</td>
          </tr>
        `).join("");

        [...$("pickerBody").querySelectorAll("tr")].forEach(tr => {
          tr.addEventListener("click", async () => {
            const mgmt = tr.getAttribute("data-mgmt") || "";
            if(!mgmt){
              alert("차량관리번호가 없습니다.");
              return;
            }

            $("vehicleMgmtNo").value = mgmt;
            picker.close();
            await loadVehicleInfoByMgmtNo();
          });
        });
      }catch(e){
        $("pickerBody").innerHTML = `<tr><td class="error-text" colspan="3">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    $("vehiclePickerBtn").addEventListener("click", () => picker.open());
    $("pickerBackdrop").addEventListener("click", () => picker.close());
    $("pickerCloseBtn").addEventListener("click", () => picker.close());
    $("pickerSearchBtn").addEventListener("click", () => pickerSearch($("pickerKw").value.trim()));

    $("pickerKw").addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        pickerSearch($("pickerKw").value.trim());
      }
      if(e.key === "Escape"){
        picker.close();
      }
    });

    $("insurancePremium").addEventListener("input", () => {
      formatMoneyInput($("insurancePremium"));
    });

    $("submitBtn").addEventListener("click", async () => {
      const mgmtNo = $("vehicleMgmtNo").value.trim();
      const startDate = $("insuranceStartDate").value;
      const endDate = $("insuranceEndDate").value;
      const premium = parseMoneyToLong($("insurancePremium").value);

      if(!mgmtNo){
        alert("차량관리번호를 입력/선택해주세요.");
        return;
      }

      if(!startDate || !endDate){
        alert("보험기간을 입력해주세요.");
        return;
      }

      if(!premium || premium <= 0){
        alert("보험료를 입력해주세요.");
        return;
      }

      const payload = {
        vehicleMgmtNo: mgmtNo,
        vehicleNo: $("vehicleNo").value.trim(),

        insuranceStartDate: startDate,
        insuranceEndDate: endDate,

        bodilyInjury: $("bodilyInjury").value.trim(),
        propertyDamage: $("propertyDamage").value.trim(),
        personalInjury: $("personalInjury").value.trim(),
        autoInjury: $("autoInjury").value.trim(),
        uninsured: $("uninsured").value.trim(),
        ownVehicle: $("ownVehicle").value.trim(),
        emergency: $("emergency").value.trim(),

        ageRange: $("ageRange").value,
        driverRange: $("driverRange").value,

        specialTerms: $("specialTerms").value.trim(),
        insurancePremium: premium
      };

      try{
        const saved = await fetchJson(`${BASE}/api/insurances`, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify(payload)
        });

        alert("보험 정보가 등록되었습니다.");
        window.location.href = `insurance_detail.html?id=${encodeURIComponent(saved.id)}`;
      }catch(e){
        console.error(e);
        alert("등록 실패: " + e.message);
      }
    });

    $("resetBtn").addEventListener("click", () => {
      if(!confirm("입력을 초기화할까요?")) return;

      $("vehicleMgmtNo").value = "";
      $("vehicleNo").value = "";
      $("vehicleNoDisplay").textContent = "-";
      $("vehicleInfoBox").style.display = "none";

      $("insuranceStartDate").value = "";
      $("insuranceEndDate").value = "";

      ["bodilyInjury","propertyDamage","personalInjury","autoInjury","uninsured","ownVehicle","emergency"].forEach(id => {
        $(id).value = "";
      });

      $("ageRange").value = "";
      $("driverRange").value = "";
      $("specialTerms").value = "";
      $("insurancePremium").value = "";
    });
  </script>
</body>
</html>
