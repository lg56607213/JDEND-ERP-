<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보험현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/maintenance_status.css">

  <style>
    /* ===== input + 돋보기 ===== */
    .input-with-icon{ position:relative; width:100%; min-width:0; }
    .input-with-icon input{ width:100%; box-sizing:border-box; padding-right:48px; }
    .icon-btn{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:34px; height:34px;
      border:1px solid #ddd;
      background:#fff;
      border-radius:8px;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:14px;
    }
    .icon-btn:hover{ background:#f5f5f5; }

    /* ✅ 검색그리드 폭/간격 강제 (계약/차량/날짜 같은 크기 + 간격 확보) */
    .search-section .search-grid{
      display:grid !important;
      grid-template-columns: repeat(5, minmax(0, 1fr)) !important; /* 5칸 동일폭 */
      gap:14px !important; /* 칸 사이 거리 */
      align-items:end;
    }
    .search-section .search-grid .form-group{
      width:100%;
      min-width:0;
    }
    .search-section input[type="date"],
    .search-section input[type="text"]{
      width:100%;
      box-sizing:border-box;
    }

    /* ===== 모달 ===== */
    .modal-backdrop{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      z-index:9999;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .modal{
      width:min(980px, 96vw);
      max-height:84vh;
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 40px rgba(0,0,0,.25);
      display:flex;
      flex-direction:column;
    }
    .modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 16px;
      border-bottom:1px solid #eee;
    }
    .modal-title{
      font-weight:700;
      color:#111827;
    }
    .modal-close{
      border:1px solid #ddd;
      background:#fff;
      border-radius:8px;
      width:34px; height:34px;
      cursor:pointer;
    }
    .modal-body{
      padding:14px 16px;
      overflow:auto;
    }
    .modal-search{
      display:flex;
      gap:8px;
      margin-bottom:12px;
    }
    .modal-search input{
      flex:1;
      padding:10px 12px;
      border:1px solid #d1d5db;
      border-radius:10px;
      outline:none;
      box-sizing:border-box;
    }
    .modal-search input:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.12);
    }
    .modal-search button{
      padding:10px 14px;
      border:1px solid #d1d5db;
      background:#fff;
      border-radius:10px;
      cursor:pointer;
    }
    .modal-search button:hover{ background:#f8fafc; }

    .pick-table{
      width:100%;
      border-collapse:collapse;
    }
    .pick-table th, .pick-table td{
      border-bottom:1px solid #eee;
      padding:10px 10px;
      text-align:left;
      font-size:14px;
    }
    .pick-table thead th{
      background:#f9fafb;
      position:sticky;
      top:0;
      z-index:1;
    }
    .pick-row{ cursor:pointer; }
    .pick-row:hover{ background:#f3f4f6; }
    .muted{ color:#6b7280; font-size:13px; }

    /* ===== 변경/해지 버튼 ===== */
    .btn-change{
      padding:4px 10px; font-size:12px; font-weight:600; border-radius:6px; cursor:pointer;
      border:1px solid #3b82f6; background:#eff6ff; color:#1d4ed8;
    }
    .btn-change:hover{ background:#dbeafe; }
    .btn-terminate{
      padding:4px 10px; font-size:12px; font-weight:600; border-radius:6px; cursor:pointer;
      border:1px solid #dc2626; background:#fef2f2; color:#dc2626;
    }
    .btn-terminate:hover{ background:#fee2e2; }

    /* ===== 변경/해지 입력 모달 ===== */
    .action-modal-backdrop{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:10000;
      align-items:center; justify-content:center;
    }
    .action-modal{
      background:#fff; border-radius:12px;
      width:min(500px, 94vw); padding:24px;
      box-shadow:0 12px 40px rgba(0,0,0,.25);
    }
    .action-modal h3{ margin:0 0 16px; font-size:17px; }
    .action-modal .field{ margin-bottom:12px; }
    .action-modal label{ display:block; font-size:13px; font-weight:600; margin-bottom:4px; color:#374151; }
    .action-modal input[type="text"],
    .action-modal input[type="date"],
    .action-modal textarea{
      width:100%; box-sizing:border-box;
      padding:9px 11px; border:1px solid #d1d5db; border-radius:8px;
      font-size:14px; outline:none;
    }
    .action-modal input:focus,
    .action-modal textarea:focus{ border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.12); }
    .action-modal textarea{ resize:vertical; min-height:70px; }
    .action-modal .modal-btns{ display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }
    .action-modal .btn-ok{
      padding:9px 22px; background:#1d4ed8; color:#fff;
      border:none; border-radius:8px; font-weight:700; cursor:pointer;
    }
    .action-modal .btn-ok:hover{ background:#1e40af; }
    .action-modal .btn-ok.terminate-ok{ background:#dc2626; }
    .action-modal .btn-ok.terminate-ok:hover{ background:#b91c1c; }
    .action-modal .btn-cancel-m{
      padding:9px 16px; background:#f3f4f6; border:1px solid #d1d5db;
      border-radius:8px; font-weight:600; cursor:pointer;
    }
    .action-modal .btn-cancel-m:hover{ background:#e5e7eb; }
  </style>
</head>

<body>
<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>보험현황</h1>
    <p>차량관리 &gt; 보험관리 &gt; 보험현황</p>
  </div>

  <div class="erp-card">
    <div class="card-body">

      <div class="search-section">
        <div class="search-grid">

          <!-- 계약번호 -->
          <div class="form-group">
            <label for="searchContract">계약번호</label>
            <div class="input-with-icon">
              <input type="text" id="searchContract" placeholder="계약번호 검색">
              <button type="button" class="icon-btn" id="openContractModalBtn" title="계약 검색">🔍</button>
            </div>
          </div>

          <!-- 차량번호 -->
          <div class="form-group">
            <label for="searchVehicle">차량번호</label>
            <div class="input-with-icon">
              <input type="text" id="searchVehicle" placeholder="차량번호 검색">
              <button type="button" class="icon-btn" id="openVehicleModalBtn" title="차량 검색">🔍</button>
            </div>
          </div>

          <div class="form-group">
            <label for="searchStartDate">보험시작일(시작)</label>
            <input type="date" id="searchStartDate">
          </div>

          <div class="form-group">
            <label for="searchEndDate">보험시작일(종료)</label>
            <input type="date" id="searchEndDate">
          </div>

          <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn-search" id="searchBtn">조회</button>
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn-excel" onclick="exportTableToExcel('insuranceTableBody', '보험현황')">엑셀 내보내기</button>
          </div>

        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
          <tr>
            <th>No</th>
            <th>계약번호</th>
            <th>차량번호</th>
            <th>보험시작일</th>
            <th>보험종료일</th>
            <th>보험료</th>
            <th>대인</th>
            <th>대물</th>
            <th>자손</th>
            <th>자상</th>
            <th>무보험차상해</th>
            <th>긴급출동</th>
            <th>관리</th>
          </tr>
          </thead>
          <tbody id="insuranceTableBody">
          <tr><td colspan="13" style="text-align:center; color:#888;">조회하세요.</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- 미가입 차량 현황 -->
  <div class="erp-card" style="margin-top:18px;">
    <div class="card-header" style="padding:14px 16px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0; font-size:16px; font-weight:700; color:#111827;">미가입 차량</h2>
      <span style="font-size:13px; color:#64748b;">보험이 한 건도 등록되지 않은 차량</span>
    </div>
    <div class="card-body">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>차량관리번호</th>
              <th>차량번호</th>
              <th>차종</th>
            </tr>
          </thead>
          <tbody id="uninsuredTbody">
            <tr><td colspan="4" style="text-align:center; color:#888;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ===== 계약 검색 모달 ===== -->
<div class="modal-backdrop" id="contractModalBackdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="contractModalTitle">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="contractModalTitle">계약 선택</div>
        <div class="muted">목록에서 선택하면 계약번호/차량번호가 자동 입력됩니다.</div>
      </div>
      <button type="button" class="modal-close" id="closeContractModalBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-search">
        <input type="text" id="contractKw" placeholder="계약번호/차량번호/고객명 등 키워드">
        <button type="button" id="contractSearchBtn">검색</button>
      </div>

      <table class="pick-table">
        <thead>
          <tr>
            <th style="width:200px;">계약번호</th>
            <th style="width:160px;">차량번호</th>
            <th>고객명/기타</th>
          </tr>
        </thead>
        <tbody id="contractPickBody">
          <tr><td colspan="3" style="text-align:center; color:#888;">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== 차량 검색 모달 ===== -->
<div class="modal-backdrop" id="vehicleModalBackdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="vehicleModalTitle">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="vehicleModalTitle">차량 선택</div>
        <div class="muted">목록에서 선택하면 차량번호가 자동 입력됩니다.</div>
      </div>
      <button type="button" class="modal-close" id="closeVehicleModalBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-search">
        <input type="text" id="vehicleKw" placeholder="차량번호/차량관리번호 키워드">
        <button type="button" id="vehicleSearchBtn">검색</button>
      </div>

      <table class="pick-table">
        <thead>
          <tr>
            <th style="width:200px;">차량관리번호</th>
            <th style="width:160px;">차량번호</th>
            <th>차종/기타</th>
          </tr>
        </thead>
        <tbody id="vehiclePickBody">
          <tr><td colspan="3" style="text-align:center; color:#888;">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== 변경/해지 입력 모달 ===== -->
<div class="action-modal-backdrop" id="actionModalBackdrop" style="display:none;">
  <div class="action-modal">
    <h3 id="actionModalTitle">보험 변경</h3>
    <div class="field">
      <label>변경사유</label>
      <textarea id="actionReason" placeholder="변경사유를 입력하세요"></textarea>
    </div>
    <div class="field">
      <label>추가납부보험료 (원)</label>
      <input type="text" id="actionAdditional" placeholder="0" inputmode="numeric">
    </div>
    <div class="field">
      <label>환급보험료 (원)</label>
      <input type="text" id="actionRefund" placeholder="0" inputmode="numeric">
    </div>
    <div class="field">
      <label>전표발생일자</label>
      <input type="date" id="actionVoucherDate">
    </div>
    <div class="modal-btns">
      <button type="button" class="btn-cancel-m" id="actionModalCancelBtn">취소</button>
      <button type="button" class="btn-ok" id="actionModalOkBtn">등록</button>
    </div>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>

<script>
  const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");
  const $ = (id)=>document.getElementById(id);

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll("\"","&quot;")
      .replaceAll("'","&#039;");
  }

  async function mustOk(res){
    if(res.ok) return res;
    let msg="HTTP "+res.status;
    try{ const b=await res.json(); msg=b.message||b.error||b.msg||msg; }catch(e){}
    throw new Error(msg);
  }

  function goToDetail(id){
    window.location.href = "insurance_detail.html?id="+encodeURIComponent(id);
  }

  function renderInsurance(list){
    const tbody=$('insuranceTableBody');

    if(!Array.isArray(list)||list.length===0){
      tbody.innerHTML=`<tr><td colspan="13" style="text-align:center; color:#888;">검색 결과가 없습니다.</td></tr>`;
      return;
    }

    tbody.innerHTML=list.map((it,idx)=>`
      <tr style="cursor:pointer;" onclick="goToDetail('${escapeHtml(it.id)}')">
        <td>${idx+1}</td>
        <td>${escapeHtml(it.contractNumber || '-')}</td>
        <td>${escapeHtml(it.vehicleNo || '-')}</td>
        <td>${escapeHtml(it.insuranceStartDate || '-')}</td>
        <td>${escapeHtml(it.insuranceEndDate || '-')}</td>
        <td class="amount-cell">${(it.insurancePremium||0).toLocaleString()}</td>
        <td>${escapeHtml(it.bodilyInjury || '-')}</td>
        <td>${escapeHtml(it.propertyDamage || '-')}</td>
        <td>${escapeHtml(it.personalInjury || '-')}</td>
        <td>${escapeHtml(it.autoInjury || '-')}</td>
        <td>${escapeHtml(it.uninsured || '-')}</td>
        <td>${escapeHtml(it.emergency || '-')}</td>
        <td onclick="event.stopPropagation()" style="white-space:nowrap;">
          <button class="btn-change" onclick="openActionModal(${it.id},'변경')">변경</button>
          <button class="btn-terminate" onclick="openActionModal(${it.id},'해지')">해지</button>
        </td>
      </tr>
    `).join('');
  }

  async function searchInsurance(){
    const contractNumber = $('searchContract').value.trim();
    const vehicleNo = $('searchVehicle').value.trim();
    const startDate = $('searchStartDate').value;
    const endDate = $('searchEndDate').value;

    const qs=new URLSearchParams();
    if(contractNumber) qs.set("contractNumber", contractNumber);
    if(vehicleNo) qs.set("vehicleNo", vehicleNo);
    if(startDate) qs.set("startDate", startDate);
    if(endDate) qs.set("endDate", endDate);

    const tbody=$('insuranceTableBody');
    tbody.innerHTML=`<tr><td colspan="13" style="text-align:center;">조회중...</td></tr>`;

    try{
      const res=await fetch(`${BASE}/api/insurances?${qs.toString()}`);
      await mustOk(res);
      const data=await res.json();
      renderInsurance(data);
    }catch(e){
      tbody.innerHTML=`<tr><td colspan="13" style="color:red; text-align:center;">오류: ${escapeHtml(e.message)}</td></tr>`;
    }
  }

  async function searchAllInsurance(){
    const tbody=$('insuranceTableBody');
    tbody.innerHTML=`<tr><td colspan="13" style="text-align:center;">조회중...</td></tr>`;
    try{
      const res=await fetch(`${BASE}/api/insurances`);
      await mustOk(res);
      const data=await res.json();
      renderInsurance(data);
    }catch(e){
      tbody.innerHTML=`<tr><td colspan="13" style="color:red; text-align:center;">오류: ${escapeHtml(e.message)}</td></tr>`;
    }
  }

  /* ===== 변경/해지 모달 ===== */
  let _actionInsuranceId = null;
  let _actionType = null;

  function parseMoneyInput(str){
    const n = String(str ?? '').replace(/[^\d]/g, '');
    return n ? parseInt(n, 10) : 0;
  }

  function formatMoneyField(el){
    const n = parseMoneyInput(el.value);
    el.value = n ? n.toLocaleString('ko-KR') : '';
  }

  function openActionModal(insuranceId, type){
    _actionInsuranceId = insuranceId;
    _actionType = type;
    const isTerminate = type === '해지';

    $('actionModalTitle').textContent = '보험 ' + type;
    $('actionModalOkBtn').textContent = type + ' 등록';
    $('actionModalOkBtn').className = 'btn-ok' + (isTerminate ? ' terminate-ok' : '');
    $('actionReason').value = '';
    $('actionAdditional').value = '';
    $('actionRefund').value = '';
    $('actionVoucherDate').value = new Date().toISOString().slice(0, 10);

    $('actionModalBackdrop').style.display = 'flex';
    setTimeout(() => $('actionReason').focus(), 0);
  }

  function closeActionModal(){
    $('actionModalBackdrop').style.display = 'none';
    _actionInsuranceId = null;
    _actionType = null;
  }

  async function submitActionModal(){
    if (!_actionInsuranceId || !_actionType) return;

    const additional = parseMoneyInput($('actionAdditional').value);
    const refund = parseMoneyInput($('actionRefund').value);
    const voucherDate = $('actionVoucherDate').value;

    if (!voucherDate) { alert('전표발생일자를 입력해주세요.'); return; }
    if (additional <= 0 && refund <= 0) {
      alert('추가납부보험료 또는 환급보험료 중 하나 이상을 입력해주세요.');
      return;
    }

    const endpoint = _actionType === '해지'
      ? `${BASE}/api/insurances/${_actionInsuranceId}/terminate`
      : `${BASE}/api/insurances/${_actionInsuranceId}/change`;

    const payload = {
      changeType: _actionType,
      changeReason: $('actionReason').value.trim(),
      additionalPremium: additional || null,
      refundPremium: refund || null,
      voucherDate: voucherDate
    };

    try{
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      await mustOk(res);
      alert(`보험 ${_actionType} 처리 및 전표가 등록되었습니다.`);
      closeActionModal();
    }catch(e){
      alert(`${_actionType} 처리 실패: ` + e.message);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    $('actionAdditional').addEventListener('input', () => formatMoneyField($('actionAdditional')));
    $('actionRefund').addEventListener('input', () => formatMoneyField($('actionRefund')));
    $('actionModalCancelBtn').addEventListener('click', closeActionModal);
    $('actionModalOkBtn').addEventListener('click', submitActionModal);
    $('actionModalBackdrop').addEventListener('click', (e) => {
      if (e.target === $('actionModalBackdrop')) closeActionModal();
    });
  });

  /* =========================
     계약 돋보기 모달
     ========================= */
  function openContractModal(){
    $('contractModalBackdrop').style.display='flex';
    $('contractKw').value = '';
    loadContracts(''); // 모달 열릴때 전체조회
    setTimeout(()=>$('contractKw').focus(), 0);
  }
  function closeContractModal(){
    $('contractModalBackdrop').style.display='none';
  }

  function renderContracts(list){
    const body = $('contractPickBody');
    if(!Array.isArray(list) || list.length===0){
      body.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">결과 없음</td></tr>`;
      return;
    }

    body.innerHTML = list.map(it => `
      <tr class="pick-row"
          data-contract="${escapeHtml(it.contractNumber || it.contractNo || '')}"
          data-vehicle="${escapeHtml(it.vehicleNo || '')}">
        <td>${escapeHtml(it.contractNumber || it.contractNo || '-')}</td>
        <td>${escapeHtml(it.vehicleNo || '-')}</td>
        <td>${escapeHtml(it.customerName || it.customer || it.name || '-')}</td>
      </tr>
    `).join('');

    body.querySelectorAll('.pick-row').forEach(tr=>{
      tr.addEventListener('click', ()=>{
        const c = tr.getAttribute('data-contract') || '';
        const v = tr.getAttribute('data-vehicle') || '';
        $('searchContract').value = c;
        if(v) $('searchVehicle').value = v;
        closeContractModal();
      });
    });
  }

  async function loadContracts(kw){
    const body = $('contractPickBody');
    body.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">불러오는 중...</td></tr>`;

    try{
      const res = await fetch(`${BASE}/api/contracts/search?kw=${encodeURIComponent(kw||'')}`);
      await mustOk(res);
      const data = await res.json();
      renderContracts(data);
    }catch(e){
      body.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
    }
  }

  /* =========================
     차량 돋보기 모달
     ========================= */
  function openVehicleModal(){
    $('vehicleModalBackdrop').style.display='flex';
    $('vehicleKw').value = '';
    loadVehicles(''); // 모달 열릴때 전체조회
    setTimeout(()=>$('vehicleKw').focus(), 0);
  }
  function closeVehicleModal(){
    $('vehicleModalBackdrop').style.display='none';
  }

  function renderVehicles(list){
    const body = $('vehiclePickBody');
    if(!Array.isArray(list) || list.length===0){
      body.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">결과 없음</td></tr>`;
      return;
    }

    body.innerHTML = list.map(it => `
      <tr class="pick-row"
          data-veh="${escapeHtml(it.vehicleNo || '')}">
        <td>${escapeHtml(it.vehicleMgmtNo || it.mgmtNo || '-')}</td>
        <td>${escapeHtml(it.vehicleNo || '-')}</td>
        <td>${escapeHtml(it.model || it.vehicleModel || it.carModel || '-')}</td>
      </tr>
    `).join('');

    body.querySelectorAll('.pick-row').forEach(tr=>{
      tr.addEventListener('click', ()=>{
        const v = tr.getAttribute('data-veh') || '';
        $('searchVehicle').value = v;
        closeVehicleModal();
      });
    });
  }

  async function loadVehicles(kw){
    const body = $('vehiclePickBody');
    body.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">불러오는 중...</td></tr>`;

    try{
      const res = await fetch(`${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw||'')}`);
      await mustOk(res);
      const data = await res.json();
      renderVehicles(data);
    }catch(e){
      body.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
    }
  }

  /* ===== ESC로 모달 닫기, 바깥 클릭 닫기 ===== */
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape'){
      if($('actionModalBackdrop').style.display === 'flex') { closeActionModal(); return; }
      if($('contractModalBackdrop').style.display === 'flex') closeContractModal();
      if($('vehicleModalBackdrop').style.display === 'flex') closeVehicleModal();
    }
  });
  $('contractModalBackdrop').addEventListener('click', (e)=>{
    if(e.target === $('contractModalBackdrop')) closeContractModal();
  });
  $('vehicleModalBackdrop').addEventListener('click', (e)=>{
    if(e.target === $('vehicleModalBackdrop')) closeVehicleModal();
  });

  /* ===== 이벤트 바인딩 ===== */
  document.addEventListener("DOMContentLoaded", ()=>{
    $('searchBtn').addEventListener("click", searchInsurance);

    ['searchContract','searchVehicle','searchStartDate','searchEndDate'].forEach(id=>{
      $(id).addEventListener("keydown",(e)=>{
        if(e.key==="Enter"){ e.preventDefault(); searchInsurance(); }
      });
    });

    $('openContractModalBtn').addEventListener('click', openContractModal);
    $('openVehicleModalBtn').addEventListener('click', openVehicleModal);

    $('contractSearchBtn').addEventListener('click', ()=>loadContracts($('contractKw').value.trim()));
    $('contractKw').addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); loadContracts($('contractKw').value.trim()); }
    });

    $('vehicleSearchBtn').addEventListener('click', ()=>loadVehicles($('vehicleKw').value.trim()));
    $('vehicleKw').addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); loadVehicles($('vehicleKw').value.trim()); }
    });

    $('closeContractModalBtn').addEventListener('click', closeContractModal);
    $('closeVehicleModalBtn').addEventListener('click', closeVehicleModal);

    // 첫 로딩: 보험 전체조회
    searchAllInsurance();
    loadUninsuredVehicles();
  });

  async function loadUninsuredVehicles(){
    const tbody = $('uninsuredTbody');
    try{
      const res = await fetch(`${BASE}/api/dashboard/vehicle-insurance-all`, { credentials:'include' });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const all = await res.json();
      const list = (all||[]).filter(r => r.status === '미가입');
      if(list.length === 0){
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#64748b;">미가입 차량 없음</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((r,i) => `
        <tr>
          <td>${i+1}</td>
          <td>${escapeHtml(r.vehicleMgmtNo||'-')}</td>
          <td>${escapeHtml(r.vehicleNo||'-')}</td>
          <td>${escapeHtml(r.carModel||'-')}</td>
        </tr>
      `).join('');
    }catch(e){
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#e74c3c;">오류: ${escapeHtml(e.message)}</td></tr>`;
    }
  }
</script>
  <script src="../../assets/js/excel-export.js"></script>
</body>
</html>
