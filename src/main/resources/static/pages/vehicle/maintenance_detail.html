<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정비 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/maintenance_status.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>정비 상세</h1>
    <p>차량관리 &gt; 정비 &gt; 정비현황 &gt; 상세보기</p>
  </div>

  <div class="erp-card" id="maintenanceDetailSection">
    <div class="card-header card-header-detail">
      <h2>정비 상세 정보</h2>
      <button type="button" class="btn btn-secondary" onclick="goBack()">목록으로</button>
    </div>

    <div class="card-body card-body-detail">

      <div class="form-section">
        <h3 class="section-title">차량 정보</h3>
        <div class="detail-grid">
          <div class="detail-item">
            <label>차량관리번호</label>
            <div class="detail-value" id="vehicleMgmtNo">-</div>
          </div>
          <div class="detail-item">
            <label>차량번호</label>
            <div class="detail-value" id="vehicleNo">-</div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">정비 정보</h3>
        <div class="detail-grid">
          <div class="detail-item">
            <label>정비일자</label>
            <div class="detail-value" id="maintenanceDate">-</div>
          </div>
          <div class="detail-item">
            <label>정비내용</label>
            <div class="detail-value" id="description">-</div>
          </div>
          <div class="detail-item">
            <label>금액</label>
            <div class="detail-value" id="amount">-</div>
          </div>
          <div class="detail-item">
            <label>공급가액</label>
            <div class="detail-value" id="supplyAmount">-</div>
          </div>
          <div class="detail-item">
            <label>세액</label>
            <div class="detail-value" id="taxAmount">-</div>
          </div>
          <div class="detail-item">
            <label>지급방법</label>
            <div class="detail-value" id="paymentMethod">-</div>
          </div>
          <div class="detail-item">
            <label>지급처</label>
            <div class="detail-value" id="vendor">-</div>
          </div>
          <div class="detail-item">
            <label>지급일자</label>
            <div class="detail-value" id="paymentDate">-</div>
          </div>
        </div>
      </div>

      <div class="form-actions" style="display:flex; gap:8px;">
        <button type="button" class="btn btn-primary" id="editMaintenanceBtn" disabled>수정하기</button>
        <button type="button" class="btn btn-secondary" id="reloadBtn">다시 불러오기</button>
      </div>

      <div style="margin-top:12px; font-size:12px; color:#666;">
        <div>maintenanceId: <strong id="dbgMaintenanceId">-</strong> / itemId: <strong id="dbgItemId">-</strong></div>
        <div id="dbgError" style="margin-top:6px; color:#d00;"></div>
      </div>

    </div>
  </div>

  <div class="erp-card hidden" id="maintenanceEditSection">
    <div class="card-header card-header-detail">
      <h2>정비 정보 수정</h2>
      <button type="button" class="btn btn-secondary" id="cancelEditBtn">취소</button>
    </div>

    <div class="card-body card-body-detail">
      <form id="maintenanceEditForm">

        <div class="form-section">
          <h3 class="section-title">차량 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>차량관리번호</label>
              <div class="detail-value" id="editVehicleMgmtNo">-</div>
            </div>
            <div class="detail-item">
              <label>차량번호</label>
              <div class="detail-value" id="editVehicleNo">-</div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">정비 정보</h3>
          <div class="detail-grid">

            <div class="form-group form-group-column">
              <label>정비일자</label>
              <input type="date" id="editMaintenanceDate" required>
            </div>

            <div class="form-group form-group-column">
              <label>정비내용</label>
              <input type="text" id="editDescription" required>
            </div>

            <div class="form-group form-group-column">
              <label>금액</label>
              <input type="number" id="editAmountInput" required>
            </div>

            <div class="detail-item">
              <label>공급가액 (자동계산)</label>
              <div class="detail-value" id="editSupplyAmount">0원</div>
            </div>

            <div class="detail-item">
              <label>세액 (자동계산)</label>
              <div class="detail-value" id="editTaxAmount">0원</div>
            </div>

            <div class="form-group form-group-column">
              <label>지급방법</label>
              <select id="editPaymentMethod">
                <option value="미지급금">미지급금</option>
                <option value="법인카드">법인카드</option>
                <option value="보통예금">보통예금</option>
              </select>
            </div>

            <div class="form-group form-group-column">
              <label>지급처</label>
              <input type="text" id="editVendor">
            </div>

            <div class="form-group form-group-column">
              <label>지급일자</label>
              <input type="date" id="editPaymentDate">
            </div>

          </div>
        </div>

        <div class="form-actions" style="display:flex; gap:8px;">
          <button type="button" class="btn btn-secondary" id="resetBtn">초기화</button>
          <button type="submit" class="btn btn-primary">수정 완료</button>
        </div>

      </form>
    </div>
  </div>

</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>

<script>
  const BASE = (typeof API_BASE_URL !== "undefined" && API_BASE_URL) ? API_BASE_URL : "http://localhost:8080";

  const qs = new URLSearchParams(window.location.search);
  const maintenanceId = qs.get("maintenanceId");
  const itemId = qs.get("itemId");

  const detailSection = document.getElementById("maintenanceDetailSection");
  const editSection = document.getElementById("maintenanceEditSection");
  const editBtn = document.getElementById("editMaintenanceBtn");
  const reloadBtn = document.getElementById("reloadBtn");
  const dbgMaintenanceId = document.getElementById("dbgMaintenanceId");
  const dbgItemId = document.getElementById("dbgItemId");
  const dbgError = document.getElementById("dbgError");

  let currentData = null;

  dbgMaintenanceId.textContent = maintenanceId || "(없음)";
  dbgItemId.textContent = itemId || "(없음)";

  function showError(msg) {
    dbgError.textContent = msg || "";
  }

  function money(v) {
    const n = Number(v);
    return (Number.isFinite(n) ? n : 0).toLocaleString() + "원";
  }

  async function readErrorMessage(res) {
    try {
      const body = await res.json();
      if (body && body.message) return body.message;
      return JSON.stringify(body);
    } catch (e) {
      try {
        const t = await res.text();
        return t || ("HTTP " + res.status);
      } catch (e2) {
        return "HTTP " + res.status;
      }
    }
  }

  async function loadDetail() {
    showError("");
    currentData = null;
    editBtn.disabled = true;

    if (!maintenanceId || !itemId) {
      showError("URL 파라미터가 없습니다. maintenanceId / itemId가 필요합니다.");
      return;
    }

    renderDetail({
      vehicleMgmtNo: "-",
      vehicleNo: "-",
      maintenanceDate: "-",
      description: "-",
      amount: 0,
      supplyAmount: 0,
      vatAmount: 0,
      vendor: "",
      payDate: "-",
      paymentMethod: "-"
    });

    try {
      const url = `${BASE}/api/vehicle-maintenance/${encodeURIComponent(maintenanceId)}/items/${encodeURIComponent(itemId)}`;
      const res = await fetch(url);

      if (!res.ok) {
        const msg = await readErrorMessage(res);
        throw new Error(`상세 조회 실패 (HTTP ${res.status}) : ${msg}`);
      }

      const data = await res.json();

      if (!data) {
        throw new Error("상세 조회 결과가 비었습니다(null).");
      }

      currentData = data;
      renderDetail(data);
      editBtn.disabled = false;

    } catch (e) {
      showError(e.message);
      alert(e.message);
    }
  }

  function renderDetail(d) {
    document.getElementById("vehicleMgmtNo").textContent = d.vehicleMgmtNo ?? "-";
    document.getElementById("vehicleNo").textContent = d.vehicleNo ?? "-";
    document.getElementById("maintenanceDate").textContent = d.maintenanceDate ?? "-";
    document.getElementById("description").textContent = d.description ?? "-";
    document.getElementById("amount").textContent = money(d.amount);
    document.getElementById("supplyAmount").textContent = money(d.supplyAmount);
    document.getElementById("taxAmount").textContent = money(d.vatAmount);
    document.getElementById("paymentMethod").textContent = d.paymentMethod ?? "-";
    document.getElementById("vendor").textContent = d.vendor ?? "";
    document.getElementById("paymentDate").textContent = d.payDate ?? "-";
  }

  editBtn.addEventListener("click", () => {
    if (!currentData) {
      alert("데이터가 아직 로드되지 않았습니다.");
      return;
    }

    document.getElementById("editVehicleMgmtNo").textContent = currentData.vehicleMgmtNo ?? "-";
    document.getElementById("editVehicleNo").textContent = currentData.vehicleNo ?? "-";
    document.getElementById("editMaintenanceDate").value = currentData.maintenanceDate || "";
    document.getElementById("editDescription").value = currentData.description || "";
    document.getElementById("editAmountInput").value = Number(currentData.amount || 0);
    document.getElementById("editPaymentMethod").value = currentData.paymentMethod || "미지급금";
    document.getElementById("editVendor").value = currentData.vendor || "";
    document.getElementById("editPaymentDate").value = currentData.payDate || "";

    calcVAT(document.getElementById("editAmountInput").value);

    detailSection.classList.add("hidden");
    editSection.classList.remove("hidden");
  });

  reloadBtn.addEventListener("click", loadDetail);

  document.getElementById("editAmountInput").addEventListener("input", function () {
    calcVAT(this.value);
  });

  function calcVAT(amount) {
    const a = Number(amount) || 0;
    const supply = Math.round(a / 1.1);
    const vat = Math.max(0, a - supply);
    document.getElementById("editSupplyAmount").textContent = supply.toLocaleString() + "원";
    document.getElementById("editTaxAmount").textContent = vat.toLocaleString() + "원";
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!currentData) return;
    document.getElementById("editMaintenanceDate").value = currentData.maintenanceDate || "";
    document.getElementById("editDescription").value = currentData.description || "";
    document.getElementById("editAmountInput").value = Number(currentData.amount || 0);
    document.getElementById("editPaymentMethod").value = currentData.paymentMethod || "미지급금";
    document.getElementById("editVendor").value = currentData.vendor || "";
    document.getElementById("editPaymentDate").value = currentData.payDate || "";
    calcVAT(document.getElementById("editAmountInput").value);
  });

  document.getElementById("cancelEditBtn").addEventListener("click", () => {
    if (!confirm("수정을 취소하시겠습니까?")) return;
    editSection.classList.add("hidden");
    detailSection.classList.remove("hidden");
  });

  document.getElementById("maintenanceEditForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    if (!currentData) {
      alert("데이터가 아직 로드되지 않았습니다.");
      return;
    }

    if (!confirm("수정하시겠습니까?")) return;

    const amount = Number(document.getElementById("editAmountInput").value || 0);
    const supply = Math.round(amount / 1.1);
    const vat = Math.max(0, amount - supply);

    const body = {
      maintenanceDate: document.getElementById("editMaintenanceDate").value,
      description: document.getElementById("editDescription").value,
      amount: amount,
      supplyAmount: supply,
      vatAmount: vat,
      paymentMethod: document.getElementById("editPaymentMethod").value,
      vendor: document.getElementById("editVendor").value,
      payDate: document.getElementById("editPaymentDate").value
    };

    try {
      const url = `${BASE}/api/vehicle-maintenance/items/${encodeURIComponent(itemId)}`;
      const res = await fetch(url, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const msg = await readErrorMessage(res);
        throw new Error(`수정 실패 (HTTP ${res.status}) : ${msg}`);
      }

      alert("수정 완료");

      editSection.classList.add("hidden");
      detailSection.classList.remove("hidden");

      await loadDetail();

    } catch (e) {
      alert(e.message);
      showError(e.message);
    }
  });

  function goBack() {
    window.location.href = "maintenance_status.html";
  }

  loadDetail();
</script>

</body>
</html>
