<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정비등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/maintenance_register.css">
  <style>
    .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; }
    .modal{ display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:min(860px, 94vw); background:#fff; border-radius:12px; z-index:10000; overflow:hidden; }
    .modal-header{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee; }
    .modal-body{ padding:14px 16px; }
    .modal-footer{ padding:12px 16px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:8px; }
    .btn{ padding:8px 12px; border-radius:8px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    .btn-primary{ background:#1f6feb; color:#fff; border-color:#1f6feb; }
    .btn-ghost{ background:#fff; }
    .search-row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .search-row input{ flex:1; padding:9px 10px; border:1px solid #ddd; border-radius:8px; }
    .list{ max-height:360px; overflow:auto; border:1px solid #eee; border-radius:10px; }
    .list table{ width:100%; border-collapse:collapse; }
    .list th, .list td{ padding:10px; border-bottom:1px solid #f0f0f0; font-size:14px; text-align:left; }
    .list tr:hover{ background:#fafafa; }
    .icon-btn{
      display:inline-flex; align-items:center; justify-content:center;
      width:40px; height:40px; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer;
    }
    .inline-flex{ display:flex; gap:8px; align-items:end; }
    .help{ font-size:12px; color:#666; margin-top:6px; }
    select{ width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>정비등록</h1>
      <p>차량관리 &gt; 정비 &gt; 정비등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <div class="form-section">
          <div class="form-row">
            <div class="form-group" style="flex:1;">
              <label for="vehicleMgmtNo">차량관리번호 *</label>
              <div class="inline-flex">
                <input type="text" id="vehicleMgmtNo" placeholder="차량관리번호 입력" style="width:100%;" />
                <button type="button" class="icon-btn" id="openVehicleSearchBtn" title="차량조회">🔍</button>
              </div>
              <div class="help">🔍로 차량을 조회/선택하거나, 차량관리번호 입력 후 엔터로 조회할 수 있어요.</div>
            </div>

            <div class="form-group" style="flex:1;">
              <label for="vehicleNo">차량번호</label>
              <input type="text" id="vehicleNo" placeholder="차량번호" disabled>
            </div>
          </div>

          <div id="inspectionInfo" class="inspection-info" style="display:none;">
            검사유효기간: <strong id="inspectionPeriod">-</strong>
          </div>
        </div>

        <div class="table-section">
          <div class="section-header">
            <div class="section-title">정비 내역</div>
            <button type="button" class="btn-add" onclick="addRow()">+ 내용추가</button>
          </div>

          <table>
            <thead>
              <tr>
                <th style="width:18%;">내용</th>
                <th style="width:10%;">금액</th>
                <th style="width:10%;">공급가액</th>
                <th style="width:10%;">세액</th>
                <th style="width:16%;">지급처</th>
                <th style="width:12%;">지급방법</th>
                <th style="width:14%;">지급일자</th>
                <th style="width:10%;">삭제</th>
              </tr>
            </thead>
            <tbody id="maintenanceTableBody">
              <tr id="row_1">
                <td><input type="text" placeholder="예: 엔진오일교환" id="desc_1"></td>
                <td><input type="number" placeholder="0" id="amount_1" onchange="calculateVAT(1)"></td>
                <td><input type="number" placeholder="0" id="supply_1" disabled></td>
                <td><input type="number" placeholder="0" id="tax_1" disabled></td>
                <td><input type="text" placeholder="예: 에이스공업사" id="vendor_1"></td>
                <td>
                  <select id="paymentMethod_1">
                    <option value="미지급금" selected>미지급금</option>
                    <option value="법인카드">법인카드</option>
                    <option value="보통예금">보통예금</option>
                  </select>
                </td>
                <td><input type="date" id="payDate_1"></td>
                <td><button type="button" class="btn-delete" onclick="deleteRow(1)">삭제</button></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="action-buttons">
          <button type="button" class="btn-submit" onclick="submitMaintenance()">등록</button>
          <button type="button" class="btn-cancel" onclick="resetForm()">취소</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="vehicleModalBackdrop"></div>
  <div class="modal" id="vehicleModal">
    <div class="modal-header">
      <div style="font-weight:700;">차량 조회</div>
      <button class="btn btn-ghost" type="button" id="closeVehicleModalBtn">닫기</button>
    </div>

    <div class="modal-body">
      <div class="search-row">
        <input type="text" id="vehicleSearchKw" placeholder="차량관리번호/차량번호/모델명으로 검색" />
        <button class="btn btn-primary" type="button" id="vehicleSearchBtn">검색</button>
      </div>

      <div class="list">
        <table>
          <thead>
            <tr>
              <th>차량관리번호</th>
              <th>차량번호</th>
              <th>모델</th>
              <th style="width:110px;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleSearchTbody">
            <tr><td colspan="4" style="color:#888;">🔍 버튼을 누르면 자동 조회됩니다.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" type="button" id="vehicleModalClose2">닫기</button>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/$/, "");
    let rowCount = 1;

    async function mustOk(res) {
      if (res.ok) return res;

      let msg = "HTTP " + res.status;
      try {
        const body = await res.json();
        if (body && body.message) msg = body.message;
      } catch (e) {
        try {
          const text = await res.text();
          if (text) msg = text;
        } catch (e2) {}
      }
      throw new Error(msg);
    }

    function fmtDateRange(start, end) {
      const s = start ? String(start) : "-";
      const e = end ? String(end) : "-";
      return `${s} ~ ${e}`;
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll("\"","&quot;")
        .replaceAll("'","&#039;");
    }

    function escapeAttr(s) {
      return String(s ?? "").replaceAll("'","\\'");
    }

    document.addEventListener("DOMContentLoaded", () => {
      const mgmtInput = document.getElementById("vehicleMgmtNo");

      mgmtInput.addEventListener("keydown", async (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          const mgmtNo = mgmtInput.value.trim();
          if (!mgmtNo) return;
          await loadVehicleInfoByMgmtNo(mgmtNo);
        }
      });

      document.getElementById("openVehicleSearchBtn").addEventListener("click", async () => {
        openVehicleModal();
        await doVehicleSearch(true);
      });

      document.getElementById("closeVehicleModalBtn").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalClose2").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalBackdrop").addEventListener("click", closeVehicleModal);

      document.getElementById("vehicleSearchBtn").addEventListener("click", () => doVehicleSearch(false));
      document.getElementById("vehicleSearchKw").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          doVehicleSearch(false);
        }
      });
    });

    function openVehicleModal() {
      document.getElementById("vehicleModalBackdrop").style.display = "block";
      document.getElementById("vehicleModal").style.display = "block";
      document.getElementById("vehicleSearchKw").value = "";
      document.getElementById("vehicleSearchTbody").innerHTML =
        `<tr><td colspan="4" style="color:#888;">조회중...</td></tr>`;
    }

    function closeVehicleModal() {
      document.getElementById("vehicleModalBackdrop").style.display = "none";
      document.getElementById("vehicleModal").style.display = "none";
    }

    async function doVehicleSearch(isAuto) {
      const kw = document.getElementById("vehicleSearchKw").value.trim();
      const tbody = document.getElementById("vehicleSearchTbody");
      tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">조회중...</td></tr>`;

      try {
        const url = `${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw)}`;
        const res = await fetch(url);
        await mustOk(res);
        const list = await res.json();

        if (!Array.isArray(list) || list.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">조회 결과가 없습니다.</td></tr>`;
          return;
        }

        tbody.innerHTML = list.map(v => `
          <tr>
            <td>${escapeHtml(v.vehicleMgmtNo || "")}</td>
            <td>${escapeHtml(v.vehicleNo || "")}</td>
            <td>${escapeHtml(v.carModel || "")}</td>
            <td>
              <button type="button" class="btn btn-primary"
                onclick="selectVehicle('${escapeAttr(v.vehicleMgmtNo || "")}')">선택</button>
            </td>
          </tr>
        `).join("");

      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    async function selectVehicle(mgmtNo) {
      closeVehicleModal();
      document.getElementById("vehicleMgmtNo").value = mgmtNo;
      await loadVehicleInfoByMgmtNo(mgmtNo);
    }

    async function loadVehicleInfoByMgmtNo(mgmtNo) {
      try {
        const url = `${BASE}/api/vehicle-maintenance/vehicle-info?mgmtNo=${encodeURIComponent(mgmtNo)}`;
        const res = await fetch(url);
        await mustOk(res);
        const data = await res.json();

        document.getElementById("vehicleMgmtNo").value = data.vehicleMgmtNo || mgmtNo;
        document.getElementById("vehicleNo").value = data.vehicleNo || "";
        document.getElementById("inspectionPeriod").textContent = fmtDateRange(data.inspectionStart, data.inspectionEnd);
        document.getElementById("inspectionInfo").style.display = "block";
      } catch (e) {
        document.getElementById("vehicleNo").value = "";
        document.getElementById("inspectionInfo").style.display = "none";
        alert("차량 정보를 불러오지 못했습니다.\n" + e.message);
      }
    }

    function calculateVAT(index) {
      const amountInput = document.getElementById(`amount_${index}`);
      const supplyInput = document.getElementById(`supply_${index}`);
      const taxInput = document.getElementById(`tax_${index}`);

      const amount = parseFloat(amountInput.value) || 0;
      const supplyAmount = Math.round(amount / 1.1);
      const taxAmount = Math.max(0, Math.round(amount - supplyAmount));

      supplyInput.value = supplyAmount;
      taxInput.value = taxAmount;
    }

    function addRow() {
      rowCount++;
      const tbody = document.getElementById('maintenanceTableBody');
      const newRow = document.createElement('tr');
      newRow.id = `row_${rowCount}`;
      newRow.innerHTML = `
        <td><input type="text" placeholder="예: 엔진오일교환" id="desc_${rowCount}"></td>
        <td><input type="number" placeholder="0" id="amount_${rowCount}" onchange="calculateVAT(${rowCount})"></td>
        <td><input type="number" placeholder="0" id="supply_${rowCount}" disabled></td>
        <td><input type="number" placeholder="0" id="tax_${rowCount}" disabled></td>
        <td><input type="text" placeholder="예: 에이스공업사" id="vendor_${rowCount}"></td>
        <td>
          <select id="paymentMethod_${rowCount}">
            <option value="미지급금" selected>미지급금</option>
            <option value="법인카드">법인카드</option>
            <option value="보통예금">보통예금</option>
          </select>
        </td>
        <td><input type="date" id="payDate_${rowCount}"></td>
        <td><button type="button" class="btn-delete" onclick="deleteRow(${rowCount})">삭제</button></td>
      `;
      tbody.appendChild(newRow);
    }

    function deleteRow(index) {
      const row = document.getElementById(`row_${index}`);
      if (row) row.remove();
    }

    async function submitMaintenance() {
      const mgmtNo = document.getElementById('vehicleMgmtNo').value.trim();
      if (!mgmtNo) {
        alert('차량관리번호를 입력/선택해주세요.');
        return;
      }

      const rows = document.querySelectorAll('#maintenanceTableBody tr');
      if (!rows.length) {
        alert('정비 내역을 추가해주세요.');
        return;
      }

      const items = [];
      for (const tr of rows) {
        const idx = tr.id.split("_")[1];

        const description = document.getElementById(`desc_${idx}`)?.value?.trim() || "";
        if (!description) {
          alert("내용은 필수입니다.");
          return;
        }

        const amount = Number(document.getElementById(`amount_${idx}`)?.value || 0);
        const supplyAmount = Number(document.getElementById(`supply_${idx}`)?.value || 0);
        const vatAmount = Number(document.getElementById(`tax_${idx}`)?.value || 0);

        const vendorRaw = (document.getElementById(`vendor_${idx}`)?.value || "").trim();
        const paymentMethod = document.getElementById(`paymentMethod_${idx}`)?.value || "미지급금";
        const payDateRaw = (document.getElementById(`payDate_${idx}`)?.value || "").trim();

        const vendor = vendorRaw ? vendorRaw : null;
        const payDate = payDateRaw ? payDateRaw : null;

        items.push({
          description,
          amount,
          supplyAmount,
          vatAmount,
          vendor,
          paymentMethod,
          payDate
        });
      }

      try {
        const res = await fetch(`${BASE}/api/vehicle-maintenance`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ vehicleMgmtNo: mgmtNo, items })
        });
        await mustOk(res);
        const data = await res.json();
        alert(`정비 내역이 등록되었습니다. (ID: ${data.maintenanceId})`);
        resetForm();
      } catch (e) {
        alert("등록 실패: " + e.message);
      }
    }

    function resetForm() {
      document.getElementById('vehicleMgmtNo').value = '';
      document.getElementById('vehicleNo').value = '';
      document.getElementById('inspectionInfo').style.display = 'none';

      const tbody = document.getElementById('maintenanceTableBody');
      tbody.innerHTML = `
        <tr id="row_1">
          <td><input type="text" placeholder="예: 엔진오일교환" id="desc_1"></td>
          <td><input type="number" placeholder="0" id="amount_1" onchange="calculateVAT(1)"></td>
          <td><input type="number" placeholder="0" id="supply_1" disabled></td>
          <td><input type="number" placeholder="0" id="tax_1" disabled></td>
          <td><input type="text" placeholder="예: 에이스공업사" id="vendor_1"></td>
          <td>
            <select id="paymentMethod_1">
              <option value="미지급금" selected>미지급금</option>
              <option value="법인카드">법인카드</option>
              <option value="보통예금">보통예금</option>
            </select>
          </td>
          <td><input type="date" id="payDate_1"></td>
          <td><button type="button" class="btn-delete" onclick="deleteRow(1)">삭제</button></td>
        </tr>
      `;
      rowCount = 1;
    }
  </script>
</body>
</html>
