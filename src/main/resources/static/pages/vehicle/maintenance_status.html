<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정비현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/maintenance_status.css">

  <style>
    .inline-flex { display:flex; gap:8px; align-items:center; }
    .icon-btn{
      display:inline-flex; align-items:center; justify-content:center;
      width:40px; height:40px; border-radius:10px;
      border:1px solid #ddd; background:#fff; cursor:pointer;
    }

    .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; }
    .modal{ display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:min(900px, 94vw); background:#fff; border-radius:12px; z-index:10000; overflow:hidden; }
    .modal-header{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee; }
    .modal-body{ padding:14px 16px; }
    .modal-footer{ padding:12px 16px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:8px; }
    .btn{ padding:8px 12px; border-radius:8px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    .btn-primary{ background:#1f6feb; color:#fff; border-color:#1f6feb; }
    .btn-ghost{ background:#fff; }
    .search-row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .search-row input{ flex:1; padding:9px 10px; border:1px solid #ddd; border-radius:8px; }
    .list{ max-height:360px; overflow:auto; border:1px solid #eee; border-radius:10px; }
    .list table{ width:100%; border-collapse:collapse; }
    .list th, .list td{ padding:10px; border-bottom:1px solid #f0f0f0; font-size:14px; text-align:left; }
    .list tr:hover{ background:#fafafa; }
  </style>
</head>

<body>
<div id="sidebar-container"></div>

<div class="content-wrapper">
  <div class="page-header">
    <h1>정비현황</h1>
    <p>차량관리 &gt; 정비 &gt; 정비현황</p>
  </div>

  <div class="erp-card">
    <div class="card-body">
      <div class="search-section">
        <div class="search-grid">

          <div class="form-group">
            <label for="searchVehicleMgmt">차량관리번호</label>
            <div class="inline-flex">
              <input type="text" id="searchVehicleMgmt" placeholder="차량관리번호 검색" style="flex:1;">
              <button type="button" class="icon-btn" id="openVehicleSearchByMgmtBtn" title="차량 조회">🔍</button>
            </div>
          </div>

          <div class="form-group">
            <label for="searchVehicle">차량번호</label>
            <div class="inline-flex">
              <input type="text" id="searchVehicle" placeholder="차량번호 검색" style="flex:1;">
              <button type="button" class="icon-btn" id="openVehicleSearchByNoBtn" title="차량 조회">🔍</button>
            </div>
          </div>

          <div class="form-group">
            <label for="searchStartDate">정비일자(시작)</label>
            <input type="date" id="searchStartDate">
          </div>

          <div class="form-group">
            <label for="searchEndDate">정비일자(종료)</label>
            <input type="date" id="searchEndDate">
          </div>

          <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn-search" id="btnSearch">조회</button>
          </div>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
          <tr>
            <th>No</th>
            <th>차량관리번호</th>
            <th>차량번호</th>
            <th>정비일자</th>
            <th>정비내용</th>
            <th>금액</th>
            <th>공급가액</th>
            <th>세액</th>
            <th>지급방법</th>
            <th>지급처</th>
            <th>지급일자</th>
          </tr>
          </thead>
          <tbody id="maintenanceTableBody">
            <tr>
              <td colspan="11" class="no-data">
                <div class="no-data-icon">🔧</div>
                <div>조회중...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<div class="modal-backdrop" id="vehicleModalBackdrop"></div>
<div class="modal" id="vehicleModal">
  <div class="modal-header">
    <div style="font-weight:700;">차량 조회</div>
    <button class="btn btn-ghost" type="button" id="closeVehicleModalBtn">닫기</button>
  </div>

  <div class="modal-body">
    <div class="search-row">
      <input type="text" id="vehicleSearchKw" placeholder="차량관리번호/차량번호/모델명으로 검색" />
      <button class="btn btn-primary" type="button" id="vehicleSearchBtn">검색</button>
    </div>

    <div class="list">
      <table>
        <thead>
        <tr>
          <th>차량관리번호</th>
          <th>차량번호</th>
          <th>모델</th>
          <th style="width:110px;">선택</th>
        </tr>
        </thead>
        <tbody id="vehicleSearchTbody">
          <tr><td colspan="4" style="color:#888;">검색 버튼을 눌러 차량을 조회하세요.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn" type="button" id="vehicleModalClose2">닫기</button>
  </div>
</div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>

<script>
  const BASE = (typeof API_BASE_URL !== "undefined" && API_BASE_URL)
  ? API_BASE_URL.replace(/\/+$/, "")
  : "";

  let pickTarget = "MGMT";

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("btnSearch").addEventListener("click", searchMaintenance);

    ["searchVehicleMgmt","searchVehicle"].forEach(id => {
      document.getElementById(id).addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchMaintenance();
      });
    });

    document.getElementById("openVehicleSearchByMgmtBtn").addEventListener("click", async () => {
      pickTarget = "MGMT";
      openVehicleModal();
      await doVehicleSearch(true);
    });

    document.getElementById("openVehicleSearchByNoBtn").addEventListener("click", async () => {
      pickTarget = "VNO";
      openVehicleModal();
      await doVehicleSearch(true);
    });

    document.getElementById("closeVehicleModalBtn").addEventListener("click", closeVehicleModal);
    document.getElementById("vehicleModalClose2").addEventListener("click", closeVehicleModal);
    document.getElementById("vehicleModalBackdrop").addEventListener("click", closeVehicleModal);

    document.getElementById("vehicleSearchBtn").addEventListener("click", () => doVehicleSearch(false));
    document.getElementById("vehicleSearchKw").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doVehicleSearch(false);
    });

    searchMaintenance();
  });

  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll("\"","&quot;")
      .replaceAll("'","&#039;");
  }

  function escapeAttr(s) {
    return String(s ?? "").replaceAll("'","\\'");
  }

  function fmtMoney(v) {
    const n = Number(v);
    return Number.isFinite(n) ? n.toLocaleString() : "0";
  }

  async function mustOk(res) {
    if (res.ok) return res;
    let msg = `HTTP ${res.status}`;
    try {
      const body = await res.json();
      if (body && body.message) msg = body.message;
    } catch (e) {
      try {
        const text = await res.text();
        if (text) msg = text;
      } catch (e2) {}
    }
    throw new Error(msg);
  }

  async function searchMaintenance() {
    const vehicleMgmt = document.getElementById('searchVehicleMgmt').value.trim();
    const vehicleNo = document.getElementById('searchVehicle').value.trim();
    const startDate = document.getElementById('searchStartDate').value;
    const endDate = document.getElementById('searchEndDate').value;

    const tbody = document.getElementById('maintenanceTableBody');
    tbody.innerHTML = `
      <tr>
        <td colspan="11" class="no-data">
          <div class="no-data-icon">🔧</div>
          <div>조회중...</div>
        </td>
      </tr>
    `;

    try {
      const params = new URLSearchParams();
      if (vehicleMgmt) params.set("vehicleMgmtNo", vehicleMgmt);
      if (vehicleNo) params.set("vehicleNo", vehicleNo);
      if (startDate) params.set("startDate", startDate);
      if (endDate) params.set("endDate", endDate);

      const url = `${BASE}/api/vehicle-maintenance/status?${params.toString()}`;
      const res = await fetch(url);
      await mustOk(res);

      const list = await res.json();
      displayMaintenance(Array.isArray(list) ? list : []);
    } catch (e) {
      tbody.innerHTML = `
        <tr>
          <td colspan="11" class="no-data">
            <div class="no-data-icon">⚠️</div>
            <div>조회 실패: ${escapeHtml(e.message)}</div>
          </td>
        </tr>
      `;
    }
  }

  function displayMaintenance(data) {
    const tbody = document.getElementById('maintenanceTableBody');

    if (!data || data.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="11" class="no-data">
            <div class="no-data-icon">🔧</div>
            <div>검색 결과가 없습니다.</div>
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = data.map((item, idx) => {
      const no = idx + 1;
      const maintenanceDate = item.maintenanceDate || "-";
      const payDate = item.maintenanceDate || "-";

      return `
        <tr onclick="viewDetail(${item.maintenanceId}, ${item.itemId})" style="cursor:pointer;">
          <td>${no}</td>
          <td>${escapeHtml(item.vehicleMgmtNo)}</td>
          <td>${escapeHtml(item.vehicleNo)}</td>
          <td>${escapeHtml(maintenanceDate)}</td>
          <td>${escapeHtml(item.description)}</td>
          <td class="amount-cell">${fmtMoney(item.amount)}</td>
          <td class="amount-cell">${fmtMoney(item.supplyAmount)}</td>
          <td class="amount-cell">${fmtMoney(item.vatAmount)}</td>
          <td>${escapeHtml(item.paymentMethod || "")}</td>
          <td>${escapeHtml(item.vendor || "")}</td>
          <td>${escapeHtml(payDate)}</td>
        </tr>
      `;
    }).join('');
  }

  function viewDetail(maintenanceId, itemId) {
    window.location.href = `maintenance_detail.html?maintenanceId=${maintenanceId}&itemId=${itemId}`;
  }

  function openVehicleModal() {
    document.getElementById("vehicleModalBackdrop").style.display = "block";
    document.getElementById("vehicleModal").style.display = "block";
    document.getElementById("vehicleSearchKw").value = "";
    document.getElementById("vehicleSearchTbody").innerHTML =
      `<tr><td colspan="4" style="color:#888;">조회중...</td></tr>`;
  }

  function closeVehicleModal() {
    document.getElementById("vehicleModalBackdrop").style.display = "none";
    document.getElementById("vehicleModal").style.display = "none";
  }

  async function doVehicleSearch() {
    const kw = document.getElementById("vehicleSearchKw").value.trim();
    const tbody = document.getElementById("vehicleSearchTbody");
    tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">조회중...</td></tr>`;

    try {
      const url = `${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw)}`;
      const res = await fetch(url);
      await mustOk(res);

      const list = await res.json();
      if (!Array.isArray(list) || list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">조회 결과가 없습니다.</td></tr>`;
        return;
      }

      tbody.innerHTML = list.map(v => `
        <tr>
          <td>${escapeHtml(v.vehicleMgmtNo || "")}</td>
          <td>${escapeHtml(v.vehicleNo || "")}</td>
          <td>${escapeHtml(v.carModel || "")}</td>
          <td>
            <button type="button" class="btn btn-primary"
              onclick="selectVehicle('${escapeAttr(v.vehicleMgmtNo || "")}','${escapeAttr(v.vehicleNo || "")}')">선택</button>
          </td>
        </tr>
      `).join("");

    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
    }
  }

  async function selectVehicle(vehicleMgmtNo, vehicleNo) {
    if (pickTarget === "VNO") {
      document.getElementById("searchVehicle").value = vehicleNo || "";
    } else {
      document.getElementById("searchVehicleMgmt").value = vehicleMgmtNo || "";
    }

    closeVehicleModal();
    await searchMaintenance();
  }
</script>
</body>
</html>
