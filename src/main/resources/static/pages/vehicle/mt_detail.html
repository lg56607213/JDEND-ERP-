<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/maintenance_status.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>MT 상세</h1>
      <p>차량관리 &gt; 정비 &gt; MT현황 &gt; 상세보기</p>
    </div>

    <!-- 상세 -->
    <div class="erp-card" id="mtDetailSection">
      <div class="card-header card-header-detail">
        <h2>MT 상세 정보</h2>
        <button type="button" class="btn btn-secondary" onclick="goBack()">목록으로</button>
      </div>

      <div class="card-body card-body-detail">
        <div class="form-section">
          <h3 class="section-title">차량 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>차량관리번호</label>
              <div class="detail-value" id="vehicleMgmtNo">-</div>
            </div>
            <div class="detail-item">
              <label>차량번호</label>
              <div class="detail-value" id="vehicleNo">-</div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">MT 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>회수의뢰일(=지급일자)</label>
              <div class="detail-value" id="maintenanceDate">-</div>
            </div>
            <div class="detail-item">
              <label>정비종류</label>
              <div class="detail-value" id="description">-</div>
            </div>
            <div class="detail-item">
              <label>MT비용</label>
              <div class="detail-value" id="amount">-</div>
            </div>
            <div class="detail-item">
              <label>공급가액</label>
              <div class="detail-value" id="supplyAmount">-</div>
            </div>
            <div class="detail-item">
              <label>세액</label>
              <div class="detail-value" id="taxAmount">-</div>
            </div>
            <div class="detail-item">
              <label>정비업체</label>
              <div class="detail-value" id="vendor">-</div>
            </div>
            <div class="detail-item">
              <label>지급일자</label>
              <div class="detail-value" id="paymentDate">-</div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="editMtBtn">수정하기</button>
        </div>
      </div>
    </div>

    <!-- 수정 -->
    <div class="erp-card hidden" id="mtEditSection">
      <div class="card-header card-header-detail">
        <h2>MT 정보 수정</h2>
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">취소</button>
      </div>

      <div class="card-body card-body-detail">
        <form id="mtEditForm">
          <div class="form-section">
            <h3 class="section-title">차량 정보</h3>
            <div class="detail-grid">
              <div class="detail-item">
                <label>차량관리번호</label>
                <div class="detail-value" id="editVehicleMgmtNo"></div>
              </div>
              <div class="detail-item">
                <label>차량번호</label>
                <div class="detail-value" id="editVehicleNo"></div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">MT 정보</h3>
            <div class="detail-grid">
              <div class="form-group form-group-column">
                <label for="editMaintenanceDate">회수의뢰일(=지급일자)</label>
                <input type="date" id="editMaintenanceDate" class="form-input" required>
              </div>

              <div class="form-group form-group-column">
                <label for="editDescription">정비종류</label>
                <input type="text" id="editDescription" class="form-input" required>
              </div>

              <div class="form-group form-group-column">
                <label for="editAmountInput">MT비용</label>
                <input type="number" id="editAmountInput" class="form-input" required>
              </div>

              <div class="detail-item">
                <label>공급가액 (자동계산)</label>
                <div class="detail-value" id="editSupplyAmount">0원</div>
              </div>

              <div class="detail-item">
                <label>세액 (자동계산)</label>
                <div class="detail-value" id="editTaxAmount">0원</div>
              </div>

              <div class="form-group form-group-column">
                <label for="editVendor">정비업체</label>
                <input type="text" id="editVendor" class="form-input">
              </div>

              <div class="form-group form-group-column">
                <label for="editPaymentDate">지급일자</label>
                <input type="date" id="editPaymentDate" class="form-input">
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    // ✅ localhost fallback 제거
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/$/, "");

    const params = new URLSearchParams(window.location.search);
    const maintenanceId = params.get("maintenanceId");
    const itemId = params.get("itemId");

    const mtDetailSection = document.getElementById("mtDetailSection");
    const mtEditSection = document.getElementById("mtEditSection");
    const editMtBtn = document.getElementById("editMtBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");

    let currentData = null;

    async function mustOk(res){
      if (res.ok) return res;

      let msg = "HTTP " + res.status;
      try {
        const body = await res.json();
        if (body && body.message) msg = body.message;
      } catch (e) {
        try {
          const text = await res.text();
          if (text) msg = text;
        } catch (e2) {}
      }
      throw new Error(msg);
    }

    async function loadDetail(){
      if(!maintenanceId || !itemId){
        alert("잘못된 접근입니다. (maintenanceId/itemId 없음)");
        return;
      }

      try{
        const res = await fetch(`${BASE}/api/vehicle-maintenance/${maintenanceId}/items/${itemId}`);
        await mustOk(res);
        const data = await res.json();
        currentData = data;
        renderDetail(data);
      }catch(e){
        alert("상세 조회 실패: " + e.message);
      }
    }

    function renderDetail(d){
      document.getElementById("vehicleMgmtNo").textContent = d.vehicleMgmtNo || "-";
      document.getElementById("vehicleNo").textContent = d.vehicleNo || "-";
      document.getElementById("maintenanceDate").textContent = d.maintenanceDate || "-";
      document.getElementById("description").textContent = d.description || "-";
      document.getElementById("amount").textContent = Number(d.amount || 0).toLocaleString() + "원";
      document.getElementById("supplyAmount").textContent = Number(d.supplyAmount || 0).toLocaleString() + "원";
      document.getElementById("taxAmount").textContent = Number(d.vatAmount || 0).toLocaleString() + "원";
      document.getElementById("vendor").textContent = d.vendor || "";
      document.getElementById("paymentDate").textContent = d.payDate || "-";
    }

    function calcVAT(amount){
      const a = Number(amount) || 0;
      const supply = Math.round(a / 1.1);
      const vat = Math.max(0, Math.round(a - supply));
      document.getElementById("editSupplyAmount").textContent = supply.toLocaleString() + "원";
      document.getElementById("editTaxAmount").textContent = vat.toLocaleString() + "원";
      return { supply, vat };
    }

    editMtBtn.addEventListener("click", () => {
      if(!currentData){
        alert("데이터가 아직 없습니다. 잠시 후 다시 시도하세요.");
        return;
      }

      document.getElementById("editVehicleMgmtNo").textContent = currentData.vehicleMgmtNo || "-";
      document.getElementById("editVehicleNo").textContent = currentData.vehicleNo || "-";

      document.getElementById("editMaintenanceDate").value = currentData.maintenanceDate || (currentData.payDate || "");
      document.getElementById("editDescription").value = currentData.description || "";
      document.getElementById("editAmountInput").value = currentData.amount || 0;
      document.getElementById("editVendor").value = currentData.vendor || "";
      document.getElementById("editPaymentDate").value = currentData.payDate || "";

      calcVAT(currentData.amount || 0);

      mtDetailSection.classList.add("hidden");
      mtEditSection.classList.remove("hidden");
    });

    cancelEditBtn.addEventListener("click", () => {
      mtEditSection.classList.add("hidden");
      mtDetailSection.classList.remove("hidden");
    });

    document.getElementById("editAmountInput").addEventListener("input", function(){
      calcVAT(this.value);
    });

    document.getElementById("mtEditForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if(!confirm("수정하시겠습니까?")) return;

      const amount = Number(document.getElementById("editAmountInput").value || 0);
      const { supply, vat } = calcVAT(amount);

      const payDateRaw = document.getElementById("editPaymentDate").value;
      const vendorRaw = document.getElementById("editVendor").value;

      const body = {
        maintenanceDate: document.getElementById("editMaintenanceDate").value,
        description: document.getElementById("editDescription").value,
        amount: amount,
        supplyAmount: supply,
        vatAmount: vat,
        vendor: vendorRaw ? vendorRaw : null,
        payDate: payDateRaw ? payDateRaw : null
      };

      try{
        const res = await fetch(`${BASE}/api/vehicle-maintenance/items/${itemId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        await mustOk(res);

        alert("수정 완료");
        mtEditSection.classList.add("hidden");
        mtDetailSection.classList.remove("hidden");

        await loadDetail();
      }catch(err){
        alert("수정 실패: " + err.message);
      }
    });

    function goBack(){
      window.location.href = "mt_status.html";
    }

    loadDetail();
  </script>
</body>
</html>
