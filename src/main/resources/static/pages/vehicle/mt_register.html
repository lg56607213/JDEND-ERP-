<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT등록 | JDEND ERP</title>

  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/mt_register.css">

  <style>
    /* ===== 돋보기 입력(메인) ===== */
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:45px; }
    .icon-btn{
      position:absolute;
      right:5px; top:50%;
      transform:translateY(-50%);
      width:34px; height:34px;
      border:1px solid #ddd;
      background:#fff;
      border-radius:8px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }

    /* ===== 모달 최소 스타일 ===== */
    .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; }
    .modal{
      display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
      width:min(920px, 94vw); background:#fff; border-radius:12px; z-index:10000; overflow:hidden;
    }
    .modal-header{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee; }
    .modal-body{ padding:14px 16px; }
    .modal-footer{ padding:12px 16px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:8px; }
    .btn{ padding:8px 12px; border-radius:8px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    .btn-primary{ background:#1f6feb; color:#fff; border-color:#1f6feb; }

    /* ===== 모달 검색줄: 버튼 제거 → 돋보기 버튼만 ===== */
    .search-row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .search-row input{ flex:1; padding:9px 10px; border:1px solid #ddd; border-radius:8px; }
    .search-row .icon-btn{
      position:static; transform:none;
      width:40px; height:40px;
      border-radius:10px;
    }

    .list{ max-height:380px; overflow:auto; border:1px solid #eee; border-radius:10px; }
    .list table{ width:100%; border-collapse:collapse; }
    .list th, .list td{ padding:10px; border-bottom:1px solid #f0f0f0; font-size:14px; text-align:left; }
    .list tr:hover{ background:#fafafa; }
    .help{ font-size:12px; color:#666; margin-top:6px; }
  </style>
</head>

<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>MT등록</h1>
      <p>차량관리 &gt; 정비 &gt; MT등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <form id="mtRegisterForm" onsubmit="return false;">

          <!-- 계약번호 -->
          <div class="form-row">
            <div class="form-group">
              <label for="contractNo">계약번호 <span class="required">*</span></label>

              <div class="input-with-icon">
                <input type="text" id="contractNo" placeholder="돋보기로 계약 선택" readonly>
                <button type="button" class="icon-btn" id="openContractModalBtn" title="계약 조회">🔍</button>
              </div>

              <div class="help">돋보기 버튼으로 계약을 선택하세요.</div>
            </div>
          </div>

          <!-- 차량번호 -->
          <div class="form-row">
            <div class="form-group">
              <label for="vehicleNo">차량번호</label>
              <input type="text" id="vehicleNo" placeholder="계약번호 선택 시 자동입력" readonly>
            </div>
          </div>

          <!-- hidden: 차량관리번호 (정비 저장에 필요) -->
          <input type="hidden" id="vehicleMgmtNoHidden" />

          <!-- MT업체 -->
          <div class="form-row">
            <div class="form-group">
              <label for="mtVendor">MT업체 <span class="required">*</span></label>
              <select id="mtVendor">
                <option value="">선택하세요</option>
                <option value="에이스공업사">에이스공업사</option>
                <option value="한국타이어">한국타이어</option>
                <option value="자동차정비센터">자동차정비센터</option>
                <option value="자동차용품점">자동차용품점</option>
                <option value="기타">기타</option>
              </select>
            </div>
          </div>

          <!-- 정비종류 -->
          <div class="form-row">
            <div class="form-group">
              <label>정비종류 <span class="required">*</span></label>
              <div class="radio-group">
                <label class="radio-item">
                  <input type="radio" name="maintenanceType" value="inspection">
                  <span class="radio-label">검사(Only)</span>
                </label>
                <label class="radio-item">
                  <input type="radio" name="maintenanceType" value="basic">
                  <span class="radio-label">기본</span>
                </label>
                <label class="radio-item">
                  <input type="radio" name="maintenanceType" value="middle">
                  <span class="radio-label">중간</span>
                </label>
                <label class="radio-item">
                  <input type="radio" name="maintenanceType" value="full">
                  <span class="radio-label">풀</span>
                </label>
              </div>
            </div>
          </div>

          <!-- MT비용 -->
          <div class="form-row">
            <div class="form-group">
              <label for="mtCost">MT비용 <span class="required">*</span></label>
              <div class="input-with-unit">
                <input type="text" id="mtCost" placeholder="0" inputmode="numeric">
                <span class="unit">원</span>
              </div>
              <div class="help">MT비용 입력 시 공급가/부가세는 자동 계산되어 정비항목으로 저장됩니다.</div>
            </div>
          </div>

          <!-- 버튼 영역 -->
          <div class="action-buttons">
            <button type="button" class="btn-submit" id="saveBtn">저장</button>
            <button type="button" class="btn-cancel" id="cancelBtn">취소</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 계약조회 모달 -->
  <div class="modal-backdrop" id="contractModalBackdrop"></div>
  <div class="modal" id="contractModal">
    <div class="modal-header">
      <div style="font-weight:700;">계약 조회</div>
      <button class="btn" type="button" id="closeContractModalBtn">닫기</button>
    </div>

    <div class="modal-body">
      <div class="search-row">
        <input type="text" id="contractSearchKw" placeholder="계약번호/차량번호/고객명 검색" />
        <button type="button" class="icon-btn" id="contractSearchIconBtn" title="검색">🔍</button>
      </div>

      <div class="list">
        <table>
          <thead>
            <tr>
              <th>계약번호</th>
              <th>차량번호</th>
              <th>고객명</th>
              <th>계약기간</th>
              <th style="width:110px;">선택</th>
            </tr>
          </thead>
          <tbody id="contractSearchTbody">
            <tr><td colspan="5" style="color:#888;">조회중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" type="button" id="contractModalClose2">닫기</button>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    // ✅ localhost fallback 제거
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/$/, "");

    const maintenanceCosts = {
      inspection: 50000,
      basic: 150000,
      middle: 300000,
      full: 500000
    };

    const maintenanceTypeLabels = {
      inspection: "검사(Only)",
      basic: "기본",
      middle: "중간",
      full: "풀"
    };

    async function mustOk(res){
      if (res.ok) return res;

      let msg = "HTTP " + res.status;
      try {
        const b = await res.json();
        msg = (b && (b.message || b.error || b.msg)) ? (b.message || b.error || b.msg) : msg;
      } catch (e) {
        try {
          const text = await res.text();
          if (text) msg = text;
        } catch (e2) {}
      }
      throw new Error(msg);
    }

    function openContractModal(){
      document.getElementById("contractModalBackdrop").style.display = "block";
      document.getElementById("contractModal").style.display = "block";

      document.getElementById("contractSearchKw").value = "";
      doContractSearch(true);

      setTimeout(()=> document.getElementById("contractSearchKw").focus(), 0);
    }

    function closeContractModal(){
      document.getElementById("contractModalBackdrop").style.display = "none";
      document.getElementById("contractModal").style.display = "none";
    }

    async function doContractSearch(initialLoad = false){
      const kw = document.getElementById("contractSearchKw").value.trim();
      const tbody = document.getElementById("contractSearchTbody");
      tbody.innerHTML = `<tr><td colspan="5" style="color:#888;">조회중...</td></tr>`;

      try{
        const res = await fetch(`${BASE}/api/mt/contracts/search?kw=${encodeURIComponent(kw)}`);
        await mustOk(res);
        const list = await res.json();

        if(!Array.isArray(list) || list.length === 0){
          tbody.innerHTML = `<tr><td colspan="5" style="color:#888;">조회 결과가 없습니다.</td></tr>`;
          return;
        }

        tbody.innerHTML = list.map(c => {
          const period = `${c.startDate || "-"} ~ ${c.endDate || "-"}`;
          const mgmtNo = c.vehicleMgmtNo || "";
          return `
            <tr>
              <td>${escapeHtml(c.contractNumber || "")}</td>
              <td>${escapeHtml(c.vehicleNo || "")}</td>
              <td>${escapeHtml(c.customerName || "")}</td>
              <td>${escapeHtml(period)}</td>
              <td>
                <button type="button" class="btn btn-primary"
                  onclick="selectContract('${escapeAttr(c.contractNumber || "")}','${escapeAttr(c.vehicleNo || "")}','${escapeAttr(mgmtNo)}')">선택</button>
              </td>
            </tr>
          `;
        }).join("");

      }catch(e){
        tbody.innerHTML = `<tr><td colspan="5" style="color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    function selectContract(contractNumber, vehicleNo, vehicleMgmtNo){
      closeContractModal();
      document.getElementById("contractNo").value = contractNumber;
      document.getElementById("vehicleNo").value = vehicleNo;
      document.getElementById("vehicleMgmtNoHidden").value = vehicleMgmtNo;

      if(!vehicleMgmtNo){
        alert("주의: 선택한 계약에서 차량관리번호를 찾지 못했습니다.\n차량 발주(vehicle_orders)에 차량번호(vehicle_no)가 등록되어 있어야 저장이 가능합니다.");
      }
    }

    function formatNumberInput(input){
      let v = input.value.replace(/[^0-9]/g,'');
      if(!v) {
        input.value = '';
        return;
      }
      input.value = Number(v).toLocaleString();
    }

    function getSelectedMaintenanceType(){
      const el = document.querySelector('input[name="maintenanceType"]:checked');
      return el ? el.value : "";
    }

    function updateCostByRadio(){
      const type = getSelectedMaintenanceType();
      if(type && maintenanceCosts[type] != null){
        document.getElementById("mtCost").value = Number(maintenanceCosts[type]).toLocaleString();
      }
    }

    async function saveMT(){
      const contractNo = document.getElementById("contractNo").value.trim();
      const vehicleNo = document.getElementById("vehicleNo").value.trim();
      const vehicleMgmtNo = document.getElementById("vehicleMgmtNoHidden").value.trim();

      const vendor = document.getElementById("mtVendor").value;
      const typeKey = getSelectedMaintenanceType();
      const costStr = document.getElementById("mtCost").value.trim();

      if(!contractNo){
        alert("계약번호를 선택해주세요.");
        return;
      }
      if(!vehicleMgmtNo){
        alert("차량관리번호를 찾을 수 없어 저장할 수 없습니다.\n(contracts의 vehicle_no와 vehicle_orders의 vehicle_no 매칭이 필요)");
        return;
      }
      if(!vendor){
        alert("MT업체를 선택해주세요.");
        document.getElementById("mtVendor").focus();
        return;
      }
      if(!typeKey){
        alert("정비종류를 선택해주세요.");
        return;
      }
      if(!costStr){
        alert("MT비용을 입력해주세요.");
        document.getElementById("mtCost").focus();
        return;
      }

      const amount = Number(costStr.replace(/,/g,''));
      if(!Number.isFinite(amount) || amount <= 0){
        alert("MT비용이 올바르지 않습니다.");
        return;
      }

      const supplyAmount = Math.round(amount / 1.1);
      const vatAmount = Math.max(0, Math.round(amount - supplyAmount));

      const today = new Date();
      const payDate = today.toISOString().slice(0,10);

      const body = {
        vehicleMgmtNo: vehicleMgmtNo,
        items: [{
          description: `MT-${maintenanceTypeLabels[typeKey]}`,
          amount: amount,
          supplyAmount: supplyAmount,
          vatAmount: vatAmount,
          vendor: vendor,
          payDate: payDate
        }]
      };

      if(!confirm("MT를 등록하시겠습니까?")) return;

      const saveBtn = document.getElementById("saveBtn");
      const saveBtnText = saveBtn.textContent;
      saveBtn.disabled = true;
      saveBtn.textContent = "저장중...";

      try{
        const res = await fetch(`${BASE}/api/vehicle-maintenance`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        await mustOk(res);

        try { await res.json(); } catch(_){}

        alert("MT가 등록되었습니다.");
        window.location.href = "mt_status.html";
      }catch(e){
        alert("등록 실패: " + e.message);
      }finally{
        saveBtn.disabled = false;
        saveBtn.textContent = saveBtnText;
      }
    }

    function goBack(){
      if(confirm("작성 중인 내용이 저장되지 않습니다. 취소하시겠습니까?")){
        window.location.href = "mt_status.html";
      }
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll("\"","&quot;")
        .replaceAll("'","&#039;");
    }

    function escapeAttr(s) {
      return String(s ?? "").replaceAll("'","\\'");
    }

    document.addEventListener("DOMContentLoaded", () => {
      // 계약 모달
      document.getElementById("openContractModalBtn").addEventListener("click", openContractModal);
      document.getElementById("closeContractModalBtn").addEventListener("click", closeContractModal);
      document.getElementById("contractModalClose2").addEventListener("click", closeContractModal);
      document.getElementById("contractModalBackdrop").addEventListener("click", closeContractModal);

      // 모달 검색
      document.getElementById("contractSearchIconBtn").addEventListener("click", ()=> doContractSearch(false));

      // Enter로도 검색
      document.getElementById("contractSearchKw").addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault();
          doContractSearch(false);
        }
      });

      // 라디오 변경시 비용 자동 입력
      document.querySelectorAll('input[name="maintenanceType"]').forEach(r=>{
        r.addEventListener("change", updateCostByRadio);
      });

      // 비용 입력 포맷
      document.getElementById("mtCost").addEventListener("input", (e)=> formatNumberInput(e.target));

      // 저장/취소
      document.getElementById("saveBtn").addEventListener("click", saveMT);
      document.getElementById("cancelBtn").addEventListener("click", goBack);
    });
  </script>
</body>
</html>
