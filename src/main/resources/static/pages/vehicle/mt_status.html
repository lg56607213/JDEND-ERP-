<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/mt_status.css">

  <style>
    /* ===== 차량관리번호 돋보기 입력 ===== */
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:45px; }
    .icon-btn{
      position:absolute;
      right:5px; top:50%;
      transform:translateY(-50%);
      width:34px; height:34px;
      border:1px solid #ddd;
      background:#fff;
      border-radius:8px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }

    /* ===== 모달(차량 선택) ===== */
    .modal-backdrop{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:9999;
    }
    .modal{
      display:none; position:fixed;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:min(920px, 94vw);
      background:#fff;
      border-radius:12px;
      z-index:10000;
      overflow:hidden;
    }
    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid #eee;
    }
    .modal-body{ padding:14px 16px; }
    .modal-footer{
      padding:12px 16px;
      border-top:1px solid #eee;
      display:flex;
      justify-content:flex-end;
      gap:8px;
    }
    .btn{
      padding:8px 12px;
      border-radius:8px;
      border:1px solid #ddd;
      background:#fff;
      cursor:pointer;
    }
    .btn-primary{
      background:#1f6feb; color:#fff; border-color:#1f6feb;
    }

    .search-row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .search-row input{ flex:1; padding:9px 10px; border:1px solid #ddd; border-radius:8px; }
    .search-row .icon-btn{
      position:static;
      transform:none;
      width:40px; height:40px;
      border-radius:10px;
    }

    .list{ max-height:380px; overflow:auto; border:1px solid #eee; border-radius:10px; }
    .list table{ width:100%; border-collapse:collapse; }
    .list th, .list td{ padding:10px; border-bottom:1px solid #f0f0f0; font-size:14px; text-align:left; }
    .list tr:hover{ background:#fafafa; }
  </style>
</head>

<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>MT현황</h1>
      <p>차량관리 &gt; 정비 &gt; MT현황</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 상단 버튼 영역 -->
        <div class="top-buttons">
          <button type="button" class="btn-register" onclick="goToRegister()">등록</button>
        </div>

        <!-- 검색 섹션 -->
        <div class="search-section">
          <div class="search-grid">
            <div class="form-group">
              <label for="searchVehicleMgmt">차량관리번호</label>

              <div class="input-with-icon">
                <input type="text" id="searchVehicleMgmt" placeholder="차량관리번호">
                <button type="button" class="icon-btn" id="openVehicleModalBtn" title="차량 선택">🔍</button>
              </div>
            </div>

            <div class="form-group">
              <label for="searchVehicle">차량번호</label>
              <input type="text" id="searchVehicle" placeholder="차량번호">
            </div>

            <div class="form-group">
              <label for="searchContractStart">계약일자(시작)</label>
              <input type="date" id="searchContractStart">
            </div>

            <div class="form-group">
              <label for="searchContractEnd">계약일자(종료)</label>
              <input type="date" id="searchContractEnd">
            </div>

            <div class="form-group">
              <label>&nbsp;</label>
              <button type="button" class="btn-search" id="searchBtn">조회</button>
            </div>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>차량관리번호</th>
                <th>차량번호</th>
                <th>계약시작일자</th>
                <th>계약종료일자</th>
                <th>회수의뢰일</th>
                <th>정비업체</th>
                <th>정비종류</th>
                <th>MT비용</th>
              </tr>
            </thead>
            <tbody id="mtTableBody">
              <tr>
                <td colspan="9" style="color:#888;">조회 버튼을 눌러 데이터를 불러오세요.</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <!-- 차량 선택 모달 -->
  <div class="modal-backdrop" id="vehicleModalBackdrop"></div>
  <div class="modal" id="vehicleModal">
    <div class="modal-header">
      <div style="font-weight:700;">차량 선택</div>
      <button class="btn" type="button" id="closeVehicleModalBtn">닫기</button>
    </div>

    <div class="modal-body">
      <div class="search-row">
        <input type="text" id="vehicleSearchKw" placeholder="차량관리번호/차량번호 검색" />
        <button type="button" class="icon-btn" id="vehicleSearchIconBtn" title="검색">🔍</button>
      </div>

      <div class="list">
        <table>
          <thead>
            <tr>
              <th style="width:220px;">차량관리번호</th>
              <th style="width:160px;">차량번호</th>
              <th>차종/모델</th>
              <th style="width:110px;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleSearchTbody">
            <tr><td colspan="4" style="color:#888;">조회중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" type="button" id="vehicleModalClose2">닫기</button>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    // ✅ localhost fallback 제거
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/$/, "");

    /**
     * ✅ 차량 검색 API
     */
    const VEHICLE_SEARCH_URL = (kw) => `${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw || "")}`;

    async function mustOk(res){
      if (res.ok) return res;

      let msg = "HTTP " + res.status;
      try {
        const b = await res.json();
        msg = b && b.message ? b.message : msg;
      } catch (e) {
        try {
          const text = await res.text();
          if (text) msg = text;
        } catch (e2) {}
      }
      throw new Error(msg);
    }

    function fmtDate(d){
      if(!d) return "-";
      return String(d);
    }

    function fmtMoney(n){
      const v = Number(n || 0);
      return v.toLocaleString();
    }

    // 등록 페이지로 이동
    function goToRegister() {
      window.location.href = 'mt_register.html';
    }

    // =========================
    // 차량 모달 열기/닫기
    // =========================
    function openVehicleModal(){
      document.getElementById("vehicleModalBackdrop").style.display = "block";
      document.getElementById("vehicleModal").style.display = "block";

      document.getElementById("vehicleSearchKw").value = "";
      doVehicleSearch(true);
      setTimeout(()=> document.getElementById("vehicleSearchKw").focus(), 0);
    }

    function closeVehicleModal(){
      document.getElementById("vehicleModalBackdrop").style.display = "none";
      document.getElementById("vehicleModal").style.display = "none";
    }

    async function doVehicleSearch(initialLoad = false){
      const kw = document.getElementById("vehicleSearchKw").value.trim();
      const tbody = document.getElementById("vehicleSearchTbody");
      tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">조회중...</td></tr>`;

      try{
        const res = await fetch(VEHICLE_SEARCH_URL(kw));
        await mustOk(res);
        const list = await res.json();

        const arr = Array.isArray(list) ? list : (Array.isArray(list.content) ? list.content : []);
        if(!arr || arr.length === 0){
          tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">조회 결과가 없습니다.</td></tr>`;
          return;
        }

        tbody.innerHTML = arr.map(v=>{
          const mgmtNo =
            v.vehicleMgmtNo || v.mgmtNo || v.vehicleManagementNumber || v.managementNumber || "";
          const vehicleNo =
            v.vehicleNo || v.carNo || v.plateNo || v.vehicleNumber || "";
          const model =
            v.modelName || v.model || v.vehicleModel || v.carModel || v.carName || "-";

          return `
            <tr>
              <td>${escapeHtml(mgmtNo)}</td>
              <td>${escapeHtml(vehicleNo)}</td>
              <td>${escapeHtml(model)}</td>
              <td>
                <button type="button" class="btn btn-primary"
                  onclick="selectVehicle('${escapeAttr(mgmtNo)}','${escapeAttr(vehicleNo)}')">선택</button>
              </td>
            </tr>
          `;
        }).join("");

      }catch(e){
        tbody.innerHTML = `<tr><td colspan="4" style="color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    function selectVehicle(vehicleMgmtNo, vehicleNo){
      closeVehicleModal();
      document.getElementById("searchVehicleMgmt").value = vehicleMgmtNo || "";
      document.getElementById("searchVehicle").value = vehicleNo || "";
      searchMT();
    }

    // =========================
    // 실제 MT 조회
    // =========================
    async function searchMT() {
      const vehicleMgmtNo = document.getElementById('searchVehicleMgmt').value.trim();
      const vehicleNo = document.getElementById('searchVehicle').value.trim();
      const startDate = document.getElementById('searchContractStart').value || "";
      const endDate = document.getElementById('searchContractEnd').value || "";

      const tbody = document.getElementById('mtTableBody');
      tbody.innerHTML = `<tr><td colspan="9" style="color:#888;">조회중...</td></tr>`;

      const qs = new URLSearchParams();
      if (vehicleMgmtNo) qs.set("vehicleMgmtNo", vehicleMgmtNo);
      if (vehicleNo) qs.set("vehicleNo", vehicleNo);
      if (startDate) qs.set("startDate", startDate);
      if (endDate) qs.set("endDate", endDate);

      try {
        const queryString = qs.toString();
        const url = `${BASE}/api/mt/status${queryString ? `?${queryString}` : ""}`;

        const res = await fetch(url);
        await mustOk(res);
        const list = await res.json();

        if (!Array.isArray(list) || list.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="9" class="no-data">
                <div class="no-data-icon">🔧</div>
                <div>검색 결과가 없습니다.</div>
              </td>
            </tr>
          `;
          return;
        }

        tbody.innerHTML = list.map((item, idx) => {
          const maintenanceId = item.maintenanceId;
          const itemId = item.itemId;

          return `
            <tr onclick="viewDetail(${maintenanceId}, ${itemId})" style="cursor:pointer;">
              <td>${idx + 1}</td>
              <td>${escapeHtml(item.vehicleMgmtNo || "")}</td>
              <td>${escapeHtml(item.vehicleNo || "")}</td>
              <td>${fmtDate(item.contractStart)}</td>
              <td>${fmtDate(item.contractEnd)}</td>
              <td>${fmtDate(item.retrieveDate)}</td>
              <td>${escapeHtml(item.vendor || "")}</td>
              <td>${escapeHtml(item.maintenanceType || "")}</td>
              <td class="amount-cell">${fmtMoney(item.mtCost)}</td>
            </tr>
          `;
        }).join("");

      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="9" style="color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    // 상세보기
    function viewDetail(maintenanceId, itemId) {
      window.location.href = `mt_detail.html?maintenanceId=${maintenanceId}&itemId=${itemId}`;
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll("\"","&quot;")
        .replaceAll("'","&#039;");
    }

    function escapeAttr(s) {
      return String(s ?? "").replaceAll("'","\\'");
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("searchBtn").addEventListener("click", searchMT);

      // 차량 돋보기 모달 버튼
      document.getElementById("openVehicleModalBtn").addEventListener("click", openVehicleModal);
      document.getElementById("closeVehicleModalBtn").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalClose2").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalBackdrop").addEventListener("click", closeVehicleModal);

      // 모달 검색
      document.getElementById("vehicleSearchIconBtn").addEventListener("click", ()=> doVehicleSearch(false));
      document.getElementById("vehicleSearchKw").addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault();
          doVehicleSearch(false);
        }
      });

      // 엔터로 조회
      ["searchVehicleMgmt","searchVehicle","searchContractStart","searchContractEnd"].forEach(id=>{
        const el = document.getElementById(id);
        el.addEventListener("keydown", (e)=>{
          if(e.key === "Enter"){
            e.preventDefault();
            searchMT();
          }
        });
      });

      // 페이지 들어오면 기본 조회 한 번
      searchMT();
    });
  </script>
</body>
</html>
