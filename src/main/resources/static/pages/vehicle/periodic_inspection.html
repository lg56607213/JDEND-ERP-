<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정기검사관리 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/periodic_inspection.css">

  <style>
    .input-with-icon{ position:relative; }
    .input-with-icon input{ width:100%; padding-right:45px; }
    .icon-btn{
      position:absolute; right:5px; top:50%;
      transform:translateY(-50%);
      width:34px; height:34px;
      border:1px solid #ddd; background:#fff;
      border-radius:8px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .icon-btn:hover{ background:#f5f5f5; }

    .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; }
    .modal{
      display:none; position:fixed; left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:min(980px,95vw);
      background:#fff; border-radius:12px; z-index:10000; overflow:hidden;
    }
    .modal-header{ display:flex; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee; }
    .modal-body{ padding:14px 16px; }
    .modal-footer{ padding:12px 16px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:8px; }
    .btn{ padding:8px 12px; border-radius:8px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    .btn-primary{ background:#1f6feb; color:#fff; border-color:#1f6feb; }

    .search-row{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .search-row input{ flex:1; padding:9px 10px; border:1px solid #ddd; border-radius:8px; }
    .search-row .icon-btn{ position:static; transform:none; width:40px; height:40px; border-radius:10px; }

    .list{ max-height:380px; overflow:auto; border:1px solid #eee; border-radius:10px; }
    .list table{ width:100%; border-collapse:collapse; }
    .list th, .list td{ padding:10px; border-bottom:1px solid #f0f0f0; font-size:14px; text-align:left; }
    .list tr:hover{ background:#fafafa; }
  </style>
</head>

<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>정기검사관리</h1>
      <p>차량등록 &gt; 차량 정기검사관리 &gt; 정기검사관리</p>
    </div>

    <div class="erp-card">
      <div class="card-body">

        <div class="form-section">
          <h3 class="section-title">차량정보</h3>
          <div class="search-grid">
            <div class="form-group">
              <label for="vehicleMgmtNo">차량관리번호</label>
              <div class="input-with-icon">
                <input type="text" id="vehicleMgmtNo" placeholder="돋보기로 선택(또는 직접입력)">
                <button type="button" class="icon-btn" id="openVehicleModalBtn">🔍</button>
              </div>
            </div>

            <div class="form-group">
              <label for="vehicleNo">차량번호</label>
              <input type="text" id="vehicleNo" placeholder="차량번호 입력">
            </div>

            <div class="form-group">
              <label for="inspectionStartSearch">검사유효기간(시작) From</label>
              <input type="date" id="inspectionStartSearch">
            </div>

            <div class="form-group">
              <label for="inspectionEndSearch">검사유효기간(종료) To</label>
              <input type="date" id="inspectionEndSearch">
            </div>

            <div class="form-group">
              <label>&nbsp;</label>
              <button type="button" class="btn-search" id="searchBtn">조회</button>
            </div>
          </div>
        </div>

        <div class="register-button-area">
          <button type="button" class="btn-register" id="openRegisterBtn">등록</button>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>No.</th>
                <th>차량관리번호</th>
                <th>차량번호</th>
                <th>차종</th>
                <th>검사유효기간(시작)</th>
                <th>검사유효기간(종료)</th>
                <th>검사일자</th>
              </tr>
            </thead>
            <tbody id="inspectionTableBody">
              <tr>
                <td colspan="7" style="text-align:center; color:#718096;">조회 버튼을 눌러주세요.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <p class="table-note">* 검사유효기간이 등록된 차량만 조회됩니다.</p>
      </div>
    </div>
  </div>

  <!-- 등록 모달 -->
  <div class="modal-backdrop" id="registerBackdrop"></div>

  <div class="modal" id="registerModal">
    <div class="modal-header">
      <b>정기검사 등록</b>
      <button type="button" class="btn" id="closeRegisterBtn">닫기</button>
    </div>

    <div class="modal-body">
      <div class="form-section">
        <div class="form-row">
          <div class="form-group">
            <label>차량관리번호 *</label>
            <div class="input-with-icon">
              <input type="text" id="regVehicleMgmtNo" placeholder="돋보기로 차량 선택" readonly>
              <button type="button" class="icon-btn" id="openVehicleModalBtn2">🔍</button>
            </div>
          </div>

          <div class="form-group">
            <label>차량번호</label>
            <input type="text" id="regVehicleNo" placeholder="-" disabled>
          </div>

          <div class="form-group">
            <label>차종</label>
            <input type="text" id="regCarModel" placeholder="-" disabled>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>검사일자</label>
            <input type="date" id="regInspectionDate">
          </div>

          <div class="form-group">
            <label>검사기관(선택)</label>
            <input type="text" id="regVendor" placeholder="예: 교통안전공단">
          </div>

          <div class="form-group">
            <label>검사처(선택)</label>
            <input type="text" id="regInspectionPlace" placeholder="예: 송파 검사소">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>검사비용(선택)</label>
            <input type="text" id="regInspectionCost" placeholder="0" inputmode="numeric">
          </div>

          <div class="form-group">
            <label>검사유효기간(시작) *</label>
            <input type="date" id="regValidStart">
          </div>

          <div class="form-group">
            <label>검사유효기간(종료) *</label>
            <input type="date" id="regValidEnd">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group" style="width:100%;">
            <label>비고(선택)</label>
            <input type="text" id="regMemo" placeholder="메모">
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn" id="resetModalBtn">초기화</button>
      <button type="button" class="btn btn-primary" id="saveModalBtn">저장</button>
    </div>
  </div>

  <!-- 차량 선택 모달 -->
  <div class="modal-backdrop" id="vehicleModalBackdrop"></div>

  <div class="modal" id="vehicleModal">
    <div class="modal-header">
      <b>차량 선택</b>
      <button type="button" class="btn" id="closeVehicleModalBtn">닫기</button>
    </div>

    <div class="modal-body">
      <div class="search-row">
        <input type="text" id="vehicleSearchKw" placeholder="차량관리번호/차량번호/차종 검색">
        <button type="button" class="icon-btn" id="vehicleSearchIconBtn">🔍</button>
      </div>

      <div class="list">
        <table>
          <thead>
            <tr>
              <th style="width:220px;">차량관리번호</th>
              <th style="width:160px;">차량번호</th>
              <th>차종</th>
              <th style="width:110px;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleSearchTbody">
            <tr>
              <td colspan="4" style="color:#888;">조회중...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn" id="vehicleModalClose2">닫기</button>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/$/, "");

    let vehiclePickTarget = "search";

    function mustOk(res){
      if(!res.ok){
        return res.json().catch(()=> ({})).then(b=>{
          const msg = (b && (b.message || b.error || b.msg))
            ? (b.message || b.error || b.msg)
            : ("HTTP " + res.status);
          throw new Error(msg);
        });
      }
      return res;
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll("\"","&quot;")
        .replaceAll("'","&#039;");
    }

    function escapeAttr(s){
      return String(s ?? "").replaceAll("'","\\'");
    }

    function parseMoneyToLong(str){
      const n = String(str ?? "").replace(/[^\d]/g, "");
      if(!n) return 0;
      return parseInt(n, 10) || 0;
    }

    function formatMoneyInput(el){
      const n = parseMoneyToLong(el.value);
      el.value = n ? n.toLocaleString() : "";
    }

    async function searchInspection(){
      const mgmtNo = document.getElementById("vehicleMgmtNo").value.trim();
      const vehicleNo = document.getElementById("vehicleNo").value.trim();
      const validStartFrom = document.getElementById("inspectionStartSearch").value;
      const validEndTo = document.getElementById("inspectionEndSearch").value;

      const qs = new URLSearchParams();
      if(mgmtNo) qs.set("vehicleMgmtNo", mgmtNo);
      if(vehicleNo) qs.set("vehicleNo", vehicleNo);
      if(validStartFrom) qs.set("validStartFrom", validStartFrom);
      if(validEndTo) qs.set("validEndTo", validEndTo);

      const tbody = document.getElementById("inspectionTableBody");
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#718096;">조회중...</td></tr>`;

      try{
        const res = await fetch(`${BASE}/api/vehicle-inspections?${qs.toString()}`);
        await mustOk(res);

        let list = await res.json();
        if(!Array.isArray(list)) list = [];

        if(list.length === 0){
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#718096;">검사유효기간이 등록된 차량이 없습니다.</td></tr>`;
          return;
        }

        tbody.innerHTML = list.map((row, idx)=>`
          <tr>
            <td>${idx + 1}</td>
            <td>${escapeHtml(row.vehicleMgmtNo || "")}</td>
            <td>${escapeHtml(row.vehicleNo || "")}</td>
            <td>${escapeHtml(row.carModel || "")}</td>
            <td>${escapeHtml(row.validStart || "")}</td>
            <td>${escapeHtml(row.validEnd || "")}</td>
            <td>${escapeHtml(row.inspectionDate || "")}</td>
          </tr>
        `).join("");

      }catch(e){
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    function openRegisterModal(){
      document.getElementById("registerBackdrop").style.display = "block";
      document.getElementById("registerModal").style.display = "block";
    }

    function closeRegisterModal(){
      document.getElementById("registerBackdrop").style.display = "none";
      document.getElementById("registerModal").style.display = "none";
      resetRegisterModal();
    }

    function resetRegisterModal(){
      document.getElementById("regVehicleMgmtNo").value = "";
      document.getElementById("regVehicleNo").value = "";
      document.getElementById("regCarModel").value = "";
      document.getElementById("regInspectionDate").value = "";
      document.getElementById("regVendor").value = "";
      document.getElementById("regInspectionPlace").value = "";
      document.getElementById("regInspectionCost").value = "";
      document.getElementById("regValidStart").value = "";
      document.getElementById("regValidEnd").value = "";
      document.getElementById("regMemo").value = "";
    }

    async function saveRegisterModal(){
      const vehicleMgmtNo = document.getElementById("regVehicleMgmtNo").value.trim();
      const inspectionDate = document.getElementById("regInspectionDate").value || null;
      const validStart = document.getElementById("regValidStart").value;
      const validEnd = document.getElementById("regValidEnd").value;
      const vendor = document.getElementById("regVendor").value.trim();
      const inspectionPlace = document.getElementById("regInspectionPlace").value.trim();
      const inspectionCost = parseMoneyToLong(document.getElementById("regInspectionCost").value);
      const memo = document.getElementById("regMemo").value.trim();

      if(!vehicleMgmtNo){
        alert("차량관리번호를 선택하세요.");
        return;
      }

      if(!validStart || !validEnd){
        alert("검사유효기간(시작/종료)은 필수입니다.");
        return;
      }

      if(validStart > validEnd){
        alert("유효기간 시작일이 종료일보다 클 수 없습니다.");
        return;
      }

      const body = {
        vehicleMgmtNo,
        inspectionDate,
        validStart,
        validEnd,
        vendor,
        inspectionPlace,
        inspectionCost,
        memo
      };

      if(!confirm("정기검사를 등록하시겠습니까?")) return;

      const btn = document.getElementById("saveModalBtn");
      const old = btn.textContent;
      btn.disabled = true;
      btn.textContent = "저장중...";

      try{
        const res = await fetch(`${BASE}/api/vehicle-inspections`, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify(body)
        });

        await mustOk(res);
        await res.json();

        alert("정기검사가 등록되었습니다.");
        closeRegisterModal();
        await searchInspection();

      }catch(e){
        alert("등록 실패: " + e.message);
      }finally{
        btn.disabled = false;
        btn.textContent = old;
      }
    }

    function openVehicleModal(target){
      vehiclePickTarget = target;
      document.getElementById("vehicleModalBackdrop").style.display = "block";
      document.getElementById("vehicleModal").style.display = "block";
      document.getElementById("vehicleSearchKw").value = "";
      doVehicleSearch();
      setTimeout(()=>document.getElementById("vehicleSearchKw").focus(), 0);
    }

    function closeVehicleModal(){
      document.getElementById("vehicleModalBackdrop").style.display = "none";
      document.getElementById("vehicleModal").style.display = "none";
    }

    // ✅ 핵심 수정
    // 기존: /api/vehicle-orders/search 호출 → 전체 차량 나옴
    // 변경: /api/vehicle-inspections 호출 → 검사유효기간 등록된 차량만 나옴
    async function doVehicleSearch(){
      const kw = document.getElementById("vehicleSearchKw").value.trim();
      const tbody = document.getElementById("vehicleSearchTbody");

      tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">조회중...</td></tr>`;

      try{
        const res = await fetch(`${BASE}/api/vehicle-inspections`);
        await mustOk(res);

        let list = await res.json();
        if(!Array.isArray(list)) list = [];

        if(kw){
          const keyword = kw.toLowerCase();

          list = list.filter(v => {
            const mgmtNo = String(v.vehicleMgmtNo || "").toLowerCase();
            const vehicleNo = String(v.vehicleNo || "").toLowerCase();
            const carModel = String(v.carModel || "").toLowerCase();

            return mgmtNo.includes(keyword) ||
                   vehicleNo.includes(keyword) ||
                   carModel.includes(keyword);
          });
        }

        if(list.length === 0){
          tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">검사유효기간이 등록된 차량이 없습니다.</td></tr>`;
          return;
        }

        tbody.innerHTML = list.map(v=>`
          <tr>
            <td>${escapeHtml(v.vehicleMgmtNo || "")}</td>
            <td>${escapeHtml(v.vehicleNo || "")}</td>
            <td>${escapeHtml(v.carModel || "")}</td>
            <td>
              <button type="button" class="btn btn-primary" onclick="selectVehicle('${escapeAttr(v.vehicleMgmtNo || "")}')">
                선택
              </button>
            </td>
          </tr>
        `).join("");

      }catch(e){
        tbody.innerHTML = `<tr><td colspan="4" style="color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    async function selectVehicle(mgmtNo){
      closeVehicleModal();

      if(vehiclePickTarget === "search"){
        document.getElementById("vehicleMgmtNo").value = mgmtNo;
        return;
      }

      document.getElementById("regVehicleMgmtNo").value = mgmtNo;

      try{
        const res = await fetch(`${BASE}/api/vehicle-orders/${encodeURIComponent(mgmtNo)}`);
        await mustOk(res);

        const v = await res.json();

        document.getElementById("regVehicleNo").value = v.vehicleNo || "";
        document.getElementById("regCarModel").value = v.carModel || "";

      }catch(e){
        document.getElementById("regVehicleNo").value = "";
        document.getElementById("regCarModel").value = "";
        alert("차량정보 로드 실패: " + e.message);
      }
    }

    document.addEventListener("DOMContentLoaded", ()=>{
      document.getElementById("searchBtn").addEventListener("click", searchInspection);

      document.getElementById("openRegisterBtn").addEventListener("click", openRegisterModal);
      document.getElementById("closeRegisterBtn").addEventListener("click", closeRegisterModal);
      document.getElementById("registerBackdrop").addEventListener("click", closeRegisterModal);
      document.getElementById("resetModalBtn").addEventListener("click", resetRegisterModal);
      document.getElementById("saveModalBtn").addEventListener("click", saveRegisterModal);

      const costEl = document.getElementById("regInspectionCost");
      costEl.addEventListener("input", ()=>formatMoneyInput(costEl));

      document.getElementById("openVehicleModalBtn").addEventListener("click", ()=>openVehicleModal("search"));
      document.getElementById("openVehicleModalBtn2").addEventListener("click", ()=>openVehicleModal("register"));

      document.getElementById("closeVehicleModalBtn").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalClose2").addEventListener("click", closeVehicleModal);
      document.getElementById("vehicleModalBackdrop").addEventListener("click", closeVehicleModal);

      document.getElementById("vehicleSearchIconBtn").addEventListener("click", doVehicleSearch);
      document.getElementById("vehicleSearchKw").addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault();
          doVehicleSearch();
        }
      });
    });
  </script>
</body>
</html>
