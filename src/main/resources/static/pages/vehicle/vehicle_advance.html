<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선급 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_advance.css">
  <style>
    .advance-summary-box {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .advance-summary-table {
      min-width: 520px;
      border-collapse: collapse;
      background: #fff;
    }

    .advance-summary-table th,
    .advance-summary-table td {
      border: 1px solid #dcdfe6;
      padding: 10px 14px;
      text-align: right;
      font-weight: 600;
    }

    .advance-summary-table th {
      background: #f8fafc;
      text-align: center;
      width: 140px;
    }

    .advance-summary-table td {
      color: #111827;
      min-width: 140px;
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>선급</h1>
      <p>차량관리 &gt; 출고 &gt; 선급</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 차량 정보 섹션 -->
        <div class="vehicle-info-section">
          <div class="section-title">차량 정보</div>
          <div class="form-grid">
            <div class="form-group">
              <label for="vehicleManagementNumber">차량관리번호 *</label>
              <div style="display:flex; gap:8px;">
                <input type="text" id="vehicleManagementNumber" placeholder="차량관리번호 입력" onchange="loadVehicleInfo()">
                <button type="button" class="btn" onclick="openVehicleSearch()">🔍</button>
              </div>
            </div>

            <div class="form-group">
              <label for="vehicleModel">차종</label>
              <input type="text" id="vehicleModel" readonly>
            </div>
            <div class="form-group">
              <label for="vehicleOptions">옵션</label>
              <input type="text" id="vehicleOptions" readonly>
            </div>
            <div class="form-group">
              <label for="vehiclePrice">총차량가</label>
              <input type="text" id="vehiclePrice" readonly>
            </div>
            <div class="form-group">
              <label for="orderDate">발주일자</label>
              <input type="date" id="orderDate" readonly>
            </div>
            <div class="form-group">
              <label for="makerContractNumber">제조사계약번호</label>
              <input type="text" id="makerContractNumber" readonly>
            </div>
            <div class="form-group">
              <label for="vinNumber">차대번호</label>
              <input type="text" id="vinNumber" readonly>
            </div>
            <div class="form-group">
              <label for="vehiclePlateNumber">차량번호</label>
              <input type="text" id="vehiclePlateNumber" readonly>
            </div>
          </div>
        </div>

        <!-- 선급금 입력 섹션 -->
        <div class="section-title">선급금 내역</div>
        <div class="advance-table-container">
          <table>
            <thead>
              <tr>
                <th class="inline-style-1">항목</th>
                <th class="inline-style-2">선급금액</th>
                <th class="inline-style-3">공급가액</th>
                <th class="inline-style-4">부가가치세액</th>
                <th class="inline-style-5">전표일자</th>
                <th class="inline-style-7">지급방법</th>
                <th>적요</th>
                <th class="inline-style-6">삭제</th>
              </tr>
            </thead>
            <tbody id="advanceTableBody"></tbody>
          </table>

          <div class="advance-summary-box">
            <table class="advance-summary-table">
              <tbody>
                <tr>
                  <th>선급금액 합계</th>
                  <td id="sumAdvanceAmount">0 원</td>
                  <th>공급가액 합계</th>
                  <td id="sumSupplyAmount">0 원</td>
                  <th>부가가치세액 합계</th>
                  <td id="sumVatAmount">0 원</td>
                </tr>
              </tbody>
            </table>
          </div>

          <button type="button" class="btn-add-row" onclick="addRow()">+ 항목 추가</button>
        </div>

        <!-- 버튼 그룹 -->
        <div class="btn-group">
          <button type="button" class="btn btn-reset" onclick="resetForm()">초기화</button>
          <button type="button" class="btn btn-save" onclick="saveAdvance()">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 차량관리번호 선택 모달 -->
  <div id="vehicleSearchModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:9999;">
    <div style="width:900px; max-width:92vw; background:#fff; margin:60px auto; padding:16px; border-radius:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">차량관리번호 선택</h3>
        <button type="button" onclick="closeVehicleSearch()">X</button>
      </div>

      <div style="display:flex; gap:8px; margin:12px 0;">
        <input type="text" id="vehicleSearchKeyword" placeholder="차량관리번호/차종/차량번호 검색" style="flex:1;">
        <button type="button" onclick="fetchVehicleList()">검색</button>
      </div>

      <div style="max-height:420px; overflow:auto; border:1px solid #ddd; border-radius:8px;">
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="background:#f5f5f5;">
              <th style="padding:10px; border-bottom:1px solid #ddd;">차량관리번호</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">차종</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">차량번호</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">발주일자</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleSearchBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/html-escape.js"></script>
<script>
  const API_BASE = `${API_BASE_URL}/api/vehicle-orders`;
  let rowCount = 0;
  let myBankAccounts = [];
  let myCorporateCards = [];

  async function loadMyInfoAccounts() {
    try {
      const [banks, cards] = await Promise.all([
        fetch(`${API_BASE_URL}/api/my-info/bank-accounts?activeOnly=true`).then(r => r.ok ? r.json() : []),
        fetch(`${API_BASE_URL}/api/my-info/corporate-cards?activeOnly=true`).then(r => r.ok ? r.json() : [])
      ]);
      myBankAccounts = banks || [];
      myCorporateCards = cards || [];
    } catch (e) {
      console.warn('내정보 계좌 로드 실패:', e);
    }
  }

  function onPaymentMethodChange(idx) {
    const method = document.getElementById(`paymentMethod_${idx}`)?.value;
    const sel = document.getElementById(`accountRef_${idx}`);
    if (!sel) return;

    if (method === '보통예금') {
      let opts = '<option value="">계좌 선택</option>';
      myBankAccounts.forEach(acc => {
        const label = [acc.accountAlias, acc.bankName, acc.accountNumber].filter(Boolean).join(' ');
        opts += `<option value="${escHtml(label)}">${escHtml(label)}</option>`;
      });
      if (myBankAccounts.length === 0) opts += '<option value="" disabled>내정보관리에 등록된 계좌 없음</option>';
      sel.innerHTML = opts;
      sel.style.display = '';
    } else if (method === '법인카드') {
      let opts = '<option value="">카드 선택</option>';
      myCorporateCards.forEach(card => {
        const label = [card.cardAlias, card.cardCompany, card.cardNumberLast4 ? `****${card.cardNumberLast4}` : ''].filter(Boolean).join(' ');
        opts += `<option value="${escHtml(label)}">${escHtml(label)}</option>`;
      });
      if (myCorporateCards.length === 0) opts += '<option value="" disabled>내정보관리에 등록된 카드 없음</option>';
      sel.innerHTML = opts;
      sel.style.display = '';
    } else {
      sel.style.display = 'none';
      sel.value = '';
    }
  }

  function onAccountRefChange(idx) {
    const val = document.getElementById(`accountRef_${idx}`)?.value;
    if (val) document.getElementById(`remark_${idx}`).value = val;
  }

  const VAT_ZERO_ITEMS = new Set(["취득세", "인지대", "공채할인금액", "공채매입금액"]);

  function parseMoney(val) {
    if (val == null) return 0;
    const n = String(val).replace(/[^\d]/g, "");
    return n ? parseInt(n, 10) : 0;
  }

  function formatMoney(n) {
    const num = Number(n) || 0;
    return num.toLocaleString();
  }

  function todayISO() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function buildDefaultRemark(index) {
    const mgmtNo = document.getElementById('vehicleManagementNumber')?.value?.trim() || "";
    const itemName = document.getElementById(`item_${index}`)?.value || "";
    if (!mgmtNo || !itemName) return "";
    return `차량관리번호 '${mgmtNo}' ${itemName} 지급처리`;
  }

  function applyDefaultRemark(index) {
    const remarkEl = document.getElementById(`remark_${index}`);
    if (!remarkEl) return;

    if ((remarkEl.value || "").trim()) return;

    const def = buildDefaultRemark(index);
    if (def) remarkEl.value = def;
  }

  function updateTotalAmount() {
    let totalAdvance = 0;
    let totalSupply = 0;
    let totalVat = 0;

    for (let i = 0; i < rowCount; i++) {
      if (!document.getElementById(`row_${i}`)) continue;

      totalAdvance += parseMoney(document.getElementById(`advanceAmount_${i}`)?.value);
      totalSupply += parseMoney(document.getElementById(`supplyAmount_${i}`)?.value);
      totalVat += parseMoney(document.getElementById(`vatAmount_${i}`)?.value);
    }

    document.getElementById('sumAdvanceAmount').textContent = `${formatMoney(totalAdvance)} 원`;
    document.getElementById('sumSupplyAmount').textContent = `${formatMoney(totalSupply)} 원`;
    document.getElementById('sumVatAmount').textContent = `${formatMoney(totalVat)} 원`;
  }

  window.addEventListener('load', async function() {
    await loadMyInfoAccounts();
    addRow();

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    if (id) {
      document.getElementById('vehicleManagementNumber').value = id;
      await loadVehicleInfo();
    }
  });

  function addRow(prefill) {
    const tbody = document.getElementById('advanceTableBody');
    const idx = rowCount;

    const newRow = document.createElement('tr');
    newRow.id = `row_${idx}`;

    newRow.innerHTML = `
      <td>
        <select id="item_${idx}" onchange="handleItemChange(${idx})">
          <option value="">선택</option>
          <option value="차량가격">차량가격</option>
          <option value="메이커탁송료">메이커탁송료</option>
          <option value="취득세">취득세</option>
          <option value="인지대">인지대</option>
          <option value="번호판대">번호판대</option>
          <option value="보조번호판대">보조번호판대</option>
          <option value="공채매입금액">공채매입금액</option>
          <option value="공채할인금액">공채할인금액</option>
          <option value="등록대행비">등록대행비</option>
          <option value="탁송료">탁송료</option>
          <option value="외주장착비용">외주장착비용</option>
          <option value="기타비용">기타비용</option>
        </select>
      </td>
      <td><input type="text" id="advanceAmount_${idx}" placeholder="0" inputmode="numeric" oninput="handleAmountInput(${idx})"></td>
      <td><input type="text" id="supplyAmount_${idx}" placeholder="0" readonly></td>
      <td><input type="text" id="vatAmount_${idx}" placeholder="0" readonly></td>
      <td><input type="date" id="voucherDate_${idx}"></td>
      <td>
        <select id="paymentMethod_${idx}" onchange="onPaymentMethodChange(${idx})">
          <option value="">선택</option>
          <option value="법인카드">법인카드</option>
          <option value="미지급금">미지급금</option>
          <option value="보통예금">보통예금</option>
        </select>
        <select id="accountRef_${idx}" style="display:none; margin-top:4px; font-size:12px; width:100%;" onchange="onAccountRefChange(${idx})">
          <option value="">선택</option>
        </select>
      </td>
      <td><input type="text" id="remark_${idx}" placeholder="적요 입력"></td>
      <td><button type="button" class="btn-delete-row" onclick="deleteRow(${idx})">삭제</button></td>
    `;

    tbody.appendChild(newRow);
    rowCount++;

    if (prefill) {
      document.getElementById(`item_${idx}`).value = prefill.itemName || "";
      document.getElementById(`advanceAmount_${idx}`).value = (prefill.advanceAmount != null) ? formatMoney(prefill.advanceAmount) : "";
      document.getElementById(`supplyAmount_${idx}`).value = (prefill.supplyAmount != null) ? formatMoney(prefill.supplyAmount) : "";
      document.getElementById(`vatAmount_${idx}`).value = (prefill.vatAmount != null) ? formatMoney(prefill.vatAmount) : "";
      document.getElementById(`voucherDate_${idx}`).value = prefill.voucherDate ?? "";
      document.getElementById(`paymentMethod_${idx}`).value = prefill.paymentMethod || "";
      onPaymentMethodChange(idx);
      document.getElementById(`remark_${idx}`).value = prefill.remark || "";
    }

    calculateVAT(idx);

    const vdEl = document.getElementById(`voucherDate_${idx}`);
    if (vdEl && !vdEl.value) vdEl.value = todayISO();

    applyDefaultRemark(idx);
    updateTotalAmount();
  }

  function deleteRow(index) {
    const row = document.getElementById(`row_${index}`);
    if (row) row.remove();
    updateTotalAmount();
  }

  function handleAmountInput(index) {
    const advEl = document.getElementById(`advanceAmount_${index}`);
    if (!advEl) return;

    const raw = parseMoney(advEl.value);
    advEl.value = raw ? formatMoney(raw) : "";

    calculateVAT(index);
    updateTotalAmount();
  }

  function handleItemChange(index) {
    calculateVAT(index);
    applyDefaultRemark(index);
    updateTotalAmount();
  }

  function calculateVAT(index) {
    const advEl = document.getElementById(`advanceAmount_${index}`);
    const itemEl = document.getElementById(`item_${index}`);
    if (!advEl || !itemEl) return;

    const itemName = itemEl.value || "";
    const adv = parseMoney(advEl.value);

    let supply = 0;
    let vat = 0;

    if (!adv || !itemName) {
      supply = 0;
      vat = 0;
    } else if (VAT_ZERO_ITEMS.has(itemName)) {
      supply = adv;
      vat = 0;
    } else {
      supply = Math.round(adv / 1.1);
      vat = adv - supply;
    }

    const supplyEl = document.getElementById(`supplyAmount_${index}`);
    const vatEl = document.getElementById(`vatAmount_${index}`);

    if (supplyEl) supplyEl.value = supply ? formatMoney(supply) : "";
    if (vatEl) vatEl.value = vat ? formatMoney(vat) : "";
  }

  async function loadVehicleInfo() {
    const mgmtNo = document.getElementById('vehicleManagementNumber').value.trim();
    if (!mgmtNo) {
      clearVehicleInfo();
      return;
    }

    const res = await fetch(`${API_BASE}/${mgmtNo}`);
    if (!res.ok) {
      alert('해당 차량관리번호를 찾을 수 없습니다.');
      clearVehicleInfo();
      return;
    }

    const v = await res.json();

    document.getElementById('vehicleModel').value = v.carModel ?? '';
    document.getElementById('vehicleOptions').value = v.optionName ?? '';

    const total = (v.totalPrice ?? v.vehiclePrice ?? 0);
    document.getElementById('vehiclePrice').value = formatMoney(total) + ' 원';

    document.getElementById('orderDate').value = v.orderDate ?? '';
    document.getElementById('makerContractNumber').value = v.makerContractNo ?? '';
    document.getElementById('vinNumber').value = v.chassisNo ?? '';
    document.getElementById('vehiclePlateNumber').value = v.vehicleNo ?? '';

    await loadAdvanceRows(mgmtNo);

    for (let i = 0; i < rowCount; i++) {
      if (!document.getElementById(`row_${i}`)) continue;
      applyDefaultRemark(i);
    }

    updateTotalAmount();
  }

  async function loadAdvanceRows(mgmtNo) {
    const tbody = document.getElementById('advanceTableBody');
    tbody.innerHTML = '';
    rowCount = 0;

    const res = await fetch(`${API_BASE}/${mgmtNo}/advances`);
    if (!res.ok) {
      addRow();
      updateTotalAmount();
      return;
    }

    const rows = await res.json();
    if (!rows || rows.length === 0) {
      addRow();
      updateTotalAmount();
      return;
    }

    rows.forEach(r => addRow(r));
    updateTotalAmount();
  }

  function clearVehicleInfo() {
    document.getElementById('vehicleModel').value = '';
    document.getElementById('vehicleOptions').value = '';
    document.getElementById('vehiclePrice').value = '';
    document.getElementById('orderDate').value = '';
    document.getElementById('makerContractNumber').value = '';
    document.getElementById('vinNumber').value = '';
    document.getElementById('vehiclePlateNumber').value = '';

    document.getElementById('advanceTableBody').innerHTML = '';
    rowCount = 0;
    addRow();
    updateTotalAmount();
  }

  function resetForm() {
    if (!confirm('모든 입력 내용을 초기화하시겠습니까?')) return;
    document.getElementById('vehicleManagementNumber').value = '';
    clearVehicleInfo();
  }

  async function saveAdvance() {
    const mgmtNo = document.getElementById('vehicleManagementNumber').value.trim();
    if (!mgmtNo) return alert('차량관리번호를 입력해주세요.');

    const tbody = document.getElementById('advanceTableBody');
    const trList = Array.from(tbody.querySelectorAll('tr'));
    if (trList.length === 0) return alert('선급금 항목을 추가해주세요.');

    const rows = [];

    for (let i = 0; i < rowCount; i++) {
      if (!document.getElementById(`row_${i}`)) continue;

      const itemName = document.getElementById(`item_${i}`)?.value || "";
      if (!itemName) continue;

      const advanceAmount = parseMoney(document.getElementById(`advanceAmount_${i}`)?.value);
      const supplyAmount  = parseMoney(document.getElementById(`supplyAmount_${i}`)?.value);
      const vatAmount     = parseMoney(document.getElementById(`vatAmount_${i}`)?.value);
      const voucherDate   = document.getElementById(`voucherDate_${i}`)?.value || null;
      const paymentMethod = document.getElementById(`paymentMethod_${i}`)?.value || "";
      const remark        = document.getElementById(`remark_${i}`)?.value || null;

      if (!paymentMethod) {
        return alert("지급방법이 결정되지 않은건이 있습니다.");
      }

      rows.push({
        itemName,
        advanceAmount,
        supplyAmount,
        vatAmount,
        voucherDate,
        paymentMethod,
        remark
      });
    }

    if (rows.length === 0) return alert('선급금 항목을 추가해주세요.');

    const res = await fetch(`${API_BASE}/${mgmtNo}/advances`, {
      method: "PUT",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ rows })
    });

    if (!res.ok) {
      const text = await res.text();
      return alert("저장 실패: " + res.status + "\n" + text);
    }

    let msg = "선급금 정보가 저장되었습니다.";
    try {
      const data = await res.json();
      if (data?.message) msg = data.message;
    } catch (e) {}

    alert(msg);
    await loadAdvanceRows(mgmtNo);
    updateTotalAmount();
  }

  function openVehicleSearch() {
    document.getElementById('vehicleSearchModal').style.display = 'block';
    document.getElementById('vehicleSearchKeyword').value = '';
    fetchVehicleList();
  }

  function closeVehicleSearch() {
    document.getElementById('vehicleSearchModal').style.display = 'none';
  }

  async function fetchVehicleList() {
    const kw = document.getElementById('vehicleSearchKeyword').value.trim();
    const url = kw ? `${API_BASE}?keyword=${encodeURIComponent(kw)}` : `${API_BASE}`;

    const res = await fetch(url);
    if (!res.ok) {
      alert('차량 목록 API가 필요합니다. (GET /api/vehicle-orders?keyword=...)');
      return;
    }

    const list = await res.json();
    const tbody = document.getElementById('vehicleSearchBody');
    tbody.innerHTML = '';

    (list || []).forEach(v => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="padding:10px; border-bottom:1px solid #eee;">${escHtml(v.vehicleMgmtNo ?? '')}</td>
        <td style="padding:10px; border-bottom:1px solid #eee;">${escHtml(v.carModel ?? '')}</td>
        <td style="padding:10px; border-bottom:1px solid #eee;">${escHtml(v.vehicleNo ?? '')}</td>
        <td style="padding:10px; border-bottom:1px solid #eee;">${v.orderDate ?? ''}</td>
        <td style="padding:10px; border-bottom:1px solid #eee;">
          <button type="button" onclick="selectVehicle('${v.vehicleMgmtNo ?? ''}')">선택</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function selectVehicle(mgmtNo) {
    document.getElementById('vehicleManagementNumber').value = mgmtNo;
    closeVehicleSearch();
    await loadVehicleInfo();
  }
</script>

</body>
</html>
