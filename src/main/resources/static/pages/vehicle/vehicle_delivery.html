<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실행 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_delivery.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>실행</h1>
      <p>차량등록 &gt; 차량현황 &gt; 실행</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 차량조회 섹션 -->
        <div class="form-section">
          <h3 class="section-title">차량조회</h3>
          <div class="search-row">
            <div class="form-group">
              <label for="vehicleMgmtNo">차량관리번호</label>

              <div style="display:flex; gap:6px; align-items:center;">
                <input
                  type="text"
                  id="vehicleMgmtNo"
                  placeholder="차량관리번호 입력 또는 선택"
                  onchange="searchVehicle()"
                >
                <button
                  type="button"
                  class="btn-search-small"
                  title="차량관리번호 선택"
                  onclick="openVehicleSearch()"
                >🔍</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 차량정보 섹션 -->
        <div class="form-section" id="vehicleInfoSection" style="display: none;">
          <h3 class="section-title">차량정보</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>차종</label>
              <input type="text" id="carModel" readonly>
            </div>
            <div class="form-group">
              <label>총차량가</label>
              <input type="text" id="totalVehiclePrice" readonly>
            </div>
            <div class="form-group">
              <label>차량번호</label>
              <input type="text" id="vehicleNo" readonly>
            </div>
            <div class="form-group">
              <label>출고가</label>
              <input type="text" id="releasePrice" readonly>
            </div>
            <div class="form-group">
              <label>총선급금액</label>
              <input type="text" id="totalAdvancePrice" readonly>
            </div>
            <div class="form-group">
              <label>출고가차액</label>
              <input type="text" id="priceDiff" readonly>
            </div>
          </div>
        </div>

        <!-- 안내 문구 -->
        <div class="form-section" id="executeInfoSection" style="display: none;">
          <h3 class="section-title">실행 안내</h3>
          <div style="padding:14px; border:1px solid #e5e7eb; border-radius:8px; background:#f8fafc; color:#334155; line-height:1.7;">
            차입금 정보는 <b>차입금 관리 메뉴</b>에서 별도로 등록합니다.<br>
            이 화면에서는 차량 상태만 <b>실행완료</b>로 변경됩니다.
          </div>
        </div>

        <!-- 버튼 영역 -->
        <div class="form-actions" id="actionButtons" style="display: none;">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">초기화</button>
          <button type="button" class="btn btn-primary" onclick="executeDelivery()">실행하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 돋보기 모달 -->
  <div id="vehicleSearchModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:9999;">
    <div style="width:900px; max-width:92vw; background:#fff; margin:60px auto; padding:16px; border-radius:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">차량관리번호 선택</h3>
        <button type="button" onclick="closeVehicleSearch()">X</button>
      </div>

      <div style="display:flex; gap:8px; margin:12px 0;">
        <input type="text" id="vehicleSearchKeyword" placeholder="차량관리번호/차종/차량번호 검색" style="flex:1;">
        <button type="button" onclick="fetchVehicleList()">검색</button>
      </div>

      <div style="max-height:420px; overflow:auto; border:1px solid #ddd; border-radius:8px;">
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="background:#f5f5f5;">
              <th style="padding:10px; border-bottom:1px solid #ddd;">차량관리번호</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">차종</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">차량번호</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">상태</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleSearchBody"></tbody>
        </table>
      </div>

      <div style="margin-top:10px; font-size:12px; color:#666;">
        * 실행 화면에서는 <b>등록완료</b> 상태만 실행 가능합니다.
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const API_BASE = '';

    function openVehicleSearch() {
      document.getElementById('vehicleSearchModal').style.display = 'block';
      document.getElementById('vehicleSearchKeyword').value = '';
      fetchVehicleList();
    }

    function closeVehicleSearch() {
      document.getElementById('vehicleSearchModal').style.display = 'none';
    }

    async function fetchVehicleList() {
      const kw = document.getElementById('vehicleSearchKeyword').value.trim();

      try {
        const url = new URL('/api/vehicle-orders', window.location.origin);
        url.searchParams.set('status', '등록완료');

        const res = await fetch(url.toString());
        if (!res.ok) {
          return alert('차량 목록 조회 실패: ' + res.status + '\nGET /api/vehicle-orders?status=등록완료');
        }

        let list = await res.json();
        if (!Array.isArray(list)) list = [];

        if (kw) {
          const keyword = kw.toLowerCase();
          list = list.filter(v => {
            const mgmtNo = (v.vehicleMgmtNo || '').toLowerCase();
            const carModel = (v.carModel || '').toLowerCase();
            const vehicleNo = (v.vehicleNo || '').toLowerCase();
            return mgmtNo.includes(keyword) || carModel.includes(keyword) || vehicleNo.includes(keyword);
          });
        }

        const tbody = document.getElementById('vehicleSearchBody');
        tbody.innerHTML = '';

        if (list.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="5" style="padding:14px; text-align:center; color:#666;">
                검색 결과가 없습니다.
              </td>
            </tr>
          `;
          return;
        }

        list.forEach(v => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.vehicleMgmtNo ?? ''}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.carModel ?? ''}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.vehicleNo ?? '-'}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.orderStatus ?? '-'}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">
              <button type="button" onclick="selectVehicle('${v.vehicleMgmtNo ?? ''}')">선택</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        alert('차량 목록 조회 중 오류: ' + e.message);
      }
    }

    async function selectVehicle(mgmtNo) {
      document.getElementById('vehicleMgmtNo').value = mgmtNo;
      closeVehicleSearch();
      await searchVehicle();
    }

    async function searchVehicle() {
      let vehicleMgmtNo = document.getElementById('vehicleMgmtNo').value.trim();

      if (!vehicleMgmtNo) {
        hideAllSections();
        return;
      }

      vehicleMgmtNo = vehicleMgmtNo.toUpperCase();
      document.getElementById('vehicleMgmtNo').value = vehicleMgmtNo;

      try {
        const res = await fetch(`/api/vehicle-orders/${encodeURIComponent(vehicleMgmtNo)}`);
        if (!res.ok) {
          hideAllSections();
          alert('해당 차량관리번호를 찾을 수 없습니다.');
          return;
        }

        const vehicle = await res.json();

        if (vehicle.orderStatus !== '등록완료') {
          hideAllSections();
          alert(`등록완료 상태의 차량만 실행할 수 있습니다.\n현재 상태: ${vehicle.orderStatus}`);
          return;
        }

        document.getElementById('carModel').value = vehicle.carModel || '';
        document.getElementById('totalVehiclePrice').value = ((vehicle.totalPrice ?? 0)).toLocaleString();
        document.getElementById('vehicleNo').value = vehicle.vehicleNo || '';
        document.getElementById('releasePrice').value = ((vehicle.releasePrice ?? 0)).toLocaleString();
        document.getElementById('totalAdvancePrice').value = ((vehicle.totalAdvancePrice ?? 0)).toLocaleString();

        const priceDiff = (vehicle.releasePrice ?? 0) - (vehicle.totalPrice ?? 0);
        const priceDiffEl = document.getElementById('priceDiff');
        priceDiffEl.value = priceDiff.toLocaleString();
        priceDiffEl.style.color = priceDiff < 0 ? '#e53e3e' : '#38a169';

        document.getElementById('vehicleInfoSection').style.display = 'block';
        document.getElementById('executeInfoSection').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
      } catch (e) {
        console.error(e);
        hideAllSections();
        alert('서버 연결 실패(API/CORS 확인)');
      }
    }

    function hideAllSections() {
      document.getElementById('vehicleInfoSection').style.display = 'none';
      document.getElementById('executeInfoSection').style.display = 'none';
      document.getElementById('actionButtons').style.display = 'none';
    }

    function resetForm() {
      if (confirm('조회한 내용을 초기화하시겠습니까?')) {
        document.getElementById('vehicleMgmtNo').value = '';
        document.getElementById('carModel').value = '';
        document.getElementById('totalVehiclePrice').value = '';
        document.getElementById('vehicleNo').value = '';
        document.getElementById('releasePrice').value = '';
        document.getElementById('totalAdvancePrice').value = '';
        document.getElementById('priceDiff').value = '';
        hideAllSections();
      }
    }

    async function executeDelivery() {
      let vehicleMgmtNo = document.getElementById('vehicleMgmtNo').value.trim();
      if (!vehicleMgmtNo) {
        alert('차량관리번호를 입력해주세요.');
        return;
      }

      vehicleMgmtNo = vehicleMgmtNo.toUpperCase();

      if (!confirm(`차량관리번호 ${vehicleMgmtNo}를 실행하시겠습니까?\n\n차입금은 차입금 관리 메뉴에서 별도로 등록합니다.`)) {
        return;
      }

      try {
        const res = await fetch(`/api/vehicle-orders/${encodeURIComponent(vehicleMgmtNo)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderStatus: '실행완료'
          })
        });

        if (!res.ok) {
          const text = await res.text();
          alert(`실행 실패 (HTTP ${res.status})\n\n${text}`);
          return;
        }

        alert('실행 완료!\n\n상태가 실행완료로 변경되었습니다.');
        window.location.href = 'vehicle_order.html';
      } catch (e) {
        console.error(e);
        alert('서버 연결 실패(API/CORS 확인)');
      }
    }
  </script>
</body>
</html>
