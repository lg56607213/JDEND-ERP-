<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차량 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_detail.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>차량 상세</h1>
      <p>차량등록 &gt; 차량현황 &gt; 상세보기</p>
    </div>

    <div class="erp-card" id="vehicleDetailSection">
      <div class="card-header">
        <h2>차량 상세 정보</h2>
        <button type="button" class="btn btn-secondary" onclick="goBack()">목록으로</button>
      </div>

      <div class="card-body">
        <div class="form-section">
          <h3 class="section-title">기본 정보</h3>
          <div class="detail-grid grid-4">
            <div class="detail-item">
              <label>차량관리번호</label>
              <div class="detail-value highlight" id="vehicleMgmtNo">-</div>
            </div>
            <div class="detail-item">
              <label>발주상태</label>
              <div class="detail-value">
                <span class="status-badge" id="orderStatus">-</span>
              </div>
            </div>
            <div class="detail-item">
              <label>차량번호</label>
              <div class="detail-value" id="vehicleNo">-</div>
            </div>
            <div class="detail-item">
              <label>차대번호</label>
              <div class="detail-value" id="chassisNo">-</div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">차량 정보</h3>
          <div class="detail-grid grid-4">
            <div class="detail-item">
              <label>차종</label>
              <div class="detail-value" id="carModel">-</div>
            </div>
            <div class="detail-item">
              <label>옵션명</label>
              <div class="detail-value" id="optionName">-</div>
            </div>
            <div class="detail-item">
              <label>연식</label>
              <div class="detail-value" id="modelYear">-</div>
            </div>
            <div class="detail-item">
              <label>유종</label>
              <div class="detail-value" id="fuelType">-</div>
            </div>
            <div class="detail-item">
              <label>배기량</label>
              <div class="detail-value" id="displacement">-</div>
            </div>
            <div class="detail-item">
              <label>최초등록일</label>
              <div class="detail-value" id="firstRegDate">-</div>
            </div>
            <div class="detail-item">
              <label>검사유효기간(시작)</label>
              <div class="detail-value" id="inspectionStart">-</div>
            </div>
            <div class="detail-item">
              <label>검사유효기간(종료)</label>
              <div class="detail-value" id="inspectionEnd">-</div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">가격 정보</h3>
          <div class="detail-grid grid-4">
            <div class="detail-item">
              <label>차량가격</label>
              <div class="detail-value amount" id="vehiclePrice">-</div>
            </div>
            <div class="detail-item">
              <label>옵션가격</label>
              <div class="detail-value amount" id="optionPrice">-</div>
            </div>
            <div class="detail-item">
              <label>총차량가</label>
              <div class="detail-value amount highlight" id="totalPrice">-</div>
            </div>
            <div class="detail-item">
              <label>출고가</label>
              <div class="detail-value amount" id="releasePrice">-</div>
            </div>
            <div class="detail-item">
              <label>총 선급가액</label>
              <div class="detail-value amount" id="totalAdvancePrice">-</div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">제조사/발주 정보</h3>
          <div class="detail-grid grid-4">
            <div class="detail-item">
              <label>제작사계약번호</label>
              <div class="detail-value" id="makerContractNo">-</div>
            </div>
            <div class="detail-item">
              <label>발주일자</label>
              <div class="detail-value" id="orderDate">-</div>
            </div>
            <div class="detail-item">
              <label>등록일자</label>
              <div class="detail-value" id="registerDate">-</div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">상태 변경 이력</h3>
          <table class="history-table">
            <thead>
              <tr>
                <th>No</th>
                <th>상태</th>
                <th>변경일시</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody id="historyTableBody">
              <tr><td colspan="4">이력이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="editVehicleBtn">수정하기</button>
        </div>
      </div>
    </div>

    <!-- 수정 폼 -->
    <div class="erp-card hidden" id="vehicleEditSection">
      <div class="card-header">
        <h2>차량 정보 수정</h2>
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">취소</button>
      </div>

      <div class="card-body">
        <form id="vehicleEditForm">
          <div class="form-section">
            <h3 class="section-title">기본 정보</h3>
            <div class="form-grid grid-4">
              <div class="form-group">
                <label>차량관리번호</label>
                <input type="text" id="editVehicleMgmtNo" disabled>
              </div>
              <div class="form-group">
                <label for="editOrderStatus">발주상태</label>
                <select id="editOrderStatus" name="orderStatus">
                  <option value="발주전">발주전</option>
                  <option value="발주완료">발주완료</option>
                  <option value="출고완료">출고완료</option>
                  <option value="등록완료">등록완료</option>
                  <option value="실행완료">실행완료</option>
                </select>
              </div>
              <div class="form-group">
                <label for="editVehicleNo">차량번호</label>
                <input type="text" id="editVehicleNo" name="vehicleNo">
              </div>
              <div class="form-group">
                <label for="editChassisNo">차대번호</label>
                <input type="text" id="editChassisNo" name="chassisNo">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">차량 정보</h3>
            <div class="form-grid grid-4">
              <div class="form-group">
                <label for="editCarModel">차종</label>
                <!-- ✅✅✅ 여기만 select -> input으로 변경 -->
                <input type="text" id="editCarModel" name="carModel" placeholder="차종 직접 입력" required>
              </div>
              <div class="form-group">
                <label for="editOptionName">옵션명</label>
                <input type="text" id="editOptionName" name="optionName">
              </div>
              <div class="form-group">
                <label for="editModelYear">연식</label>
                <input type="text" id="editModelYear" name="modelYear">
              </div>
              <div class="form-group">
                <label for="editFuelType">유종</label>
                <select id="editFuelType" name="fuelType">
                  <option value="">선택</option>
                  <option value="휘발유">휘발유</option>
                  <option value="경유">경유</option>
                  <option value="LPG">LPG</option>
                  <option value="전기">전기</option>
                  <option value="하이브리드">하이브리드</option>
                </select>
              </div>
              <div class="form-group">
                <label for="editDisplacement">배기량</label>
                <input type="number" id="editDisplacement" name="displacement">
              </div>
              <div class="form-group">
                <label for="editFirstRegDate">최초등록일</label>
                <input type="date" id="editFirstRegDate" name="firstRegDate">
              </div>
              <div class="form-group">
                <label for="editInspectionStart">검사유효기간(시작)</label>
                <input type="date" id="editInspectionStart" name="inspectionStart">
              </div>
              <div class="form-group">
                <label for="editInspectionEnd">검사유효기간(종료)</label>
                <input type="date" id="editInspectionEnd" name="inspectionEnd">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">가격 정보</h3>
            <div class="form-grid grid-4">
              <div class="form-group">
                <label for="editVehiclePrice">차량가격</label>
                <input type="text" id="editVehiclePrice" name="vehiclePrice" oninput="formatNumber(this); calculateTotalPrice();" required>
              </div>
              <div class="form-group">
                <label for="editOptionPrice">옵션가격</label>
                <input type="text" id="editOptionPrice" name="optionPrice" oninput="formatNumber(this); calculateTotalPrice();">
              </div>
              <div class="form-group">
                <label>총차량가</label>
                <input type="text" id="editTotalPrice" disabled class="highlight-field">
              </div>
              <div class="form-group">
                <label for="editReleasePrice">출고가</label>
                <input type="text" id="editReleasePrice" name="releasePrice" oninput="formatNumber(this);">
              </div>
              <div class="form-group">
                <label for="editTotalAdvancePrice">총 선급가액</label>
                <input type="text" id="editTotalAdvancePrice" name="totalAdvancePrice" oninput="formatNumber(this);">
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">제조사/발주 정보</h3>
            <div class="form-grid grid-4">
              <div class="form-group">
                <label for="editMakerContractNo">제작사계약번호</label>
                <input type="text" id="editMakerContractNo" name="makerContractNo">
              </div>
              <div class="form-group">
                <label for="editOrderDate">발주일자</label>
                <input type="date" id="editOrderDate" name="orderDate" required>
              </div>
              <div class="form-group">
                <label for="editRegisterDate">등록일자</label>
                <input type="date" id="editRegisterDate" name="registerDate">
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="resetEditForm()">초기화</button>
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>
    </div>
  </div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>
<script>
  const API_BASE = `${API_BASE_URL}/api/vehicle-orders`;
  
  const urlParams = new URLSearchParams(window.location.search);
  const vehicleId = urlParams.get('id');

  const vehicleDetailSection = document.getElementById('vehicleDetailSection');
  const vehicleEditSection = document.getElementById('vehicleEditSection');
  const editVehicleBtn = document.getElementById('editVehicleBtn');
  const cancelEditBtn = document.getElementById('cancelEditBtn');

  let currentData = null;

  function getStatusClass(status) {
    switch(status) {
      case '발주전': return 'status-before';
      case '발주완료': return 'status-ordered';
      case '출고완료': return 'status-released';
      case '등록완료': return 'status-registered';
      case '실행완료': return 'status-executed';
      default: return '';
    }
  }

  function formatAmount(amount) {
    if (amount === null || amount === undefined || amount === '') return '-';
    const n = Number(amount);
    if (Number.isNaN(n)) return '-';
    return n.toLocaleString() + '원';
  }

  // ✅ 상태별 상세 숨김(-) 규칙
  function shouldMaskFieldByStatus(status, fieldKey) {
    if (!status) return false;

    if (status === '발주전') {
      return [
        'vehicleNo','chassisNo',
        'firstRegDate','inspectionStart','inspectionEnd',
        'releasePrice','totalAdvancePrice',
        'makerContractNo','registerDate'
      ].includes(fieldKey);
    }

    if (status === '발주완료') {
      return [
        'firstRegDate','inspectionStart','inspectionEnd',
        'releasePrice','totalAdvancePrice','registerDate'
      ].includes(fieldKey);
    }

    if (status === '출고완료') {
      return ['registerDate','firstRegDate','inspectionStart','inspectionEnd'].includes(fieldKey);
    }

    if (status === '등록완료') return false;

    return false;
  }

  function setText(id, value) {
    document.getElementById(id).textContent =
      (value === null || value === undefined || value === '') ? '-' : value;
  }

  function setDetailValue(fieldKey, domId, value, status, isAmount=false) {
    if (shouldMaskFieldByStatus(status, fieldKey)) {
      document.getElementById(domId).textContent = '-';
      return;
    }
    if (isAmount) {
      document.getElementById(domId).textContent = formatAmount(value);
      return;
    }
    setText(domId, value);
  }

  async function fetchDetail() {
    const res = await fetch(`${API_BASE}/${vehicleId}`);
    if (!res.ok) return alert("상세 조회 실패: " + res.status);
    currentData = await res.json();
    loadVehicleDetail();
  }

  function loadVehicleDetail() {
    const status = currentData.orderStatus ?? '-';

    setText('vehicleMgmtNo', currentData.vehicleMgmtNo);

    const statusBadge = document.getElementById('orderStatus');
    statusBadge.textContent = status;
    statusBadge.className = 'status-badge ' + getStatusClass(status);

    setDetailValue('vehicleNo','vehicleNo', currentData.vehicleNo, status);
    setDetailValue('chassisNo','chassisNo', currentData.chassisNo, status);

    setDetailValue('carModel','carModel', currentData.carModel, status);
    setDetailValue('optionName','optionName', currentData.optionName, status);
    setDetailValue('modelYear','modelYear', currentData.modelYear, status);
    setDetailValue('fuelType','fuelType', currentData.fuelType, status);
    setDetailValue('displacement','displacement', currentData.displacement, status);

    setDetailValue('firstRegDate','firstRegDate', currentData.firstRegDate, status);
    setDetailValue('inspectionStart','inspectionStart', currentData.inspectionStart, status);
    setDetailValue('inspectionEnd','inspectionEnd', currentData.inspectionEnd, status);

    setDetailValue('vehiclePrice','vehiclePrice', currentData.vehiclePrice, status, true);
    setDetailValue('optionPrice','optionPrice', currentData.optionPrice, status, true);
    setDetailValue('totalPrice','totalPrice', currentData.totalPrice, status, true);

    setDetailValue('releasePrice','releasePrice', currentData.releasePrice, status, true);
    setDetailValue('totalAdvancePrice','totalAdvancePrice', currentData.totalAdvancePrice, status, true);

    setDetailValue('makerContractNo','makerContractNo', currentData.makerContractNo, status);
    setDetailValue('orderDate','orderDate', currentData.orderDate, status);
    setDetailValue('registerDate','registerDate', currentData.registerDate, status);

    const historyBody = document.getElementById('historyTableBody');
    const history = currentData.history || [];
    historyBody.innerHTML = history.length
      ? history.map((h, idx) => `
          <tr>
            <td>${idx + 1}</td>
            <td><span class="status-badge ${getStatusClass(h.status)}">${h.status}</span></td>
            <td>${String(h.changedAt ?? '').replace('T',' ').substring(0,16)}</td>
            <td>${h.note ?? '-'}</td>
          </tr>
        `).join('')
      : `<tr><td colspan="4">이력이 없습니다.</td></tr>`;
  }

  function formatNumber(input) {
    let value = input.value.replace(/[^0-9]/g, '');
    input.value = value ? parseInt(value, 10).toLocaleString() : '';
  }

  function calculateTotalPrice() {
    const vehiclePrice = parseInt((document.getElementById('editVehiclePrice').value || '0').replace(/,/g,''),10) || 0;
    const optionPrice  = parseInt((document.getElementById('editOptionPrice').value || '0').replace(/,/g,''),10) || 0;
    document.getElementById('editTotalPrice').value = (vehiclePrice + optionPrice).toLocaleString() + '원';
  }

  editVehicleBtn.addEventListener('click', function() {
    document.getElementById('editVehicleMgmtNo').value = currentData.vehicleMgmtNo ?? '';
    document.getElementById('editOrderStatus').value = currentData.orderStatus ?? '발주전';

    document.getElementById('editVehicleNo').value = currentData.vehicleNo ?? '';
    document.getElementById('editChassisNo').value = currentData.chassisNo ?? '';

    // ✅ input 이라서 그대로 value 세팅하면 됨
    document.getElementById('editCarModel').value = currentData.carModel ?? '';
    document.getElementById('editOptionName').value = currentData.optionName ?? '';
    document.getElementById('editModelYear').value = currentData.modelYear ?? '';
    document.getElementById('editFuelType').value = currentData.fuelType ?? '';
    document.getElementById('editDisplacement').value = currentData.displacement ?? '';

    document.getElementById('editFirstRegDate').value = currentData.firstRegDate ?? '';
    document.getElementById('editInspectionStart').value = currentData.inspectionStart ?? '';
    document.getElementById('editInspectionEnd').value = currentData.inspectionEnd ?? '';

    document.getElementById('editVehiclePrice').value = currentData.vehiclePrice ? Number(currentData.vehiclePrice).toLocaleString() : '';
    document.getElementById('editOptionPrice').value = currentData.optionPrice ? Number(currentData.optionPrice).toLocaleString() : '';
    document.getElementById('editTotalPrice').value = currentData.totalPrice ? Number(currentData.totalPrice).toLocaleString() + '원' : '';

    document.getElementById('editReleasePrice').value = currentData.releasePrice ? Number(currentData.releasePrice).toLocaleString() : '';
    document.getElementById('editTotalAdvancePrice').value = currentData.totalAdvancePrice ? Number(currentData.totalAdvancePrice).toLocaleString() : '';

    document.getElementById('editMakerContractNo').value = currentData.makerContractNo ?? '';
    document.getElementById('editOrderDate').value = currentData.orderDate ?? '';
    document.getElementById('editRegisterDate').value = currentData.registerDate ?? '';

    calculateTotalPrice();

    vehicleDetailSection.classList.add('hidden');
    vehicleEditSection.classList.remove('hidden');
  });

  cancelEditBtn.addEventListener('click', function() {
    if(confirm('수정을 취소하시겠습니까?')) {
      vehicleEditSection.classList.add('hidden');
      vehicleDetailSection.classList.remove('hidden');
    }
  });

  document.getElementById('vehicleEditForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if(!confirm('수정하시겠습니까?')) return;

    const payload = {
      orderStatus: document.getElementById('editOrderStatus').value,

      vehicleNo: document.getElementById('editVehicleNo').value || null,
      chassisNo: document.getElementById('editChassisNo').value || null,

      // ✅ input이니까 그대로 value로 전송
      carModel: document.getElementById('editCarModel').value,

      optionName: document.getElementById('editOptionName').value || null,

      modelYear: document.getElementById('editModelYear').value || null,
      fuelType: document.getElementById('editFuelType').value || null,
      displacement: document.getElementById('editDisplacement').value
        ? parseInt(document.getElementById('editDisplacement').value, 10) : null,
      firstRegDate: document.getElementById('editFirstRegDate').value || null,
      inspectionStart: document.getElementById('editInspectionStart').value || null,
      inspectionEnd: document.getElementById('editInspectionEnd').value || null,

      vehiclePrice: parseInt((document.getElementById('editVehiclePrice').value || '0').replace(/,/g,''),10) || 0,
      optionPrice: parseInt((document.getElementById('editOptionPrice').value || '0').replace(/,/g,''),10) || 0,

      releasePrice: document.getElementById('editReleasePrice').value
        ? parseInt(document.getElementById('editReleasePrice').value.replace(/,/g,''),10) : null,
      totalAdvancePrice: document.getElementById('editTotalAdvancePrice').value
        ? parseInt(document.getElementById('editTotalAdvancePrice').value.replace(/,/g,''),10) : null,

      makerContractNo: document.getElementById('editMakerContractNo').value || null,
      orderDate: document.getElementById('editOrderDate').value,
      registerDate: document.getElementById('editRegisterDate').value || null
    };

    const res = await fetch(`${API_BASE}/${vehicleId}`, {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    if(!res.ok) {
      const text = await res.text();
      return alert("수정 실패: " + res.status + "\n" + text);
    }

    currentData = await res.json();
    loadVehicleDetail();

    vehicleEditSection.classList.add('hidden');
    vehicleDetailSection.classList.remove('hidden');
    alert('수정되었습니다.');
  });

  function resetEditForm() {
    if(confirm('모든 입력 내용을 초기화하시겠습니까?')) {
      editVehicleBtn.click();
    }
  }

  function goBack() {
    window.location.href = 'vehicle_order.html';
  }

  fetchDetail();
</script>
</body>
</html>
