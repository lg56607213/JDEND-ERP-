<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>발주 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_order.css">

  <style>
    .option-layout-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 24px;
    }

    .option-layout-grid .full-width {
      grid-column: 1 / -1;
    }

    .option-layout-grid .form-group {
      min-width: 0;
    }

    .option-layout-grid .form-group input {
      width: 100%;
      box-sizing: border-box;
    }

    .checkbox-cell {
      width: 52px;
      text-align: center;
    }

    .checkbox-cell input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .btn-release {
      padding: 6px 14px;
      background: #f59e0b;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-release:hover:not(:disabled) { background: #d97706; }
    .btn-release:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }

    .btn-advance {
      padding: 6px 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-advance:hover:not(:disabled) { background: #1d4ed8; }
    .btn-advance:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }

    .btn-car-register {
      padding: 6px 14px;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-car-register:hover:not(:disabled) { background: #047857; }
    .btn-car-register:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }

    /* 차량등록 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 10px;
      padding: 28px 32px;
      width: 480px;
      max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal-box h3 { margin: 0 0 20px; font-size: 1.1rem; color: #111827; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; }
    .modal-grid .full { grid-column: 1 / -1; }
    .modal-grid label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .modal-grid label.required::after { content: ' *'; color: #ef4444; }
    .modal-grid input, .modal-grid select { width: 100%; box-sizing: border-box; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
    .modal-actions .btn-cancel { padding: 8px 18px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .modal-actions .btn-save { padding: 8px 18px; background: #059669; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 700; }

    @media (max-width: 768px) {
      .option-layout-grid {
        grid-template-columns: 1fr;
      }

      .option-layout-grid .full-width {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>발주</h1>
      <p>차량등록 &gt; 차량현황 &gt; 발주</p>
    </div>

    <!-- 현황 조회 화면 -->
    <div class="erp-card" id="statusView">
      <div class="card-body">

        <div class="search-section">
          <div class="search-row">
            <div class="form-group">
              <label for="searchStartDate">발주일자</label>
              <div class="date-range">
                <input type="date" id="searchStartDate">
                <span>~</span>
                <input type="date" id="searchEndDate">
              </div>
            </div>

            <div class="form-group">
              <label for="searchStatus">발주상태</label>
              <select id="searchStatus">
                <option value="">전체</option>
                <option value="발주전">발주전</option>
                <option value="발주완료">발주완료</option>
                <option value="출고완료">출고완료</option>
                <option value="등록완료">등록완료</option>
                <option value="실행완료">실행완료</option>
              </select>
            </div>

            <div class="button-group">
              <button type="button" class="btn-search" onclick="searchVehicle()">조회하기</button>
              <button type="button" class="btn-add" onclick="showRegisterForm()">+ 등록추가</button>
              <button type="button" class="btn-release" id="btnRelease" onclick="bulkSetReleased()" disabled>출고완료 변경 <span id="releaseCount"></span></button>
              <button type="button" class="btn-advance" id="btnAdvance" onclick="goToAdvance()" disabled>선급등록</button>
              <button type="button" class="btn-car-register" id="btnCarRegister" onclick="openCarRegisterModal()" disabled>차량등록</button>
              <button type="button" class="btn-excel" onclick="exportTableToExcel('vehicleTableBody', '발주현황')">엑셀 내보내기</button>
            </div>
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th class="checkbox-cell">
                  <input type="checkbox" id="checkAll" onchange="toggleAllRows(this)">
                </th>
                <th>순번</th>
                <th>발주상태</th>
                <th>차량관리번호</th>
                <th>제작사계약번호</th>
                <th>차종</th>
                <th>옵션명</th>
                <th>차량가격</th>
                <th>옵션가격</th>
                <th>총차량가</th>
                <th>발주일자</th>
                <th>차대번호</th>
                <th>출고가</th>
                <th>총 선급가액</th>
                <th>차량번호</th>
                <th>등록일자</th>
              </tr>
            </thead>
            <tbody id="vehicleTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 등록 화면 -->
    <div class="erp-card" id="registerView" style="display:none;">
      <div class="card-body">
        <div class="view-header">
          <h2>발주 등록</h2>
          <button type="button" class="btn-back" onclick="showStatusView()">← 목록으로</button>
        </div>

        <form id="orderForm">
          <div class="vehicle-id-display">
            <div class="vehicle-id-label">차량관리번호</div>
            <div class="vehicle-id-value" id="vehicleManagementId">(저장 시 자동 생성)</div>
          </div>

          <div class="form-section">
            <h3 class="section-title">차량 기본 정보</h3>

            <div class="form-grid">
              <div class="form-group">
                <label for="vehicleModel" class="required">차종</label>
                <input type="text" id="vehicleModel" name="vehicleModel" placeholder="차종 직접 입력" required>
              </div>

              <div class="form-group">
                <label for="vehiclePrice" class="required">차량가격</label>
                <input type="text" id="vehiclePrice" placeholder="0" oninput="handlePriceInput(this)">
              </div>

              <div class="form-group">
                <label for="orderDate" class="required">발주일자</label>
                <input type="date" id="orderDate" required>
              </div>
            </div>

            <div class="option-layout-grid">
              <div class="form-group full-width">
                <label for="optionName">옵션명</label>
                <input type="text" id="optionName">
              </div>

              <div class="form-group">
                <label for="optionPrice">옵션가격</label>
                <input type="text" id="optionPrice" placeholder="0" oninput="handlePriceInput(this)">
              </div>

              <div class="form-group">
                <label for="totalPrice">총차량가격</label>
                <input type="text" id="totalPrice" placeholder="0" readonly>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">제조사 정보</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="orderQuantity" class="required">대수</label>
                <input type="number" id="orderQuantity" min="1" max="99" value="1" oninput="renderMakerContractInputs()">
              </div>

              <div class="form-group">
                <label for="vinNumber">차대번호</label>
                <input type="text" id="vinNumber">
              </div>

              <div class="form-group">
                <label for="vehicleNumber">차량번호</label>
                <input type="text" id="vehicleNumber">
              </div>
            </div>

            <!-- 대별 제조사계약번호(각 대가 다름) -->
            <div id="makerContractContainer" class="form-grid" style="margin-top:12px;"></div>
            <p id="multiUnitHint" class="hint" style="display:none; margin-top:6px; color:#6b7280; font-size:0.85rem;">
              ※ 2대 이상 발주 시 차대번호·차량번호는 대별로 나중에 개별 입력합니다. 제작사계약번호만 대별로 입력하세요.
            </p>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="resetForm()">초기화</button>
            <button type="submit" class="btn btn-primary">발주 등록</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 차량등록 모달 -->
  <div class="modal-overlay" id="carRegisterModal">
    <div class="modal-box">
      <h3>차량등록</h3>
      <div class="modal-grid">
        <div class="full">
          <label class="required">차량번호</label>
          <input type="text" id="regVehicleNo" placeholder="예) 12가3456">
        </div>
        <div>
          <label class="required">등록일자</label>
          <input type="date" id="regRegisterDate">
        </div>
        <div>
          <label>정기검사 시작일</label>
          <input type="date" id="regInspectionStart">
        </div>
        <div>
          <label>정기검사 종료일</label>
          <input type="date" id="regInspectionEnd">
        </div>
        <div>
          <label>연식</label>
          <input type="text" id="regModelYear" placeholder="예) 2023">
        </div>
        <div>
          <label>유종</label>
          <select id="regFuelType">
            <option value="">선택</option>
            <option value="가솔린">가솔린</option>
            <option value="디젤">디젤</option>
            <option value="LPG">LPG</option>
            <option value="전기">전기</option>
            <option value="하이브리드">하이브리드</option>
          </select>
        </div>
        <div>
          <label>배기량 (cc)</label>
          <input type="number" id="regDisplacement" placeholder="예) 2000">
        </div>
        <div class="full">
          <label>등록증 파일</label>
          <input type="file" id="regFile" accept=".pdf,.jpg,.jpeg,.png">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCarRegisterModal()">취소</button>
        <button class="btn-save" onclick="submitCarRegister()">저장</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/html-escape.js"></script>
<script>
  const API_BASE = '/api/vehicle-orders';
  let currentVehicleRows = [];

  window.addEventListener('DOMContentLoaded', async function() {
    document.getElementById('searchStartDate').value = '';
    document.getElementById('searchEndDate').value = '';
    document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
    updateTotalPrice();
    renderMakerContractInputs();
    await searchVehicle();
  });

  function showRegisterForm() {
    document.getElementById('statusView').style.display = 'none';
    document.getElementById('registerView').style.display = 'block';
    updateTotalPrice();
    renderMakerContractInputs();
  }

  // 대수(quantity)에 맞춰 대별 제조사계약번호 입력칸을 렌더링한다.
  function renderMakerContractInputs() {
    const qtyEl = document.getElementById('orderQuantity');
    let qty = parseInt(qtyEl.value, 10);
    if (isNaN(qty) || qty < 1) qty = 1;
    if (qty > 99) { qty = 99; qtyEl.value = 99; }

    const container = document.getElementById('makerContractContainer');
    // 기존 입력값 보존
    const prev = {};
    container.querySelectorAll('input[data-maker-idx]').forEach(inp => {
      prev[inp.getAttribute('data-maker-idx')] = inp.value;
    });

    let html = '';
    for (let i = 1; i <= qty; i++) {
      const label = qty > 1 ? `제작사계약번호 (${i}대)` : '제작사계약번호';
      const val = prev[i] ? escHtml(prev[i]) : '';
      html += `
        <div class="form-group">
          <label>${label}</label>
          <input type="text" data-maker-idx="${i}" value="${val}">
        </div>`;
    }
    container.innerHTML = html;

    // 2대 이상이면 차대번호·차량번호는 대별 개별 입력이므로 비활성화
    const multi = qty > 1;
    const vin = document.getElementById('vinNumber');
    const plate = document.getElementById('vehicleNumber');
    vin.disabled = multi;
    plate.disabled = multi;
    if (multi) { vin.value = ''; plate.value = ''; }
    document.getElementById('multiUnitHint').style.display = multi ? 'block' : 'none';
  }

  function goToAdvance() {
    const checked = document.querySelectorAll('.row-check:checked');
    if (checked.length !== 1) {
      alert('선급등록은 차량 1대만 선택한 상태에서 진행할 수 있습니다.');
      return;
    }
    // …000 공유값 대비: 해당 차량 행 PK(id)로 선급화면 이동
    const rowId = checked[0].value;
    window.location.href = 'vehicle_advance.html?id=' + encodeURIComponent(rowId);
  }

  function showStatusView() {
    document.getElementById('registerView').style.display = 'none';
    document.getElementById('statusView').style.display = 'block';
  }

  function formatNumber(input) {
    const v = input.value.replace(/[^0-9]/g, '');
    input.value = v ? parseInt(v, 10).toLocaleString() : '';
  }

  function parseNumber(value) {
    if (value === null || value === undefined || value === '') return 0;
    return Number(String(value).replace(/,/g, '').replace(/[^0-9]/g, '')) || 0;
  }

  function formatAmount(value) {
    return Number(value || 0).toLocaleString();
  }

  function handlePriceInput(input) {
    formatNumber(input);
    updateTotalPrice();
  }

  function updateTotalPrice() {
    const vehiclePrice = parseNumber(document.getElementById('vehiclePrice').value);
    const optionPrice = parseNumber(document.getElementById('optionPrice').value);
    const totalPrice = vehiclePrice + optionPrice;
    document.getElementById('totalPrice').value = totalPrice ? formatAmount(totalPrice) : '';
  }

  async function searchVehicle() {
    try {
      const startDate = document.getElementById('searchStartDate').value;
      const endDate = document.getElementById('searchEndDate').value;
      const status = document.getElementById('searchStatus').value;

      const url = new URL(API_BASE, window.location.origin);

      if (startDate) url.searchParams.set('startDate', startDate);
      if (endDate) url.searchParams.set('endDate', endDate);
      if (status) url.searchParams.set('status', status);

      const res = await fetch(url.toString());

      if (!res.ok) {
        document.getElementById('vehicleTableBody').innerHTML = `
          <tr>
            <td colspan="16" class="no-data">조회 실패: ${res.status}</td>
          </tr>
        `;
        return;
      }

      const data = await res.json();
      currentVehicleRows = Array.isArray(data) ? data : [];
      displayVehicle(currentVehicleRows);
      resetSelectionState();
    } catch (error) {
      console.error('조회 오류:', error);
      document.getElementById('vehicleTableBody').innerHTML = `
        <tr>
          <td colspan="16" class="no-data">조회 중 오류가 발생했습니다.</td>
        </tr>
      `;
    }
  }

  function getStatusClass(status) {
    switch(status) {
      case '발주전': return 'status-before';
      case '발주완료': return 'status-ordered';
      case '출고완료': return 'status-released';
      case '등록완료': return 'status-registered';
      case '실행완료': return 'status-executed';
      default: return '';
    }
  }

  function displayVehicle(data) {
    const tbody = document.getElementById('vehicleTableBody');

    if (!data || data.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="16" class="no-data">검색 결과가 없습니다.</td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = data.map((item, index) => {
      const vehiclePrice = parseNumber(item.vehiclePrice);
      const optionPrice = parseNumber(item.optionPrice);
      const totalPrice = item.totalPrice !== null && item.totalPrice !== undefined
        ? parseNumber(item.totalPrice)
        : (vehiclePrice + optionPrice);

      return `
        <tr onclick="viewDetail('${item.id}')">
          <td class="checkbox-cell" onclick="event.stopPropagation()">
            <input
              type="checkbox"
              class="row-check"
              value="${item.id ?? ''}"
              onchange="updateSelectedCount()"
            >
          </td>
          <td>${index + 1}</td>
          <td><span class="status-badge ${getStatusClass(item.orderStatus)}">${item.orderStatus ?? '-'}</span></td>
          <td>${escHtml(item.vehicleMgmtNo ?? '-')}</td>
          <td>${escHtml(item.makerContractNo ?? '-')}</td>
          <td>${escHtml(item.carModel ?? '-')}</td>
          <td>${escHtml(item.optionName ?? '-')}</td>
          <td class="amount-cell">${formatAmount(vehiclePrice)}</td>
          <td class="amount-cell">${optionPrice ? formatAmount(optionPrice) : '-'}</td>
          <td class="amount-cell">${formatAmount(totalPrice)}</td>
          <td>${item.orderDate ?? '-'}</td>
          <td>${escHtml(item.chassisNo ?? '-')}</td>
          <td class="amount-cell">${item.releasePrice ? formatAmount(item.releasePrice) : '-'}</td>
          <td class="amount-cell">${item.totalAdvancePrice ? formatAmount(item.totalAdvancePrice) : '-'}</td>
          <td>${escHtml(item.vehicleNo ?? '-')}</td>
          <td>${item.registerDate ?? '-'}</td>
        </tr>
      `;
    }).join('');
  }

  // 발주~선급 pre-실행 단계는 …000 공유값이라 행 PK(id)로 상세 이동
  function viewDetail(rowId) {
    window.location.href = 'vehicle_detail.html?id=' + encodeURIComponent(rowId);
  }

  function toggleAllRows(source) {
    const checks = document.querySelectorAll('.row-check');
    checks.forEach(chk => {
      chk.checked = source.checked;
    });
    updateSelectedCount();
  }

  function updateSelectedCount() {
    const checks = document.querySelectorAll('.row-check');
    const checked = document.querySelectorAll('.row-check:checked');

    const checkAll = document.getElementById('checkAll');
    if (checks.length === 0) {
      checkAll.checked = false;
      checkAll.indeterminate = false;
    } else if (checked.length === 0) {
      checkAll.checked = false;
      checkAll.indeterminate = false;
    } else if (checked.length === checks.length) {
      checkAll.checked = true;
      checkAll.indeterminate = false;
    } else {
      checkAll.checked = false;
      checkAll.indeterminate = true;
    }

    const releaseBtn = document.getElementById('btnRelease');
    const releaseCount = document.getElementById('releaseCount');
    if (releaseBtn) releaseBtn.disabled = checked.length === 0;
    if (releaseCount) releaseCount.textContent = checked.length > 0 ? `(${checked.length})` : '';

    // 선급등록은 정확히 1대 선택 시에만 활성화
    const advanceBtn = document.getElementById('btnAdvance');
    if (advanceBtn) advanceBtn.disabled = checked.length !== 1;

    // 차량등록은 정확히 1대 선택 + 해당 차량이 출고완료 상태일 때만 활성화
    const carRegBtn = document.getElementById('btnCarRegister');
    if (carRegBtn) {
      if (checked.length === 1) {
        const rowId = checked[0].value;
        const row = currentVehicleRows.find(r => String(r.id) === String(rowId));
        carRegBtn.disabled = !(row && row.orderStatus === '출고완료');
      } else {
        carRegBtn.disabled = true;
      }
    }
  }

  let carRegisterTargetId = null;

  function openCarRegisterModal() {
    const checked = document.querySelectorAll('.row-check:checked');
    if (checked.length !== 1) return;
    carRegisterTargetId = checked[0].value;

    // 폼 초기화
    document.getElementById('regVehicleNo').value = '';
    document.getElementById('regRegisterDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('regInspectionStart').value = '';
    document.getElementById('regInspectionEnd').value = '';
    document.getElementById('regModelYear').value = '';
    document.getElementById('regFuelType').value = '';
    document.getElementById('regDisplacement').value = '';
    document.getElementById('regFile').value = '';

    document.getElementById('carRegisterModal').classList.add('open');
  }

  function closeCarRegisterModal() {
    document.getElementById('carRegisterModal').classList.remove('open');
    carRegisterTargetId = null;
  }

  async function submitCarRegister() {
    const vehicleNo = document.getElementById('regVehicleNo').value.trim();
    const registerDate = document.getElementById('regRegisterDate').value;
    if (!vehicleNo) { alert('차량번호는 필수입니다.'); return; }
    if (!registerDate) { alert('등록일자는 필수입니다.'); return; }

    const data = {
      vehicleNo,
      registerDate,
      inspectionStart: document.getElementById('regInspectionStart').value || null,
      inspectionEnd:   document.getElementById('regInspectionEnd').value || null,
      modelYear:       document.getElementById('regModelYear').value.trim() || null,
      fuelType:        document.getElementById('regFuelType').value || null,
      displacement:    document.getElementById('regDisplacement').value ? parseInt(document.getElementById('regDisplacement').value, 10) : null
    };

    const formData = new FormData();
    formData.append('data', new Blob([JSON.stringify(data)], { type: 'application/json' }));
    const fileInput = document.getElementById('regFile');
    if (fileInput.files.length > 0) {
      formData.append('file', fileInput.files[0]);
    }

    try {
      const res = await fetch(`${API_BASE}/by-id/${encodeURIComponent(carRegisterTargetId)}/register`, {
        method: 'POST',
        credentials: 'include',
        body: formData
      });
      if (!res.ok) {
        const msg = await res.text();
        alert('차량등록 실패: ' + msg);
        return;
      }
      alert('차량등록이 완료되었습니다.');
      closeCarRegisterModal();
      await searchVehicle();
    } catch (e) {
      alert('오류 발생: ' + e.message);
    }
  }

  async function bulkSetReleased() {
    const checked = document.querySelectorAll('.row-check:checked');
    if (checked.length === 0) {
      alert('출고완료로 변경할 항목을 선택해주세요.');
      return;
    }

    if (!confirm(`선택한 ${checked.length}건을 출고완료로 변경하시겠습니까?`)) return;

    const ids = Array.from(checked).map(c => c.value);
    let successCount = 0;
    let failItems = [];

    for (const rowId of ids) {
      try {
        // …000 공유값 대비: 행 PK(id) 기반 수정 엔드포인트 사용
        const res = await fetch(`${API_BASE}/by-id/${encodeURIComponent(rowId)}`, {
          method: 'PUT',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderStatus: '출고완료' })
        });
        if (res.ok) {
          successCount++;
        } else {
          failItems.push(rowId);
        }
      } catch {
        failItems.push(rowId);
      }
    }

    if (failItems.length > 0) {
      alert(`${successCount}건 변경 완료\n실패 ${failItems.length}건: ${failItems.join(', ')}`);
    } else {
      alert(`${successCount}건이 출고완료로 변경되었습니다.`);
    }

    await searchVehicle();
  }

  function resetSelectionState() {
    const checkAll = document.getElementById('checkAll');
    if (checkAll) {
      checkAll.checked = false;
      checkAll.indeterminate = false;
    }
  }

  document.getElementById('orderForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const vehiclePriceValue = parseNumber(document.getElementById('vehiclePrice').value);
    const optionPriceValue = parseNumber(document.getElementById('optionPrice').value);

    let quantity = parseInt(document.getElementById('orderQuantity').value, 10);
    if (isNaN(quantity) || quantity < 1) quantity = 1;

    // 대별 제조사계약번호 수집
    const makerContractNos = Array.from(
      document.querySelectorAll('#makerContractContainer input[data-maker-idx]')
    ).map(inp => inp.value.trim() || null);

    const payload = {
      carModel: document.getElementById('vehicleModel').value,
      vehiclePrice: vehiclePriceValue,
      optionName: document.getElementById('optionName').value || null,
      optionPrice: optionPriceValue,
      totalPrice: vehiclePriceValue + optionPriceValue,
      orderDate: document.getElementById('orderDate').value,
      quantity: quantity,
      makerContractNos: makerContractNos,
      // 1대일 때만 발주 화면에서 차대번호/차량번호 즉시 입력 반영(2대 이상은 대별 개별 입력)
      makerContractNo: makerContractNos[0] || null,
      chassisNo: quantity === 1 ? (document.getElementById('vinNumber').value || null) : null,
      vehicleNo: quantity === 1 ? (document.getElementById('vehicleNumber').value || null) : null
    };

    try {
      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const errorText = await res.text();
        console.error('등록 실패:', errorText);
        alert('등록 실패');
        return;
      }

      let created = [];
      try { created = await res.json(); } catch (e) {}
      const orderNo = Array.isArray(created) && created.length ? created[0].orderNo : null;
      alert(`발주 등록 완료 (${quantity}대)` + (orderNo ? `\n발주번호: ${orderNo}` : ''));

      resetForm();
      showStatusView();
      await searchVehicle();
    } catch (error) {
      console.error('등록 오류:', error);
      alert('등록 중 오류가 발생했습니다.');
    }
  });

  function resetForm() {
    document.getElementById('orderForm').reset();
    document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('totalPrice').value = '';
    document.getElementById('orderQuantity').value = 1;
    renderMakerContractInputs();
  }
</script>
