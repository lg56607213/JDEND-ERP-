<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_register.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>등록</h1>
      <p>차량등록 &gt; 차량현황 &gt; 등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 차량조회 섹션 -->
        <div class="form-section">
          <h3 class="section-title">차량조회</h3>
          <div class="search-row">
            <div class="form-group">
              <label for="vehicleMgmtNo">차량관리번호</label>

              <div style="display:flex; gap:6px; align-items:center;">
                <input
                  type="text"
                  id="vehicleMgmtNo"
                  placeholder="차량관리번호 입력 또는 선택"
                  onchange="searchVehicle()"
                >
                <button
                  type="button"
                  class="btn-search-small"
                  title="차량관리번호 선택"
                  onclick="openVehicleSearch()"
                >🔍</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 차량정보 섹션 -->
        <div class="form-section" id="vehicleInfoSection" style="display: none;">
          <h3 class="section-title">차량정보</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>차종</label>
              <input type="text" id="carModel" readonly>
            </div>
            <div class="form-group">
              <label>차량가격</label>
              <input type="text" id="vehiclePrice" readonly>
            </div>
            <div class="form-group">
              <label>옵션</label>
              <input type="text" id="optionName" readonly>
            </div>
            <div class="form-group">
              <label>옵션가격</label>
              <input type="text" id="optionPrice" readonly>
            </div>
            <div class="form-group">
              <label>차대번호</label>
              <input type="text" id="chassisNo" readonly>
            </div>
            <div class="form-group">
              <label>총차량가격</label>
              <input type="text" id="totalPrice" readonly>
            </div>
          </div>
        </div>

        <!-- 등록정보 섹션 -->
        <div class="form-section" id="registerInfoSection" style="display: none;">
          <h3 class="section-title">등록정보</h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="vehicleNo">차량번호 <span class="required">*</span></label>
              <input type="text" id="vehicleNo" placeholder="예: 123가4567">
            </div>
            <div class="form-group">
              <label for="inspectionStart">검사유효기간(시작)</label>
              <input type="date" id="inspectionStart">
            </div>
            <div class="form-group">
              <label for="firstRegDate">최초등록일 <span class="required">*</span></label>
              <input type="date" id="firstRegDate">
            </div>
            <div class="form-group">
              <label for="inspectionEnd">검사유효기간(종료)</label>
              <input type="date" id="inspectionEnd">
            </div>
            <div class="form-group">
              <label for="modelYear">연식</label>
              <input type="text" id="modelYear" placeholder="예: 2025">
            </div>
            <div class="form-group">
              <label for="fuelType">유종</label>
              <select id="fuelType">
                <option value="">선택</option>
                <option value="휘발유">휘발유</option>
                <option value="경유">경유</option>
                <option value="LPG">LPG</option>
                <option value="전기">전기</option>
                <option value="하이브리드">하이브리드</option>
              </select>
            </div>
            <div class="form-group">
              <label></label>
              <span></span>
            </div>
            <div class="form-group">
              <label for="displacement">배기량(cc)</label>
              <input type="number" id="displacement" placeholder="예: 1999">
            </div>
          </div>
        </div>

        <!-- 차량등록증 스캔파일 섹션 -->
        <div class="form-section" id="fileSection" style="display: none;">
          <h3 class="section-title">차량등록증 스캔파일</h3>
          <div class="file-upload-area">
            <div class="file-upload-box" id="fileUploadBox">
              <div class="file-icon">📄</div>
              <div class="file-text">PDF, JPG, PNG 파일을 선택하세요 (최대 10MB)</div>
              <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFileSelect(event)" hidden>
              <button type="button" class="btn-file-select" onclick="document.getElementById('fileInput').click()">파일선택</button>
            </div>
            <div class="file-preview" id="filePreview" style="display: none;">
              <span class="file-name" id="fileName"></span>
              <button type="button" class="btn-file-remove" onclick="removeFile()">삭제</button>
            </div>
          </div>
        </div>

        <!-- 버튼 영역 -->
        <div class="form-actions" id="actionButtons" style="display: none;">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">초기화</button>
          <button type="button" class="btn btn-primary" onclick="registerVehicle()">등록하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 돋보기 모달 -->
  <div id="vehicleSearchModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:9999;">
    <div style="width:900px; max-width:92vw; background:#fff; margin:60px auto; padding:16px; border-radius:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">차량관리번호 선택</h3>
        <button type="button" onclick="closeVehicleSearch()">X</button>
      </div>

      <div style="display:flex; gap:8px; margin:12px 0;">
        <input type="text" id="vehicleSearchKeyword" placeholder="차량관리번호/차종/차량번호 검색" style="flex:1;">
        <button type="button" onclick="fetchVehicleList()">검색</button>
      </div>

      <div style="max-height:420px; overflow:auto; border:1px solid #ddd; border-radius:8px;">
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="background:#f5f5f5;">
              <th style="padding:10px; border-bottom:1px solid #ddd;">차량관리번호</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">차종</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">차량번호</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">상태</th>
              <th style="padding:10px; border-bottom:1px solid #ddd;">선택</th>
            </tr>
          </thead>
          <tbody id="vehicleSearchBody"></tbody>
        </table>
      </div>

      <div style="margin-top:10px; font-size:12px; color:#666;">
        * 등록 화면에서는 <b>출고완료</b> 상태만 등록 가능합니다.
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>

  <script>
    const API_BASE = '';
    let selectedFile = null;

    function openVehicleSearch() {
      document.getElementById('vehicleSearchModal').style.display = 'block';
      document.getElementById('vehicleSearchKeyword').value = '';
      fetchVehicleList();
    }

    function closeVehicleSearch() {
      document.getElementById('vehicleSearchModal').style.display = 'none';
    }

    async function fetchVehicleList() {
      const kw = document.getElementById('vehicleSearchKeyword').value.trim();

      try {
        const url = new URL('/api/vehicle-orders', window.location.origin);
        url.searchParams.set('status', '출고완료');

        // 현재 백엔드는 keyword 파라미터 지원 안 하므로
        // 프론트에서 받아온 뒤 필터링
        const res = await fetch(url.toString());

        if (!res.ok) {
          return alert('차량 목록 조회 실패: ' + res.status + '\\nGET /api/vehicle-orders?status=출고완료');
        }

        let list = await res.json();
        if (!Array.isArray(list)) list = [];

        if (kw) {
          const keyword = kw.toLowerCase();
          list = list.filter(v => {
            const mgmtNo = (v.vehicleMgmtNo || '').toLowerCase();
            const carModel = (v.carModel || '').toLowerCase();
            const vehicleNo = (v.vehicleNo || '').toLowerCase();
            return mgmtNo.includes(keyword) || carModel.includes(keyword) || vehicleNo.includes(keyword);
          });
        }

        const tbody = document.getElementById('vehicleSearchBody');
        tbody.innerHTML = '';

        if (list.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="5" style="padding:14px; text-align:center; color:#666;">
                검색 결과가 없습니다.
              </td>
            </tr>
          `;
          return;
        }

        list.forEach(v => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.vehicleMgmtNo ?? ''}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.carModel ?? ''}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.vehicleNo ?? '-'}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${v.orderStatus ?? '-'}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">
              <button type="button" onclick="selectVehicle('${v.vehicleMgmtNo ?? ''}')">선택</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        alert('차량 목록 조회 중 오류: ' + e.message);
      }
    }

    async function selectVehicle(mgmtNo) {
      document.getElementById('vehicleMgmtNo').value = mgmtNo;
      closeVehicleSearch();
      await searchVehicle();
    }

    async function searchVehicle() {
      const vehicleMgmtNo = document.getElementById('vehicleMgmtNo').value.trim();

      if (!vehicleMgmtNo) {
        hideAllSections();
        return;
      }

      hideAllSections();

      try {
        const res = await fetch(`/api/vehicle-register/${encodeURIComponent(vehicleMgmtNo)}`);
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          alert(data.message || '조회 실패');
          return;
        }

        if (data.orderStatus !== '출고완료') {
          alert('출고완료 상태의 차량만 등록할 수 있습니다.');
          return;
        }

        document.getElementById('carModel').value = data.carModel || '';
        document.getElementById('vehiclePrice').value = (data.vehiclePrice ?? 0).toLocaleString();
        document.getElementById('optionName').value = data.optionName || '';
        document.getElementById('optionPrice').value = (data.optionPrice ?? 0).toLocaleString();
        document.getElementById('chassisNo').value = data.chassisNo || '';
        document.getElementById('totalPrice').value = (data.totalPrice ?? 0).toLocaleString();

        document.getElementById('vehicleInfoSection').style.display = 'block';
        document.getElementById('registerInfoSection').style.display = 'block';
        document.getElementById('fileSection').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
      } catch (e) {
        alert('서버 연결 실패: ' + e.message);
      }
    }

    function hideAllSections() {
      document.getElementById('vehicleInfoSection').style.display = 'none';
      document.getElementById('registerInfoSection').style.display = 'none';
      document.getElementById('fileSection').style.display = 'none';
      document.getElementById('actionButtons').style.display = 'none';
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (file.size > 10 * 1024 * 1024) {
        alert('파일 크기는 10MB 이하여야 합니다.');
        return;
      }

      const allowedTypes = ['application/pdf', 'image/jpeg', 'image/png'];
      if (!allowedTypes.includes(file.type)) {
        alert('PDF, JPG, PNG 파일만 업로드 가능합니다.');
        return;
      }

      selectedFile = file;
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('filePreview').style.display = 'flex';
      document.getElementById('fileUploadBox').style.display = 'none';
    }

    function removeFile() {
      selectedFile = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('filePreview').style.display = 'none';
      document.getElementById('fileUploadBox').style.display = 'flex';
    }

    function resetForm() {
      if (confirm('모든 입력 내용을 초기화하시겠습니까?')) {
        document.getElementById('vehicleNo').value = '';
        document.getElementById('firstRegDate').value = '';
        document.getElementById('modelYear').value = '';
        document.getElementById('inspectionStart').value = '';
        document.getElementById('inspectionEnd').value = '';
        document.getElementById('fuelType').value = '';
        document.getElementById('displacement').value = '';
        removeFile();
      }
    }

    async function registerVehicle() {
      const vehicleMgmtNo = document.getElementById('vehicleMgmtNo').value.trim();
      const vehicleNo = document.getElementById('vehicleNo').value.trim();
      const firstRegDate = document.getElementById('firstRegDate').value;

      if (!vehicleMgmtNo) {
        alert('차량관리번호를 먼저 조회해주세요.');
        return;
      }

      if (!vehicleNo) {
        alert('차량번호를 입력해주세요.');
        document.getElementById('vehicleNo').focus();
        return;
      }

      if (!firstRegDate) {
        alert('최초등록일을 입력해주세요.');
        document.getElementById('firstRegDate').focus();
        return;
      }

      if (!confirm(`차량번호 ${vehicleNo}로 등록하시겠습니까?`)) return;

      const formData = new FormData();
      formData.append('vehicleNo', vehicleNo);
      formData.append('registerDate', firstRegDate);

      const modelYear = document.getElementById('modelYear').value;
      const inspectionStart = document.getElementById('inspectionStart').value;
      const inspectionEnd = document.getElementById('inspectionEnd').value;
      const fuelType = document.getElementById('fuelType').value;
      const displacement = document.getElementById('displacement').value;

      if (modelYear) formData.append('modelYear', modelYear);
      if (inspectionStart) formData.append('inspectionStart', inspectionStart);
      if (inspectionEnd) formData.append('inspectionEnd', inspectionEnd);
      if (fuelType) formData.append('fuelType', fuelType);
      if (displacement) formData.append('displacement', displacement);

      if (selectedFile) formData.append('file', selectedFile);

      try {
        const res = await fetch(`/api/vehicle-register/${encodeURIComponent(vehicleMgmtNo)}`, {
          method: 'POST',
          body: formData
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          alert(data.message || '등록 실패');
          return;
        }

        alert('차량이 등록되었습니다.\\n차량현황에서 "등록완료" 상태로 변경됩니다.');
        window.location.href = 'vehicle_order.html';
      } catch (e) {
        alert('서버 연결 실패: ' + e.message);
      }
    }
  </script>
</body>
</html>
