<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매각 상세 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_sale_status.css">
  <style>
    .card-header-detail{ display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid #e2e8f0; }
    .card-header-detail h2{ margin:0; font-size:1.1rem; font-weight:600; color:#1e293b; }
    .card-body-detail{ padding:20px; }
    .form-section{ margin-bottom:24px; }
    .section-title{ font-size:.95rem; font-weight:600; color:#374151; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid #e5e7eb; }
    .detail-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    @media (max-width: 900px){ .detail-grid{ grid-template-columns:1fr; } }
    .detail-item{ display:flex; flex-direction:column; gap:4px; }
    .detail-item label{ font-size:.85rem; color:#6b7280; font-weight:500; }
    .detail-value{ font-size:.95rem; color:#1f2937; font-weight:500; padding:8px 12px; background:#f9fafb; border-radius:6px; min-height:38px; display:flex; align-items:center; }
    .form-actions{ display:flex; justify-content:center; gap:12px; margin-top:24px; padding-top:20px; border-top:1px solid #e5e7eb; }
    .btn{ padding:10px 24px; border-radius:6px; font-size:.9rem; font-weight:500; cursor:pointer; border:none; transition:all .2s; }
    .btn-primary{ background:#3b82f6; color:#fff; }
    .btn-primary:hover{ background:#2563eb; }
    .btn-secondary{ background:#6b7280; color:#fff; }
    .btn-secondary:hover{ background:#4b5563; }
    .hidden{ display:none !important; }
    .form-input{ padding:8px 12px; border:1px solid #d1d5db; border-radius:6px; font-size:.95rem; min-height:38px; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>매각 상세</h1>
      <p>차량관리 &gt; 매각관리 &gt; 매각현황 &gt; 상세보기</p>
    </div>

    <!-- 상세 -->
    <div class="erp-card" id="saleDetailSection">
      <div class="card-header card-header-detail">
        <h2>매각 상세 정보</h2>
        <button type="button" class="btn btn-secondary" onclick="goBack()">목록으로</button>
      </div>
      <div class="card-body card-body-detail">

        <div class="form-section">
          <h3 class="section-title">차량 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>차량관리번호</label>
              <div class="detail-value" id="vehicleMgmtNo">-</div>
            </div>
            <div class="detail-item">
              <label>차량번호</label>
              <div class="detail-value" id="vehicleNo">-</div>
            </div>
            <div class="detail-item">
              <label>차종</label>
              <div class="detail-value" id="carModel">-</div>
            </div>
            <div class="detail-item">
              <label>차대번호</label>
              <div class="detail-value" id="chassisNo">-</div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">매각 정보</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>매각일자</label>
              <div class="detail-value" id="saleDate">-</div>
            </div>
            <div class="detail-item">
              <label>매각처</label>
              <div class="detail-value" id="buyer">-</div>
            </div>
            <div class="detail-item">
              <label>매각금액</label>
              <div class="detail-value" id="saleAmount">-</div>
            </div>
            <div class="detail-item">
              <label>공급가액</label>
              <div class="detail-value" id="supplyAmount">-</div>
            </div>
            <div class="detail-item">
              <label>세액</label>
              <div class="detail-value" id="taxAmount">-</div>
            </div>
            <div class="detail-item">
              <label>상태</label>
              <div class="detail-value" id="status">-</div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="editSaleBtn">수정하기</button>
        </div>
      </div>
    </div>

    <!-- 수정 -->
    <div class="erp-card hidden" id="saleEditSection">
      <div class="card-header card-header-detail">
        <h2>매각 정보 수정</h2>
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">취소</button>
      </div>
      <div class="card-body card-body-detail">
        <form id="saleEditForm">

          <div class="form-section">
            <h3 class="section-title">차량 정보</h3>
            <div class="detail-grid">
              <div class="detail-item">
                <label>차량관리번호</label>
                <div class="detail-value" id="editVehicleMgmtNo">-</div>
              </div>
              <div class="detail-item">
                <label>차량번호</label>
                <div class="detail-value" id="editVehicleNo">-</div>
              </div>
              <div class="detail-item">
                <label>차종</label>
                <div class="detail-value" id="editCarModel">-</div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">매각 정보</h3>
            <div class="detail-grid">
              <div class="detail-item">
                <label for="editSaleDate">매각일자</label>
                <input type="date" id="editSaleDate" class="form-input" required>
              </div>
              <div class="detail-item">
                <label for="editBuyer">매각처</label>
                <input type="text" id="editBuyer" class="form-input" required>
              </div>
              <div class="detail-item">
                <label for="editSaleAmount">매각금액</label>
                <input type="number" id="editSaleAmount" class="form-input" required>
              </div>

              <div class="detail-item">
                <label>공급가액(자동)</label>
                <div class="detail-value" id="editSupplyAmount">0</div>
              </div>
              <div class="detail-item">
                <label>세액(자동)</label>
                <div class="detail-value" id="editTaxAmount">0</div>
              </div>

              <div class="detail-item">
                <label for="editStatus">상태</label>
                <input type="text" id="editStatus" class="form-input" placeholder="예: 완료">
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="resetEditBtn">초기화</button>
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");
    const $ = (id) => document.getElementById(id);

    async function mustOk(res){
      if(res.ok) return res;
      let msg = "HTTP " + res.status;
      try{ const b = await res.json(); msg = b.message || b.error || b.msg || msg; }catch(e){}
      throw new Error(msg);
    }
    async function fetchJson(url, opt){
      const res = await fetch(url, opt);
      await mustOk(res);
      return res.json();
    }

    const urlParams = new URLSearchParams(window.location.search);
    const saleId = urlParams.get('id');

    const saleDetailSection = $('saleDetailSection');
    const saleEditSection = $('saleEditSection');

    let current = null;

    function renderDetail(d){
      $('vehicleMgmtNo').textContent = d.vehicleMgmtNo || '-';
      $('vehicleNo').textContent = d.vehicleNo || '-';
      $('carModel').textContent = d.carModel || '-';
      $('chassisNo').textContent = d.chassisNo || '-';

      $('saleDate').textContent = d.saleDate || '-';
      $('buyer').textContent = d.buyer || '-';
      $('saleAmount').textContent = (d.saleAmount ?? 0).toLocaleString() + '원';
      $('supplyAmount').textContent = (d.supplyAmount ?? 0).toLocaleString() + '원';
      $('taxAmount').textContent = (d.taxAmount ?? 0).toLocaleString() + '원';
      $('status').textContent = d.status || '-';
    }

    function calcEditTax(){
      const saleAmount = Number($('editSaleAmount').value || 0);
      const supply = Math.round(saleAmount / 1.1);
      const tax = Math.round(saleAmount - supply);
      $('editSupplyAmount').textContent = supply.toLocaleString() + '원';
      $('editTaxAmount').textContent = tax.toLocaleString() + '원';
    }
    $('editSaleAmount').addEventListener('input', calcEditTax);

    function fillEdit(d){
      $('editVehicleMgmtNo').textContent = d.vehicleMgmtNo || '-';
      $('editVehicleNo').textContent = d.vehicleNo || '-';
      $('editCarModel').textContent = d.carModel || '-';

      $('editSaleDate').value = d.saleDate || '';
      $('editBuyer').value = d.buyer || '';
      $('editSaleAmount').value = d.saleAmount ?? 0;
      $('editStatus').value = d.status || '완료';
      calcEditTax();
    }

    async function load(){
      if(!saleId){ alert('id 파라미터가 없습니다.'); goBack(); return; }
      try{
        current = await fetchJson(`${BASE}/api/vehicle-sales/${encodeURIComponent(saleId)}`);
        renderDetail(current);
      }catch(e){
        console.error(e);
        alert('상세 조회 실패: ' + e.message);
        goBack();
      }
    }

    $('editSaleBtn').addEventListener('click', ()=>{
      fillEdit(current);
      saleDetailSection.classList.add('hidden');
      saleEditSection.classList.remove('hidden');
    });

    $('cancelEditBtn').addEventListener('click', ()=>{
      if(!confirm('수정을 취소하시겠습니까?')) return;
      saleEditSection.classList.add('hidden');
      saleDetailSection.classList.remove('hidden');
    });

    $('resetEditBtn').addEventListener('click', ()=>{
      if(!confirm('입력을 초기화할까요?')) return;
      fillEdit(current);
    });

    $('saleEditForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      if(!confirm('수정하시겠습니까?')) return;

      const payload = {
        saleDate: $('editSaleDate').value,
        buyer: $('editBuyer').value.trim(),
        saleAmount: Number($('editSaleAmount').value || 0),
        status: $('editStatus').value.trim() || '완료'
      };

      try{
        const updated = await fetchJson(`${BASE}/api/vehicle-sales/${encodeURIComponent(saleId)}`, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });
        current = updated;
        renderDetail(current);
        saleEditSection.classList.add('hidden');
        saleDetailSection.classList.remove('hidden');
        alert('수정되었습니다.');
      }catch(err){
        console.error(err);
        alert('수정 실패: ' + err.message);
      }
    });

    function goBack(){
      window.location.href = 'vehicle_sale_status.html';
    }
    window.goBack = goBack;

    load();
  </script>
</body>
</html>
