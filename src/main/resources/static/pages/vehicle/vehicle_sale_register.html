<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매각 등록 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_sale_register.css">
  <style>
    .input-with-icon { position: relative; }
    .input-with-icon input { width: 100%; padding-right: 44px; }

    .icon-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover { background: #f5f5f5; }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 9998;
    }

    .modal {
      display: none;
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(920px, 92vw);
      max-height: 80vh;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      z-index: 9999;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .modal-close {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .modal-close:hover { background: #f3f4f6; }

    .modal-body {
      padding: 14px 16px 16px;
      overflow: auto;
      max-height: calc(80vh - 58px);
    }

    .modal-searchbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .modal-searchbar input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    .modal-searchbar button {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .modal-searchbar button:hover { background: #f5f5f5; }

    .modal-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .modal-table thead th {
      text-align: left;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      font-weight: 700;
      position: sticky;
      top: 0;
    }

    .modal-table tbody td {
      padding: 10px;
      border-bottom: 1px solid #f1f5f9;
    }

    .modal-table tbody tr:hover {
      background: #f9fafb;
      cursor: pointer;
    }

    .muted { color: #6b7280; }
    .error-text { color: #dc2626; font-weight: 600; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <div class="content-wrapper">
    <div class="page-header">
      <h1>매각 등록</h1>
      <p>차량관리 &gt; 매각관리 &gt; 매각등록</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <form id="saleForm">
          <!-- 차량 조회 섹션 -->
          <div class="form-section">
            <h3 class="section-title">차량 조회</h3>

            <div class="search-group">
              <div class="form-group">
                <label for="vehicleManagementId">차량관리번호</label>
                <div class="input-with-icon">
                  <input type="text" id="vehicleManagementId" name="vehicleManagementId" placeholder="예: J000001">
                  <button type="button" class="icon-btn" id="vehiclePickerBtn" title="차량 선택">🔍</button>
                </div>
              </div>

              <div class="form-group">
                <label for="searchVehicleNo">차량번호</label>
                <input type="text" id="searchVehicleNo" placeholder="예: 12가3456" readonly>
              </div>

              <button type="button" class="btn-search" id="loadVehicleBtn">조회</button>
            </div>

            <!-- 차량 정보 표시 -->
            <div class="vehicle-info" id="vehicleInfo">
              <h4>차량 정보</h4>
              <div class="info-row">
                <div class="info-item">
                  <span class="info-label">차량번호</span>
                  <span class="info-value" id="displayVehicleNumber">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">차종</span>
                  <span class="info-value" id="displayVehicleModel">-</span>
                </div>
                <div class="info-item">
                  <span class="info-label">차대번호</span>
                  <span class="info-value" id="displayVinNumber">-</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 매각 정보 섹션 -->
          <div class="form-section">
            <h3 class="section-title">매각 정보</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="saleDate" class="required">매각일자</label>
                <input type="date" id="saleDate" name="saleDate" required>
              </div>

              <div class="form-group">
                <label for="buyer" class="required">매각처</label>
                <input type="text" id="buyer" name="buyer" placeholder="매각처를 입력하세요" required>
              </div>

              <div class="form-group">
                <label for="saleAmount" class="required">매각금액</label>
                <input type="number" id="saleAmount" name="saleAmount" placeholder="매각금액을 입력하세요" required>
              </div>
            </div>

            <div class="calculation-box">
              <h5>세금 계산</h5>
              <div class="calc-item">
                <span class="calc-label">공급가액 (매각금액 / 1.1)</span>
                <span class="calc-value" id="supplyAmount">0 원</span>
              </div>
              <div class="calc-item">
                <span class="calc-label">세액 (매각금액 - 공급가액)</span>
                <span class="calc-value" id="taxAmount">0 원</span>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="resetBtn">초기화</button>
            <button type="submit" class="btn btn-primary">매각 등록</button>
            <button type="button" class="btn btn-print" id="printBtn">출력</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 차량 선택 모달 -->
  <div class="modal-backdrop" id="pickerBackdrop"></div>
  <div class="modal" id="pickerModal">
    <div class="modal-header">
      <h3>차량 선택</h3>
      <button type="button" class="modal-close" id="pickerCloseBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-searchbar">
        <input type="text" id="pickerKw" placeholder="차량관리번호/차량번호/차종 검색">
        <button type="button" id="pickerSearchBtn">검색</button>
      </div>
      <div class="muted" style="margin-bottom:8px;">모달이 열리면 자동으로 전체조회됩니다.</div>

      <table class="modal-table">
        <thead>
          <tr>
            <th style="width:140px;">차량관리번호</th>
            <th style="width:140px;">차량번호</th>
            <th>차종</th>
          </tr>
        </thead>
        <tbody id="pickerBody">
          <tr><td class="muted" colspan="3">조회중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function mustOk(res) {
      if (res.ok) return res;

      let msg = "HTTP " + res.status;
      try {
        const b = await res.json();
        msg = b.message || b.error || b.msg || msg;
      } catch (e) {}

      throw new Error(msg);
    }

    async function fetchJson(url, opt) {
      const res = await fetch(url, opt);
      await mustOk(res);
      return res.json();
    }

    // ===== 차량 정보 표시 =====
    function showVehicleInfo({ vehicleNo, carModel, chassisNo }) {
      $("displayVehicleNumber").textContent = vehicleNo || "-";
      $("displayVehicleModel").textContent = carModel || "-";
      $("displayVinNumber").textContent = chassisNo || "-";
      $("vehicleInfo").classList.add("active");
    }

    function clearVehicleInfo() {
      $("displayVehicleNumber").textContent = "-";
      $("displayVehicleModel").textContent = "-";
      $("displayVinNumber").textContent = "-";
      $("vehicleInfo").classList.remove("active");
    }

    // ===== 세금 계산 =====
    function calcAndRender() {
      const saleAmount = parseFloat($("saleAmount").value) || 0;
      const supply = Math.round(saleAmount / 1.1);
      const tax = Math.round(saleAmount - supply);

      $("supplyAmount").textContent = supply.toLocaleString() + " 원";
      $("taxAmount").textContent = tax.toLocaleString() + " 원";
    }

    $("saleAmount").addEventListener("input", calcAndRender);

    // ===== 차량 상세 조회(차량관리번호로) =====
    async function loadVehicleByMgmtNo() {
      const mgmtNo = $("vehicleManagementId").value.trim();
      if (!mgmtNo) {
        alert("차량관리번호를 입력/선택하세요.");
        return;
      }

      try {
        const v = await fetchJson(`${BASE}/api/vehicle-orders/${encodeURIComponent(mgmtNo)}`);

        const vehicleNo = v.vehicleNo || v.vehicleNumber || v.vehicle_no || "";
        const carModel = v.carModel || v.vehicleModel || v.car_model || "";
        const chassisNo = v.chassisNo || v.vinNumber || v.chassis_no || "";

        $("searchVehicleNo").value = vehicleNo;
        showVehicleInfo({ vehicleNo, carModel, chassisNo });
      } catch (e) {
        console.error(e);
        alert("차량 조회 실패: " + e.message);
        clearVehicleInfo();
      }
    }

    $("loadVehicleBtn").addEventListener("click", loadVehicleByMgmtNo);

    // ===== 출력 =====
    $("printBtn").addEventListener("click", () => {
      if (!$("vehicleInfo").classList.contains("active")) {
        alert("먼저 차량을 조회해주세요.");
        return;
      }
      window.print();
    });

    // ===== 모달(차량 선택) =====
    const picker = {
      open() {
        $("pickerBackdrop").style.display = "block";
        $("pickerModal").style.display = "block";
        $("pickerKw").value = "";
        $("pickerBody").innerHTML = `<tr><td class="muted" colspan="3">조회중...</td></tr>`;

        setTimeout(() => {
          $("pickerKw").focus();
          pickerSearch("");
        }, 0);
      },

      close() {
        $("pickerBackdrop").style.display = "none";
        $("pickerModal").style.display = "none";
      }
    };

    async function pickerSearch(kw) {
      $("pickerBody").innerHTML = `<tr><td class="muted" colspan="3">조회중...</td></tr>`;

      try {
        const res = await fetch(`${BASE}/api/vehicle-orders/search?kw=${encodeURIComponent(kw ?? "")}`);
        await mustOk(res);
        const list = await res.json();

        if (!Array.isArray(list) || list.length === 0) {
          $("pickerBody").innerHTML = `<tr><td class="muted" colspan="3">검색 결과 없음</td></tr>`;
          return;
        }

        $("pickerBody").innerHTML = list.map(v => `
          <tr data-mgmt="${escapeHtml(v.vehicleMgmtNo || "")}">
            <td>${escapeHtml(v.vehicleMgmtNo || "-")}</td>
            <td>${escapeHtml(v.vehicleNo || "-")}</td>
            <td>${escapeHtml(v.carModel || "-")}</td>
          </tr>
        `).join("");

        [...$("pickerBody").querySelectorAll("tr")].forEach(tr => {
          tr.addEventListener("click", async () => {
            const mgmt = tr.getAttribute("data-mgmt") || "";
            if (!mgmt) {
              alert("차량관리번호가 없습니다.");
              return;
            }

            $("vehicleManagementId").value = mgmt;
            picker.close();
            await loadVehicleByMgmtNo();
          });
        });
      } catch (e) {
        $("pickerBody").innerHTML = `<tr><td class="error-text" colspan="3">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    $("vehiclePickerBtn").addEventListener("click", () => picker.open());
    $("pickerBackdrop").addEventListener("click", () => picker.close());
    $("pickerCloseBtn").addEventListener("click", () => picker.close());

    $("pickerSearchBtn").addEventListener("click", () => {
      pickerSearch($("pickerKw").value.trim());
    });

    $("pickerKw").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        pickerSearch($("pickerKw").value.trim());
      }
      if (e.key === "Escape") {
        picker.close();
      }
    });

    // ===== 등록 =====
    $("saleForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const mgmtNo = $("vehicleManagementId").value.trim();
      if (!mgmtNo) {
        alert("차량관리번호를 선택하세요.");
        return;
      }

      if (!$("vehicleInfo").classList.contains("active")) {
        alert("차량 조회를 먼저 하세요.");
        return;
      }

      const payload = {
        vehicleMgmtNo: mgmtNo,
        vehicleNo: $("searchVehicleNo").value.trim(),
        saleDate: $("saleDate").value,
        buyer: $("buyer").value.trim(),
        saleAmount: Number($("saleAmount").value || 0)
      };

      try {
        const saved = await fetchJson(`${BASE}/api/vehicle-sales`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        alert("매각 등록 완료");
        window.location.href = `vehicle_sale_detail.html?id=${encodeURIComponent(saved.id)}`;
      } catch (e2) {
        console.error(e2);
        alert("매각 등록 실패: " + e2.message);
      }
    });

    // ===== 초기화 =====
    $("resetBtn").addEventListener("click", () => {
      if (!confirm("모든 입력 내용을 초기화하시겠습니까?")) return;

      $("saleForm").reset();
      clearVehicleInfo();
      $("searchVehicleNo").value = "";
      $("supplyAmount").textContent = "0 원";
      $("taxAmount").textContent = "0 원";

      const today = new Date().toISOString().split("T")[0];
      $("saleDate").value = today;
    });

    window.addEventListener("load", () => {
      const today = new Date().toISOString().split("T")[0];
      $("saleDate").value = today;
      calcAndRender();
    });
  </script>
</body>
</html>
