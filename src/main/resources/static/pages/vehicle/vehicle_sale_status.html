<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매각 현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_sale_status.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>매각 현황</h1>
      <p>차량관리 &gt; 매각관리 &gt; 매각현황</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <div class="search-section">
          <div class="search-grid">
            <div class="form-group">
              <label for="searchStartDate">시작일</label>
              <input type="date" id="searchStartDate">
            </div>
            <div class="form-group">
              <label for="searchEndDate">종료일</label>
              <input type="date" id="searchEndDate">
            </div>
            <div class="form-group">
              <label for="searchBuyer">매각처</label>
              <input type="text" id="searchBuyer" placeholder="매각처 검색">
            </div>
            <div class="form-group">
              <label>&nbsp;</label>
              <button type="button" class="btn-search" id="searchBtn">검색</button>
            </div>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>No</th>
                <th>차량관리번호</th>
                <th>차량번호</th>
                <th>차종</th>
                <th>매각일자</th>
                <th>매각처</th>
                <th>매각금액</th>
                <th>공급가액</th>
                <th>세액</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="salesTableBody">
              <tr><td colspan="10" style="text-align:center; color:#888;">검색하세요.</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script>
    const BASE = (typeof API_BASE_URL !== "undefined" ? API_BASE_URL : "").replace(/\/+$/, "");
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll("\"","&quot;").replaceAll("'","&#039;");
    }
    async function mustOk(res){
      if(res.ok) return res;
      let msg = "HTTP " + res.status;
      try{ const b = await res.json(); msg = b.message || b.error || b.msg || msg; }catch(e){}
      throw new Error(msg);
    }

    function goToDetail(id){
      window.location.href = `vehicle_sale_detail.html?id=${encodeURIComponent(id)}`;
    }

    function render(list){
      const tbody = $('salesTableBody');
      if(!Array.isArray(list) || list.length === 0){
        tbody.innerHTML = `
          <tr>
            <td colspan="10" class="no-data">
              <div class="no-data-icon">📋</div>
              <div>검색 결과가 없습니다.</div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = list.map((it, idx)=>`
        <tr style="cursor:pointer;" onclick="goToDetail('${String(it.id).replaceAll("'","")}')">
          <td>${idx+1}</td>
          <td>${escapeHtml(it.vehicleMgmtNo || '-')}</td>
          <td>${escapeHtml(it.vehicleNo || '-')}</td>
          <td>${escapeHtml(it.carModel || '-')}</td>
          <td>${escapeHtml(it.saleDate || '-')}</td>
          <td>${escapeHtml(it.buyer || '-')}</td>
          <td class="amount-cell">${(it.saleAmount ?? 0).toLocaleString()}</td>
          <td class="amount-cell">${(it.supplyAmount ?? 0).toLocaleString()}</td>
          <td class="amount-cell">${(it.taxAmount ?? 0).toLocaleString()}</td>
          <td>${escapeHtml(it.status || '-')}</td>
        </tr>
      `).join('');
    }

    async function searchSales(){
      const startDate = $('searchStartDate').value;
      const endDate = $('searchEndDate').value;
      const buyer = $('searchBuyer').value.trim();

      const qs = new URLSearchParams();
      if(startDate) qs.set('startDate', startDate);
      if(endDate) qs.set('endDate', endDate);
      if(buyer) qs.set('buyer', buyer);

      const tbody = $('salesTableBody');
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color:#888;">조회중...</td></tr>`;

      try{
        const res = await fetch(`${BASE}/api/vehicle-sales?${qs.toString()}`);
        await mustOk(res);
        const data = await res.json();
        render(data);
      }catch(e){
        tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color:#d00;">오류: ${escapeHtml(e.message)}</td></tr>`;
      }
    }

    document.addEventListener('DOMContentLoaded', ()=>{
      const today = new Date();
      const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      $('searchStartDate').value = startOfMonth.toISOString().split('T')[0];
      $('searchEndDate').value = today.toISOString().split('T')[0];

      $('searchBtn').addEventListener('click', searchSales);

      // 엔터로 검색
      ['searchStartDate','searchEndDate','searchBuyer'].forEach(id=>{
        $(id).addEventListener('keydown', (e)=>{
          if(e.key === 'Enter'){ e.preventDefault(); searchSales(); }
        });
      });

      // 최초 자동조회(원치 않으면 삭제)
      searchSales();
    });
  </script>
</body>
</html>
