<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차량상태 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <style>
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-bar input, .filter-bar select {
      height: 36px;
      padding: 0 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
    }
    .filter-bar input { min-width: 180px; }

    .state-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .state-table th, .state-table td {
      padding: 10px 11px;
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
    }
    .state-table th {
      background: #f8fafc;
      font-weight: 700;
      text-align: center;
    }
    .state-table td { text-align: center; }
    .state-table td.left { text-align: left; }
    .state-table .amount { text-align: right; }
    .state-table tbody tr:hover { background: #f0f7ff; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-contract  { background: #dbeafe; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-standby   { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
    .badge-sold      { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }

    .summary-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .summary-chip {
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }
    .summary-chip span { font-weight: 800; margin-left: 4px; }

    @media (prefers-color-scheme: dark) {
      .state-table th { background: #1e293b; }
      .state-table tbody tr:hover { background: #1e3a5f; }
      .summary-chip { background: #1e293b; border-color: #334155; }
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>차량상태</h1>
      <p>차량등록 &gt; 차량상태</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <div class="filter-bar">
          <input type="text" id="filterKeyword" placeholder="차량번호 / 차량관리번호 / 차종 / 계약자명 검색">
          <select id="filterState">
            <option value="">전체 상태</option>
            <option value="계약">계약</option>
            <option value="대기">대기</option>
            <option value="매각">매각</option>
          </select>
          <button type="button" class="btn btn-primary" onclick="applyFilter()">조회</button>
          <button type="button" class="btn btn-secondary" onclick="resetFilter()">초기화</button>
        </div>

        <div class="summary-bar" id="summaryBar"></div>

        <div class="table-container" style="overflow-x:auto;">
          <table class="state-table">
            <thead>
              <tr>
                <th>순번</th>
                <th>차량번호</th>
                <th>차량관리번호</th>
                <th class="left">차종</th>
                <th>차량가격</th>
                <th>차량상태</th>
                <th>계약자명</th>
                <th>계약시작일</th>
                <th>계약종료일</th>
                <th>차량등록일</th>
              </tr>
            </thead>
            <tbody id="stateTableBody">
              <tr><td colspan="10" style="padding:20px; color:#94a3b8;">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/html-escape.js"></script>
  <script>
    const API_BASE = (typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : '').replace(/\/+$/, '');

    let allData = [];
    let filtered = [];

    function fmtMoney(v) {
      if (v == null) return '-';
      return Number(v).toLocaleString() + '원';
    }

    function stateBadge(state) {
      if (state === '계약') return `<span class="badge badge-contract">계약</span>`;
      if (state === '대기') return `<span class="badge badge-standby">대기</span>`;
      if (state === '매각') return `<span class="badge badge-sold">매각</span>`;
      return escHtml(state ?? '');
    }

    function renderSummary(data) {
      const counts = { 계약: 0, 대기: 0, 매각: 0 };
      data.forEach(r => { if (counts[r.vehicleState] !== undefined) counts[r.vehicleState]++; });
      document.getElementById('summaryBar').innerHTML = `
        <div class="summary-chip">전체<span>${data.length}</span>대</div>
        <div class="summary-chip">계약<span>${counts.계약}</span>대</div>
        <div class="summary-chip">대기<span>${counts.대기}</span>대</div>
        <div class="summary-chip">매각<span>${counts.매각}</span>대</div>
      `;
    }

    function renderTable(data) {
      const tbody = document.getElementById('stateTableBody');
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="10" style="padding:18px;color:#94a3b8;">데이터가 없습니다.</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${escHtml(r.vehicleNo ?? '-')}</td>
          <td>${escHtml(r.vehicleMgmtNo ?? '-')}</td>
          <td class="left">${escHtml(r.carModel ?? '-')}</td>
          <td class="amount">${fmtMoney(r.vehiclePrice)}</td>
          <td>${stateBadge(r.vehicleState)}</td>
          <td>${r.vehicleState === '대기' ? '' : escHtml(r.contractorName ?? '-')}</td>
          <td>${r.contractStartDate ?? ''}</td>
          <td>${r.contractEndDate ?? ''}</td>
          <td>${r.registeredDate ?? ''}</td>
        </tr>
      `).join('');
    }

    function applyFilter() {
      const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();
      const state = document.getElementById('filterState').value;

      filtered = allData.filter(r => {
        if (state && r.vehicleState !== state) return false;
        if (!kw) return true;
        return (
          (r.vehicleNo ?? '').toLowerCase().includes(kw) ||
          (r.vehicleMgmtNo ?? '').toLowerCase().includes(kw) ||
          (r.carModel ?? '').toLowerCase().includes(kw) ||
          (r.contractorName ?? '').toLowerCase().includes(kw)
        );
      });
      renderSummary(filtered);
      renderTable(filtered);
    }

    function resetFilter() {
      document.getElementById('filterKeyword').value = '';
      document.getElementById('filterState').value = '';
      filtered = [...allData];
      renderSummary(filtered);
      renderTable(filtered);
    }

    document.getElementById('filterKeyword').addEventListener('keydown', e => {
      if (e.key === 'Enter') applyFilter();
    });

    async function load() {
      try {
        const res = await fetch(API_BASE + '/api/vehicle-orders/state');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allData = await res.json();
        filtered = [...allData];
        renderSummary(filtered);
        renderTable(filtered);
      } catch (e) {
        document.getElementById('stateTableBody').innerHTML =
          `<tr><td colspan="10" style="padding:18px;color:#dc2626;">로드 실패: ${e.message}</td></tr>`;
      }
    }

    load();
  </script>
</body>
</html>
