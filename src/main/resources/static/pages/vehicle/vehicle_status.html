<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>차량현황 | JDEND ERP</title>
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/vehicle/vehicle_status.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="content-wrapper">
    <div class="page-header">
      <h1>차량현황</h1>
      <p>차량등록 &gt; 차량현황</p>
    </div>

    <div class="erp-card">
      <div class="card-body">
        <!-- 검색 섹션 -->
        <div class="search-section">
          <div class="search-row">
            <div class="form-group">
              <label for="searchStartDate">발주일자</label>
              <div class="date-range">
                <input type="date" id="searchStartDate">
                <span>~</span>
                <input type="date" id="searchEndDate">
              </div>
            </div>
            <div class="form-group">
              <label for="searchStatus">발주상태</label>
              <select id="searchStatus">
                <option value="">전체</option>
                <option value="발주전">발주전</option>
                <option value="발주완료">발주완료</option>
                <option value="출고완료">출고완료</option>
                <option value="등록완료">등록완료</option>
                <option value="실행완료">실행완료</option>
              </select>
            </div>
            <div class="button-group">
              <button type="button" class="btn-search" onclick="searchVehicle()">조회하기</button>
              <button type="button" class="btn-add" onclick="goToRegister()">+ 등록추가</button>
            </div>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>순번</th>
                <th>발주상태</th>
                <th>차량관리번호</th>
                <th>제작사계약번호</th>
                <th>차종</th>
                <th>옵션명</th>
                <th>차량가격</th>
                <th>옵션가격</th>
                <th>총차량가</th>
                <th>발주일자</th>
                <th>차대번호</th>
                <th>출고가</th>
                <th>총 선급가액</th>
                <th>차량번호</th>
                <th>등록일자</th>
              </tr>
            </thead>
            <tbody id="vehicleTableBody">
              <tr>
                <td colspan="15" class="no-data">조회하기를 눌러 데이터를 불러오세요.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/html-escape.js"></script>
  <script>
    const API_BASE = '/api/vehicle-orders';

    window.addEventListener('DOMContentLoaded', function() {
      const today = new Date();
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      document.getElementById('searchStartDate').value = firstDay.toISOString().split('T')[0];
      document.getElementById('searchEndDate').value = today.toISOString().split('T')[0];
      searchVehicle();
    });

    async function searchVehicle() {
      const tbody = document.getElementById('vehicleTableBody');
      try {
        const startDate = document.getElementById('searchStartDate').value;
        const endDate = document.getElementById('searchEndDate').value;
        const status = document.getElementById('searchStatus').value;

        const url = new URL(API_BASE, window.location.origin);
        if (startDate) url.searchParams.set('startDate', startDate);
        if (endDate) url.searchParams.set('endDate', endDate);
        if (status) url.searchParams.set('status', status);

        const res = await fetch(url.toString(), { credentials: 'include' });
        if (!res.ok) {
          tbody.innerHTML = `<tr><td colspan="15" class="no-data">조회 실패: ${res.status}</td></tr>`;
          return;
        }
        const data = await res.json();
        displayVehicle(Array.isArray(data) ? data : []);
      } catch (error) {
        console.error('조회 오류:', error);
        tbody.innerHTML = `<tr><td colspan="15" class="no-data">조회 중 오류가 발생했습니다.</td></tr>`;
      }
    }

    function getStatusClass(status) {
      switch(status) {
        case '발주전': return 'status-before';
        case '발주완료': return 'status-ordered';
        case '출고완료': return 'status-released';
        case '등록완료': return 'status-registered';
        case '실행완료': return 'status-executed';
        default: return '';
      }
    }

    function fmt(n) {
      if (n === null || n === undefined || n === '') return '-';
      const num = Number(n);
      return isNaN(num) ? '-' : num.toLocaleString();
    }

    function displayVehicle(data) {
      const tbody = document.getElementById('vehicleTableBody');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="15" class="no-data">검색 결과가 없습니다.</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map((item, index) => {
        const statusLabel = item.orderStatus ?? '-';
        const statusClass = getStatusClass(statusLabel);
        return `
          <tr onclick="viewDetail('${escHtml(item.vehicleMgmtNo)}')">
            <td>${index + 1}</td>
            <td><span class="status-badge ${statusClass}">${escHtml(statusLabel)}</span></td>
            <td>${escHtml(item.vehicleMgmtNo ?? '-')}</td>
            <td>${escHtml(item.makerContractNo ?? '-')}</td>
            <td>${escHtml(item.carModel ?? '-')}</td>
            <td>${escHtml(item.optionName ?? '-')}</td>
            <td class="amount-cell">${fmt(item.vehiclePrice)}</td>
            <td class="amount-cell">${item.optionPrice ? fmt(item.optionPrice) : '-'}</td>
            <td class="amount-cell">${fmt(item.totalPrice)}</td>
            <td>${item.orderDate ?? '-'}</td>
            <td>${escHtml(item.chassisNo ?? '-')}</td>
            <td class="amount-cell">${item.releasePrice ? fmt(item.releasePrice) : '-'}</td>
            <td class="amount-cell">${item.totalAdvancePrice ? fmt(item.totalAdvancePrice) : '-'}</td>
            <td>${escHtml(item.vehicleNo ?? '-')}</td>
            <td>${item.registerDate ?? '-'}</td>
          </tr>
        `;
      }).join('');
    }

    function goToRegister() {
      window.location.href = 'vehicle_order.html';
    }

    function viewDetail(vehicleMgmtNo) {
      window.location.href = 'vehicle_detail.html?id=' + encodeURIComponent(vehicleMgmtNo);
    }
  </script>
</body>
</html>
